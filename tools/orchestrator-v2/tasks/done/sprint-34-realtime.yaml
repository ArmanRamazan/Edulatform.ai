phase: "sprint-34"
description: "Real-time — WebSocket notifications + coach SSE streaming frontend"

tasks:
  - id: ws-notification-frontend
    title: "WebSocket hook and TopBar live notification badge"
    scope: frontend
    type: feat
    prompt: |
      Task: Add WebSocket connection for live notification count in TopBar.

      CONTEXT:
      - Buyer app: apps/buyer/
      - TopBar: apps/buyer/components/layout/TopBar.tsx — has bell icon with notification count
      - ws-gateway at port 8011 is defined in docker-compose (Rust WebSocket server)
      - JWT token available via useAuth()
      - Current: notification count fetched via REST polling

      WHAT TO BUILD:

      1. apps/buyer/hooks/use-websocket.ts ("use client"):
         - useWebSocket(token: string | null) hook
         - Connects to ws://localhost:8011/ws?token={jwt}
         - Handles: open, message, close, error events
         - Auto-reconnect with exponential backoff (1s, 2s, 4s, max 30s)
         - Returns: { isConnected, lastMessage, notificationCount }
         - On message type "notification": update notificationCount
         - Cleanup: close connection on unmount
         - Graceful: if WS unavailable, silently fallback (no errors in UI)

      2. Update TopBar.tsx:
         - Use useWebSocket(token) to get live notificationCount
         - Fallback: if WS not connected, use existing REST polling
         - Badge animates when count changes (brief scale bounce)
         - Green dot indicator when WS connected (subtle, in corner of bell icon)

      3. If ws-gateway is not running (connection fails):
         - No errors shown to user
         - Falls back to REST polling seamlessly
         - Log to console: "WebSocket unavailable, using polling"

      RULES:
      - WebSocket is enhancement, not requirement — app works without it
      - No external WebSocket libraries — use native WebSocket API
      - Named exports
      - Clean reconnect logic (don't leak connections)

      COMMIT: feat(buyer): add WebSocket hook for live notification badge
    test: "cd /mnt/c/Users/aquam/PetProject/Merket_for_10_M_uesr/apps/buyer && pnpm build"
    depends_on: []

  - id: coach-streaming-frontend
    title: "Coach streaming UI with typing indicator"
    scope: frontend
    type: feat
    prompt: |
      Task: Add EventSource-based streaming for coach responses in mission sessions.

      CONTEXT:
      - Buyer app: apps/buyer/
      - Mission session: apps/buyer/components/mission/MissionSession.tsx
      - Coach hook: apps/buyer/hooks/use-coach.ts — sendMessage() returns full text
      - AI service will have SSE endpoint: GET /ai/coach/stream/{session_id}
      - Each SSE event: data: {"token": "word", "done": false}
      - Final event: data: {"token": "", "done": true, "full_text": "..."}

      WHAT TO BUILD:

      1. apps/buyer/hooks/use-coach-stream.ts:
         - useCoachStream(sessionId: string, token: string) hook
         - startStream(userMessage: string): initiates SSE connection
         - State: { isStreaming, currentText, isComplete }
         - On each SSE event: append token to currentText
         - On done event: set isComplete=true, update currentText with full_text
         - On error: fallback to regular POST sendMessage()
         - Cleanup: close EventSource on unmount

      2. apps/buyer/components/mission/StreamingMessage.tsx ("use client"):
         - Renders text that grows token by token
         - Typing cursor: blinking violet bar at end while streaming
         - Code blocks: detect ``` markers, render with JetBrains Mono font
         - Smooth scroll container follows new content
         - When done: cursor disappears, message is complete

      3. apps/buyer/components/mission/TypingIndicator.tsx:
         - Three bouncing dots animation (violet)
         - Shown before first token arrives
         - Disappears when streaming starts

      4. Update MissionSession.tsx:
         - When coach responds: show TypingIndicator → then StreamingMessage
         - Use useCoachStream if SSE available, fallback to useCoach.sendMessage()
         - Detection: try SSE first, if connection fails → fallback

      RULES:
      - SSE is enhancement — mission works without it (fallback to POST)
      - Use native EventSource API
      - Smooth animations, no content jumping
      - Named exports

      COMMIT: feat(buyer): add coach streaming UI with typing indicator
    test: "cd /mnt/c/Users/aquam/PetProject/Merket_for_10_M_uesr/apps/buyer && pnpm build"
    depends_on: []
