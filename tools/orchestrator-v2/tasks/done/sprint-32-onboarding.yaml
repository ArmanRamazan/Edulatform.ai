phase: "sprint-32"
description: "Onboarding Wizard — 5-step guided flow after registration"

tasks:
  - id: onboarding-layout
    title: "Onboarding page layout with step indicator"
    scope: frontend
    type: feat
    prompt: |
      Task: Create the onboarding wizard page with step navigation and progress indicator.

      CONTEXT:
      - Buyer app: apps/buyer/ (Next.js 15, App Router, shadcn/ui, Dark Knowledge theme)
      - Route: apps/buyer/app/(app)/onboarding/page.tsx
      - Design: 5 steps with animated progress bar at top
      - Theme: Dark background (#0a0a0f), violet accent (#7c5cfc), Inter font
      - shadcn components available: button, card, badge, progress, skeleton, tabs

      WHAT TO BUILD:

      1. apps/buyer/app/(app)/onboarding/page.tsx — Server component wrapper:
         ```tsx
         export default function OnboardingPage() {
           return <OnboardingWizard />;
         }
         ```

      2. apps/buyer/components/onboarding/OnboardingWizard.tsx ("use client"):
         - State: currentStep (1-5)
         - Top: step indicator bar (5 circles connected by line, active=violet, completed=green, upcoming=muted)
         - Progress bar below circles: violet gradient, width = (currentStep/5 * 100)%
         - Content area: renders current step component
         - Navigation: "Back" button (step > 1), "Continue" button (validated)
         - Framer Motion: slide transition between steps (left/right based on direction)
         - Persist currentStep in localStorage to survive refresh

      3. apps/buyer/components/onboarding/StepIndicator.tsx ("use client"):
         - 5 labeled circles: "Organization", "Experience", "Assessment", "Plan", "Start"
         - Connected by horizontal line
         - Active circle: ring pulse animation, violet fill
         - Completed circle: green checkmark icon
         - Upcoming: muted border only
         - Responsive: labels hidden on mobile, icons only

      4. Step container pattern:
         Each step is a separate component receiving:
         - onNext: () => void
         - onBack: () => void
         - data: accumulated wizard data (from parent state)
         - setData: update wizard data

      RULES:
      - Named exports only
      - All colors from CSS variables (not hardcoded hex)
      - Framer Motion for transitions
      - shadcn components where applicable
      - No API calls in this task (steps will add their own)

      COMMIT: feat(buyer): add onboarding wizard layout with step indicator
    test: "cd /mnt/c/Users/aquam/PetProject/Merket_for_10_M_uesr/apps/buyer && pnpm build"
    depends_on: []

  - id: onboarding-step1-org
    title: "Onboarding Step 1: Select Organization"
    scope: frontend
    type: feat
    prompt: |
      Task: Build Step 1 of onboarding — organization selection.

      CONTEXT:
      - Buyer app: apps/buyer/
      - OnboardingWizard component exists (from onboarding-layout task)
      - Hook: hooks/use-organizations.ts — useMyOrganizations(token)
      - OrgProvider: components/providers/OrgProvider.tsx — setActiveOrg()
      - Dark Knowledge theme, shadcn/ui

      WHAT TO BUILD:

      1. apps/buyer/components/onboarding/steps/OrgStep.tsx ("use client"):
         - Fetches user's organizations via useMyOrganizations(token)
         - Displays org cards in a grid (2 columns on desktop, 1 on mobile)
         - Each card: org logo (or first letter avatar), name, member count badge
         - Selected card: violet border + glow shadow
         - If only 1 org: auto-select with 1s delay + "Auto-selecting..." animation
         - If no orgs: "No organizations found. Ask your admin for an invite."
         - On select: updates OrgProvider context, calls onNext()
         - Loading: skeleton cards (3 items)

      RULES:
      - Use shadcn Card, Badge, Avatar, Skeleton
      - Selection state persisted via OrgProvider
      - Named exports, Framer Motion mount animation

      COMMIT: feat(buyer): add onboarding step 1 — organization selection
    test: "cd /mnt/c/Users/aquam/PetProject/Merket_for_10_M_uesr/apps/buyer && pnpm build"
    depends_on: [onboarding-layout]

  - id: onboarding-step2-profile
    title: "Onboarding Step 2: Role and Experience"
    scope: frontend
    type: feat
    prompt: |
      Task: Build Step 2 of onboarding — role and tech stack selection.

      CONTEXT:
      - Buyer app: apps/buyer/
      - OnboardingWizard provides data/setData props
      - Dark Knowledge theme, shadcn/ui
      - Lucide icons available (lucide-react)

      WHAT TO BUILD:

      1. apps/buyer/components/onboarding/steps/ProfileStep.tsx ("use client"):

         Section A: "What's your role?"
         - 4 cards in a row: Junior, Mid, Senior, Lead
         - Each card: icon (GraduationCap, Code2, Shield, Crown from lucide), label, brief description
         - Selected: violet border, scale(1.05) transition, glow

         Section B: "Primary tech stack?"
         - 5 cards: Python, Rust, TypeScript, Go, Java
         - Each card: language icon/emoji, name, brief "AI/ML, Web..." tags
         - Selected: same style as role cards

         Both selections required to enable "Continue" button.
         Data saved: { role: string, stack: string }
         Optional: PATCH /users/me to save to profile (fire and forget, non-blocking)

      RULES:
      - Cards use shadcn Card component
      - Smooth select animation (Framer Motion layoutId)
      - Mobile: 2 columns for cards
      - Named exports

      COMMIT: feat(buyer): add onboarding step 2 — role and experience selection
    test: "cd /mnt/c/Users/aquam/PetProject/Merket_for_10_M_uesr/apps/buyer && pnpm build"
    depends_on: [onboarding-layout]

  - id: onboarding-step3-pretest
    title: "Onboarding Step 3: AI Pretest"
    scope: frontend
    type: feat
    prompt: |
      Task: Build Step 3 of onboarding — 5-question AI pretest.

      CONTEXT:
      - Buyer app: apps/buyer/
      - Wizard data has: { role, stack } from Step 2
      - Mock mode: AI may not be available, so use local question bank
      - Existing: hooks/use-pretest.ts, lib/api.ts has pretests namespace
      - Dark Knowledge theme, shadcn/ui

      WHAT TO BUILD:

      1. apps/buyer/components/onboarding/steps/PretestStep.tsx ("use client"):
         - Local question bank: 5 questions per stack (Python, Rust, TypeScript, Go, Java)
         - Each question: { question: string, options: string[4], correct: number, explanation: string }
         - Questions shown one at a time with progress counter "Question 2/5"
         - Timer: 30s countdown bar per question (violet gradient depleting)
         - Options: 4 cards, click to select
         - After select: brief delay (0.5s), then show result:
           - Correct: green flash on card, "+1" floating badge
           - Wrong: red flash, show correct answer highlighted green, show explanation
         - Auto-advance to next question after 2s
         - After all 5: calculate score, save to wizard data

      2. Question banks (hardcoded, ~25 questions total):
         Python: ownership/GIL, decorators, async/await, list comprehension, type hints
         Rust: ownership/borrowing, lifetimes, Result/Option, traits, async
         TypeScript: generics, type guards, utility types, module patterns, strict mode
         Go: goroutines, channels, interfaces, error handling, defer
         Java: generics, streams, concurrency, spring boot, JVM

      3. Try to POST /pretests/ with results (fire-and-forget, catch errors silently)

      RULES:
      - Questions work without backend (local bank)
      - Smooth animations for question transitions (slide left)
      - Timer is purely visual (no auto-submit on timeout, just visual urgency)
      - shadcn Card, Progress, Badge
      - Named exports

      COMMIT: feat(buyer): add onboarding step 3 — AI pretest with question bank
    test: "cd /mnt/c/Users/aquam/PetProject/Merket_for_10_M_uesr/apps/buyer && pnpm build"
    depends_on: [onboarding-layout]

  - id: onboarding-step4-plan
    title: "Onboarding Step 4: Learning Plan Preview"
    scope: frontend
    type: feat
    prompt: |
      Task: Build Step 4 of onboarding — AI-generated learning plan preview.

      CONTEXT:
      - Buyer app: apps/buyer/
      - Wizard data has: { role, stack, pretestScore, pretestAnswers }
      - Dark Knowledge theme, shadcn/ui
      - Framer Motion available

      WHAT TO BUILD:

      1. apps/buyer/components/onboarding/steps/PlanStep.tsx ("use client"):

         Header: "AI analyzed your assessment" with animated checkmark icon

         Section A: Score Summary
         - Circular progress ring (SVG): pretestScore/5 as percentage
         - Color: red (<40%) / yellow (40-70%) / green (>70%)
         - Label: "Your starting level: [Beginner/Intermediate/Advanced]"
         - Framer Motion: ring fills up on mount

         Section B: Mini Concept Graph
         - Simple visualization (NOT React Flow — too heavy for this step)
         - 5-7 concept bubbles arranged in a tree/cluster
         - Colors by pretest result: green (correct topics), yellow (partial), red (incorrect)
         - Each bubble: concept name, small mastery % badge
         - Animated: bubbles appear one by one (stagger 100ms)
         - Use plain SVG or absolutely positioned divs with rounded corners

         Section C: Plan Statistics
         - "12 concepts to master"
         - "~3 weeks estimated"
         - "First mission: [concept from lowest score]"
         - Each stat: icon + number + label, fade-in stagger

         Section D: CTA
         - "Your personalized learning path is ready"
         - Continue button: "Let's begin" with subtle pulse

      RULES:
      - All data derived from pretest results (no API call needed)
      - Concept names derived from question topics in the bank
      - Animations make the page feel "alive" and impressive
      - shadcn Card, Badge, Progress
      - Named exports

      COMMIT: feat(buyer): add onboarding step 4 — learning plan preview
    test: "cd /mnt/c/Users/aquam/PetProject/Merket_for_10_M_uesr/apps/buyer && pnpm build"
    depends_on: [onboarding-step3-pretest]

  - id: onboarding-step5-start
    title: "Onboarding Step 5: Launch first mission"
    scope: frontend
    type: feat
    prompt: |
      Task: Build Step 5 of onboarding — the launch screen.

      CONTEXT:
      - Buyer app: apps/buyer/
      - Wizard data has: { org, role, stack, pretestScore, plan }
      - This is the final step — after this, user goes to dashboard
      - Dark Knowledge theme, shadcn/ui, Framer Motion

      WHAT TO BUILD:

      1. apps/buyer/components/onboarding/steps/LaunchStep.tsx ("use client"):

         Full-screen centered layout:

         - Animated title: "Ready to start your journey?" (fade + scale from 0.9)
         - Subtitle: "[User name], welcome to [Org name]" (fade in 0.5s delay)
         - Large CTA button: "Start First Mission"
           - Violet gradient background
           - Glow pulse animation (box-shadow oscillates)
           - Scale on hover (1.05)
           - Rocket icon (lucide Rocket)

         On click:
         1. Save onboarding_complete=true (localStorage + try PATCH /users/me)
         2. Redirect to /dashboard
         3. Brief transition: button shrinks, screen fades out

         Background: subtle particle/grid animation (CSS only, no heavy libs)
         - Option A: CSS grid dots that subtly move
         - Option B: radial gradient that slowly shifts

      RULES:
      - This should feel like a "launch" moment — dramatic, impressive
      - Keep animations performant (CSS transforms only, no layout triggers)
      - shadcn Button
      - Named exports

      COMMIT: feat(buyer): add onboarding step 5 — mission launch screen
    test: "cd /mnt/c/Users/aquam/PetProject/Merket_for_10_M_uesr/apps/buyer && pnpm build"
    depends_on: [onboarding-layout]

  - id: onboarding-redirect
    title: "Onboarding redirect guard"
    scope: frontend
    type: feat
    prompt: |
      Task: Add redirect logic — send new users to onboarding, completed users to dashboard.

      CONTEXT:
      - Buyer app: apps/buyer/
      - (app)/layout.tsx wraps all authenticated routes
      - useAuth() hook provides user info and token
      - Onboarding stores completion in localStorage key "onboarding_complete"

      WHAT TO BUILD:

      1. In apps/buyer/app/(app)/layout.tsx:
         - After auth check, check localStorage "onboarding_complete"
         - If not complete AND current path is not /onboarding → redirect to /onboarding
         - If complete AND current path is /onboarding → redirect to /dashboard

      2. Alternative: create a small hook apps/buyer/hooks/use-onboarding-guard.ts:
         - useOnboardingGuard() — reads localStorage, returns { isComplete, isLoading }
         - Used in layout to conditionally redirect

      RULES:
      - Do NOT use Next.js middleware for this (middleware can't read localStorage)
      - Client-side redirect via useRouter().push()
      - Brief loading state while checking (prevent flash of wrong page)
      - Named exports

      COMMIT: feat(buyer): add onboarding redirect guard
    test: "cd /mnt/c/Users/aquam/PetProject/Merket_for_10_M_uesr/apps/buyer && pnpm build"
    depends_on: [onboarding-step5-start]
