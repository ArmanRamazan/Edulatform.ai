phase: "sprint-35"
description: "B2B Seed Data — Acme Engineering org with realistic demo content"

tasks:
  - id: seed-demo-org
    title: "Seed Acme Engineering organization with members"
    scope: infra
    type: feat
    prompt: |
      Task: Extend seed script to create a demo B2B organization with members.

      CONTEXT:
      - Seed script: tools/seed/seed.py
      - Identity service DB: port 5433, user=identity, db=identity
      - Tables: users, organizations, org_members
      - Payment service DB: port 5436 — org_subscriptions
      - Docker exec: docker exec merket_for_10_m_uesr-identity-db-1 psql -U identity -c "SQL"

      WHAT TO BUILD:

      1. Add function seed_demo_org() to tools/seed/seed.py (or create tools/seed/seed_demo.py):

         a) Create demo user:
            - email: demo@acme.com, password: bcrypt hash of "demo123"
            - name: "Alex Chen", role: teacher, is_verified: true, email_verified: true
            - id: use fixed UUID (e.g., '00000000-0000-4000-a000-000000000001')

         b) Create organization:
            - name: "Acme Engineering", slug: "acme"
            - id: fixed UUID '00000000-0000-4000-b000-000000000001'

         c) Add demo user as org admin (role: admin in org_members)

         d) Create 9 team members:
            - Names: Sarah Kim, Mike Johnson, Priya Patel, James Wilson, Yuki Tanaka,
              Carlos Rodriguez, Emma Davis, Ali Hassan, Lisa Chen
            - All role=student, is_verified=true
            - All members of Acme Engineering
            - Passwords: same as email prefix (sarah123, mike123, etc.)

         e) Create org subscription in payment DB:
            - org_id: Acme UUID
            - plan: enterprise, status: active
            - current_seats: 10, max_seats: 50
            - price_cents: 100000 ($1000/mo)

      2. Make it idempotent:
         - Check if demo user exists before creating
         - Use ON CONFLICT DO NOTHING or check first

      3. Run via: docker compose --profile seed up seed
         OR: python tools/seed/seed_demo.py (direct, for development)

      RULES:
      - Fixed UUIDs for predictable references in other seed scripts
      - bcrypt for passwords (use python bcrypt module)
      - All SQL must be parameterized
      - Script must work when databases are empty or already seeded

      COMMIT: feat(seed): add Acme Engineering demo organization
    test: "echo 'Seed script created — manual verification needed'"
    depends_on: []

  - id: seed-rag-documents
    title: "Seed RAG documents and concepts for Acme org"
    scope: infra
    type: feat
    prompt: |
      Task: Seed 5 technical documents into RAG service for the demo organization.

      CONTEXT:
      - RAG service DB: port 5439, user=rag, db=rag
      - Tables: documents (id, org_id, title, source_type, content, status, created_at),
                chunks (id, document_id, content, embedding, metadata),
                org_concepts (id, org_id, name, description, relationships)
      - Acme org_id: '00000000-0000-4000-b000-000000000001'
      - Embeddings: 768-dim vectors (pgvector)

      WHAT TO BUILD:

      1. Create 5 documents in tools/seed/demo_documents/:
         - python_best_practices.md (~2000 words): Type hints, async/await, testing patterns, project structure
         - rust_ownership.md (~2000 words): Ownership, borrowing, lifetimes, smart pointers, error handling
         - typescript_patterns.md (~2000 words): Generics, utility types, React patterns, module design
         - system_design.md (~2000 words): Microservices, API design, caching, load balancing, databases
         - api_design_guide.md (~2000 words): REST conventions, versioning, pagination, error formats, auth

         These must be REAL, useful content — not lorem ipsum.

      2. Seed documents into RAG DB:
         - Insert into documents table with org_id=Acme, source_type='file', status='processed'
         - Insert chunks (split each doc into ~10 chunks of ~200 words)
         - For embeddings: insert random 768-dim vectors (normalized)
           We can't generate real embeddings without API, but random vectors let search return results

      3. Seed 47 concepts into org_concepts:
         - Extract realistic concept names from the 5 documents
         - Python: type_hints, async_await, testing, decorators, generators, context_managers, dataclasses, logging, error_handling, virtual_environments
         - Rust: ownership, borrowing, lifetimes, traits, enums, pattern_matching, error_handling, async_runtime, smart_pointers, unsafe
         - TypeScript: generics, type_guards, utility_types, react_hooks, module_patterns, strict_mode, type_inference, discriminated_unions, mapped_types
         - System Design: microservices, api_gateway, caching, load_balancing, database_sharding, event_driven, circuit_breaker, rate_limiting, monitoring
         - API: rest_conventions, versioning, pagination, authentication, error_formats, idempotency, rate_limiting_api, documentation
         - Total: ~47 concepts

      4. Seed prerequisite relationships between concepts:
         - e.g., borrowing requires ownership, generics requires type_inference
         - Create a realistic DAG (directed acyclic graph)

      RULES:
      - Real content, not placeholder text
      - Random embeddings are fine (just for making search return results)
      - Fixed UUIDs for documents (predictable)
      - Idempotent script

      COMMIT: feat(seed): add RAG documents and concepts for demo org
    test: "echo 'Seed documents created — manual verification needed'"
    depends_on: [seed-demo-org]

  - id: seed-learning-data
    title: "Seed missions, flashcards, gamification for demo user"
    scope: infra
    type: feat
    prompt: |
      Task: Seed learning data for the demo user — missions, flashcards, streaks, XP, badges.

      CONTEXT:
      - Learning service DB: port 5438, user=learning, db=learning
      - Tables: missions, concept_mastery, streaks, xp_points, flashcards, quiz_attempts,
                trust_levels, activity_feed, badges
      - Demo user_id: '00000000-0000-4000-a000-000000000001'
      - Demo org_id: '00000000-0000-4000-b000-000000000001'
      - 47 concepts seeded in RAG (from seed-rag-documents task)

      WHAT TO BUILD:

      1. Seed concept mastery for demo user:
         - 10 concepts at mastery > 80% (well-learned)
         - 15 concepts at 40-60% (in progress)
         - 22 concepts at < 30% (gaps / not started)

      2. Seed concept mastery for 9 team members:
         - Varying levels: some strong in Python, some in Rust, etc.
         - Creates realistic team heatmap data

      3. Seed missions for demo user:
         - 15 completed missions (scores: 65-95%, various concepts)
         - 1 active mission (today's, status: pending)
         - Each mission: concept_name, difficulty, score, completed_at

      4. Seed flashcards:
         - 25 flashcards for demo user (various concepts)
         - 10 with next_review <= now (due today)
         - 15 with next_review in future (reviewed recently)

      5. Seed gamification:
         - Streak: current_count=7, longest_count=14
         - XP: total=2450, 20 xp_events over 2 weeks
         - Badges: first_enrollment, streak_7, quiz_ace (3 unlocked)
         - Trust level: demo user = 4 (Guardian)
         - Team trust levels: distribution 1-3

      6. Seed activity feed:
         - 20 activity entries for demo user over last 14 days
         - Types: mission_completed, badge_earned, streak_milestone, flashcard_review, concept_mastered

      RULES:
      - Realistic timestamps (spread over 2 weeks, daily patterns)
      - Scores follow normal distribution around 78%
      - Idempotent: check before insert
      - Use fixed UUIDs where needed for cross-references

      COMMIT: feat(seed): add learning data for demo user and team
    test: "echo 'Seed learning data created — manual verification needed'"
    depends_on: [seed-demo-org, seed-rag-documents]
