phase: "sprint-45"
description: "Phase B.2 — NATS JetStream for async events between services"

tasks:
  - id: nats-infrastructure
    title: "Add NATS JetStream to Docker infrastructure"
    scope: infra
    type: feat
    prompt: |
      Task: Add NATS JetStream as async event bus to Docker infrastructure.

      CONTEXT:
      - CLAUDE.md: "Между доменами — асинхронные события через NATS JetStream"
      - Currently all inter-service communication is synchronous HTTP
      - NATS will replace some HTTP calls with events

      WHAT TO DO:

      1. Add NATS to docker-compose.dev.yml:
         ```yaml
         nats:
           image: nats:2.10-alpine
           ports:
             - "4222:4222"   # client
             - "8222:8222"   # monitoring
           command: "--jetstream --store_dir /data"
           volumes:
             - nats-data:/data
           healthcheck:
             test: ["CMD", "nats-server", "--signal", "ldm"]
             interval: 5s
             timeout: 3s
             retries: 5
         ```

      2. Add NATS volume to volumes section

      3. Add NATS_URL env var to services that will publish/subscribe:
         - ai: NATS_URL: nats://nats:4222
         - learning: NATS_URL: nats://nats:4222
         - notification: NATS_URL: nats://nats:4222

      4. Add nats-py dependency to common library or individual services:
         - Check if libs/py/common/pyproject.toml exists
         - Add nats-py>=2.7.0 as optional dependency

      5. Create libs/py/common/common/nats.py:
         - NATSClient wrapper with connect/publish/subscribe
         - create_nats_client(url: str) factory
         - Handles reconnection gracefully

      6. Update docs/architecture/05-INFRASTRUCTURE.md:
         - Add NATS to infrastructure table
         - Document event patterns

      COMMIT: feat(infra): add NATS JetStream infrastructure and common client
    test: "python3 -c \"import ast; ast.parse(open('/mnt/c/Users/aquam/PetProject/Merket_for_10_M_uesr/libs/py/common/common/nats.py').read()); print('OK')\""
    depends_on: []

  - id: mastery-updated-event
    title: "Publish mastery.updated event from Learning service"
    scope: backend
    type: feat
    prompt: |
      Task: When concept mastery is updated in Learning service, publish an event via NATS.

      CONTEXT:
      - Learning service owns concept_mastery table
      - AI service previously fetched mastery via HTTP (circular dep, fixed in sprint-41)
      - Now: Learning publishes mastery.updated → any interested service can subscribe

      WHAT TO DO:

      1. Define event in proto/events/v1/mastery.proto (or as Python dataclass if proto not set up):
         ```python
         @dataclass
         class MasteryUpdated:
             user_id: str
             organization_id: str
             concept_id: str
             new_level: float
             timestamp: str
         ```

      2. In Learning service:
         - Connect to NATS in lifespan (use common/nats.py)
         - After mastery update in service layer, publish event:
           await nats.publish("mastery.updated", event.to_json())

      3. Write tests:
         - Mock NATS client
         - Verify event published after mastery update
         - Verify event contains correct data

      4. Run tests: cd services/py/learning && uv run --package learning pytest tests/ -v

      TDD: Write failing test first.

      COMMIT: feat(learning): publish mastery.updated event via NATS
    test: "cd /mnt/c/Users/aquam/PetProject/Merket_for_10_M_uesr/services/py/learning && uv run --package learning pytest tests/ -v"
    depends_on: [nats-infrastructure]

  - id: notification-event-subscriber
    title: "Subscribe notification service to mission.completed events"
    scope: backend
    type: feat
    prompt: |
      Task: Notification service should listen for events and create notifications automatically.

      CONTEXT:
      - Currently notifications are only created via direct API calls
      - B2B flow: mission completed → notification should be auto-created
      - NATS JetStream provides durable subscriptions

      WHAT TO DO:

      1. In Notification service:
         - Connect to NATS in lifespan
         - Subscribe to: "mission.completed", "badge.earned", "streak.milestone"
         - On event: create notification record in DB

      2. In Learning service (if not already):
         - After mission completion: publish "mission.completed" event
         - After badge earned: publish "badge.earned" event
         - After streak milestone (7, 14, 30 days): publish "streak.milestone" event

      3. Event handlers in Notification service must be idempotent:
         - Use event_id as dedup key
         - Check if notification already exists before creating

      4. Write tests for both sides:
         - Learning: verify events published
         - Notification: verify subscriber creates notifications

      5. Run tests:
         - cd services/py/learning && uv run --package learning pytest tests/ -v
         - cd services/py/notification && uv run --package notification pytest tests/ -v

      TDD: Write failing tests first.

      COMMIT: feat(notification): subscribe to learning events via NATS
    test: "cd /mnt/c/Users/aquam/PetProject/Merket_for_10_M_uesr/services/py/notification && uv run --package notification pytest tests/ -v"
    depends_on: [nats-infrastructure, mastery-updated-event]
