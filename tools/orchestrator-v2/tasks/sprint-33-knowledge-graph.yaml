phase: "sprint-33"
description: "Knowledge Graph — React Flow visualization with Concept Map and Mind Map"

tasks:
  - id: reactflow-setup
    title: "Install React Flow and configure Dark Knowledge theme"
    scope: frontend
    type: feat
    prompt: |
      Task: Install React Flow and create base graph component with Dark Knowledge styling.

      CONTEXT:
      - Buyer app: apps/buyer/ (Next.js 15, pnpm, Tailwind, Dark Knowledge theme)
      - Current: apps/buyer/app/(app)/graph/ has ConceptHub component (basic, no graph visualization)
      - React Flow: @xyflow/react (latest, v12+)
      - Theme colors: background #0a0a0f, card #14141f, primary #7c5cfc, success #34d399, muted #6b6b80

      WHAT TO BUILD:

      1. Install: cd apps/buyer && pnpm add @xyflow/react dagre

      2. apps/buyer/components/graph/KnowledgeGraph.tsx ("use client"):
         - Base component wrapping ReactFlow
         - Dynamic import wrapper (ssr: false) — React Flow doesn't support SSR
         - Dark theme: proOptions={{ hideAttribution: true }}, dark background
         - Custom styles: .react-flow__node, .react-flow__edge in globals or module CSS
         - Props: nodes, edges, onNodeClick, viewMode ('map' | 'mindmap')
         - MiniMap in bottom-right corner with dark styling
         - Controls (zoom buttons) styled violet

      3. apps/buyer/components/graph/ConceptNode.tsx ("use client"):
         - Custom React Flow node component
         - Shows: concept name, mastery % badge, small mastery ring
         - Size varies by importance (passed as data.importance)
         - Color by mastery: #6b6b80 (0%) → #7c5cfc (50%) → #34d399 (100%)
         - Hover: scale(1.1), glow shadow
         - Handle positions: top and bottom for edges

      4. apps/buyer/components/graph/graphTheme.ts:
         - Edge styles: animated=true, stroke color matching source node mastery
         - Prerequisite edges: solid line, arrow marker
         - Related edges: dashed line, no arrow
         - Default node/edge style objects

      RULES:
      - Dynamic import with ssr: false is REQUIRED for React Flow
      - All colors from CSS variables where possible
      - Named exports only
      - Keep existing ConceptHub component unchanged

      COMMIT: feat(buyer): install React Flow with Dark Knowledge graph theme
    test: "cd /mnt/c/Users/aquam/PetProject/Merket_for_10_M_uesr/apps/buyer && pnpm build"
    depends_on: []

  - id: concept-map-view
    title: "Concept Map view with dagre layout"
    scope: frontend
    type: feat
    prompt: |
      Task: Build the Concept Map view — full knowledge graph visualization.

      CONTEXT:
      - Buyer app: apps/buyer/
      - KnowledgeGraph and ConceptNode components exist (from reactflow-setup)
      - API: GET /concepts/graph?org_id=X (via learning service) returns:
        { nodes: [{id, name, mastery, importance, category}], edges: [{source, target, type}] }
      - Hook: hooks/use-concepts.ts has useCourseGraph()
      - dagre package installed for layout

      WHAT TO BUILD:

      1. apps/buyer/components/graph/ConceptMapView.tsx ("use client"):
         - Fetches graph data via useCourseGraph(token, orgId)
         - Transforms API data → React Flow nodes/edges:
           a) Use dagre for hierarchical layout (direction: TB, nodeSpacing: 80, rankSpacing: 120)
           b) Node data: { label: name, mastery: 0-100, importance: 1-5, category: string }
           c) Edge data: { type: 'prerequisite' | 'related', animated: true for prerequisite }
         - Filters panel (top-right overlay):
           - "All" / "Gaps (<30%)" / "Mastered (>80%)" — toggle buttons
           - Category filter dropdown (if categories exist)
         - Stats bar (top-left overlay): "47 concepts · 12 mastered · 8 gaps"
         - Fit view on mount with animation
         - On node click: callback to parent (for switching to Mind Map)
         - Loading: skeleton placeholder (blurred abstract graph image)
         - Empty state: "Upload documents to build your knowledge graph" with upload icon

      2. Layout helper: apps/buyer/lib/graph-layout.ts
         - layoutGraph(nodes, edges) → positioned nodes using dagre
         - Pure function, no React dependency

      RULES:
      - Handle 50+ nodes without performance issues (React Flow virtualizes)
      - Smooth transitions when filtering (nodes fade in/out)
      - Named exports
      - Keep graph interactive: zoom, pan, node drag

      COMMIT: feat(buyer): add Concept Map view with dagre layout and filters
    test: "cd /mnt/c/Users/aquam/PetProject/Merket_for_10_M_uesr/apps/buyer && pnpm build"
    depends_on: [reactflow-setup]

  - id: mind-map-view
    title: "Mind Map view for single concept deep-dive"
    scope: frontend
    type: feat
    prompt: |
      Task: Build the Mind Map view — radial zoom into a single concept.

      CONTEXT:
      - Buyer app: apps/buyer/
      - KnowledgeGraph and ConceptNode exist
      - ConceptMapView triggers mind map via onNodeClick(conceptId)
      - API: existing hooks for concept mastery, missions, flashcards

      WHAT TO BUILD:

      1. apps/buyer/components/graph/MindMapView.tsx ("use client"):
         - Takes: conceptId, graphData (full graph from parent), onBack callback
         - Center: selected concept as large node (2x normal size, pulsing glow)
         - Radial layout around center:
           - Top: prerequisites (nodes that come before)
           - Bottom: dependents (nodes that come after)
           - Left/Right: related concepts
         - Edges from center to all surrounding nodes
         - Max 12 surrounding nodes (closest by graph distance)
         - Animate layout on mount (nodes fly in from center, stagger 50ms)

      2. Detail panel (right side, 320px):
         - Concept name (large)
         - Mastery ring (SVG, animated fill)
         - Stats: missions completed, flashcards count, team average mastery
         - "Start Mission" button if mastery < 80% (violet, glow on hover)
         - "Review Flashcards" link if cards exist
         - Team members: top 3 avatars with their mastery %
         - All data from existing hooks or derived from graphData

      3. "Back to Map" button (top-left):
         - Arrow icon + "Back to Map"
         - Triggers onBack(), parent switches to ConceptMapView

      RULES:
      - Radial layout: compute positions with Math.cos/Math.sin around center
      - Smooth transitions (Framer Motion for panel, React Flow for nodes)
      - Detail panel scrollable if content overflows
      - Named exports

      COMMIT: feat(buyer): add Mind Map view with radial layout and detail panel
    test: "cd /mnt/c/Users/aquam/PetProject/Merket_for_10_M_uesr/apps/buyer && pnpm build"
    depends_on: [reactflow-setup]

  - id: graph-page-integration
    title: "Integrate both views into /graph page"
    scope: frontend
    type: feat
    prompt: |
      Task: Wire ConceptMapView and MindMapView into the /graph page with view toggle.

      CONTEXT:
      - Buyer app: apps/buyer/
      - Both views exist: ConceptMapView, MindMapView
      - Current: apps/buyer/app/(app)/graph/page.tsx exists (basic ConceptHub)
      - Replace with new graph visualization

      WHAT TO BUILD:

      1. Update apps/buyer/app/(app)/graph/page.tsx:
         - Server component that renders GraphView client component

      2. apps/buyer/components/graph/GraphView.tsx ("use client"):
         - State: viewMode ('map' | 'mindmap'), selectedConceptId
         - Fetches graph data once via useCourseGraph()
         - viewMode === 'map': renders ConceptMapView
           - onNodeClick → setSelectedConceptId, setViewMode('mindmap')
         - viewMode === 'mindmap': renders MindMapView
           - onBack → setViewMode('map'), clear selectedConceptId
         - Transition between views: fade + scale animation (Framer Motion AnimatePresence)
         - Full height: h-[calc(100vh-48px)] (minus TopBar)

      3. Remove or rename old ConceptHub if it conflicts.

      RULES:
      - Graph takes full page width and height (no padding)
      - Smooth transition between views
      - Named exports
      - Keep old ConceptHub file but don't import it in page.tsx

      COMMIT: feat(buyer): integrate knowledge graph views into /graph page
    test: "cd /mnt/c/Users/aquam/PetProject/Merket_for_10_M_uesr/apps/buyer && pnpm build"
    depends_on: [concept-map-view, mind-map-view]
