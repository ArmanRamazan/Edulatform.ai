phase: "sprint-37"
description: "Demo Readiness — mock providers, health checks, demo walkthrough"

tasks:
  - id: mock-stripe-provider
    title: "Mock Stripe provider for demo mode"
    scope: backend
    type: feat
    prompt: |
      Task: Add a MockStripeClient that returns fake successful responses when STRIPE_SECRET_KEY is empty.

      CONTEXT:
      - Payment service: services/py/payment/
      - Stripe client: app/repositories/stripe_client.py
      - Org subscriptions: app/services/org_subscription_service.py
      - Payment service: app/services/payment_service.py
      - Config: app/config.py (likely reads STRIPE_SECRET_KEY from env)
      - Pattern: AI service already has MockLLMProvider when GEMINI_API_KEY is not set

      WHAT TO BUILD:

      1. Check how AI service implements mock (services/py/ai/app/services/llm_provider.py)
         Follow the same pattern for Stripe.

      2. In app/repositories/stripe_client.py:
         - Add MockStripeClient class alongside real StripeClient
         - MockStripeClient returns fake successful responses:
           - create_customer() → returns {"id": "cus_mock_xxx", "email": email}
           - create_subscription() → returns {"id": "sub_mock_xxx", "status": "active", ...}
           - create_payment_intent() → returns {"id": "pi_mock_xxx", "status": "succeeded", ...}
           - cancel_subscription() → returns {"id": "sub_mock_xxx", "status": "canceled"}
           - All methods return realistic-looking fake data
         - Factory function: get_stripe_client() checks env var, returns Mock or Real

      3. Wire it up:
         - In app/main.py lifespan or config: if STRIPE_SECRET_KEY is empty, use MockStripeClient
         - Log a warning: "STRIPE_SECRET_KEY not set — using mock Stripe (demo mode)"

      4. Write tests:
         - Test MockStripeClient returns valid responses
         - Test factory function picks correct client based on env
         - Test payment flow works end-to-end with mock

      TDD: Write failing tests first, then implement.

      COMMIT: feat(payment): add mock Stripe provider for demo mode
    test: "cd /mnt/c/Users/aquam/PetProject/Merket_for_10_M_uesr/services/py/payment && uv run --package payment pytest tests/ -v"
    depends_on: []

  - id: verify-mock-llm
    title: "Verify and fix AI service mock LLM provider"
    scope: backend
    type: fix
    prompt: |
      Task: Verify that AI service works fully without GEMINI_API_KEY set.

      CONTEXT:
      - AI service: services/py/ai/
      - MockLLMProvider should exist (was implemented earlier)
      - All AI endpoints should return reasonable mock responses
      - Coach streaming, mission generation, unified search — all should work in mock mode

      WHAT TO DO:

      1. Read services/py/ai/app/services/llm_provider.py — check MockLLMProvider exists
      2. Read services/py/ai/app/services/llm_resolver.py — check it falls back to mock
      3. Run ALL tests without GEMINI_API_KEY:
         cd services/py/ai && unset GEMINI_API_KEY && uv run --package ai pytest tests/ -v
      4. Fix any failures:
         - If MockLLMProvider is missing methods → add them
         - If tests assume real API → make them work with mock
         - If coach/strategist/designer services fail without API → add mock fallback

      5. Verify these specific flows work in mock mode:
         - POST /coach/session → returns mock coaching response
         - POST /missions/daily → returns mock mission
         - POST /search/unified → returns mock search results
         - GET /credits/balance → returns mock credits

      COMMIT: fix(ai): ensure all endpoints work in mock LLM mode
    test: "cd /mnt/c/Users/aquam/PetProject/Merket_for_10_M_uesr/services/py/ai && uv run --package ai pytest tests/ -v"
    depends_on: []

  - id: health-endpoints-verify
    title: "Verify all services have /health endpoint"
    scope: backend
    type: fix
    prompt: |
      Task: Ensure every Python service has a working /health endpoint.

      CONTEXT:
      - Common library: libs/py/common/common/health.py — should have health router
      - All services should mount it at /health
      - Docker compose uses health checks pointing to these endpoints

      WHAT TO DO:

      1. Check each service has health endpoint:
         - services/py/identity/app/main.py — check /health is mounted
         - services/py/course/app/main.py
         - services/py/enrollment/app/main.py
         - services/py/payment/app/main.py
         - services/py/notification/app/main.py
         - services/py/ai/app/main.py
         - services/py/learning/app/main.py
         - services/py/rag/app/main.py

      2. If common/health.py exists, all services should use it
      3. If not, add a simple /health GET endpoint returning {"status": "ok"}
      4. Verify each service can start and respond to /health

      Only fix what's broken. Don't refactor working code.

      COMMIT: fix(services): ensure all services have /health endpoint
    test: "cd /mnt/c/Users/aquam/PetProject/Merket_for_10_M_uesr/services/py/identity && uv run --package identity pytest tests/ -v"
    depends_on: []

  - id: demo-readme
    title: "Create demo README with walkthrough"
    scope: infra
    type: docs
    prompt: |
      Task: Create a demo walkthrough document explaining how to run and demo KnowledgeOS.

      CONTEXT:
      - Project: KnowledgeOS — B2B AI-powered knowledge platform
      - Target demo audience: investors, potential B2B customers
      - Demo user: demo@acme.com / demo123
      - Buyer app: http://localhost:3001
      - API gateway: http://localhost:8000

      WHAT TO BUILD:

      1. Create docs/DEMO.md:

         # KnowledgeOS Demo Guide

         ## Quick Start
         ```bash
         cp .env.example .env
         docker compose -f docker-compose.dev.yml up -d --build
         # Wait for services to start (~2 min)
         docker compose -f docker-compose.dev.yml --profile seed up seed
         # Open http://localhost:3001
         # Login: demo@acme.com / demo123
         ```

         ## Demo Walkthrough (5 minutes)

         ### 1. Onboarding (1 min)
         - Register new account or login as demo@acme.com
         - Walk through 5-step onboarding wizard
         - Show AI pretest and personalized learning plan

         ### 2. Dashboard (1 min)
         - Show personalized dashboard with mission card, streaks, trust level
         - Show team progress block (for tech leads)
         - Command palette (Cmd+K) for quick navigation

         ### 3. Knowledge Graph (1 min)
         - Navigate to /graph
         - Show concept nodes with mastery levels
         - Click concept to see details and related content

         ### 4. AI Mission (1 min)
         - Start a mission from dashboard
         - Show tri-agent coaching (Strategist → Designer → Coach)
         - Complete mission, see XP and badge earned

         ### 5. Smart Search (1 min)
         - Navigate to /search
         - Search internal knowledge base
         - Show external results integration

         ## Key Features to Highlight
         - 8 microservices, clean architecture
         - 1408 tests, TDD methodology
         - AI-powered coaching with tri-agent system
         - FSRS spaced repetition for flashcards
         - Knowledge graph with concept mastery tracking
         - B2B multi-tenant with organization isolation
         - Dark Knowledge theme (premium dark UI)

         ## Architecture Overview
         - 8 Python services + 2 Rust services
         - PostgreSQL per service (database isolation)
         - Redis caching
         - API Gateway (Rust/axum) with JWT validation
         - Next.js 15 with App Router

         ## Mock Mode
         - Without GEMINI_API_KEY: AI returns mock responses
         - Without STRIPE_SECRET_KEY: payments use mock Stripe
         - All features work in demo mode without external API keys

      RULES:
      - Keep it concise and actionable
      - Focus on what to show, not implementation details
      - Include exact commands and URLs

      COMMIT: docs: add demo walkthrough guide
    test: "test -f /mnt/c/Users/aquam/PetProject/Merket_for_10_M_uesr/docs/DEMO.md"
    depends_on: [mock-stripe-provider, verify-mock-llm]
