phase: "sprint-42"
description: "Phase A.3 — pgvector optimization: HNSW index, binary encoding, search cache"

tasks:
  - id: pgvector-hnsw-index
    title: "Switch pgvector from IVFFlat to HNSW index"
    scope: backend
    type: perf
    prompt: |
      Task: Replace IVFFlat(lists=100) with HNSW index for better search quality and dynamic insertion.

      CONTEXT:
      - services/py/rag/migrations/001_init.sql — current IVFFlat index
      - IVFFlat with lists=100 is only optimal for ~100K vectors
      - HNSW provides better recall and supports dynamic inserts without reindexing
      - pgvector supports HNSW since v0.5.0

      WHAT TO DO:

      1. Read current migration: services/py/rag/migrations/001_init.sql
      2. Create new migration: services/py/rag/migrations/003_hnsw_index.sql
         ```sql
         -- Drop old IVFFlat index
         DROP INDEX IF EXISTS chunks_embedding_idx;

         -- Create HNSW index (better for dynamic inserts and recall)
         CREATE INDEX IF NOT EXISTS chunks_embedding_hnsw_idx
           ON chunks USING hnsw (embedding vector_cosine_ops)
           WITH (m = 16, ef_construction = 64);
         ```
      3. Parameters:
         - m=16: connections per node (default, good balance)
         - ef_construction=64: build-time accuracy (higher = slower build, better recall)
         - For 10M vectors: m=32, ef_construction=128 would be better, but start with 16/64

      4. Update search repository to set ef_search at query time:
         - In search_repository.py, before the search query:
           `SET LOCAL hnsw.ef_search = 40;` (default is 40, configurable)

      5. Write a test that verifies the migration runs without error
      6. Run tests: cd services/py/rag && uv run --package rag pytest tests/ -v

      COMMIT: perf(rag): switch pgvector index from IVFFlat to HNSW
    test: "cd /mnt/c/Users/aquam/PetProject/Merket_for_10_M_uesr/services/py/rag && uv run --package rag pytest tests/ -v"
    depends_on: []

  - id: pgvector-binary-encoding
    title: "Use binary vector encoding instead of string serialization"
    scope: backend
    type: perf
    prompt: |
      Task: Replace string-based vector serialization with proper pgvector binary encoding.

      CONTEXT:
      - services/py/rag/app/repositories/search_repository.py
      - Current code: embedding_str = "[" + ",".join(str(v) for v in query_embedding) + "]"
      - This is slow — string formatting 768 floats on every query
      - asyncpg can pass vectors as binary through proper casting

      WHAT TO DO:

      1. Read search_repository.py — find the string serialization
      2. Replace with proper pgvector parameter passing:
         - Option A: Use pgvector's encode/decode with asyncpg custom types
         - Option B: Use numpy.array(embedding).tobytes() + custom type
         - Option C (simplest): Keep string but pre-format as PostgreSQL array literal
           and let pgvector handle casting via $1::vector

      3. The simplest fix that works:
         ```python
         # Instead of manual string building:
         embedding_str = "[" + ",".join(f"{v:.6f}" for v in query_embedding) + "]"
         # Use the same SQL but ensure it's passed correctly
         ```
         Actually check if asyncpg supports vector type natively. If not, the string
         approach is fine but should at least use f-string with fixed precision.

      4. Also check ingestion — how are embeddings stored during document ingestion?
         - services/py/rag/app/repositories/document_repository.py
         - Apply same optimization

      5. Run tests: cd services/py/rag && uv run --package rag pytest tests/ -v

      COMMIT: perf(rag): optimize vector serialization in search queries
    test: "cd /mnt/c/Users/aquam/PetProject/Merket_for_10_M_uesr/services/py/rag && uv run --package rag pytest tests/ -v"
    depends_on: []

  - id: search-result-cache
    title: "Add Redis cache for RAG search results"
    scope: backend
    type: perf
    prompt: |
      Task: Cache RAG search results in Redis to avoid re-embedding identical queries.

      CONTEXT:
      - services/py/rag/app/services/search_service.py — search flow
      - services/py/rag/app/config.py — has REDIS_URL (but RAG may not use it yet)
      - Identical queries = same embedding + same results
      - Cache key: hash(query_text + org_id + limit)
      - TTL: 5 minutes (KB content changes rarely)

      WHAT TO DO:

      1. Read search_service.py — understand the search flow
      2. Check if RAG service connects to Redis in main.py lifespan
         - If not, add Redis connection (use aioredis or redis.asyncio)

      3. Add caching layer in SearchService:
         ```python
         cache_key = f"rag:search:{hashlib.sha256(f'{query}:{org_id}:{limit}'.encode()).hexdigest()}"
         cached = await redis.get(cache_key)
         if cached:
             return json.loads(cached)
         # ... do actual search ...
         await redis.setex(cache_key, 300, json.dumps(results))
         ```

      4. Write tests:
         - Test cache hit returns cached results
         - Test cache miss performs actual search
         - Test different queries produce different cache keys

      5. Run tests: cd services/py/rag && uv run --package rag pytest tests/ -v

      TDD: Write failing tests first.

      COMMIT: perf(rag): add Redis cache for search results
    test: "cd /mnt/c/Users/aquam/PetProject/Merket_for_10_M_uesr/services/py/rag && uv run --package rag pytest tests/ -v"
    depends_on: [pgvector-hnsw-index]
