phase: "3.4"
description: "DevOps + Reliability — CI/CD, staging env, structured logging, DB backups, email delivery"

tasks:
  - id: github-actions-ci
    title: "GitHub Actions CI — lint, test, build"
    scope: infra
    prompt: |
      Task: Set up GitHub Actions CI pipeline that runs linting, tests, and frontend build on every PR and push to main.

      CONTEXT:
      - Monorepo root at /
      - Python services in services/py/ (7 services: identity, course, enrollment, payment, notification, ai, learning)
      - Rust services in services/rs/ (api-gateway, search, video-processor, payment-engine)
      - Frontend apps in apps/buyer/ and apps/seller/ (Next.js, pnpm)
      - Package manager: uv (Python), pnpm (Node.js)
      - Test commands per service:
        cd services/py/identity    && uv run --package identity pytest tests/ -v
        cd services/py/course      && uv run --package course pytest tests/ -v
        cd services/py/enrollment  && uv run --package enrollment pytest tests/ -v
        cd services/py/payment     && uv run --package payment pytest tests/ -v
        cd services/py/notification && uv run --package notification pytest tests/ -v
        cd services/py/ai          && uv run --package ai pytest tests/ -v
        cd services/py/learning    && uv run --package learning pytest tests/ -v
      - Python lint: ruff check + ruff format --check + mypy
      - Frontend build: cd apps/buyer && pnpm build
      - Rust: cargo test + cargo clippy -- -D warnings

      WHAT TO BUILD:
      1. .github/workflows/ci.yml — triggered on: push to main, pull_request to main
      2. Jobs (run in parallel where possible):
         a. python-lint: checkout, install uv, uv sync --all-packages, run ruff + mypy on services/py/
         b. python-tests: matrix strategy over all 7 Python services, run pytest per service
            - Services that need a DB use testcontainers (already in test deps) — no external DB needed
         c. frontend-build: checkout, install pnpm, pnpm install, cd apps/buyer && pnpm build
         d. rust-check: checkout, install stable toolchain, cargo clippy + cargo test in each Rust service
      3. Use GitHub-hosted runners: ubuntu-latest
      4. Cache: uv cache, pnpm store, cargo registry

      IMPLEMENTATION:
      1. Create .github/workflows/ directory if it does not exist
      2. Create .github/workflows/ci.yml
      3. For Python matrix job, use strategy.matrix.service: [identity, course, enrollment, payment, notification, ai, learning]
      4. Working directory for each matrix job: services/py/${{ matrix.service }}
      5. Use actions/cache for pnpm with key based on pnpm-lock.yaml hash
      6. Use actions/cache for uv with key based on uv.lock hash
      7. Use actions/cache for cargo with key based on Cargo.lock hash

      RULES:
      - No secrets or credentials in the workflow file
      - Use pinned action versions (e.g. actions/checkout@v4)
      - Fail fast: false for matrix jobs (one service failure does not cancel others)
      - No test command needed — this is infra config, verify by reading the generated file
      - Create atomic git commit: feat(infra): add GitHub Actions CI pipeline
    test: null

  - id: github-actions-docker-build
    title: "GitHub Actions CD — Docker build and push"
    scope: infra
    depends_on: [github-actions-ci]
    prompt: |
      Task: Add a Docker build and push job to GitHub Actions, triggered only on push to main after CI passes.

      CONTEXT:
      - Monorepo has Dockerfiles for each service (check deploy/ and each service directory)
      - Docker images pushed to GitHub Container Registry (ghcr.io)
      - Existing CI workflow: .github/workflows/ci.yml (from previous task)
      - Python services: services/py/{name}/Dockerfile
      - Frontend: apps/buyer/Dockerfile (if exists, otherwise skip buyer Docker build for now)
      - Repository owner and name available as github.repository_owner and github.repository

      WHAT TO BUILD:
      1. .github/workflows/docker-build.yml — triggered on: push to main (after ci workflow passes)
         Use workflow_run trigger: { workflows: ["CI"], types: [completed], branches: [main] }
         Only run if the triggering workflow succeeded: if: github.event.workflow_run.conclusion == 'success'
      2. Matrix build for Python services: [identity, course, enrollment, payment, notification, ai, learning]
      3. Each job:
         - Login to ghcr.io using GITHUB_TOKEN (no secrets needed — github.token works)
         - Build Docker image from services/py/{name}/Dockerfile
         - Tag as ghcr.io/${{ github.repository_owner }}/{name}:latest and ghcr.io/.../:{sha}
         - Push both tags
      4. Use docker/build-push-action@v5 and docker/login-action@v3

      IMPLEMENTATION:
      1. Create .github/workflows/docker-build.yml
      2. Use strategy.matrix.service for the 7 Python services
      3. Context for each build: services/py/${{ matrix.service }}
      4. Use docker/metadata-action@v5 for tag generation

      RULES:
      - GITHUB_TOKEN only — no custom secrets needed for ghcr.io
      - Pinned action versions
      - Create atomic git commit: feat(infra): add GitHub Actions Docker build and push workflow
    test: null

  - id: staging-environment
    title: "Staging environment — Docker Compose staging config"
    scope: infra
    prompt: |
      Task: Create a docker-compose.staging.yml for a staging environment that mirrors production but uses staging DBs and config.

      CONTEXT:
      - Existing compose files: docker-compose.dev.yml (hot reload) and docker-compose.prod.yml (monitoring)
      - Staging should be like prod but with:
        - Staging-specific env vars (ENVIRONMENT=staging)
        - Lower resource limits than prod
        - No monitoring stack (Prometheus/Grafana) to reduce cost
        - Seeded with demo data on first run
      - All 7 Python services + api-gateway (Rust)
      - DB ports offset by 10 from dev (5443-5449 for staging DBs)

      WHAT TO BUILD:
      1. docker-compose.staging.yml at repo root
      2. All 7 Python services configured:
         - image: ghcr.io/{owner}/{name}:latest (use image instead of build for staging)
         - env_file: deploy/staging/.env.staging
         - ENVIRONMENT=staging
         - Separate DB containers with staging-specific volumes
      3. A deploy/staging/.env.staging.example file with all required env var keys (no real values)
      4. Staging DB containers:
         - Same PostgreSQL image as prod
         - Ports: identity-db on 5443, course-db on 5444, etc.
         - Named volumes: identity-staging-data, course-staging-data, etc.
      5. Health checks on all services (same as prod)

      IMPLEMENTATION:
      1. Read docker-compose.prod.yml to understand existing patterns
      2. Create docker-compose.staging.yml based on prod but with image references instead of build
      3. Create deploy/staging/ directory
      4. Create deploy/staging/.env.staging.example with all required keys as placeholder comments

      RULES:
      - No real credentials in any committed file
      - Use .env.staging.example — never commit an actual .env.staging
      - Create atomic git commit: feat(infra): add staging environment Docker Compose config
    test: null

  - id: structured-logging
    title: "Structured JSON logging with structlog across all Python services"
    scope: backend:identity
    prompt: |
      Task: Replace print/logging stdlib usage with structlog structured JSON logging in all 7 Python services.

      CONTEXT:
      - Python services: services/py/{identity,course,enrollment,payment,notification,ai,learning}/
      - Common library: libs/py/common/ (shared across all services)
      - Current logging: likely uses Python's stdlib logging or print statements
      - structlog provides structured JSON logging with context binding
      - Target: every log line is valid JSON with fields: timestamp, level, service, message, plus context fields

      WHAT TO BUILD:
      1. Add structlog to libs/py/common/pyproject.toml dependencies
      2. Create libs/py/common/app/logging.py:
         - configure_logging(service_name: str, log_level: str = "INFO") -> None
         - Sets up structlog with JSON renderer for production, console renderer for dev (based on ENVIRONMENT env var)
         - Adds service name to every log event via bind_contextvars
         - Standard processors: add_log_level, add_timestamp (ISO format), format_exc_info
      3. Update each service's main.py / lifespan to call configure_logging(service_name="identity") on startup
      4. Replace any print() or logger = logging.getLogger() usage with:
         import structlog; logger = structlog.get_logger()
      5. Key log events to ensure are structured:
         - Service startup: logger.info("service_started", port=8001)
         - Request errors: logger.error("request_failed", error=str(e), path=request.url.path)
         - DB errors: logger.error("db_error", error=str(e))

      TDD:
      1. Write test in libs/py/common/tests/ verifying configure_logging does not raise
      2. Write test verifying log output is valid JSON when ENVIRONMENT=production
      3. Implement configure_logging
      4. Update all 7 services to use it
      5. Run tests for each service to ensure no regressions:
         cd services/py/identity    && uv run --package identity pytest tests/ -v
         cd services/py/notification && uv run --package notification pytest tests/ -v
         (spot check 2 services, then run all if those pass)

      RULES:
      - TDD: failing test first, then implementation
      - Do NOT add structlog calls to every function — only meaningful events
      - Do NOT log PII (email, name, card numbers) — use user_id only
      - ENVIRONMENT=production uses JSON renderer; ENVIRONMENT=development uses colored ConsoleRenderer
      - After implementation run all 7 service test suites
      - Create atomic git commit: feat(infra): add structlog structured JSON logging to all services
    test: "cd services/py/identity && uv run --package identity pytest tests/ -v && cd /mnt/c/Users/aquam/PetProject/Merket_for_10_M_uesr/services/py/notification && uv run --package notification pytest tests/ -v"

  - id: db-backup-scripts
    title: "Database backup and restore scripts"
    scope: infra
    prompt: |
      Task: Create shell scripts for backing up and restoring all 7 PostgreSQL databases.

      CONTEXT:
      - 7 PostgreSQL databases, one per service
      - Dev ports: identity-db:5433, course-db:5434, enrollment-db:5435, payment-db:5436, notification-db:5437, learning-db:5438
      - Docker container names follow pattern: {service}-db (e.g. identity-db, course-db)
      - Backups should be pg_dump compressed format (.sql.gz)
      - Scripts go in deploy/scripts/

      WHAT TO BUILD:
      1. deploy/scripts/backup-all-dbs.sh:
         - Loops over all 7 services
         - Runs pg_dump via docker exec on each DB container
         - Saves to deploy/backups/{service}-{YYYY-MM-DD-HHMMSS}.sql.gz
         - Creates deploy/backups/ if not exists
         - Prints success/failure per service
         - Exit code 0 only if all backups succeed

      2. deploy/scripts/restore-db.sh SERVICE BACKUP_FILE:
         - Takes service name and backup file path as arguments
         - Validates arguments (usage message if missing)
         - Runs psql via docker exec to restore
         - Warns user that this will drop and recreate the DB
         - Requires --confirm flag to actually run (safety check)

      3. deploy/scripts/list-backups.sh:
         - Lists all backups in deploy/backups/ sorted by date
         - Shows file size, service name, timestamp

      IMPLEMENTATION:
      1. Create deploy/scripts/ directory if not exists
      2. Create the three shell scripts
      3. Make them executable (chmod +x)
      4. Add deploy/backups/ to .gitignore

      RULES:
      - No credentials hardcoded — read from environment or .env file
      - Scripts must work in bash (#!/bin/bash)
      - Add error handling: exit on failure for backup script
      - Create atomic git commit: feat(infra): add database backup and restore scripts
    test: null

  - id: email-delivery-resend
    title: "Email delivery via Resend API in notification service"
    scope: backend:notification
    prompt: |
      Task: Integrate Resend API for actual email delivery in the notification service.

      CONTEXT:
      - Notification service (port 8005) in services/py/notification/
      - Clean Architecture: routes/ -> services/ -> domain/ <- repositories/
      - Current behavior: notifications are stored in DB and logged to stdout only
      - Resend API: https://resend.com/docs/api-reference/emails/send-email
        - POST https://api.resend.com/emails
        - Headers: Authorization: Bearer {RESEND_API_KEY}
        - Body: { from, to, subject, html }
      - RESEND_API_KEY in environment variables
      - Email should be sent for notification types: enrollment, payment, streak_reminder
      - From address: "EduPlatform <noreply@eduplatform.com>" (configurable via env)
      - Use httpx (already in deps) for HTTP calls

      WHAT TO BUILD:
      1. Domain interface: services/py/notification/app/domain/email_sender.py
         - Abstract class EmailSender with async method: send(to: str, subject: str, html: str) -> bool
      2. Implementation: services/py/notification/app/repositories/resend_email_sender.py
         - ResendEmailSender(api_key: str, from_address: str) implements EmailSender
         - POST to Resend API using httpx.AsyncClient
         - Returns True on success (2xx), False on failure
         - Logs errors but does not raise (email failure should not fail the notification creation)
      3. Mock implementation: services/py/notification/app/repositories/stub_email_sender.py
         - StubEmailSender: logs to stdout, always returns True
         - Used in tests and when RESEND_API_KEY is not set
      4. Notification service (services/py/notification/app/services/notification_service.py):
         - Accept EmailSender via dependency injection
         - After saving notification to DB, call email_sender.send() for relevant notification types
         - Email subject and HTML body templates per notification type:
           - enrollment: "You're enrolled in {course_name}!" / simple HTML with course name
           - payment: "Payment confirmed — {course_name}" / receipt HTML
           - streak_reminder: "Don't lose your streak!" / motivational HTML
      5. Dependency wiring in main.py / lifespan:
         - If RESEND_API_KEY env var present: use ResendEmailSender
         - Otherwise: use StubEmailSender

      TDD:
      1. Write test: create notification of type enrollment -> email_sender.send() called once with correct subject
      2. Write test: email_sender.send() raises exception -> notification still created successfully (no re-raise)
      3. Write test: StubEmailSender.send() always returns True without making HTTP calls
      4. Write test: ResendEmailSender.send() makes POST to Resend API with correct headers (mock httpx)
      5. Implement all of the above
      6. Run: cd services/py/notification && uv run --package notification pytest tests/ -v

      RULES:
      - TDD: failing test first
      - EmailSender is an ABC in domain/ — no httpx import in domain/
      - ResendEmailSender uses httpx.AsyncClient as context manager
      - HTML emails are minimal but valid — no external CSS frameworks
      - RESEND_API_KEY must never be logged
      - After all tests pass: create atomic git commit: feat(notification): add email delivery via Resend API
    test: "cd services/py/notification && uv run --package notification pytest tests/ -v"

  - id: email-templates
    title: "HTML email templates for all notification types"
    scope: backend:notification
    depends_on: [email-delivery-resend]
    prompt: |
      Task: Create proper HTML email templates for all notification types in the notification service.

      CONTEXT:
      - Notification service (port 8005) in services/py/notification/
      - Email sending infrastructure added in previous task (email-delivery-resend)
      - Notification types: enrollment, payment, streak_reminder, flashcard_reminder
      - Existing notification_service.py now calls email_sender.send(to, subject, html)
      - HTML emails must render correctly in Gmail, Outlook (table-based layout for Outlook compat)
      - Brand colors: indigo (#6366f1) primary, white background

      WHAT TO BUILD:
      1. services/py/notification/app/domain/email_templates.py:
         - Pure functions (no I/O) generating HTML strings for each notification type
         - enrollment_email(student_name: str, course_name: str, course_url: str) -> tuple[str, str]
           Returns (subject, html_body)
         - payment_email(student_name: str, course_name: str, amount: float, transaction_id: str) -> tuple[str, str]
         - streak_reminder_email(student_name: str, streak_days: int) -> tuple[str, str]
         - flashcard_reminder_email(student_name: str, cards_due: int) -> tuple[str, str]
      2. HTML structure for each email:
         - Outer table 600px wide, centered
         - Header: EduPlatform logo text in brand color
         - Body: clean white section with relevant message
         - CTA button: brand-colored link button
         - Footer: "You received this because you have an account at EduPlatform. Unsubscribe."
      3. Update notification_service.py to use templates when calling email_sender.send()

      TDD:
      1. Write test: enrollment_email returns subject containing course name and valid HTML containing student name
      2. Write test: payment_email returns HTML containing transaction_id
      3. Write test: streak_reminder_email for streak_days=7 contains "7" in subject or body
      4. Implement email_templates.py
      5. Run: cd services/py/notification && uv run --package notification pytest tests/ -v

      RULES:
      - TDD: failing test first
      - Pure functions in domain/ — no imports from routes/, services/, repositories/
      - Table-based HTML for email client compatibility
      - No external template engine (jinja2 etc.) — keep it simple with f-strings
      - Create atomic git commit: feat(notification): add HTML email templates for all notification types
    test: "cd services/py/notification && uv run --package notification pytest tests/ -v"
