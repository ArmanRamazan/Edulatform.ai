  - id: checkout-flow
    title: "Checkout flow: Stripe Elements card input, plan selection, confirmation"
    scope: frontend:buyer
    prompt: |
      Task: Build a checkout page at /checkout in the buyer app that integrates Stripe Elements for card input.

      CONTEXT:
      - Buyer app: apps/buyer/ (Next.js App Router, TypeScript strict, Tailwind CSS)
      - useCreateSubscription() mutation hook available from hooks/use-subscriptions.ts
      - Stripe Elements: use @stripe/react-stripe-js and @stripe/stripe-js
        Install: pnpm add @stripe/react-stripe-js @stripe/stripe-js (in apps/buyer)
      - Route: apps/buyer/app/checkout/page.tsx
      - Auth: use useAuth hook (apps/buyer/hooks/use-auth.ts) — redirect to /login if not authenticated
      - URL param: ?plan=<plan_id> pre-selects the plan

      WHAT TO BUILD:
      1. apps/buyer/app/checkout/page.tsx — Server Component:
         - export const metadata with title="Checkout — EduPlatform"
         - Renders <CheckoutContent /> with Suspense wrapper

      2. apps/buyer/components/checkout/CheckoutContent.tsx — "use client":
         - Reads ?plan from useSearchParams (wrapped in Suspense per Next.js requirement)
         - Shows selected plan summary (name, price) from useSubscriptionPlans()
         - For free plan: no card input, just a "Activate Free Plan" button calling createSubscription({plan_id, payment_method_id: ""})
         - For paid plans: renders Stripe Elements CardElement inside Elements provider
           NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY from env
         - On submit: creates PaymentMethod via stripe.createPaymentMethod(), then calls createSubscription mutation
         - Loading state during submission, error display on failure
         - On success: redirect to /account/subscription with router.push()

      3. apps/buyer/app/checkout/loading.tsx — skeleton for the checkout form

      RULES:
      - Dynamic import for Stripe Elements to keep initial bundle light:
        const Elements = dynamic(() => import("@stripe/react-stripe-js").then(m => m.Elements), { ssr: false })
      - Redirect unauthenticated users to /login?redirect=/checkout (use router.push)
      - Show spinner/disabled state on submit button while mutation is pending
      - Named exports only, no default exports
      - Commit: feat(buyer): add Stripe Elements checkout flow for subscription purchase
    test: "cd /mnt/c/Users/aquam/PetProject/Merket_for_10_M_uesr/apps/buyer && pnpm build"
    depends_on: [pricing-page]

