    prompt: |
      Task: Build a pricing page at /pricing in the buyer Next.js app.

      CONTEXT:
      - Buyer app: apps/buyer/ (Next.js App Router, TypeScript strict, Tailwind CSS, Radix UI)
      - Existing pages: apps/buyer/app/page.tsx (home), courses/[id]/page.tsx (course detail)
      - useSubscriptionPlans hook available from apps/buyer/hooks/use-subscriptions.ts
      - Route: apps/buyer/app/pricing/page.tsx
      - Server Components by default; "use client" only for interactive elements
      - No CSS modules, no styled-components — Tailwind only

      WHAT TO BUILD:
      1. apps/buyer/app/pricing/page.tsx — Server Component (static metadata, Suspense wrapper):
         - export const metadata with title="Pricing — EduPlatform"
         - Renders <PricingContent /> wrapped in <Suspense fallback={<PricingLoading />}>

      2. apps/buyer/components/pricing/PricingContent.tsx — "use client":
