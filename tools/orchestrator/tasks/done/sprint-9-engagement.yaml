phase: "sprint-9"
description: "Engagement & Retention — certificates, wishlist, recommendations, email notifications"

tasks:
  - id: certificate-model
    title: "Certificate domain model and DB migration"
    scope: backend:learning
    prompt: |
      Task: Create certificate domain model, repository, service, routes, and DB migration in the learning service.

      CONTEXT:
      - Learning service: services/py/learning/ (FastAPI, asyncpg, Clean Architecture)
      - Learning DB: learning-db (port 5438)
      - Existing structure: app/routes/, app/services/, app/domain/, app/repositories/, migrations/
      - Enrollment service tracks course completion (is_completed flag on enrollments table)
      - JWT contains user_id, role, is_verified, email_verified
      - Shared lib: libs/py/common/ — config, errors (NotFoundError, ConflictError, ForbiddenError), security (decode_token), database

      WHAT TO BUILD:
      1. Migration: migrations/006_certificates.sql
         CREATE TABLE IF NOT EXISTS certificates (
           id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
           user_id UUID NOT NULL,
           course_id UUID NOT NULL,
           issued_at TIMESTAMPTZ NOT NULL DEFAULT now(),
           certificate_number VARCHAR(20) NOT NULL UNIQUE,
           template_data JSONB DEFAULT '{}',
           UNIQUE(user_id, course_id)
         );
         CREATE INDEX idx_certificates_user_id ON certificates(user_id);
         CREATE INDEX idx_certificates_course_id ON certificates(course_id);

      2. Domain entity: app/domain/certificate.py
         @dataclass(frozen=True) Certificate with fields: id (UUID), user_id (UUID), course_id (UUID),
         issued_at (datetime), certificate_number (str), template_data (dict).

      3. Repository: app/repositories/certificate_repository.py
         CertificateRepository class with asyncpg pool:
         - create(user_id, course_id, certificate_number, template_data) -> Certificate
         - get_by_id(id) -> Certificate | None
         - get_by_user(user_id, limit, offset) -> list[Certificate]
         - get_by_user_and_course(user_id, course_id) -> Certificate | None

      4. Service: app/services/certificate_service.py
         CertificateService(repository):
         - issue_certificate(user_id, course_id) -> Certificate
           Generate certificate_number: CERT-{YYYY}-{6 random uppercase alphanum}
           Check duplicate via get_by_user_and_course → ConflictError if exists
         - get_my_certificates(user_id, limit=20, offset=0) -> list[Certificate]
         - get_certificate(certificate_id) -> Certificate (NotFoundError if missing)

      5. Routes: app/routes/certificate_routes.py
         POST /certificates/issue — body: { course_id: UUID }
           Auth required (student). Calls service.issue_certificate(user_id, course_id).
           Returns 201 with certificate data.
         GET /certificates/me — query params: limit, offset
           Auth required. Returns list of certificates.
         GET /certificates/{certificate_id} — Auth required. Returns single certificate.
         Register router in app/main.py.

      IMPLEMENTATION APPROACH:
      1. TDD: Write tests first in tests/test_certificate_service.py and tests/test_certificate_routes.py
      2. Mock CertificateRepository for service tests
      3. Use AsyncMock(spec=CertificateRepository) pattern from existing test files
      4. Test duplicate prevention (ConflictError), not-found cases, pagination
      5. Then implement: migration → domain → repository → service → routes

      RULES:
      - TDD mandatory: write failing tests FIRST, then implement
      - Clean Architecture: routes → services → domain ← repositories
      - Domain entity has no framework imports
      - Use parameterized SQL queries ($1, $2, ...), never string concatenation
      - Type hints on all public functions
      - Handle asyncpg.UniqueViolationError → ConflictError for duplicate certificates
      - Named exports only
      - Follow existing code patterns in the learning service

      COMMIT: feat(learning): add certificate domain model, repository, service, and routes
    test: "cd /mnt/c/Users/aquam/PetProject/Merket_for_10_M_uesr/services/py/learning && uv run --package learning pytest tests/ -v"
    depends_on: []

  - id: certificate-pdf
    title: "Generate certificate PDF"
    scope: backend:learning
    prompt: |
      Task: Add PDF generation for certificates so students can download them.

      CONTEXT:
      - Learning service: services/py/learning/
      - Certificate model, repository, service, and routes already exist (from certificate-model task)
      - Certificate entity has: id, user_id, course_id, issued_at, certificate_number, template_data
      - GET /certificates/{id} returns certificate data
      - pyproject.toml is at services/py/learning/pyproject.toml — add reportlab dependency there

      WHAT TO BUILD:
      1. Add reportlab dependency to services/py/learning/pyproject.toml under [project.dependencies]

      2. Create app/adapters/pdf.py — CertificatePDFGenerator class:
         - generate(certificate, student_name: str, course_title: str) -> bytes
         - A4 landscape PDF layout:
           * Header: "EduPlatform" text logo, bold, centered
           * Title: "Certificate of Completion" centered
           * Body: "{student_name}" in large font, "has successfully completed", "{course_title}" in medium font
           * Date: "Issued on {issued_at formatted as DD Month YYYY}"
           * Certificate number: "Certificate No: {certificate_number}" at bottom
           * Decorative border: simple rectangle frame with margin
         - Use reportlab.lib.pagesizes.landscape, reportlab.lib.pagesizes.A4
         - Use reportlab.pdfgen.canvas for drawing
         - Return PDF as bytes (BytesIO buffer)

      3. New route: GET /certificates/{certificate_id}/pdf
         - Auth required
         - Fetch certificate by ID (NotFoundError if missing)
         - Verify user owns the certificate (user_id match) or is admin
         - Need student name and course title — these can come from template_data or
           accept query params ?student_name=...&course_title=... (populated by frontend)
         - Alternatively, store student_name and course_title in template_data at issue time
         - Return StreamingResponse with content_type="application/pdf",
           headers={"Content-Disposition": f"attachment; filename={certificate_number}.pdf"}

      4. Update CertificateService.issue_certificate to accept and store template_data:
         template_data = {"student_name": name, "course_title": title}
         The caller (route) should provide these from JWT claims and request body.

      IMPLEMENTATION APPROACH:
      1. TDD: Write tests for PDF generation (test that it returns bytes, non-empty, starts with %PDF)
      2. Write tests for the /pdf route (mock service, verify response content type)
      3. Then implement: adapter → service update → route
      4. Keep PDF simple — no external fonts or images, just reportlab built-in fonts

      RULES:
      - TDD mandatory: write failing tests FIRST
      - PDF must be valid (starts with %PDF header bytes)
      - No external font files or image files — text-only certificate
      - Parameterized SQL only
      - Type hints on all public functions
      - Clean Architecture: adapter is in app/adapters/, used by service

      COMMIT: feat(learning): add certificate PDF generation and download endpoint
    test: "cd /mnt/c/Users/aquam/PetProject/Merket_for_10_M_uesr/services/py/learning && uv run --package learning pytest tests/ -v"
    depends_on: [certificate-model]

  - id: certificate-auto-issue
    title: "Auto-issue certificate on course completion"
    scope: backend:learning
    prompt: |
      Task: Automatically issue a certificate when a student completes a course (all lessons done).

      CONTEXT:
      - Learning service: services/py/learning/ — has CertificateService.issue_certificate(user_id, course_id)
      - Enrollment service: services/py/enrollment/ — has lesson progress tracking
        POST /progress/lessons/{lesson_id}/complete auto-completes enrollment when all lessons are done
        (sets is_completed=True on enrollment)
      - Services communicate via HTTP (no shared DB access)
      - Enrollment service config: services/py/enrollment/app/config.py uses pydantic BaseSettings
      - Existing enrollment auto-completion logic is in app/services/progress_service.py or enrollment_service.py

      WHAT TO BUILD:
      1. Learning service — new internal endpoint:
         POST /internal/certificates/auto-issue
         Body: { user_id: UUID, course_id: UUID, student_name: str, course_title: str }
         - Checks if certificate already exists for (user_id, course_id) — if yes, return 200 with existing cert
         - If not, issues new certificate with template_data containing student_name and course_title
         - Returns 201 with certificate data
         - No auth required (internal endpoint, called service-to-service)
         Add route to app/routes/certificate_routes.py with prefix /internal/certificates

      2. Enrollment service — trigger certificate issuance:
         - Add LEARNING_SERVICE_URL to enrollment service config (BaseSettings), default "http://localhost:8007"
         - In the auto-completion logic (where is_completed is set to True), after successful completion:
           Make httpx.AsyncClient POST to {LEARNING_SERVICE_URL}/internal/certificates/auto-issue
           with { user_id, course_id, student_name, course_title }
         - student_name and course_title: pass what's available (user_id as name fallback, course_id as title fallback)
           or accept them from the progress completion request
         - Wrap the httpx call in try/except — certificate issuance failure should NOT fail the completion
           (log warning, don't raise)
         - Add httpx to enrollment service dependencies if not already present

      IMPLEMENTATION APPROACH:
      1. TDD for learning service: test internal endpoint (happy path, duplicate handling)
      2. TDD for enrollment service: test that auto-completion triggers certificate call
         Mock httpx to verify the call is made with correct payload
      3. Test that httpx failure doesn't break completion (graceful degradation)
      4. Implement learning internal route first, then enrollment integration

      RULES:
      - TDD mandatory: write failing tests FIRST
      - Certificate issuance failure must not break course completion (fire-and-forget with logging)
      - No shared DB access between services
      - Service-to-service calls via HTTP with httpx.AsyncClient
      - Parameterized SQL only, type hints on all public functions
      - Clean Architecture in both services

      COMMIT: feat(learning): auto-issue certificate on course completion via enrollment service integration
    test: "cd /mnt/c/Users/aquam/PetProject/Merket_for_10_M_uesr/services/py/learning && uv run --package learning pytest tests/ -v"
    depends_on: [certificate-pdf]

  - id: wishlist-model
    title: "Wishlist domain model and API"
    scope: backend:course
    prompt: |
      Task: Add wishlist feature to the course service so students can save courses for later.

      CONTEXT:
      - Course service: services/py/course/ (FastAPI, asyncpg, Clean Architecture)
      - Course DB: course-db (port 5434)
      - Existing tables: courses, modules, lessons, reviews, categories
      - Existing structure: app/routes/, app/services/, app/domain/, app/repositories/, migrations/
      - JWT contains user_id, role — use decode_token from libs/py/common/security
      - Shared errors: NotFoundError, ConflictError, ForbiddenError from libs/py/common/errors
      - Courses table has: id, title, description, teacher_id, is_free, price, level, duration_minutes, etc.

      WHAT TO BUILD:
      1. Migration: migrations/ (next number, check existing files for sequence)
         CREATE TABLE IF NOT EXISTS wishlist (
           id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
           user_id UUID NOT NULL,
           course_id UUID NOT NULL REFERENCES courses(id) ON DELETE CASCADE,
           created_at TIMESTAMPTZ NOT NULL DEFAULT now(),
           UNIQUE(user_id, course_id)
         );
         CREATE INDEX idx_wishlist_user_id ON wishlist(user_id);

      2. Domain entity: app/domain/wishlist.py
         @dataclass(frozen=True) WishlistItem: id (UUID), user_id (UUID), course_id (UUID), created_at (datetime)

      3. Repository: app/repositories/wishlist_repository.py
         WishlistRepository(pool):
         - add(user_id, course_id) -> WishlistItem
         - remove(user_id, course_id) -> bool (True if deleted, False if not found)
         - get_by_user(user_id, limit, offset) -> list[dict] (JOIN with courses to include course details:
           title, description, level, avg_rating, review_count, price, is_free, duration_minutes)
         - exists(user_id, course_id) -> bool

      4. Service: app/services/wishlist_service.py
         WishlistService(repository):
         - add_to_wishlist(user_id, course_id) -> WishlistItem
           Handle asyncpg.UniqueViolationError → ConflictError("Course already in wishlist")
         - remove_from_wishlist(user_id, course_id) -> None
           Raise NotFoundError if not in wishlist
         - get_my_wishlist(user_id, limit=20, offset=0) -> list[dict]
         - is_in_wishlist(user_id, course_id) -> bool

      5. Routes: app/routes/wishlist_routes.py
         POST /wishlist — body: { course_id: UUID }. Auth required (student). Returns 201.
         DELETE /wishlist/{course_id} — Auth required (student). Returns 204.
         GET /wishlist/me — Auth required. Query: limit, offset. Returns paginated list with course details.
         GET /wishlist/check/{course_id} — Auth required. Returns { in_wishlist: bool }.
         Register router in app/main.py.

      IMPLEMENTATION APPROACH:
      1. TDD: Write tests for service (add, remove, duplicate, not-found) and routes
      2. Mock WishlistRepository for service tests using AsyncMock(spec=WishlistRepository)
      3. Follow patterns from existing course service tests (check tests/ directory)
      4. Implement: migration → domain → repository → service → routes

      RULES:
      - TDD mandatory: write failing tests FIRST
      - Clean Architecture: routes → services → domain ← repositories
      - Domain entity: frozen dataclass, no framework imports
      - Parameterized SQL queries only ($1, $2, ...)
      - Handle UniqueViolationError → ConflictError
      - Type hints on all public functions
      - Named exports only
      - Follow existing patterns in the course service

      COMMIT: feat(course): add wishlist domain model, repository, service, and API endpoints
    test: "cd /mnt/c/Users/aquam/PetProject/Merket_for_10_M_uesr/services/py/course && uv run --package course pytest tests/ -v"
    depends_on: []

  - id: recommendations
    title: "Course recommendations based on enrollment patterns"
    scope: backend:enrollment
    prompt: |
      Task: Add course recommendation endpoints based on collaborative filtering (co-enrollment patterns).

      CONTEXT:
      - Enrollment service: services/py/enrollment/ (FastAPI, asyncpg, Clean Architecture)
      - Enrollment DB: enrollment-db (port 5435)
      - Enrollments table: id, user_id, course_id, enrolled_at, is_completed, total_lessons, completed_lessons
      - JWT contains user_id — use decode_token from libs/py/common/security
      - No new tables needed — recommendations computed from existing enrollments via SQL

      WHAT TO BUILD:
      1. Repository: Add methods to existing enrollment repository or create app/repositories/recommendation_repository.py
         - get_similar_courses(course_id, limit=5) -> list[dict]
           SQL: Users who enrolled in course X also enrolled in these courses.
           SELECT e2.course_id, COUNT(*) as co_enrollment_count
           FROM enrollments e1
           JOIN enrollments e2 ON e1.user_id = e2.user_id
           WHERE e1.course_id = $1 AND e2.course_id != $1
           GROUP BY e2.course_id
           ORDER BY co_enrollment_count DESC
           LIMIT $2
           Returns: [{ course_id, co_enrollment_count }]
         - get_personalized_recommendations(user_id, limit=10) -> list[dict]
           SQL: Courses popular among users with similar enrollment patterns, excluding already enrolled.
           SELECT e2.course_id, COUNT(*) as relevance_score
           FROM enrollments e1
           JOIN enrollments e2 ON e1.user_id = e2.user_id
           WHERE e1.user_id != $1
             AND e1.course_id IN (SELECT course_id FROM enrollments WHERE user_id = $1)
             AND e2.course_id NOT IN (SELECT course_id FROM enrollments WHERE user_id = $1)
           GROUP BY e2.course_id
           ORDER BY relevance_score DESC
           LIMIT $2

      2. Service: app/services/recommendation_service.py
         RecommendationService(repository):
         - get_similar_courses(course_id, limit=5) -> list[dict]
         - get_my_recommendations(user_id, limit=10) -> list[dict]

      3. Routes: app/routes/recommendation_routes.py
         GET /recommendations/courses/{course_id} — public, returns top 5 similar courses
         GET /recommendations/me — auth required, returns personalized recommendations
         Register router in app/main.py with prefix /recommendations

      IMPLEMENTATION APPROACH:
      1. TDD: Write tests with pre-populated enrollment data
         - Test similar courses: create enrollments for 3 users, verify correct co-enrollment ranking
         - Test personalized: create user enrollments, verify excluded already-enrolled courses
         - Test empty results (new course, no enrollments)
      2. Mock repository for service tests
      3. Implement: repository → service → routes

      RULES:
      - TDD mandatory: write failing tests FIRST
      - Clean Architecture: routes → services → domain ← repositories
      - SQL queries must be efficient — use proper JOINs and indexes
      - Parameterized SQL only ($1, $2, ...)
      - Type hints on all public functions
      - Return course_ids (frontend will fetch course details from course service)
      - Handle edge cases: no enrollments, new user, course with no co-enrollments

      COMMIT: feat(enrollment): add course recommendations based on co-enrollment patterns
    test: "cd /mnt/c/Users/aquam/PetProject/Merket_for_10_M_uesr/services/py/enrollment && uv run --package enrollment pytest tests/ -v"
    depends_on: []

  - id: email-notifications-events
    title: "Email notifications for key lifecycle events"
    scope: backend:notification
    prompt: |
      Task: Add event-triggered email notifications for key user lifecycle events.

      CONTEXT:
      - Notification service: services/py/notification/ (FastAPI, asyncpg, Clean Architecture)
      - Notification DB: notification-db (port 5437)
      - Existing notifications table: id, user_id, type, title, message, is_read, created_at
      - Existing routes: POST /notifications, GET /notifications/me, PATCH /notifications/{id}/read
      - Existing notification types in the service (check domain/notification.py or similar)
      - Email sending: if Resend adapter exists (from previous sprint), use it; otherwise create
        a simple app/adapters/email.py with EmailAdapter that logs email content to stdout (mock)
      - JWT auth for protected endpoints

      WHAT TO BUILD:
      1. Migration: Add email_sent column to notifications table
         ALTER TABLE notifications ADD COLUMN IF NOT EXISTS email_sent BOOLEAN DEFAULT FALSE;

      2. Email adapter: app/adapters/email.py (if not existing)
         EmailAdapter class:
         - send(to_email: str, subject: str, body: str) -> bool
         - For now: log to stdout with [EMAIL] prefix and return True (mock implementation)
         - Interface allows swapping to Resend/SendGrid later

      3. Update NotificationService:
         - Add email_adapter dependency
         - Define which notification types trigger email:
           * "welcome" → email subject: "Добро пожаловать в EduPlatform!"
           * "course_completed" → "Поздравляем с завершением курса!"
           * "review_received" → "Новый отзыв на ваш курс"
           * "streak_at_risk" → "Ваша серия под угрозой!"
         - When creating notification, if type is in email-triggering types:
           Send email via adapter, set email_sent=True on the notification record
         - Types not in list → in-app only (email_sent=False)

      4. Update routes to support new notification types:
         POST /notifications body now accepts: { user_id, type, title, message, email? }
         where email is optional recipient email address for email-triggering types.

      IMPLEMENTATION APPROACH:
      1. TDD: Test that creating a "welcome" notification triggers email adapter
      2. Test that creating a regular notification does NOT trigger email
      3. Test email_sent flag is set correctly
      4. Mock EmailAdapter for all tests
      5. Implement: migration → adapter → service update → route update

      RULES:
      - TDD mandatory: write failing tests FIRST
      - Clean Architecture: adapter in app/adapters/, injected into service
      - Email sending failure should not fail notification creation (log warning, set email_sent=False)
      - No real email sending — mock adapter that logs to stdout
      - Parameterized SQL only
      - Type hints on all public functions
      - Backward compatible: existing notification creation still works without email field

      COMMIT: feat(notification): add email notifications for lifecycle events (welcome, completion, review, streak)
    test: "cd /mnt/c/Users/aquam/PetProject/Merket_for_10_M_uesr/services/py/notification && uv run --package notification pytest tests/ -v"
    depends_on: []

  - id: certificates-ui
