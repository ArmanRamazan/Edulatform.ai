  - id: b2b-pricing
    title: "B2B organization subscription with seat-based pricing"
    scope: backend:payment
    type: feat
    prompt: |
      Task: Add B2B subscription plans for organizations — pilot, enterprise tiers with per-seat pricing.

      CONTEXT:
      - Payment service: services/py/payment/ (FastAPI, asyncpg, Clean Architecture)
      - Existing: subscription_plans, user_subscriptions, StripeClient adapter
      - Need: organization-level subscriptions

      WHAT TO BUILD:
      TDD — write tests first, then implement.

      1. Migration:
         CREATE TABLE IF NOT EXISTS org_subscriptions (
           id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
           organization_id UUID NOT NULL UNIQUE,
           plan_tier VARCHAR(20) NOT NULL DEFAULT 'pilot',
           stripe_subscription_id VARCHAR(200),
           stripe_customer_id VARCHAR(200),
           max_seats INT NOT NULL DEFAULT 20,
           current_seats INT NOT NULL DEFAULT 0,
           price_cents INT NOT NULL,
           status VARCHAR(20) NOT NULL DEFAULT 'active',
           trial_ends_at TIMESTAMPTZ,
           current_period_start TIMESTAMPTZ,
           current_period_end TIMESTAMPTZ,
           created_at TIMESTAMPTZ NOT NULL DEFAULT now()
         );

      2. Domain: OrgSubscription dataclass, PLAN_TIERS config
         pilot: max 20 seats, $1000/mo
         enterprise: max 999 seats, $10000/mo

      3. Repository: OrgSubscriptionRepository — create, get_by_org, update_seats, update_status, cancel

      4. Service: OrgSubscriptionService(repo, stripe_client):
         - create_subscription, check_seat_limit, add_seat, remove_seat, cancel_subscription
         - handle_webhook (invoice.paid, invoice.payment_failed, customer.subscription.deleted)

      5. Routes:
         POST /org-subscriptions — create
         GET /org-subscriptions/{org_id} — get status
         POST /org-subscriptions/{org_id}/cancel — cancel
         POST /webhooks/stripe-org — Stripe webhook

      6. Tests: full service + route tests, mock Stripe

      RULES:
      - TDD mandatory
      - Seat limit enforced on member add
      - Webhook idempotency (check event ID)
      - Clean Architecture

      COMMIT: feat(payment): add B2B organization subscription with seat-based pricing
    test: "cd /mnt/c/Users/aquam/PetProject/Merket_for_10_M_uesr/services/py/payment && uv run --package payment pytest tests/ -v"
    depends_on: []

