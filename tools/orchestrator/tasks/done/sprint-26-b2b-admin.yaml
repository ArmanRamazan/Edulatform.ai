        RAG: GET /kb/{org_id}/concepts → {nodes, edges}
      - Recharts already installed in project

      WHAT TO BUILD:

      1. apps/buyer/app/(app)/settings/analytics/page.tsx

      2. apps/buyer/components/admin/analytics/TeamOverview.tsx:
         - Summary cards: total members, avg trust level, active today, completion rate
