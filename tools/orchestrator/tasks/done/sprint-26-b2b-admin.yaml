  - id: llm-provider-config
    title: "Configurable LLM provider per organization"
    scope: backend:ai
    type: feat
    prompt: |
      Task: Add per-org LLM provider configuration — organizations choose between Gemini (standard) and self-hosted (strict isolation).

      CONTEXT:
      - AI service: services/py/ai/ (port 8006, Gemini Flash via httpx)
      - Design: docs/plans/2026-03-05-b2b-knowledge-platform-design.md — Section 5-6
      - Current: all orgs use Gemini. Need: configurable per org.
      - Identity service has organizations table with settings JSONB column

      WHAT TO BUILD:
      TDD — write tests first, then implement.

      1. app/domain/llm_config.py:
         @dataclass(frozen=True)
         LLMConfig:
           internal_provider: str  # "gemini" | "self_hosted"
           internal_model_url: str | None
           external_provider: str  # always "gemini" for now
           embedding_provider: str  # "gemini" | "self_hosted"
           data_isolation: str  # "strict" | "standard"

      2. app/services/llm_provider.py:
         Abstract base:
         class LLMProvider(ABC):
           async def complete(self, prompt: str, system: str = "") -> str: ...

         class GeminiProvider(LLMProvider):
           (refactor from existing gemini_client usage)

         class SelfHostedProvider(LLMProvider):
           Uses httpx to call OpenAI-compatible API at internal_model_url
           Compatible with vLLM, Ollama, text-generation-inference

      3. app/services/llm_resolver.py:
         LLMResolver(settings):
         - resolve(org_id: str, purpose: str) -> LLMProvider
           purpose: "internal" | "external"
           Reads org settings (cache in Redis, TTL 5min)
           Returns appropriate provider

      4. Routes: app/routes/llm_config_routes.py:
         GET /ai/config/llm/{org_id} — Auth required (admin). Returns current LLM config.
         PUT /ai/config/llm/{org_id} — Auth required (admin). Updates config.
         POST /ai/config/llm/{org_id}/test — Auth required (admin). Tests connection to self-hosted model.

      5. Refactor existing services (StrategistService, DesignerService, CoachService):
         Replace direct gemini_client calls with llm_resolver.resolve(org_id, "internal")
         External search always uses llm_resolver.resolve(org_id, "external")

      6. Frontend: settings/llm page in admin dashboard (SettingsTab):
         - Toggle: Standard (Gemini) / Strict (Self-hosted)
         - If strict: URL input for self-hosted model
         - Test connection button
         - Warning: "Strict mode requires a running self-hosted LLM"

      7. Tests: mock providers, test resolver logic, test config endpoints

      RULES:
      - TDD mandatory
      - Default: standard (Gemini) — no breaking change for existing orgs
      - Self-hosted provider uses OpenAI-compatible API format
      - Config cached in Redis (avoid DB hit per LLM call)
      - Strict mode validation: if data_isolation=strict, internal_provider must be self_hosted
      - Clean Architecture

      COMMIT: feat(ai): add configurable LLM provider per organization with data isolation
    test: "cd /mnt/c/Users/aquam/PetProject/Merket_for_10_M_uesr/services/py/ai && uv run --package ai pytest tests/ -v"
    depends_on: []
