phase: "sprint-26"
description: "B2B Admin & Billing — admin dashboard, team analytics, org subscriptions, LLM config"

tasks:
  - id: admin-dashboard
    title: "Organization admin dashboard with Dark Knowledge theme"
    scope: frontend:buyer
    type: feat
    prompt: |
      Task: Build the admin dashboard for org owners — manage team, knowledge base, templates, settings.

      CONTEXT:
      - Buyer app: apps/buyer/ (Next.js 15, shadcn/ui, Dark Knowledge theme, sidebar layout)
      - Design: docs/plans/2026-03-05-b2b-knowledge-platform-design.md
      - APIs (all exist):
        Identity: GET /organizations/{id}/members, POST /organizations/{id}/members, DELETE /organizations/{id}/members/{user_id}
        Learning: GET /trust-level/org/{org_id}
        RAG: GET /kb/{org_id}/stats, GET /kb/{org_id}/sources, POST /sources/github, POST /upload/markdown, POST /upload/bulk
        RAG: GET /templates?org_id, POST /templates, POST /templates/{id}/stages, etc.
      - Admin = org member with role "owner" or "admin"

      WHAT TO BUILD:

      1. apps/buyer/app/(app)/settings/page.tsx:
         Server wrapper. Admin-only route (check role, redirect non-admins).

      2. apps/buyer/components/admin/AdminDashboard.tsx ("use client"):
         shadcn Tabs component with 4 tabs:
         - Team | Knowledge Base | Templates | Settings

      3. TeamTab.tsx:
         - Table (shadcn Table): name, email, role, trust level badge, missions completed, last active
         - "Invite Member" button → Dialog with email + role select
         - Remove member button with confirmation Dialog
         - Sort by trust level / activity

      4. KnowledgeBaseTab.tsx:
         - Stats cards (shadcn Card): total docs, chunks, concepts — from GET /kb/{org_id}/stats
         - Source list: type badges (github=violet, markdown=info)
         - "Add GitHub Repo" → Dialog with form: owner, repo, branch, extensions
         - "Upload Documents" → file upload area (drag & drop)
         - Refresh button per source

      5. TemplatesTab.tsx:
         - List onboarding templates
         - Create: Dialog with name + description
         - Edit stages: ordered list, add/remove, trust_level_required per stage
         - Set default template toggle

      6. SettingsTab.tsx:
         - Org name, logo
         - Danger zone: deactivate org (with confirmation)
         - Link to billing (/settings/billing)

      7. apps/buyer/hooks/use-admin.ts:
         Hooks for all admin operations (mutations with cache invalidation).

      8. apps/buyer/lib/api.ts — add admin/templates namespaces.

      RULES:
      - Admin check at layout level
      - File upload via FormData with progress indicator
      - Confirmation Dialogs for destructive actions
      - All shadcn components, Dark Knowledge styling
      - Named exports
      - Responsive tables with horizontal scroll on mobile

      COMMIT: feat(buyer): add organization admin dashboard with team and KB management
    test: "cd /mnt/c/Users/aquam/PetProject/Merket_for_10_M_uesr/apps/buyer && pnpm build"
    depends_on: []

