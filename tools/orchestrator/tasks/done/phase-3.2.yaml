  # ─── FRONTEND: Seller onboarding page ────────────────────────────────────────

  - id: seller-onboarding
    title: "Teacher onboarding and registration page"
    scope: frontend:seller
    depend_on:
      - seller-earnings-ui
    prompt: |
      Task: Build the teacher onboarding flow in apps/seller/ — a dedicated register/onboarding page
      that guides a new teacher through account creation and explains the platform.

      CONTEXT:
      - apps/seller/ is set up with Next.js 15, App Router, Tailwind, TypeScript strict
      - lib/api.ts has identity namespace: identity.login(email, password), identity.me(token)
      - Identity service (port 8001, proxied at /api/identity/):
        - POST /register { email, password, name, role: "teacher" } → { access_token, token_type }
        - Teachers start as is_verified=false and must be verified by an admin
      - After registration, teacher sees a "pending verification" screen
      - hooks/use-auth.ts provides useAuth() with { token, user, login, register, logout }
        register(email, password, name, role) calls POST /register — add this to use-auth.ts if missing

      WHAT TO BUILD:

      1. Verify apps/seller/hooks/use-auth.ts has register() function.
         If identity.register is not in lib/api.ts, add it:
         POST /api/identity/register { email, password, name, role } → TokenResponse

      2. apps/seller/app/register/page.tsx — renders TeacherRegisterForm client component.

      3. apps/seller/components/TeacherRegisterForm.tsx — "use client":
         Multi-step form (2 steps controlled by local state, no routing between steps):

         Step 1 — Account details:
           - Name (text, required, min 2 chars)
           - Email (email type, required)
           - Password (password type, required, min 8 chars)
           - "Next" button: validates fields, advances to step 2

         Step 2 — Confirm and create:
           - Summary: "Creating teacher account for {name} ({email})"
           - Checklist of what teachers can do on the platform:
             * Create and manage courses
             * Track student enrollments and reviews
             * View earnings analytics
             * Request payouts
           - "Create Teacher Account" submit button
           - "Back" button to return to step 1
           - Calls identity.register + stores token + calls identity.me
           - On success: shows PendingVerification component (not a redirect)
           - On error: shows error message below form

         Step 3 — Pending verification (shown after successful register):
           Not a separate route — rendered inline after successful registration.
           Shows:
           - "Account created successfully!" heading
           - "Your teacher account is pending admin verification. You will receive
             an email once your account is approved."
           - "Go to Dashboard" link → /dashboard
             (Dashboard layout will show access-denied if not verified — that's intentional
             so teacher can see what's coming)

      4. Update apps/seller/app/login/page.tsx (if it exists from seller-dashboard task):
         Add a link "New teacher? Create an account →" pointing to /register

      5. apps/seller/app/page.tsx (root redirect):
         Ensure it still redirects to /dashboard (created in scaffold task).

      RULES:
      - Named exports only
      - "use client" only on TeacherRegisterForm (not on page.tsx)
      - No default exports
      - Tailwind only
      - next/link for navigation links
      - Client-side validation before API call (no empty submit)
      - After implementation: cd apps/seller && pnpm build
      - Commit: feat(seller): add teacher onboarding and registration flow
    test: "cd apps/seller && pnpm build"
