  - id: messaging-frontend
    title: "Direct messaging UI in buyer app"
    scope: frontend:buyer
    prompt: |
      Task: Build a messaging interface for direct communication between users.

      CONTEXT:
      - Buyer app: apps/buyer/ (Next.js 15 App Router, Tailwind CSS, TanStack Query)
      - API client: apps/buyer/lib/api.ts
      - Auth hook: apps/buyer/hooks/use-auth.ts — { user, token, loading }
      - API proxy: /api/notification/:path* → http://localhost:8005/:path*
      - Notification service messaging endpoints:
        POST /messages { recipient_id, content } → 201
        GET /conversations/me?limit&offset → paginated ConversationPreview
        GET /conversations/:id/messages?limit&offset → paginated Message
        PATCH /messages/:id/read → 204
      - ConversationPreview: { conversation_id, other_user_id, last_message_content, last_message_at, unread_count }
      - Message: { id, conversation_id, sender_id, content, is_read, created_at }

      WHAT TO BUILD:

      1. API client additions in apps/buyer/lib/api.ts:
         Add to notification namespace (or create messaging namespace):
         - sendMessage(token, { recipient_id, content }): Message
         - getConversations(token, params): paginated ConversationPreview
         - getMessages(token, conversationId, params): paginated Message
         - markMessageRead(token, messageId): void

      2. Hook: apps/buyer/hooks/use-messages.ts
         - useConversations(token) — TanStack Query, refetchInterval: 10000 (poll every 10s)
         - useMessages(token, conversationId) — TanStack Query, refetchInterval: 10000
         - useSendMessage(token) — useMutation, invalidates conversations + messages
         - useMarkRead(token) — useMutation

      3. Messages page: apps/buyer/app/messages/page.tsx ("use client")
         Two-panel layout:
         - Left panel (1/3 width): conversation list
           Each item: other user name (or ID as fallback), last message preview (truncated),
           timestamp, unread count badge (blue dot)
           Click → select conversation
         - Right panel (2/3 width): message thread
           Chronological messages, grouped by date. Each message: content, timestamp, sent/received style
           (sent = right-aligned blue, received = left-aligned gray — like chat apps)
           Bottom: text input + "Отправить" button. Enter to send.
         - Empty state: "Нет сообщений. Начните диалог с преподавателем на странице его профиля."

      4. "Написать" button on profile pages:
         On teacher profile page (apps/buyer/app/users/[id]/page.tsx), add
         "Написать сообщение" button → navigates to /messages?to={userId}
         Messages page checks ?to param → opens new conversation with that user.

      5. Header notification: Add "Сообщения" link to Header.tsx with unread count badge.

      IMPLEMENTATION APPROACH:
      1. Add API methods
      2. Create hook
      3. Build messages page with two-panel layout
      4. Add "Написать" button to profile page
      5. Add header link
      6. Verify: cd apps/buyer && pnpm build

      RULES:
      - "use client" for messages page
      - Polling every 10s for new messages (no WebSocket)
      - Tailwind CSS only
      - next/link for navigation
      - No new dependencies
      - Named exports (except page default export)
      - Message content: max 2000 chars, validated client-side

      COMMIT:
      feat(buyer): add direct messaging UI
    test: "cd /mnt/c/Users/aquam/PetProject/Merket_for_10_M_uesr/apps/buyer && pnpm build"
    depends_on: []

  - id: study-groups-frontend
    title: "Study groups UI"
    scope: frontend:buyer
    prompt: |
      Task: Build study groups UI integrated into course pages in the buyer app.

      CONTEXT:
      - Buyer app: apps/buyer/ (Next.js 15 App Router, Tailwind CSS, TanStack Query)
      - API client: apps/buyer/lib/api.ts
      - Auth hook: apps/buyer/hooks/use-auth.ts
      - API proxy: /api/learning/:path* → http://localhost:8007/:path*
      - Learning service study group endpoints:
        POST /study-groups { course_id, name, description? } → 201
        GET /study-groups/course/:course_id?limit&offset → paginated StudyGroupWithCount
        POST /study-groups/:id/join → 201
        DELETE /study-groups/:id/leave → 204
        GET /study-groups/:id/members?limit&offset → paginated GroupMember
        GET /study-groups/me → list of user's groups
      - StudyGroupWithCount: { id, course_id, name, description, creator_id, max_members, created_at, member_count }
      - Existing course detail page: apps/buyer/app/courses/[id]/page.tsx

      WHAT TO BUILD:

      1. API client additions in apps/buyer/lib/api.ts:
         Add to learning namespace:
         - getCourseGroups(courseId, params): paginated StudyGroupWithCount
         - createGroup(token, { course_id, name, description }): StudyGroup
         - joinGroup(token, groupId): GroupMember
         - leaveGroup(token, groupId): void
         - getGroupMembers(groupId, params): paginated GroupMember
         - getMyGroups(token): StudyGroup[]

      2. Hook: apps/buyer/hooks/use-study-groups.ts
         - useCourseGroups(courseId) — TanStack Query
         - useCreateGroup(token) — useMutation, invalidates course groups
         - useJoinGroup(token) — useMutation, invalidates course groups
         - useLeaveGroup(token) — useMutation, invalidates course groups
         - useGroupMembers(groupId) — TanStack Query
         - useMyGroups(token) — TanStack Query

      3. On course detail page, add a "Учебные группы" section (below existing content):
         - List of groups for this course: name, member count / max, "Вступить" button
         - If user is already a member: show "Вы участник" badge + "Выйти" button
         - "Создать группу" button → opens inline form (name input, description textarea, submit)
         - If no groups: "Пока нет учебных групп. Создайте первую!"

      4. Group detail (expandable or modal):
         Click group name → show member list (avatars/initials, names)
         Link member names to profile pages (/users/:id)

      5. My Groups page: apps/buyer/app/groups/page.tsx
         List of user's study groups across all courses.
         Each item: group name, course title (if available), member count, "Открыть курс" link.

      IMPLEMENTATION APPROACH:
      1. Add API methods
      2. Create hook
      3. Add study groups section to course detail page
      4. Build my-groups page
      5. Verify: cd apps/buyer && pnpm build

      RULES:
      - "use client" for interactive components
      - Tailwind CSS only
      - next/link for navigation
      - No new dependencies
      - Named exports (except page default exports)
      - Group name: max 100 chars, validated client-side

      COMMIT:
      feat(buyer): add study groups UI on course pages
    test: "cd /mnt/c/Users/aquam/PetProject/Merket_for_10_M_uesr/apps/buyer && pnpm build"
    depends_on: []

  - id: activity-feed-frontend
    title: "Activity feed UI"
    scope: frontend:buyer
    prompt: |
      Task: Build a social activity feed page in the buyer app.

      CONTEXT:
      - Buyer app: apps/buyer/ (Next.js 15 App Router, Tailwind CSS, TanStack Query)
      - API client: apps/buyer/lib/api.ts
      - Auth hook: apps/buyer/hooks/use-auth.ts — { user, token }
      - Profile hook: apps/buyer/hooks/use-profile.ts — useFollowing(token) returns followed user IDs
      - API proxy: /api/learning/:path* → http://localhost:8007/:path*
      - Learning service activity endpoints:
        GET /activity/me?limit&offset → paginated Activity
        GET /activity/feed?user_ids=id1,id2,...&limit&offset → paginated Activity
      - Activity: { id, user_id, activity_type, payload: object, created_at }
      - Activity types: quiz_completed, flashcard_reviewed, badge_earned, streak_milestone, concept_mastered

      WHAT TO BUILD:

      1. API client additions in apps/buyer/lib/api.ts:
         Add to learning namespace:
         - getMyActivity(token, params): paginated Activity
         - getSocialFeed(token, { user_ids, limit, offset }): paginated Activity

      2. Hook: apps/buyer/hooks/use-activity.ts
         - useMyActivity(token) — TanStack Query, paginated
         - useSocialFeed(token, userIds) — TanStack Query, paginated
           Depends on followed user IDs from useFollowing hook.

      3. Feed page: apps/buyer/app/feed/page.tsx ("use client")
         - Tab switcher: "Моя активность" / "Подписки"
         - "Моя активность" tab: list of own activities
         - "Подписки" tab: feed of followed users' activities
           First, fetch following list to get user_ids, then fetch social feed.
           If not following anyone: "Подпишитесь на преподавателей, чтобы видеть их активность"

      4. Activity card component: apps/buyer/components/ActivityCard.tsx
         Each card shows:
         - User avatar (initials placeholder) + name (link to /users/:id)
         - Activity description based on type:
           * quiz_completed: "{name} завершил(а) квиз с результатом {payload.score}%"
           * flashcard_reviewed: "{name} повторил(а) {payload.count} флеш-карточек"
           * badge_earned: "{name} получил(а) значок «{payload.badge_name}»"
           * streak_milestone: "{name} достиг(ла) серии в {payload.days} дней"
           * concept_mastered: "{name} освоил(а) концепт «{payload.concept_name}»"
         - Relative timestamp ("2 часа назад", "вчера")

      5. Header integration: Add "Лента" link to Header.tsx navigation.

      IMPLEMENTATION APPROACH:
      1. Add API methods
      2. Create hook
      3. Build ActivityCard component
      4. Build feed page with tabs
      5. Add header link
      6. Verify: cd apps/buyer && pnpm build

      RULES:
      - "use client" for feed page
      - Tailwind CSS only
      - next/link for user profile links
      - No new dependencies
      - Named exports (except page default export)
      - Relative time formatting: use Intl.RelativeTimeFormat or simple helper (no moment/dayjs)

      COMMIT:
      feat(buyer): add social activity feed page
    test: "cd /mnt/c/Users/aquam/PetProject/Merket_for_10_M_uesr/apps/buyer && pnpm build"
    depends_on: []
