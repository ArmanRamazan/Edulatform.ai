      2. Edit HeroSection to add responsive classes and "trusted by" line.
      3. Update SocialProof numbers to match actual project state.
      4. Add FeatureHighlights section between social proof and catalog if not present,
         or enhance existing one. Use grid-cols-1 md:grid-cols-3.
      5. Add catalog section heading.
      6. Do NOT break any existing functionality — search, filters, course grid must work.

      RULES:
      - "use client" stays at top (already present)
      - Tailwind CSS only, no inline styles, no CSS modules
      - next/link for navigation (not <a>) except same-page anchors
      - No new npm dependencies
      - Named exports for sub-components (HeroSection, etc.)
      - Keep ALL existing imports and hooks — do not remove any
      - After implementation: cd apps/buyer && pnpm build must pass with 0 errors

