      IMPLEMENTATION APPROACH:
      1. Check apps/buyer/lib/api.ts for existing ai.credits method — add if missing.
      2. Create apps/buyer/hooks/use-credits.ts following the pattern in use-gamification.ts.
      3. Edit Header.tsx: add useCredits(token) call alongside useMyXp and useMyStreak.
      4. Add the credit badge span in the gamification badges row.
      5. Calculate percentage: (used / limit) * 100 for color logic.

      RULES:
      - Named export only: export function useCredits(...)
      - TanStack Query for data fetching (useQuery)
      - Tailwind CSS only for styling
      - No new npm dependencies
      - Follow the exact pattern of useMyXp/useMyStreak hooks
