      Task: Enhance the homepage (apps/buyer/app/page.tsx) with a richer marketing landing page
      including refined hero, social proof, feature highlights, and a smooth scroll to catalog.

      CONTEXT:
      - Current homepage: apps/buyer/app/page.tsx — already a "use client" component with HeroSection,
        SocialProof, FeatureHighlights, and a course catalog grid with search/filter.
      - HeroSection already exists as a named export in page.tsx with gradient bg, headline
        "Учитесь быстрее с AI-тьютором", and CTAs for logged-in/logged-out users.
      - Social proof section exists with 3 stat boxes (hardcoded).
      - Course catalog section exists with id="catalog", search, filters, grid.
      - Auth hook: apps/buyer/hooks/use-auth.ts — { user, token, loading }
      - Header component: apps/buyer/components/Header.tsx
      - CourseCard component: apps/buyer/components/CourseCard.tsx
      - Hooks: useCourseList, useCategories from apps/buyer/hooks/use-courses.ts

      WHAT TO BUILD:
      Enhance the existing landing page with:

      1. Hero section improvements:
         - Add a subtle pattern or animated gradient background (CSS only, no JS animation)
         - Make headline responsive: text-2xl sm:text-4xl lg:text-5xl
         - Stack CTA buttons vertically on mobile: flex-col sm:flex-row
         - Add a "trusted by" line under CTAs: "Присоединяйтесь к тысячам студентов"

      2. Updated social proof numbers:
         - "373 теста" / "Полное покрытие кода" (actual test count from MEMORY)
         - "7 микросервисов" / "Масштабируемая архитектура"
         - "AI + FSRS" / "Умные повторения и адаптивное обучение"

      3. Feature highlights section (3 columns below social proof):
