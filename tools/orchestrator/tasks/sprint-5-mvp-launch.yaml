  - id: checkout-flow
    title: "Checkout flow: plan selection and payment confirmation"
    scope: frontend:buyer
    prompt: |
      Task: Build a checkout page at /checkout for subscription plan purchase with a mock payment form.

      CONTEXT:
      - Buyer app: apps/buyer/ (Next.js App Router, TypeScript strict, Tailwind CSS)
      - Pricing page at /pricing passes plan and billing cycle via query params:
        /checkout?plan=student&billing=monthly
      - Payment service has POST /subscriptions endpoint (mock — always returns success).
      - API client: apps/buyer/lib/api.ts — needs subscriptions.create() method if not present.
      - Auth hook: apps/buyer/hooks/use-auth.ts — redirect to /login if not authenticated.
      - useSearchParams() requires Suspense boundary in Next.js static generation.

      WHAT TO BUILD:
      1. apps/buyer/app/checkout/page.tsx — "use client" component:
         - Read ?plan and ?billing from useSearchParams() (wrap in Suspense)
         - If not authenticated, redirect to /login?redirect=/checkout
         - Left side: Order summary card (plan name, price, billing cycle, total)
         - Right side: Mock payment form with fields:
           * Card number (text input, placeholder "4242 4242 4242 4242")
           * Expiry (text input, placeholder "MM/YY")
           * CVV (text input, placeholder "123")
           * Name on card (text input)
         - "Оплатить" submit button — calls payment API to create subscription
         - Loading/disabled state during submission
         - Error display below form if API call fails

      2. apps/buyer/app/checkout/success/page.tsx — success confirmation:
         - Headline: "Оплата прошла успешно!"
         - Checkmark icon (CSS circle with checkmark or emoji)
         - Plan name and "Подписка активна"
         - Two CTAs: "Перейти к курсам" → / and "Мой аккаунт" → /account

      3. apps/buyer/app/checkout/loading.tsx — skeleton for checkout form.

      4. If not present, add to apps/buyer/lib/api.ts:
         subscriptions namespace with create(token, { plan_id, billing_cycle }) method
         calling POST /api/payment/subscriptions.

      IMPLEMENTATION APPROACH:
      1. Create apps/buyer/app/checkout/page.tsx as "use client".
      2. Use useSearchParams() for plan/billing — wrap component in Suspense.
      3. Map plan name to price: { free: 0, student: { monthly: 9.99, yearly: 95.88 },
         pro: { monthly: 19.99, yearly: 191.88 } }.
      4. On form submit: validate fields are non-empty (client-side only, no real validation
         since payment is mock), call API, on success router.push("/checkout/success?plan=...").
      5. Create success page that reads ?plan from searchParams and shows confirmation.
      6. Create loading.tsx skeleton.

      RULES:
      - "use client" on checkout/page.tsx and success/page.tsx
      - useSearchParams() must be wrapped in Suspense boundary
      - next/link for navigation
      - Tailwind CSS only
      - No real Stripe or payment processing — this is a mock form
      - No new npm dependencies (no @stripe/react-stripe-js — keep it simple)
      - Card number/CVV inputs must have autoComplete="off" (security hygiene)
      - After implementation: cd apps/buyer && pnpm build must pass with 0 errors

      COMMIT:
      feat(buyer): add checkout flow with mock payment form
    test: "cd /mnt/c/Users/aquam/PetProject/Merket_for_10_M_uesr/apps/buyer && pnpm build"
    depends_on: [pricing-page]

