  - id: responsive-mobile
    title: "Responsive mobile web audit & fixes"
    scope: frontend:buyer
    prompt: |
      Task: Audit and fix mobile responsiveness across the entire buyer app for screens from 320px wide.

      CONTEXT:
      - Buyer app: apps/buyer/ (Next.js App Router, Tailwind CSS)
      - All pages use max-w-6xl or max-w-4xl containers with px-4.
      - Problem areas to audit and fix:

        1. apps/buyer/components/Header.tsx
           - Nav has many items: links, XP badge, flame badge, username, role badge, logout.
           - On mobile (<640px) this overflows the row.
           - Fix: hide non-critical items on mobile using hidden sm:flex / hidden sm:inline.
           - Keep visible on mobile: Logo, primary nav links (Курсы), Login/Register or Logout.
           - Hide on mobile: XP badge, streak flame, role badge, username text.

        2. apps/buyer/app/page.tsx (homepage/landing)
           - Hero: headline text-2xl sm:text-4xl, CTAs flex-col sm:flex-row
           - Feature highlights: grid-cols-1 sm:grid-cols-3
           - Social proof: grid-cols-1 sm:grid-cols-3
           - Filter row: ensure flex-wrap
           - Course grid: grid-cols-1 sm:grid-cols-2 lg:grid-cols-3

        3. apps/buyer/app/badges/page.tsx
           - Stats grid: should be grid-cols-1 sm:grid-cols-3

        4. apps/buyer/app/enrollments/page.tsx
           - Card with flex items-center justify-between may overflow on small screens.
           - Fix: add flex-wrap or use flex-col on mobile.

        5. apps/buyer/app/courses/[id]/page.tsx
           - Meta row: ensure flex-wrap for level, price, duration, enrollments, rating.
           - Review form: check for horizontal overflow.

        6. apps/buyer/app/onboarding/page.tsx
           - Step 2 course grid: grid-cols-1 sm:grid-cols-2 lg:grid-cols-3
           - Step 3 highlights: grid-cols-1 sm:grid-cols-3

        7. apps/buyer/app/flashcards/page.tsx
           - Flashcard container: ensure it doesn't overflow on 320px screens.

        8. apps/buyer/app/courses/[id]/lessons/[lessonId]/page.tsx
           - Sidebar/main layout: stack vertically on mobile (flex-col lg:flex-row).

      IMPLEMENTATION APPROACH:
      1. Read each file listed above.
      2. Apply Tailwind responsive prefixes (sm:, md:, lg:) to fix layout issues.
      3. For Header: simplest approach — wrap items, hide non-critical on mobile with hidden sm:flex.
         Do NOT add hamburger menu with JS state.
      4. Do NOT introduce new components or abstractions — edit existing files in place.
      5. Do NOT change any functionality — only layout/spacing/visibility classes.

      RULES:
      - Only Tailwind responsive utility classes — no custom CSS, no media queries
      - Do not add new components or JavaScript logic
      - Do not change any text content, routing, or business logic
      - All changes are purely in className strings
      - After implementation: cd apps/buyer && pnpm build must pass with 0 errors

      COMMIT:
      feat(buyer): fix mobile responsive layout across all pages
    test: "cd /mnt/c/Users/aquam/PetProject/Merket_for_10_M_uesr/apps/buyer && pnpm build"
    depends_on: [landing-page]

  - id: pricing-page
    title: "Pricing page: 3 tiers with feature comparison"
    scope: frontend:buyer
    prompt: |
      Task: Build a pricing page at /pricing showing three subscription tiers with a monthly/yearly toggle.

      CONTEXT:
      - Buyer app: apps/buyer/ (Next.js App Router, TypeScript strict, Tailwind CSS)
      - Payment service has subscription_plans table and GET /subscription-plans endpoint.
      - Plans: Free (5 courses, 10 AI chats/day, basic quizzes), Student $9.99/mo (unlimited courses,
        100 AI/day, spaced repetition, knowledge graph), Pro $19.99/mo (unlimited AI, velocity
        dashboard, Obsidian export).
      - API client: apps/buyer/lib/api.ts — has namespace objects for each service.
      - Auth hook: apps/buyer/hooks/use-auth.ts — { user, token, loading }
      - Header component: apps/buyer/components/Header.tsx — need to add pricing link.
      - Existing pages follow pattern: Server Component page.tsx wrapping "use client" content.

      WHAT TO BUILD:
      1. apps/buyer/app/pricing/page.tsx — page component:
         - Can be "use client" (needs state for toggle and hooks for auth)
         - Title section: "Выберите свой план" with subtitle
         - Monthly/Yearly toggle (useState): yearly = 20% discount, show "Скидка 20%" badge
         - Three pricing cards in a responsive grid (grid-cols-1 md:grid-cols-3):

         Card 1 — Free:
           - Price: "Бесплатно"
           - Features: 5 курсов, 10 AI-запросов/день, Базовые квизы, Флеш-карточки
           - CTA: "Начать бесплатно" → /register (if not logged in) or disabled "Текущий план"

         Card 2 — Student (highlighted with ring-2 ring-indigo-500 and "Рекомендуем" badge):
           - Price: "$9.99/мес" or "$7.99/мес" (yearly)
           - Features: Безлимитные курсы, 100 AI-запросов/день, Адаптивные повторения (FSRS),
             Граф знаний, Расширенная статистика
           - CTA: "Выбрать план" → /checkout?plan=student&billing=monthly|yearly

         Card 3 — Pro:
           - Price: "$19.99/мес" or "$15.99/мес" (yearly)
           - Features: Всё из Student +, Безлимитный AI, Velocity дашборд,
             Экспорт в Obsidian, Приоритетная поддержка
           - CTA: "Выбрать план" → /checkout?plan=pro&billing=monthly|yearly

      2. apps/buyer/app/pricing/loading.tsx — three skeleton cards.

      3. Update Header.tsx: add "Тарифы" link pointing to /pricing in the nav.

      IMPLEMENTATION APPROACH:
      1. Create apps/buyer/app/pricing/page.tsx as "use client" component.
      2. Use useState for billingCycle ("monthly" | "yearly").
      3. Hardcode plan data (no API call needed — plans are static for now).
      4. Use useAuth() to detect logged-in state for CTA button logic.
      5. Create loading.tsx with 3 skeleton cards (animate-pulse).
      6. Edit Header.tsx to add "Тарифы" nav link between existing nav items.
      7. Style with Tailwind: white cards, rounded-2xl, shadow-sm, p-8.
         Highlighted card: ring-2 ring-indigo-500 shadow-lg relative with absolute badge.

      RULES:
      - "use client" on pricing/page.tsx (uses useState, useAuth)
      - next/link for all navigation
      - Tailwind CSS only
      - No new npm dependencies
      - Named exports for extracted sub-components (PricingCard, etc.)
      - Default export for the page component (Next.js requirement)
      - After implementation: cd apps/buyer && pnpm build must pass with 0 errors

      COMMIT:
      feat(buyer): add pricing page with 3-tier plan comparison
    test: "cd /mnt/c/Users/aquam/PetProject/Merket_for_10_M_uesr/apps/buyer && pnpm build"
