  - id: credit-indicator
    title: "AI credit usage indicator in header"
    scope: frontend:buyer
    prompt: |
      Task: Add an AI credit usage indicator to the Header component and create a supporting hook.

      CONTEXT:
      - AI service: GET /ai/credits/me returns { used: int, limit: int, plan: str, resets_at: str }
      - API client: apps/buyer/lib/api.ts — has AI_URL = "/api/ai" and an `ai` namespace object.
      - Header component: apps/buyer/components/Header.tsx — shows XP badge (star icon + XP count)
        and streak flame (fire icon + streak days). These are in a gamification badges row.
      - Auth hook: useAuth() provides { user, token, loading }.
      - Existing gamification hooks: apps/buyer/hooks/use-gamification.ts — useMyXp, useMyStreak.
      - TanStack Query used for all server state.

      WHAT TO BUILD:
      1. apps/buyer/hooks/use-credits.ts — new hook:
         - useCredits(token: string | null) → TanStack Query hook
         - Calls GET /api/ai/credits/me with auth header
         - Returns { data: { used, limit, plan, resets_at }, isLoading, error }
         - Refetch interval: 60 seconds (staleTime: 60_000)

      2. Add credit method to api.ts if not present:
