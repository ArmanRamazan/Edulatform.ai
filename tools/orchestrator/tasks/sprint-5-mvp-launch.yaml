        are exhausted.
      - Pages that use AI credits:
        * apps/buyer/app/courses/[id]/lessons/[lessonId]/page.tsx — tutor chat (TutorDrawer),
          summary generation, quiz generation
        * Possibly standalone quiz/summary pages
      - TutorDrawer component: apps/buyer/components/TutorDrawer.tsx — sends chat messages to AI.
      - Pricing page exists at /pricing.
      - API error handling: apps/buyer/lib/errors.ts has getErrorMessage().
      - TanStack Query mutation errors have error.message containing the API error detail.

      WHAT TO BUILD:
      1. apps/buyer/components/PaywallModal.tsx — named export PaywallModal:
         - Props: { isOpen: boolean; onClose: () => void }
         - Modal overlay (fixed inset-0, bg-black/50, z-50)
         - Modal content (centered card, max-w-md, white bg, rounded-2xl, p-8):
           * Headline: "Кредиты на сегодня закончились"
           * Subtext: "Ваш текущий план исчерпал лимит AI-запросов на сегодня"
           * Mini plan comparison (2 rows):
             - Student: "100 запросов/день — $9.99/мес"
             - Pro: "Безлимитно — $19.99/мес"
           * Primary CTA: "Улучшить план" → Link to /pricing (indigo button)
           * Secondary: "Подождать до завтра" → calls onClose (gray text button)
         - Close on Escape key (useEffect with keydown listener)
         - Close on overlay click

      2. Integration in apps/buyer/app/courses/[id]/lessons/[lessonId]/page.tsx:
         - Add state: const [showPaywall, setShowPaywall] = useState(false)
