  - id: profile-edit
    title: "User profile editing: name, bio, avatar"
    scope: backend:identity
    prompt: |
      Task: Add profile editing capability to the identity service — new columns, domain entity,
      endpoint PATCH /me for updating name, bio, and avatar_url.

      CONTEXT:
      - Identity service: services/py/identity/ (FastAPI, asyncpg, Clean Architecture)
      - Current user table: id, email, name, password_hash, role, is_verified, email_verified, created_at
      - Domain entity: services/py/identity/app/domain/user.py — User dataclass
      - Repository: services/py/identity/app/repositories/ — UserRepository with SQL queries
      - Service: services/py/identity/app/services/auth_service.py — AuthService with business logic
      - Routes: services/py/identity/app/routes/auth.py — has GET /me returning user info
      - Migrations: services/py/identity/migrations/ — SQL migration files
      - Tests: services/py/identity/tests/ — 48 existing tests
      - Common lib: libs/py/common/ — errors (NotFoundError, ConflictError, ForbiddenError),
        security (decode_token, get_current_user_id)

      WHAT TO BUILD:
      1. Migration: services/py/identity/migrations/00N_profile_fields.sql
         - ALTER TABLE users ADD COLUMN IF NOT EXISTS bio TEXT DEFAULT NULL;
         - ALTER TABLE users ADD COLUMN IF NOT EXISTS avatar_url TEXT DEFAULT NULL;

      2. Domain: update User entity in services/py/identity/app/domain/user.py
         - Add fields: bio: str | None = None, avatar_url: str | None = None

      3. Repository: update UserRepository
         - Add method: update_profile(user_id: str, name: str | None, bio: str | None,
           avatar_url: str | None) -> User
         - SQL: UPDATE users SET name=COALESCE($2,name), bio=COALESCE($3,bio),
           avatar_url=COALESCE($4,avatar_url) WHERE id=$1 RETURNING *
         - Return updated User domain entity

      4. Service: update AuthService
         - Add method: update_profile(user_id: str, name: str | None, bio: str | None,
           avatar_url: str | None) -> User
         - Validate: name if provided must be 1-100 chars, bio max 500 chars,
           avatar_url if provided must start with http:// or https://
         - Call repository.update_profile()

      5. Route: add PATCH /users/me endpoint in auth.py routes
         - Request body (pydantic): { name?: str, bio?: str, avatar_url?: str }
