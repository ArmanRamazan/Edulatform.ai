      IMPLEMENTATION APPROACH:
      1. Create PaywallModal.tsx as a "use client" component.
      2. Use createPortal for the modal (or simple fixed positioning, no portal needed for simplicity).
      3. Read the lesson page and TutorDrawer to understand their mutation error handling.
      4. Add 429 detection: check if error message includes "credit" or "limit" or if
         the error object has a status of 429.
      5. Add PaywallModal state and rendering to both files.

      RULES:
      - "use client" on PaywallModal.tsx
      - Named export: export function PaywallModal(...)
      - next/link for the /pricing link
      - Tailwind CSS only
      - No new npm dependencies
      - Modal must be accessible: focus trap not required, but Escape to close is required
      - Do not change existing AI API calls — only add error detection
      - After implementation: cd apps/buyer && pnpm build must pass with 0 errors

      COMMIT:
      feat(buyer): add paywall modal for exhausted AI credits
    test: "cd /mnt/c/Users/aquam/PetProject/Merket_for_10_M_uesr/apps/buyer && pnpm build"
