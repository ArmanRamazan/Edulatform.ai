  - id: event-handlers
    title: "Migrate notification service to consume NATS events"
    scope: backend:notification
    prompt: |
      Task: Migrate the notification service from direct POST API calls to consuming NATS JetStream events for triggering notifications.

      CONTEXT:
      - Notification service at services/py/notification/ (port 8005, FastAPI)
      - Currently: other services POST to /notifications to create notifications
      - NATS event bus available (from nats-event-bus task) with NatsPublisher/NatsSubscriber in libs/py/common/
      - Event schemas in libs/py/common/app/events/schemas.py
      - Notification service has: routes/, services/, domain/, repositories/
      - NotificationService creates notifications in DB and (currently) logs to stdout
      - Tests: 28 existing tests in services/py/notification/tests/
      - Clean Architecture: routes → services → domain ← repositories

      WHAT TO BUILD:
      1. services/py/notification/app/events/__init__.py — Event consumer module

      2. services/py/notification/app/events/handlers.py:
         - Each handler is an async function that receives an event dict and creates appropriate notification:

         a) handle_enrollment_created(event: dict):
            - Extract user_id, course_id from event data
            - Create notification: type="enrollment", title="Welcome to your new course!", body="You've enrolled in {course_title}. Start learning now!"
            - Note: course_title may need to be included in event or fetched (prefer including in event)

         b) handle_lesson_completed(event: dict):
            - Extract user_id, course_id, lesson_id
            - Create notification: type="progress", title="Lesson completed!", body="Great job! Keep going."
            - Check if all lessons in course completed → send "Course completed! Congratulations!" notification

         c) handle_quiz_submitted(event: dict):
            - Extract user_id, quiz_id, score
            - If score >= 0.9: notification type="achievement", title="Quiz Ace!", body="You scored {score*100}%!"
            - If score < 0.5: notification type="encouragement", title="Keep practicing!", body="Review the material and try again."

         d) handle_payment_processed(event: dict):
            - Extract user_id, payment_id, amount, currency
            - Create notification: type="payment", title="Payment confirmed", body="Your payment of {amount} {currency} has been processed."

      3. services/py/notification/app/events/consumer.py:
         - class EventConsumer:
           - Uses NatsSubscriber from common library
           - consumer_group = "notification-service"
           - subscribe_all(): Subscribe to relevant event subjects:
             "events.enrollment.created" → handle_enrollment_created
             "events.lesson.completed" → handle_lesson_completed
             "events.quiz.submitted" → handle_quiz_submitted
             "events.payment.processed" → handle_payment_processed
           - Deduplication: check event_id against processed_events table or in-memory set (with TTL)
           - Error handling: log errors, nack for retry, dead-letter after 3 attempts

      4. services/py/notification/app/events/idempotency.py:
         - IdempotencyChecker class:
           - Uses notification-db to track processed event_ids
           - CREATE TABLE IF NOT EXISTS processed_events (event_id UUID PRIMARY KEY, processed_at TIMESTAMPTZ DEFAULT NOW())
           - is_processed(event_id) → bool
           - mark_processed(event_id) → None
           - Cleanup: DELETE WHERE processed_at < NOW() - INTERVAL '7 days'

      5. Update services/py/notification/app/main.py (or lifespan):
         - On startup: connect EventConsumer, subscribe_all()
         - On shutdown: close EventConsumer gracefully
         - Keep existing POST /notifications endpoint (backward compatible during migration)

      6. Add NATS_URL to notification service config (default nats://localhost:4222)

      7. Migration file: create processed_events table

      8. Tests (TDD):
         - test_handle_enrollment_created: mock NotificationService, verify notification created with correct type/title
         - test_handle_payment_processed: verify payment receipt notification
         - test_handle_quiz_submitted_high_score: verify achievement notification for score >= 0.9
         - test_handle_quiz_submitted_low_score: verify encouragement notification for score < 0.5
         - test_idempotency: same event_id processed twice → only one notification created
         - test_consumer_subscribes_to_all_subjects: verify 4 subscriptions created

      IMPLEMENTATION APPROACH:
      1. Write failing tests first (TDD)
      2. Create migration for processed_events table
      3. Implement IdempotencyChecker
      4. Implement event handlers
      5. Implement EventConsumer
      6. Wire into service lifespan
      7. Run all tests (existing 28 + new event tests)

      RULES:
      - TDD mandatory: write failing test first, then implement
      - Idempotent handlers: same event processed twice = same result (no duplicate notifications)
      - Keep existing POST endpoint working (backward compatible)
      - Handlers must not import from routes/ (Clean Architecture)
      - Event handlers use NotificationService (service layer), not repository directly
      - AsyncMock(spec=NatsSubscriber) for unit tests
      - All new tests independent, no shared state
      - Log every event received and processed (structured logging)

      COMMIT: feat(notification): migrate to NATS event consumption with idempotent handlers
