  # ──────────────────────────────────────────────
  # INFRA: PGBOUNCER CONNECTION POOLING
  # ──────────────────────────────────────────────

  - id: pgbouncer-connection-pooling
    title: "Add PgBouncer connection pooling for all PostgreSQL databases"
    scope: infra
    prompt: |
      Task: Add PgBouncer as a connection pooler in front of all PostgreSQL instances to handle connection scaling.

      CONTEXT:
      - 6 PostgreSQL databases: identity-db (5433), course-db (5434), enrollment-db (5435), payment-db (5436), notification-db (5437), learning-db (5438)
      - Each Python service connects directly to its PostgreSQL via asyncpg
      - Docker Compose files at project root (dev and prod)
      - Current: each service creates its own connection pool (typically 10-20 connections)
      - Problem at scale: 10 instances × 20 connections = 200 connections per DB, PostgreSQL default max is 100
      - PgBouncer in transaction pooling mode: many client connections → few server connections

      WHAT TO BUILD:
      1. deploy/docker/pgbouncer/ directory:

      2. deploy/docker/pgbouncer/pgbouncer.ini:
         [databases]
         identity = host=identity-db port=5432 dbname=identity
         course = host=course-db port=5432 dbname=course
         enrollment = host=enrollment-db port=5432 dbname=enrollment
         payment = host=payment-db port=5432 dbname=payment
         notification = host=notification-db port=5432 dbname=notification
         learning = host=learning-db port=5432 dbname=learning

         [pgbouncer]
         listen_addr = 0.0.0.0
         listen_port = 6432
         auth_type = md5
         auth_file = /etc/pgbouncer/userlist.txt
         pool_mode = transaction
         default_pool_size = 20
         min_pool_size = 5
         max_client_conn = 1000
         max_db_connections = 100
         server_idle_timeout = 300
         client_idle_timeout = 600
         log_connections = 0
         log_disconnections = 0
         stats_period = 60
         admin_users = pgbouncer

      3. deploy/docker/pgbouncer/userlist.txt:
         "identity" "identity"
         "course" "course"
         "enrollment" "enrollment"
         "payment" "payment"
         "notification" "notification"
         "learning" "learning"

      4. Add to docker-compose.dev.yml:
         pgbouncer:
           image: edoburu/pgbouncer:1.22.0
           volumes:
             - ./deploy/docker/pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
             - ./deploy/docker/pgbouncer/userlist.txt:/etc/pgbouncer/userlist.txt:ro
           ports:
             - "6432:6432"
           depends_on:
             identity-db: { condition: service_healthy }
             course-db: { condition: service_healthy }
             enrollment-db: { condition: service_healthy }
             payment-db: { condition: service_healthy }
             notification-db: { condition: service_healthy }
             learning-db: { condition: service_healthy }
           healthcheck:
             test: ["CMD-SHELL", "pg_isready -h localhost -p 6432 -U pgbouncer -d pgbouncer || exit 1"]
             interval: 10s
             timeout: 5s
             retries: 5

      5. Add same to docker-compose.prod.yml

      6. Update Python service DATABASE_URL environment variables to point to PgBouncer:
         - Old: postgres://identity:identity@identity-db:5432/identity
         - New: postgres://identity:identity@pgbouncer:6432/identity
         - Do this for all 6 services in both compose files
         - Keep direct DB URLs as fallback env var (DIRECT_DATABASE_URL) for migrations

      7. Update service Dockerfiles or entrypoints:
         - Migrations run against DIRECT_DATABASE_URL (direct to PostgreSQL, not through PgBouncer)
         - Application runtime uses DATABASE_URL (through PgBouncer)
         - PgBouncer transaction pooling doesn't support prepared statements well — ensure asyncpg uses simple query protocol or statement_cache_size=0

      IMPLEMENTATION APPROACH:
      1. Create PgBouncer config files
      2. Add PgBouncer service to both compose files
      3. Update all service DATABASE_URL to go through PgBouncer
      4. Add DIRECT_DATABASE_URL for migrations
      5. Note about asyncpg statement_cache_size=0 for PgBouncer compatibility

      RULES:
      - Transaction pooling mode (not session) for max efficiency
      - max_db_connections must not exceed PostgreSQL max_connections (default 100)
      - max_client_conn = 1000 to handle many service instances
      - Auth type md5 (matches PostgreSQL default)
      - All services MUST go through PgBouncer for runtime queries
      - Migrations MUST go directly to PostgreSQL (DDL doesn't work well through PgBouncer)
      - Use specific PgBouncer image version, not :latest
      - Healthcheck required
      - PgBouncer depends_on all DB services being healthy

      COMMIT: chore(infra): add PgBouncer connection pooling for all databases
    test: "echo 'manual verification required'"
    depends_on: []

  # ──────────────────────────────────────────────
  # INFRA: READ REPLICAS FOR HIGH-READ DATABASES
  # ──────────────────────────────────────────────

  - id: read-replicas
    title: "Configure PostgreSQL read replicas for course-db and learning-db"
    scope: infra
    prompt: |
      Task: Set up PostgreSQL streaming replication with read replicas for course-db and learning-db (highest read load services).

      CONTEXT:
      - course-db: most read queries (catalog browsing, search fallback, course details) — port 5434
      - learning-db: second highest reads (leaderboards, XP, badges, flashcard reviews) — port 5438
      - Docker Compose files at project root
      - PostgreSQL 16 Alpine images used
      - PgBouncer added (from pgbouncer-connection-pooling task) — replicas need PgBouncer entries too
      - Python services use asyncpg for DB access

      WHAT TO BUILD:
      1. deploy/docker/postgres-replica/setup-replica.sh:
         - Shell script that configures a PostgreSQL replica:
           a) Wait for primary to be ready
           b) pg_basebackup from primary
           c) Configure recovery.conf / standby.signal
           d) Start in hot standby mode

      2. deploy/docker/postgres-replica/primary-init.sh:
         - Configures primary PostgreSQL for replication:
           a) Create replication user
           b) Update pg_hba.conf to allow replication connections
           c) Set wal_level=replica, max_wal_senders=3, hot_standby=on

      3. Add to docker-compose.dev.yml:
         course-db-replica:
           image: postgres:16-alpine
           environment:
             POSTGRES_DB: course
             POSTGRES_USER: course
             POSTGRES_PASSWORD: course
             PGUSER: replicator
             PGPASSWORD: replicator_password
           volumes:
             - course-db-replica-data:/var/lib/postgresql/data
             - ./deploy/docker/postgres-replica/setup-replica.sh:/docker-entrypoint-initdb.d/setup-replica.sh
           depends_on:
             course-db: { condition: service_healthy }
           ports:
             - "5444:5432"
           command: >
             bash -c "
             until pg_isready -h course-db -p 5432 -U course; do sleep 1; done;
             pg_basebackup -h course-db -D /var/lib/postgresql/data -U replicator -Fp -Xs -P -R;
             postgres
             "

         learning-db-replica:
           image: postgres:16-alpine
           environment:
             POSTGRES_DB: learning
             POSTGRES_USER: learning
             POSTGRES_PASSWORD: learning
             PGUSER: replicator
             PGPASSWORD: replicator_password
           volumes:
             - learning-db-replica-data:/var/lib/postgresql/data
             - ./deploy/docker/postgres-replica/setup-replica.sh:/docker-entrypoint-initdb.d/setup-replica.sh
           depends_on:
             learning-db: { condition: service_healthy }
           ports:
             - "5448:5432"
           command: >
             bash -c "
             until pg_isready -h learning-db -p 5432 -U learning; do sleep 1; done;
             pg_basebackup -h learning-db -D /var/lib/postgresql/data -U replicator -Fp -Xs -P -R;
             postgres
             "

      4. Update primary course-db and learning-db in docker-compose.dev.yml:
         - Add init script to create replication user and configure WAL
         - Volume mount: ./deploy/docker/postgres-replica/primary-init.sh:/docker-entrypoint-initdb.d/01-init-replication.sh

      5. Add same replica services to docker-compose.prod.yml

      6. Update PgBouncer config (deploy/docker/pgbouncer/pgbouncer.ini):
         - Add read-replica entries:
           course_readonly = host=course-db-replica port=5432 dbname=course
           learning_readonly = host=learning-db-replica port=5432 dbname=learning

      7. Add READ_DATABASE_URL env var to course and learning services:
         - course: READ_DATABASE_URL=postgres://course:course@pgbouncer:6432/course_readonly
         - learning: READ_DATABASE_URL=postgres://learning:learning@pgbouncer:6432/learning_readonly

      8. Update libs/py/common/ — add read replica support:
         - libs/py/common/app/database.py (or similar):
           - ReadWritePool class: primary_pool (write), replica_pool (read)
           - Methods: get_write_pool(), get_read_pool()
           - If READ_DATABASE_URL not set, read_pool falls back to primary pool
           - Usage: repositories use read_pool for SELECT, write_pool for INSERT/UPDATE/DELETE

      IMPLEMENTATION APPROACH:
      1. Create replication setup scripts
      2. Update primary DB configs for WAL replication
      3. Add replica services to compose files
      4. Update PgBouncer with replica entries
      5. Add READ_DATABASE_URL to service configs
      6. Create ReadWritePool helper in common library
      7. Document: replicas have eventual consistency (small lag acceptable for reads)

      RULES:
      - Streaming replication (synchronous for dev simplicity, async in prod for performance)
      - Replicas are read-only — any write attempt will fail with clear error
      - Replication lag monitoring: add pg_stat_replication check to health endpoints
      - Fallback: if replica is down, read from primary (ReadWritePool handles this)
      - Replication user has minimal permissions (REPLICATION role only)
      - Replica data volumes are separate from primary
      - Primary init script is idempotent (IF NOT EXISTS for replication user)

      COMMIT: chore(infra): add PostgreSQL read replicas for course-db and learning-db
    test: "echo 'manual verification required'"
    depends_on:
      - pgbouncer-connection-pooling

