  - id: search-service-scaffold
    title: "Scaffold Rust search service with Meilisearch integration"
    scope: backend:rs:search
    prompt: |
      Task: Scaffold the Rust search service at services/rs/search/ integrating with Meilisearch for full-text course search.

      CONTEXT:
      - Placeholder exists: services/rs/search/src/.gitkeep
      - Course service (Python, port 8002) has ILIKE-based search — works but doesn't scale
      - Meilisearch will be added to Docker Compose (meilisearch-integration task, port 7700)
      - Course DB: PostgreSQL on port 5434, tables: courses, modules, lessons, categories, reviews
      - Course table columns: id (UUID), teacher_id, title, description, level (beginner/intermediate/advanced), category_id, price, is_free, is_published, avg_rating, review_count, created_at, updated_at
      - Search service will run on port 9001
      - Proto contracts in proto/course/v1/course.proto define CourseFilter message

      WHAT TO BUILD:
      1. services/rs/search/Cargo.toml:
         - Package name: search-service
         - Edition 2021
         - Dependencies: axum 0.7, tokio (full), serde (derive), serde_json, meilisearch-sdk 0.27, sqlx 0.7 (with postgres, runtime-tokio, tls-rustls, uuid, chrono), tracing, tracing-subscriber, thiserror, anyhow, dotenvy, uuid (v4, serde)
         - Dev dependencies: axum-test or similar

      2. services/rs/search/src/config.rs:
         - SearchConfig: PORT (9001), HOST, MEILISEARCH_URL (http://localhost:7700), MEILISEARCH_API_KEY, COURSE_DATABASE_URL (postgres://course:course@localhost:5434/course), LOG_LEVEL

      3. services/rs/search/src/services/indexer.rs:
         - CourseDocument struct (for Meilisearch): id, teacher_id, title, description, level, category_name, price, is_free, avg_rating, review_count, created_at
         - sync_courses(): Connect to course-db via sqlx, SELECT published courses JOIN categories, transform to CourseDocument, batch upsert into Meilisearch "courses" index
         - Called on startup and via admin endpoint

      4. services/rs/search/src/services/searcher.rs:
         - SearchQuery struct: query (String), filters (optional: level, category, is_free, price_min, price_max), sort_by (optional: relevance, rating, newest, price_asc, price_desc), page, per_page
         - SearchResult: hits (Vec<CourseDocument>), total_hits, page, per_page, processing_time_ms
         - search_courses(query: SearchQuery) → SearchResult: Build Meilisearch query with filters and sort, execute, return results

      5. services/rs/search/src/routes/mod.rs:
         - POST /search/courses — body: SearchQuery → SearchResult
         - POST /search/reindex — admin endpoint: trigger sync_courses(), return count indexed
         - GET /health — 200 OK

      6. services/rs/search/src/main.rs:
         - Load config, init tracing
         - Connect to Meilisearch, configure index settings
         - Run initial sync on startup (background task, don't block server start)
         - Build router, serve on HOST:PORT

      7. Tests:
         - SearchQuery serialization/deserialization
         - Filter building logic
         - Health check
         - Config defaults

      IMPLEMENTATION APPROACH:
      1. Remove .gitkeep from services/rs/search/src/
      2. Create Cargo.toml
      3. Implement config, then services (indexer, searcher), then routes, then main
      4. Index settings configured in code: searchable attributes (title, description), filterable (level, category_name, is_free, price), sortable (avg_rating, review_count, created_at, price)
      5. Write unit tests for serialization and filter logic

      RULES:
      - #![deny(clippy::all)] in main.rs
      - No unwrap() in production code
      - sqlx for PostgreSQL access (read-only, search service never writes to course-db)
      - Meilisearch SDK for search operations
      - Async everywhere
      - Structured logging with tracing
      - Reindex is idempotent (upsert, not insert)
      - Search response includes processing_time_ms for observability

      COMMIT: feat(search): scaffold Rust search service with Meilisearch integration
    test: "cd /mnt/c/Users/aquam/PetProject/Merket_for_10_M_uesr/services/rs/search && cargo test && cargo clippy -- -D warnings"
    depends_on:
      - proto-contracts

  # ──────────────────────────────────────────────
  # INFRA: MEILISEARCH IN DOCKER COMPOSE
