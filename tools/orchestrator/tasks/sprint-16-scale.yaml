phase: "sprint-16"
description: "Scale Infrastructure — Rust gateway, event bus, search, database scaling"

tasks:
  # ──────────────────────────────────────────────
  # INFRA: PROTOBUF CONTRACTS
  # ──────────────────────────────────────────────

  - id: proto-contracts
    title: "Define protobuf contracts for all services and events"
    scope: infra
    prompt: |
      Task: Define protobuf contracts for all 7 Python services and domain events. These are the source of truth for inter-service communication.

      CONTEXT:
      - Proto directory exists at proto/ with .gitkeep placeholders:
        proto/identity/v1/.gitkeep, proto/catalog/v1/.gitkeep, proto/orders/v1/.gitkeep, proto/events/v1/.gitkeep
      - 7 Python services: identity (8001), course (8002), enrollment (8003), payment (8004), notification (8005), ai (8006), learning (8007)
      - Services use Clean Architecture: routes → services → domain ← repositories
      - Current endpoints documented in docs/architecture/02-API-REFERENCE.md
      - JWT auth with claims: sub (user_id UUID), role (student/teacher/admin), is_verified, email_verified
      - Domain roles: Student (default), Teacher (verified only), Admin

      WHAT TO BUILD:
      1. proto/identity/v1/identity.proto — proto3:
         - service IdentityService with RPCs: Register, Login, GetMe, RefreshToken, VerifyEmail, ForgotPassword, ResetPassword, AdminGetUsers, AdminUpdateRole
         - Messages: RegisterRequest/Response, LoginRequest/Response, User, TokenPair
         - Role enum: ROLE_UNSPECIFIED, ROLE_STUDENT, ROLE_TEACHER, ROLE_ADMIN

      2. proto/course/v1/course.proto — proto3:
         - Rename from catalog/v1/ to course/v1/ (remove catalog .gitkeep, create course dir)
         - service CourseService with RPCs: CreateCourse, GetCourse, ListCourses, UpdateCourse, DeleteCourse, CreateModule, CreateLesson, GetCurriculum, ListCategories, CreateReview, ListReviews
         - Messages: Course, Module, Lesson, Review, Category, CourseFilter (level, category_id, is_free, price_min, price_max, sort_by)

      3. proto/enrollment/v1/enrollment.proto — proto3:
         - Rename from orders/v1/ to enrollment/v1/ (remove orders .gitkeep, create enrollment dir)
         - service EnrollmentService with RPCs: Enroll, GetMyEnrollments, GetCourseEnrollmentCount, UpdateLessonProgress, GetLessonProgress
         - Messages: Enrollment, LessonProgress

      4. proto/payment/v1/payment.proto — proto3:
         - service PaymentService with RPCs: CreatePayment, GetPayment, GetMyPayments, GetEarningsSummary, GetMyEarnings, RequestPayout, GetMyPayouts
         - Messages: Payment, EarningsSummary, Earning, Payout

      5. proto/notification/v1/notification.proto — proto3:
         - service NotificationService with RPCs: CreateNotification, GetMyNotifications, MarkAsRead, SendStreakReminders, SendFlashcardReminders
         - Messages: Notification

      6. proto/ai/v1/ai.proto — proto3:
         - service AIService with RPCs: GenerateQuiz, GenerateSummary, TutorChat, TutorFeedback, GetMyCredits
         - Messages: Quiz, Summary, ChatMessage, CreditStatus

      7. proto/learning/v1/learning.proto — proto3:
         - service LearningService with RPCs covering 29 endpoints:
           Quizzes (CreateQuiz, GetQuiz, ListMyQuizzes, SubmitQuiz),
           Flashcards (CreateDeck, GetDeck, ListMyDecks, ReviewFlashcard),
           Concepts (CreateConcept, GetConcept, ListConcepts, GetKnowledgeGraph, LinkConcepts, GetConceptMastery, UpdateConceptMastery),
           Streaks (GetMyStreak, UpdateStreak),
           Leaderboard (GetLeaderboard, GetMyRank, GetCourseLeaderboard, GetWeeklyLeaderboard, GetAllTimeLeaderboard),
           Discussions (CreateThread, GetThread, ListThreads, CreateReply, ListReplies),
           XP (GetMyXP), Badges (GetMyBadges)
         - Messages: Quiz, QuizSubmission, FlashcardDeck, Flashcard, Concept, KnowledgeGraph, Streak, LeaderboardEntry, Discussion, Reply, XPStatus, Badge

      8. proto/events/v1/events.proto — proto3:
         - Domain events (all with: string event_id, string aggregate_id, google.protobuf.Timestamp timestamp, int32 version):
           EnrollmentCreated (user_id, course_id)
           LessonCompleted (user_id, course_id, lesson_id)
           QuizSubmitted (user_id, quiz_id, course_id, score)
           PaymentProcessed (user_id, payment_id, amount, currency)
           CoursePublished (course_id, teacher_id, title)
           UserRegistered (user_id, email, role)
         - Subject naming convention: domain.event_name (e.g., "enrollment.created")

      9. proto/buf.yaml — buf configuration for linting and breaking change detection

      IMPLEMENTATION APPROACH:
      1. Remove .gitkeep files from existing proto dirs
      2. Create new directory structure matching service names
      3. Write each .proto file with proto3 syntax
      4. Use google.protobuf.Timestamp for datetime fields
      5. Use google.protobuf.Empty where no request/response body needed
      6. Add buf.yaml for proto linting

      RULES:
      - proto3 syntax only
      - Package naming: eduplatform.<service>.v1
      - All IDs are string (UUIDs as strings)
      - Timestamps use google.protobuf.Timestamp
      - Enums start with UNSPECIFIED = 0
      - Fields use snake_case
      - RPCs use PascalCase
      - Events are past tense (enrollment.created, not enrollment.create)
      - No business logic in proto — pure contract definitions
      - Backward compatible: only add fields, never remove

      COMMIT: feat(proto): define protobuf contracts for all services and events
    test: "echo 'manual verification required'"
    depends_on: []

  # ──────────────────────────────────────────────
  # BACKEND (RUST): API GATEWAY SCAFFOLD
  # ──────────────────────────────────────────────

  - id: api-gateway-scaffold
    title: "Scaffold Rust API gateway with reverse proxy routing"
    scope: backend:rs:api-gateway
    prompt: |
      Task: Scaffold the Rust API gateway at services/rs/api-gateway/ with Axum, proxying requests to Python backend services.

      CONTEXT:
      - Placeholder exists: services/rs/api-gateway/src/.gitkeep
      - 7 Python backend services running on ports 8001-8007
      - Gateway will be the single entry point for all client traffic on port 9000
      - Rust stack: axum, tokio, serde, reqwest, tower
      - Current frontend calls Python services directly — gateway will sit in front
      - Proto contracts defined in proto/ (from proto-contracts task)
      - Target: > 5000 RPS, p99 < 50ms

      WHAT TO BUILD:
      1. services/rs/api-gateway/Cargo.toml:
         - Package name: api-gateway
         - Edition 2021
         - Dependencies: axum 0.7, tokio (full features), serde (derive), serde_json, reqwest (rustls-tls), tower 0.4, tower-http 0.5 (cors, trace, compression), tracing, tracing-subscriber, thiserror, anyhow, dotenvy
         - Dev dependencies: axum-test or tower::ServiceExt for testing

      2. services/rs/api-gateway/src/config.rs:
         - AppConfig struct loaded from env vars:
           PORT (default 9000), HOST (default 0.0.0.0)
           IDENTITY_URL (default http://localhost:8001)
           COURSE_URL (default http://localhost:8002)
           ENROLLMENT_URL (default http://localhost:8003)
           PAYMENT_URL (default http://localhost:8004)
           NOTIFICATION_URL (default http://localhost:8005)
           AI_URL (default http://localhost:8006)
           LEARNING_URL (default http://localhost:8007)
           CORS_ORIGINS (comma-separated, default http://localhost:3000)
           LOG_LEVEL (default info)

      3. services/rs/api-gateway/src/routes/mod.rs — Route table:
         - /health → 200 OK {"status": "healthy", "service": "api-gateway"}
         - /api/identity/* → proxy to IDENTITY_URL
         - /api/courses/* → proxy to COURSE_URL (note: /api/courses maps to course service)
         - /api/enrollments/* → proxy to ENROLLMENT_URL
         - /api/payments/* → proxy to PAYMENT_URL
         - /api/notifications/* → proxy to NOTIFICATION_URL
         - /api/ai/* → proxy to AI_URL
         - /api/learning/* → proxy to LEARNING_URL

      4. services/rs/api-gateway/src/proxy.rs:
         - Generic proxy handler: receives request, forwards to upstream service
         - Preserves: method, headers, query params, body
         - Passes through: Authorization header, Content-Type
         - Adds: X-Request-Id (UUID v4), X-Forwarded-For
         - Strips /api/{service} prefix before forwarding (e.g., /api/courses/courses → /courses)
         - Returns upstream response as-is (status, headers, body)
         - Timeout: 30s per upstream request
         - Error handling: 502 Bad Gateway if upstream unreachable, 504 Gateway Timeout if timeout

      5. services/rs/api-gateway/src/main.rs:
         - Load config, init tracing
         - Build router with all routes
         - Add middleware layers: CORS, request tracing, response compression
         - Bind to HOST:PORT, serve with graceful shutdown (tokio signal)

      6. Tests in services/rs/api-gateway/src/routes/mod.rs or tests/:
         - Health check returns 200
         - Unknown path returns 404
         - Config loads defaults correctly

      IMPLEMENTATION APPROACH:
      1. Remove .gitkeep from services/rs/api-gateway/src/
      2. Create Cargo.toml with all dependencies
      3. Implement config.rs with env var loading
      4. Implement proxy.rs with generic forwarding logic
      5. Implement routes/mod.rs with path-based routing
      6. Implement main.rs wiring everything together
      7. Add unit tests for config and route matching
      8. Verify: cargo build, cargo test, cargo clippy -- -D warnings

      RULES:
      - #![deny(clippy::all)] in main.rs
      - All errors use thiserror for library types, anyhow for application
      - Async everywhere (tokio runtime)
      - No unwrap() in production code — proper error handling
      - reqwest client should be shared (clone is cheap, it uses Arc internally)
      - Graceful shutdown on SIGTERM/SIGINT
      - Structured logging with tracing
      - Response times logged for every proxied request

      COMMIT: feat(api-gateway): scaffold Rust API gateway with reverse proxy routing
    test: "cd /mnt/c/Users/aquam/PetProject/Merket_for_10_M_uesr/services/rs/api-gateway && cargo test && cargo clippy -- -D warnings"
    depends_on:
      - proto-contracts

  # ──────────────────────────────────────────────
  # BACKEND (RUST): GATEWAY JWT AUTH MIDDLEWARE
  # ──────────────────────────────────────────────

  - id: gateway-auth-middleware
    title: "JWT validation middleware for API gateway"
    scope: backend:rs:api-gateway
    prompt: |
      Task: Add JWT validation middleware to the Rust API gateway that decodes tokens and passes user claims as headers to upstream services.

      CONTEXT:
      - API gateway at services/rs/api-gateway/ (from api-gateway-scaffold task)
      - Python services currently validate JWT themselves using HS256 with a shared JWT_SECRET
      - JWT payload structure: { "sub": "uuid", "role": "student|teacher|admin", "is_verified": true/false, "email_verified": true/false, "exp": unix_timestamp }
      - JWT_SECRET is the same across all services (shared secret)
      - Python identity service creates tokens in services/py/identity/app/services/auth_service.py

      WHAT TO BUILD:
      1. Add dependency to Cargo.toml: jsonwebtoken 9

      2. services/rs/api-gateway/src/middleware/auth.rs:
         - JwtClaims struct: sub (String), role (String), is_verified (bool), email_verified (bool), exp (u64)
         - AuthConfig: jwt_secret (from JWT_SECRET env var), public_paths (Vec of path patterns)
         - auth_middleware function (axum middleware::from_fn):
           a) Check if request path matches any public path → skip auth, pass through
           b) Extract Authorization header → "Bearer <token>"
           c) Decode JWT with HS256 using JWT_SECRET
           d) Validate expiration
           e) On success: inject headers into request before forwarding:
              X-User-Id: claims.sub
              X-User-Role: claims.role
              X-User-Verified: claims.is_verified (as "true"/"false")
              X-Email-Verified: claims.email_verified (as "true"/"false")
           f) On failure: return 401 {"error": "Invalid or expired token"}

      3. Public paths (no auth required):
         - GET /health
         - POST /api/identity/register
         - POST /api/identity/login
         - POST /api/identity/refresh
         - POST /api/identity/forgot-password
         - POST /api/identity/reset-password
         - GET /api/identity/verify-email
         - GET /api/courses/courses (list courses — public catalog)
         - GET /api/courses/courses/* (get course detail — public)
         - GET /api/courses/categories (list categories — public)

      4. Update main.rs to add auth middleware layer to the router (before proxy, after CORS)

      5. Tests:
         - Valid token → request passes with X-User-* headers
         - Expired token → 401
         - Missing Authorization header on protected route → 401
         - Missing Authorization header on public route → passes through
         - Malformed token → 401
         - Wrong secret → 401

      IMPLEMENTATION APPROACH:
      1. Add jsonwebtoken to Cargo.toml
      2. Create middleware/mod.rs and middleware/auth.rs
      3. Define claims struct and validation logic
      4. Implement axum middleware function
      5. Configure public paths list
      6. Wire into router in main.rs
      7. Write comprehensive tests

      RULES:
      - Use jsonwebtoken crate with HS256 algorithm
      - Same JWT_SECRET env var that Python services use
      - Public paths are configurable, not hardcoded (loaded at startup, but defaults provided)
      - Middleware must be fast — no I/O, just CPU crypto
      - Claims headers MUST match what Python services expect (check identity service code)
      - Log auth failures at WARN level with request path (no token content in logs)
      - Never log the JWT secret or token values

      COMMIT: feat(api-gateway): add JWT validation middleware with claim forwarding
    test: "cd /mnt/c/Users/aquam/PetProject/Merket_for_10_M_uesr/services/rs/api-gateway && cargo test && cargo clippy -- -D warnings"
    depends_on:
      - api-gateway-scaffold

  # ──────────────────────────────────────────────
  # BACKEND (RUST): GATEWAY RATE LIMITER
  # ──────────────────────────────────────────────

  - id: gateway-rate-limiter
    title: "Redis-backed rate limiting in API gateway"
    scope: backend:rs:api-gateway
    prompt: |
      Task: Add Redis-backed rate limiting to the Rust API gateway using a sliding window algorithm.

      CONTEXT:
      - API gateway at services/rs/api-gateway/ (from api-gateway-scaffold + gateway-auth-middleware tasks)
      - Redis already used by Python services for caching (REDIS_URL env var, typically redis://localhost:6379)
      - Python identity service has rate limiting: 100/min global, 10/min login, 5/min register
      - Gateway rate limiting replaces per-service rate limiting (single enforcement point)

      WHAT TO BUILD:
      1. Add dependencies to Cargo.toml: redis 0.25 (with tokio-comp and connection-manager features)

      2. services/rs/api-gateway/src/middleware/rate_limit.rs:
         - RateLimiter struct: redis connection pool, rate limit configs
         - RateLimitConfig: path_pattern (String), max_requests (u32), window_seconds (u32)
         - Default configs:
           a) Global: 100 requests/minute per IP for all paths
           b) Login: 10 requests/minute per IP for POST /api/identity/login
           c) Register: 5 requests/minute per IP for POST /api/identity/register
           d) AI endpoints: 30 requests/minute per IP for /api/ai/*
         - Sliding window algorithm using Redis sorted sets:
           Key: "ratelimit:{ip}:{path_group}:{window_id}"
           a) ZREMRANGEBYSCORE to remove expired entries
           b) ZCARD to count entries in current window
           c) If count >= max_requests → reject with 429
           d) ZADD to add current request timestamp
           e) EXPIRE on the key to auto-cleanup
         - rate_limit_middleware function (axum middleware):
           a) Extract client IP from X-Forwarded-For or socket addr
           b) Find matching rate limit config (most specific first)
           c) Check rate limit via Redis
           d) On allowed: add headers: X-RateLimit-Limit, X-RateLimit-Remaining, X-RateLimit-Reset
           e) On exceeded: return 429 Too Many Requests with Retry-After header and JSON error body

      3. Update config.rs:
         - Add REDIS_URL (default redis://localhost:6379)
         - Add RATE_LIMIT_ENABLED (default true)

      4. Update main.rs to add rate limit middleware layer (before auth, after CORS)

      5. Tests:
         - Request within limit → passes with rate limit headers
         - Request exceeding limit → 429 with Retry-After
         - Redis unavailable → fail open (allow request, log error)
         - Different paths have different limits
         - Rate limit resets after window expires

      IMPLEMENTATION APPROACH:
      1. Add redis dependency to Cargo.toml
      2. Implement sliding window algorithm with Redis sorted sets
      3. Create rate limit middleware
      4. Wire into router
      5. Write tests (use mock Redis or in-memory fallback for unit tests)

      RULES:
      - Sliding window, not fixed window (prevents burst at window boundary)
      - Fail open if Redis is down — never block requests due to rate limiter failure
      - Log rate limit violations at WARN level with IP and path
      - Never log full IP in production (last octet masked) — but for now, full IP is acceptable in dev
      - Rate limit keys expire automatically (TTL = window_seconds + buffer)
      - Redis operations must be non-blocking and fast (< 5ms)
      - Connection pooling for Redis (use deadpool-redis or redis connection manager)

      COMMIT: feat(api-gateway): add Redis-backed sliding window rate limiting
    test: "cd /mnt/c/Users/aquam/PetProject/Merket_for_10_M_uesr/services/rs/api-gateway && cargo test && cargo clippy -- -D warnings"
    depends_on:
      - api-gateway-scaffold

