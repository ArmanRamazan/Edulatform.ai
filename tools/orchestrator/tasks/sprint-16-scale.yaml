  - id: meilisearch-integration
    title: "Add Meilisearch to Docker Compose with index configuration"
    scope: infra
    prompt: |
      Task: Add Meilisearch to both Docker Compose files (dev and prod) for full-text search.

      CONTEXT:
      - docker-compose.dev.yml and docker-compose.prod.yml at project root
      - Dev compose has: 6 PostgreSQL DBs (5433-5438), Redis (6379), 7 Python services (8001-8007)
      - Prod compose has same services + Prometheus, Grafana, Cadvisor monitoring
      - Meilisearch is used by the Rust search service (port 9001)
      - Course data to be indexed: title, description, level, category, price, rating
      - Meilisearch official Docker image: getmeili/meilisearch:v1.6

      WHAT TO BUILD:
      1. Add to docker-compose.dev.yml:
         meilisearch:
           image: getmeili/meilisearch:v1.6
           environment:
             MEILI_ENV: development
             MEILI_MASTER_KEY: dev-master-key-change-in-production
             MEILI_NO_ANALYTICS: true
           ports:
             - "7700:7700"
           volumes:
             - meilisearch-data:/meili_data
           healthcheck:
             test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
             interval: 10s
             timeout: 5s
             retries: 5

      2. Add to docker-compose.prod.yml:
         meilisearch:
           image: getmeili/meilisearch:v1.6
           environment:
             MEILI_ENV: production
             MEILI_MASTER_KEY: ${MEILISEARCH_MASTER_KEY}
             MEILI_NO_ANALYTICS: true
           volumes:
             - meilisearch-data:/meili_data
           healthcheck:
             test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
             interval: 10s
             timeout: 5s
             retries: 5
           # No port exposed in prod — only internal access via search service

      3. Add meilisearch-data volume to both compose files

      4. Update seed script (tools/seed/ or docker compose seed profile) to index courses into Meilisearch after seeding course-db:
         - After course seed data is inserted, call Meilisearch API to create "courses" index
         - Configure index: searchable attributes [title, description], filterable [level, category_name, is_free, price], sortable [avg_rating, review_count, created_at, price]
         - Insert course documents from course-db

      5. Add MEILISEARCH_URL=http://meilisearch:7700 and MEILISEARCH_API_KEY to search service environment in compose files

      IMPLEMENTATION APPROACH:
      1. Edit docker-compose.dev.yml — add meilisearch service and volume
      2. Edit docker-compose.prod.yml — add meilisearch service and volume
      3. Update any seed scripts to include Meilisearch indexing
      4. Verify compose files are valid YAML

      RULES:
      - Use specific Meilisearch version tag (v1.6), not :latest
      - Dev uses hardcoded master key, prod uses env variable
      - Healthcheck required for both environments
      - Volume for persistent data
      - Prod does NOT expose port 7700 externally
      - Meilisearch data volume separate from PostgreSQL volumes

      COMMIT: chore(infra): add Meilisearch to Docker Compose for full-text search
    test: "echo 'manual verification required'"
    depends_on: []

  # ──────────────────────────────────────────────
  # INFRA: NATS JETSTREAM EVENT BUS
  # ──────────────────────────────────────────────

  - id: nats-event-bus
    title: "Add NATS JetStream event bus with Python publisher/subscriber"
    scope: infra
    prompt: |
      Task: Add NATS JetStream to Docker Compose and create Python helper library for publishing and subscribing to domain events.

      CONTEXT:
      - Docker Compose files at project root (dev and prod)
      - Python shared library at libs/py/common/ (installable via hatchling, used by all services)
      - Current inter-service communication: notification service receives direct POST calls
      - Target: async event-driven architecture where services publish events and others subscribe
      - Events defined in proto/events/v1/events.proto (from proto-contracts task)
      - NATS JetStream provides at-least-once delivery with consumer groups
      - Python services use asyncio

      WHAT TO BUILD:
      1. Add to docker-compose.dev.yml:
         nats:
           image: nats:2.10-alpine
           command: ["--jetstream", "--store_dir", "/data", "-p", "4222", "-m", "8222"]
           ports:
             - "4222:4222"   # Client connections
             - "8222:8222"   # Monitoring/management
           volumes:
             - nats-data:/data
           healthcheck:
             test: ["CMD", "nats-server", "--signal", "ldm"]
             interval: 10s
             timeout: 5s
             retries: 5

      2. Add same to docker-compose.prod.yml (no monitoring port exposed)

      3. Add nats-data volume to both compose files

      4. libs/py/common/app/events/__init__.py — Event bus module:

      5. libs/py/common/app/events/publisher.py:
         - class NatsPublisher:
           - __init__(self, nats_url: str = "nats://localhost:4222")
           - async connect() → establishes NATS connection and JetStream context
           - async publish(subject: str, event: dict) → publishes event as JSON to JetStream
             - subject format: "events.{domain}.{action}" (e.g., "events.enrollment.created")
             - event dict must contain: event_id (UUID), aggregate_id, timestamp (ISO), version, data
           - async close() → gracefully close connection
           - Context manager support (__aenter__, __aexit__)

      6. libs/py/common/app/events/subscriber.py:
         - class NatsSubscriber:
           - __init__(self, nats_url: str = "nats://localhost:4222", consumer_group: str = "default")
           - async connect() → establishes NATS connection and JetStream context
           - async subscribe(subject: str, handler: Callable[[dict], Awaitable[None]], durable_name: str | None = None):
             - Creates/binds to durable consumer for the subject
             - Delivers to consumer group (queue group for load balancing)
             - On message: deserialize JSON, call handler, ack on success, nack on exception
           - async close() → gracefully close connection and drain subscriptions
           - Context manager support

      7. libs/py/common/app/events/schemas.py:
         - Pydantic models for each event type matching proto definitions:
           BaseEvent: event_id (UUID auto-generated), aggregate_id (str), timestamp (datetime, default now), version (int, default 1)
           EnrollmentCreatedEvent(BaseEvent): user_id, course_id
           LessonCompletedEvent(BaseEvent): user_id, course_id, lesson_id
           QuizSubmittedEvent(BaseEvent): user_id, quiz_id, course_id, score (float)
           PaymentProcessedEvent(BaseEvent): user_id, payment_id, amount (Decimal), currency (str)
           CoursePublishedEvent(BaseEvent): course_id, teacher_id, title
           UserRegisteredEvent(BaseEvent): user_id, email, role

      8. Add nats-py>=2.7.0 to libs/py/common/ dependencies (pyproject.toml)

      9. libs/py/common/app/events/stream.py:
         - ensure_streams() function: creates JetStream streams on startup
           Stream "EVENTS": subjects ["events.>"], retention: limits, max_age: 7 days, storage: file
         - Called once during service startup

      IMPLEMENTATION APPROACH:
      1. Add NATS to both Docker Compose files
      2. Add nats-py dependency to common library
      3. Create events module with publisher, subscriber, schemas, stream setup
      4. Write unit tests for event serialization and publisher/subscriber logic
      5. Integration can be tested with NATS running in Docker

      RULES:
      - At-least-once delivery — handlers MUST be idempotent
      - Consumer groups ensure each event processed once per service (not per instance)
      - Durable consumers survive service restarts
      - Events are JSON-serialized (not protobuf binary for now — simpler debugging)
      - Publisher must handle NATS connection failure gracefully (log error, don't crash service)
      - event_id is UUID v4 for deduplication
      - All event schemas are Pydantic BaseModel with json_schema_extra for documentation
      - Stream retention: 7 days max age, after which events are purged
      - Add NATS_URL env var to service configurations

      COMMIT: feat(infra): add NATS JetStream event bus with Python publisher/subscriber library
