      - "use client" on dashboard/page.tsx
      - Wrap in SellerLayout component
      - Named exports for hooks
      - next/link for navigation
      - Tailwind CSS only
      - No new npm dependencies
      - Handle null/undefined data gracefully (avg_rating can be null)
      - Format currency: parseFloat(total_net).toFixed(2) with $ prefix
      - After implementation: cd apps/seller && pnpm build must pass with 0 errors

      COMMIT:
      feat(seller): add teacher dashboard with stats and course overview
    test: "cd /mnt/c/Users/aquam/PetProject/Merket_for_10_M_uesr/apps/seller && pnpm build"
