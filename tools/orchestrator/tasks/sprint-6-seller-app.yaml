      2. Write all tests first (add to existing test files or create test_thumbnails.py).
      3. Add migration file 008_thumbnails.sql.
      4. Update domain entity — add thumbnail_url field.
      5. Update repository — add to SELECT, INSERT, UPDATE queries.
      6. Update service — add validation and pass through.
      7. Update route schemas — add to request/response models.
      8. Run tests until all green (existing + new).

      RULES:
      - TDD: write failing tests FIRST, then implement
      - Clean Architecture: routes → services → domain ← repositories
      - Parameterized SQL queries only
      - Migration must be idempotent (ADD COLUMN IF NOT EXISTS)
      - thumbnail_url is optional — all existing courses get NULL
      - Do not break any existing tests — all 59 + new tests must pass
