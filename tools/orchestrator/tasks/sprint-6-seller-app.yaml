      IMPLEMENTATION APPROACH:
      1. Create use-analytics.ts and use-earnings.ts hooks.
      2. Replace dashboard/page.tsx placeholder with full implementation.
      3. Use useAuth() for token and user, useTeacherCourses for courses,
