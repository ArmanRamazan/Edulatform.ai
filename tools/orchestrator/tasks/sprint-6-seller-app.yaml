  - id: seller-courses
    title: "Seller course management: list, create, edit"
    scope: frontend:seller
    prompt: |
      Task: Build course management pages — list, create, and edit with curriculum management.

      CONTEXT:
      - Seller app: apps/seller/ (Next.js App Router, TypeScript strict, Tailwind CSS, TanStack Query)
      - SellerLayout component for page wrapping.
      - API client lib/api.ts:
        * courses.my(token) → CourseList
        * courses.create(token, body: CourseCreate) → Course
        * courses.update(token, id, body: CourseUpdate) → Course
        * courses.get(token, id) → Course
        * courses.curriculum(token, id) → CurriculumResponse { course, modules, total_lessons }
      - Hooks: useTeacherCourses, useCreateCourse, useUpdateCourse, useCurriculum (all exist).
      - CourseCreate: { title, description, is_free, price, duration_minutes, level, category_id }
      - CourseUpdate: partial of CourseCreate fields
      - CurriculumResponse includes modules[] with lessons[] nested.
      - Module/Lesson CRUD may need new API methods in api.ts:
        * POST /api/course/courses/:id/modules { title, order }
        * POST /api/course/modules/:id/lessons { title, content, video_url?, duration_minutes, order }
        * PATCH /api/course/modules/:id { title, order }
        * PATCH /api/course/lessons/:id { title, content, video_url?, duration_minutes, order }
        * DELETE /api/course/modules/:id
        * DELETE /api/course/lessons/:id

      WHAT TO BUILD:
      1. Add missing API methods to apps/seller/lib/api.ts:
         - modules.create(token, courseId, body) → POST /api/course/courses/{courseId}/modules
         - modules.update(token, moduleId, body) → PATCH /api/course/modules/{moduleId}
         - modules.delete(token, moduleId) → DELETE /api/course/modules/{moduleId}
         - lessons.create(token, moduleId, body) → POST /api/course/modules/{moduleId}/lessons
         - lessons.update(token, lessonId, body) → PATCH /api/course/lessons/{lessonId}
         - lessons.delete(token, lessonId) → DELETE /api/course/lessons/{lessonId}

      2. apps/seller/hooks/use-modules.ts — CRUD mutation hooks for modules and lessons.

      3. apps/seller/app/courses/page.tsx — "use client":
         - Wrap in SellerLayout
         - Headline: "Мои курсы" with "Создать курс" button → /courses/new
         - List of teacher's courses (useTeacherCourses)
         - Each course row: title, level, lessons count, avg rating, created date
         - Click row → /courses/{id}
         - Loading and empty states

      4. apps/seller/app/courses/new/page.tsx — "use client":
         - Wrap in SellerLayout
         - Course creation form:
           * Title (required, text input)
           * Description (required, textarea)
           * Level (select: beginner/intermediate/advanced)
           * Is free (checkbox)
           * Price (number input, disabled if is_free)
           * Duration (number input, minutes)
           * Category (select, optional — hardcode a few or leave as text)
         - Submit → useCreateCourse mutation
         - On success → router.push(`/courses/${newCourse.id}`)
         - Validation: title required (min 3 chars), description required (min 10 chars)

      5. apps/seller/app/courses/[id]/page.tsx — "use client":
         - Wrap in SellerLayout
         - Tabs: "Детали" | "Программа" (useState for active tab)

         Details tab:
           - Same form as create, prefilled with course data (useUpdateCourse to save)
           - "Сохранить изменения" button

         Curriculum tab:
           - List of modules, each expandable to show lessons
           - "Добавить модуль" button → inline form (title input + save)
           - Each module: title, order number, edit/delete buttons
           - Under each module: list of lessons with title, duration
           - "Добавить урок" button per module → inline form (title, content textarea,
             duration input, save)
           - Each lesson: edit (inline) / delete buttons
           - No drag-to-reorder (keep it simple — manual order number input)

      6. Loading files for each page.

      IMPLEMENTATION APPROACH:
      1. Add API methods to lib/api.ts for modules and lessons CRUD.
      2. Create use-modules.ts with mutation hooks.
      3. Build courses/page.tsx — list view.
      4. Build courses/new/page.tsx — creation form.
      5. Build courses/[id]/page.tsx — edit with tabs.
      6. For curriculum editing: use useState for inline forms.
         When user clicks "Добавить модуль", show input + save/cancel.
         On save → call mutation → refetch curriculum.
      7. Create loading.tsx for each route.

      RULES:
      - "use client" on all page components
      - Wrap every page in SellerLayout
      - Named exports for hooks and non-page components
      - next/link for navigation
      - Tailwind CSS only
      - No new npm dependencies
      - TanStack Query for all data fetching and mutations
      - Invalidate relevant queries on mutation success
      - After implementation: cd apps/seller && pnpm build must pass with 0 errors

      COMMIT:
      feat(seller): add course management with CRUD and curriculum editing
    test: "cd /mnt/c/Users/aquam/PetProject/Merket_for_10_M_uesr/apps/seller && pnpm build"
    depends_on: [seller-dashboard]

  - id: seller-analytics
    title: "Seller analytics dashboard: students, completion, engagement"
    scope: frontend:seller
    prompt: |
      Task: Build a teacher analytics page with charts showing enrollments, ratings, and performance.

      CONTEXT:
      - Seller app: apps/seller/ (Next.js App Router, TypeScript strict, Tailwind CSS, TanStack Query)
      - SellerLayout for page wrapping.
      - API: analytics.getSummary(token) → TeacherAnalyticsSummary:
        { total_courses, total_lessons, avg_rating, total_reviews, courses: CourseAnalytics[] }
        CourseAnalytics: { course_id, title, avg_rating, review_count, module_count, lesson_count }
      - Hook: useTeacherAnalytics(token) from hooks/use-analytics.ts (created in seller-dashboard).
      - No chart library installed yet — need to add recharts.

      WHAT TO BUILD:
      1. Install recharts: run pnpm add recharts in apps/seller/.

      2. apps/seller/app/analytics/page.tsx — "use client":
         - Wrap in SellerLayout
         - Headline: "Аналитика"

         Summary cards row (grid-cols-2 lg:grid-cols-4):
           - Total courses, Total lessons, Average rating, Total reviews

         Chart 1 — Lessons per course (BarChart from recharts):
           - X axis: course title (truncated to 20 chars)
           - Y axis: lesson count
           - Data from courses[] array in analytics summary
           - Blue bars

         Chart 2 — Ratings per course (BarChart):
           - X axis: course title
           - Y axis: avg_rating (0-5 scale)
           - Green bars for rating >= 4, yellow for 3-4, red for < 3

         Chart 3 — Reviews per course (BarChart):
           - X axis: course title
           - Y axis: review_count
           - Indigo bars

         Course-level detail table below charts:
           - Columns: Course title, Modules, Lessons, Avg rating, Reviews
           - Sortable by clicking column headers (useState for sort column/direction)
           - Click row → link to /courses/{id}

      3. apps/seller/app/analytics/loading.tsx — chart skeleton placeholders.

      IMPLEMENTATION APPROACH:
      1. Install recharts: pnpm add recharts (in apps/seller directory).
      2. Create analytics/page.tsx as "use client".
      3. Use useTeacherAnalytics(token) to fetch data.
      4. Import BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer from recharts.
      5. Dynamic import recharts to keep bundle light:
         const { BarChart, Bar, ... } = await import("recharts") — or use next/dynamic.
         Actually, simpler: just import directly since it's a seller app (lower performance requirements).
      6. Map courses[] array to chart data format.
      7. For the table: useState for sortKey and sortDirection, sort the array before rendering.
      8. Handle empty state: if no courses, show "Создайте курс, чтобы увидеть аналитику" with link.

      RULES:
      - "use client" on analytics/page.tsx
      - Wrap in SellerLayout
      - Named exports for any extracted chart components
      - Tailwind CSS only for layout (recharts handles chart styling)
      - ResponsiveContainer width="100%" height={300} for all charts
      - Handle null avg_rating: show 0 or "Нет оценок" in table
      - After implementation: cd apps/seller && pnpm build must pass with 0 errors

      COMMIT:
      feat(seller): add analytics dashboard with charts and course stats
    test: "cd /mnt/c/Users/aquam/PetProject/Merket_for_10_M_uesr/apps/seller && pnpm build"
    depends_on: [seller-dashboard]

  - id: seller-earnings
    title: "Seller earnings and payout management"
    scope: frontend:seller
    prompt: |
      Task: Build the teacher earnings page with summary, earnings history, and payout management.

      CONTEXT:
      - Seller app: apps/seller/ (Next.js App Router, TypeScript strict, Tailwind CSS, TanStack Query)
      - SellerLayout for page wrapping.
      - API client lib/api.ts:
        * earnings.getSummary(token) → EarningsSummary { total_gross, total_net, total_pending,
          total_paid, earnings: EarningResponse[] }
        * earnings.listEarnings(token, limit, offset) → EarningListResponse { items, total }
        * earnings.requestPayout(token, amount) → PayoutResponse
        * earnings.listPayouts(token, limit, offset) → PayoutListResponse { items, total }
      - EarningResponse: { id, teacher_id, course_id, payment_id, gross_amount, commission_rate,
        net_amount, status, created_at }
      - PayoutResponse: { id, teacher_id, amount, stripe_transfer_id, status, requested_at, completed_at }
      - Hook: useEarningsSummary(token) from hooks/use-earnings.ts (created in seller-dashboard).

      WHAT TO BUILD:
      1. Extend apps/seller/hooks/use-earnings.ts with additional hooks:
         - useEarningsList(token, limit?, offset?) → useQuery
         - useRequestPayout(token) → useMutation calling earnings.requestPayout
         - usePayoutList(token, limit?, offset?) → useQuery

      2. apps/seller/app/earnings/page.tsx — "use client":
         - Wrap in SellerLayout
         - Headline: "Доходы"

         Summary cards (grid-cols-2 lg:grid-cols-4):
           - "Общий доход" — total_gross, gray text
           - "Чистый доход" — total_net, green text (after commission)
           - "В ожидании" — total_pending, yellow text
           - "Выплачено" — total_paid, blue text
         Each card: white bg, rounded-xl, p-6, amount in text-2xl font-bold

         Earnings table:
           - Columns: Date, Course ID (truncated), Gross, Commission, Net, Status badge
           - Status badges: pending=yellow, paid=green, processing=blue
           - Pagination: "Показать ещё" button (increase limit) or page numbers
           - Loading state: skeleton rows

         Payout section:
           - "Запросить выплату" button → opens inline form or modal:
             * Amount input (number, max = available balance = total_net - total_paid - total_pending)
             * "Отправить запрос" button → useRequestPayout mutation
             * Success: show green alert, refetch earnings summary
             * Error: show red alert with message
           - Available balance display: total_net - total_paid - total_pending

         Payout history table:
           - Columns: Date requested, Amount, Status, Completed date
           - Status badges: requested=yellow, processing=blue, completed=green, failed=red

      3. apps/seller/app/earnings/loading.tsx — summary card + table skeletons.

      IMPLEMENTATION APPROACH:
      1. Extend use-earnings.ts with new hooks.
      2. Create earnings/page.tsx with three sections: summary, earnings, payouts.
      3. Use useEarningsSummary for cards, useEarningsList for table, usePayoutList for payout history.
      4. For payout request: useState for showPayoutForm, amount field, submit handler.
      5. Calculate available balance: parseFloat(total_net) - parseFloat(total_paid) - parseFloat(total_pending).
      6. Format amounts: parseFloat(amount).toFixed(2) with $ prefix.
      7. Format dates: Intl.DateTimeFormat("ru-RU", { dateStyle: "medium" }).
      8. Handle empty states for both tables.

      RULES:
      - "use client" on earnings/page.tsx
      - Wrap in SellerLayout
      - Named exports for hooks
      - Tailwind CSS only
      - No new npm dependencies
      - Handle string-to-number conversion for amounts (API returns strings)
      - Payout amount validation: must be positive, must not exceed available balance
      - window.confirm before submitting payout request
      - After implementation: cd apps/seller && pnpm build must pass with 0 errors

      COMMIT:
      feat(seller): add earnings page with payout management
    test: "cd /mnt/c/Users/aquam/PetProject/Merket_for_10_M_uesr/apps/seller && pnpm build"
    depends_on: [seller-dashboard]

