  - id: seller-quiz-builder
    title: "Teacher quiz builder with AI generation"
    scope: frontend:seller
    prompt: |
      Task: Add a Quiz tab to the course editor for creating and managing quizzes with AI generation.

      CONTEXT:
      - Seller app: apps/seller/ (Next.js App Router, TypeScript strict, Tailwind CSS, TanStack Query)
      - Course edit page: apps/seller/app/courses/[id]/page.tsx (from seller-courses task) — has tabs.
      - Learning service quiz API:
        * POST /api/learning/quizzes — create quiz { course_id, lesson_id?, title, questions[] }
        * GET /api/learning/quizzes/course/{course_id} — list quizzes for course
        * Each question: { question_text, options: string[], correct_index: number, explanation? }
      - AI service:
        * POST /api/ai/quiz/generate — { lesson_content: str, num_questions: int } → generated quiz
      - Curriculum data: courses.curriculum(token, id) returns modules with lessons (title, content).
      - Seller API client: apps/seller/lib/api.ts — needs learning and AI endpoints added.

      WHAT TO BUILD:
      1. Add to apps/seller/lib/api.ts:
         - learning namespace:
           * quizzes.list(token, courseId) → GET /api/learning/quizzes/course/{courseId}
           * quizzes.create(token, body) → POST /api/learning/quizzes
         - ai namespace:
