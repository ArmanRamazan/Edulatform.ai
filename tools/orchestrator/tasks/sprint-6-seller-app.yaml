phase: "sprint-6"
description: "Supply Side — complete seller dashboard, teacher analytics, earnings UI"

tasks:
  - id: seller-layout
    title: "Seller app layout: sidebar navigation, auth guard"
    scope: frontend:seller
    prompt: |
      Task: Create the seller app layout with sidebar navigation, auth guard, and login page.

      CONTEXT:
      - Seller app: apps/seller/ (Next.js App Router, TypeScript strict, Tailwind CSS, TanStack Query)
      - Current state: minimal scaffold with layout.tsx (just Providers wrapper), page.tsx (redirects
        to /dashboard), lib/api.ts (full API client with identity, courses, analytics, earnings),
        hooks/use-auth.ts (teacher-only auth with role check), hooks/use-courses.ts (CRUD hooks),
        components/Providers.tsx (QueryClientProvider).
      - useAuth() in hooks/use-auth.ts: login validates role=teacher, stores token in localStorage,
        provides { token, user, loading, login, logout }.
      - API client lib/api.ts has: identity (login, me), courses (my, list, get, create, update,
        curriculum), analytics (getSummary), earnings (getSummary, listEarnings, requestPayout, listPayouts).
      - lib/errors.ts exists for error handling.
      - No dashboard, login page, or sidebar currently exist.

      WHAT TO BUILD:
      1. apps/seller/components/Sidebar.tsx — "use client" named export:
         - Left sidebar, fixed width (w-64), full height (min-h-screen), bg-white border-r
         - Logo section: "EduPlatform" text + "Для преподавателей" subtitle
         - Nav items (vertical list with icons as emoji or text prefixes):
           * "Дашборд" → /dashboard (icon: bar chart)
           * "Мои курсы" → /courses (icon: book)
           * "Аналитика" → /analytics (icon: chart)
           * "Доходы" → /earnings (icon: wallet)
           * "Настройки" → /settings (icon: gear)
         - Active item highlighted with bg-indigo-50 text-indigo-700 font-medium
         - Use usePathname() to detect active route
         - User section at bottom: user name, email, role badge, logout button
         - Mobile: hidden on <lg, show hamburger button in a top bar

      2. apps/seller/components/AuthGuard.tsx — "use client" named export:
         - Wraps children, uses useAuth()
         - If loading: show centered spinner
         - If !user && !loading: redirect to /login using router.push()
         - If user: render children

      3. apps/seller/app/layout.tsx — update:
         - Import AuthGuard and Sidebar (but NOT on /login route)
         - The layout renders Providers wrapping the page content
         - Use a conditional layout: if pathname is /login, render just children;
           otherwise render sidebar + main content area

      4. apps/seller/components/SellerLayout.tsx — "use client" named export:
         - Combines AuthGuard + Sidebar + main content area
         - Layout: flex row, sidebar on left, main content flex-1 p-8 bg-gray-50
         - Mobile: sidebar hidden, top bar with hamburger toggle (useState for sidebar open)
         - Hamburger sidebar: fixed overlay on mobile, slide from left

      5. apps/seller/app/login/page.tsx — "use client":
         - Simple login form: email, password, submit button
         - Uses useAuth().login() — which validates teacher role
         - Error display for wrong credentials or non-teacher role
         - On success: router.push("/dashboard")
         - Branded header: "EduPlatform — Вход для преподавателей"
         - Link: "Нет аккаунта? Зарегистрируйтесь на основном сайте"

      6. apps/seller/app/dashboard/page.tsx — placeholder:
         - Simple "Dashboard coming soon" with SellerLayout wrapping
         - This will be replaced by seller-dashboard task

      IMPLEMENTATION APPROACH:
      1. Create Sidebar.tsx with nav items and usePathname() for active detection.
      2. Create AuthGuard.tsx wrapping children with auth check.
      3. Create SellerLayout.tsx combining AuthGuard + Sidebar + content area.
      4. Update layout.tsx to use Providers only (keep it simple, no layout logic here).
      5. Create login/page.tsx with form using useAuth().login().
      6. Create dashboard/page.tsx as placeholder.
      7. For mobile sidebar: useState in SellerLayout, hamburger button in top bar,
         fixed overlay sidebar with transition.
      8. Import SellerLayout in dashboard/page.tsx (and future pages will do the same).

      RULES:
      - "use client" on all interactive components (Sidebar, AuthGuard, SellerLayout, login page)
      - Named exports ONLY (except page.tsx which needs default export for Next.js)
      - next/link for all navigation
      - Tailwind CSS only — no CSS modules
      - No new npm dependencies
      - useAuth() hook is already built — do not recreate it
      - Seller app is teacher-only: useAuth already rejects non-teacher roles
      - After implementation: cd apps/seller && pnpm build must pass with 0 errors

      COMMIT:
      feat(seller): add layout with sidebar navigation, auth guard, and login page
    test: "cd /mnt/c/Users/aquam/PetProject/Merket_for_10_M_uesr/apps/seller && pnpm build"
    depends_on: []

  - id: seller-dashboard
    title: "Seller dashboard: overview stats and recent activity"
    scope: frontend:seller
    prompt: |
      Task: Build the main teacher dashboard page showing overview statistics and recent activity.

      CONTEXT:
      - Seller app: apps/seller/ (Next.js App Router, TypeScript strict, Tailwind CSS, TanStack Query)
      - Layout with Sidebar and AuthGuard established (from seller-layout task).
      - SellerLayout component: apps/seller/components/SellerLayout.tsx — wraps page content.
      - API client: apps/seller/lib/api.ts:
        * courses.my(token) → CourseList { items: Course[], total: number }
        * analytics.getSummary(token) → TeacherAnalyticsSummary { total_courses, total_lessons,
          avg_rating, total_reviews, courses: CourseAnalytics[] }
        * earnings.getSummary(token) → EarningsSummary { total_gross, total_net, total_pending,
          total_paid, earnings: EarningResponse[] }
      - Hooks: hooks/use-courses.ts — useTeacherCourses(token), useCreateCourse(token).
      - Auth: hooks/use-auth.ts — { token, user, loading }.

      WHAT TO BUILD:
      1. apps/seller/hooks/use-analytics.ts — new hook:
         - useTeacherAnalytics(token) → useQuery calling analytics.getSummary(token)

      2. apps/seller/hooks/use-earnings.ts — new hook:
         - useEarningsSummary(token) → useQuery calling earnings.getSummary(token)

      3. apps/seller/app/dashboard/page.tsx — "use client" (replace placeholder):
         - Wrap content in SellerLayout
         - Headline: "Дашборд" with "Добро пожаловать, {user.name}"

         Stats row (4 cards in grid-cols-2 lg:grid-cols-4):
           - "Курсы" — total_courses count with book icon
           - "Уроки" — total_lessons count with document icon
           - "Средняя оценка" — avg_rating (or "—" if null) with star icon
           - "Доход" — total_net from earnings summary with dollar icon
         Each card: white bg, rounded-xl, shadow-sm, p-6, icon + number + label

         Teacher's courses section:
