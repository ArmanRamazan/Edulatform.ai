      - Course service: services/py/course/ (FastAPI, asyncpg, Clean Architecture)
      - Domain entity: services/py/course/app/domain/course.py — Course dataclass
      - Repository: services/py/course/app/repositories/ — CourseRepository with SQL
      - Service: services/py/course/app/services/ — CourseService
      - Routes: services/py/course/app/routes/ — course routes with CRUD
      - Migrations: services/py/course/migrations/ — 7 existing migration files (001-007)
      - Tests: services/py/course/tests/ — 59 existing tests
      - Current Course fields: id, teacher_id, title, description, is_free, price, duration_minutes,
        level, created_at, updated_at, avg_rating, review_count, category_id
      - Common lib: libs/py/common/ — errors, security, database

      WHAT TO BUILD:
      1. Migration: services/py/course/migrations/008_thumbnails.sql
         - ALTER TABLE courses ADD COLUMN IF NOT EXISTS thumbnail_url TEXT DEFAULT NULL;

      2. Domain: update Course entity in services/py/course/app/domain/course.py
         - Add field: thumbnail_url: str | None = None

      3. Repository: update CourseRepository
         - Include thumbnail_url in all SELECT queries (in the column list)
         - Include thumbnail_url in INSERT and UPDATE queries
         - Update the row-to-entity mapping to include thumbnail_url

      4. Service: update CourseService
         - Accept thumbnail_url in create and update methods
         - Validate: if provided, must start with http:// or https:// and end with
           common image extension (.jpg, .jpeg, .png, .gif, .webp) or be a known CDN URL
         - Simple validation: URL format check, not strict

      5. Route: update course routes
         - Add thumbnail_url to CreateCourseRequest and UpdateCourseRequest schemas
         - Include thumbnail_url in course response
         - No separate endpoint needed — thumbnail_url is set via create/update

      6. Update GET /courses list and GET /courses/{id} responses to include thumbnail_url.

      TDD — write tests FIRST:
      1. test_create_course_with_thumbnail — POST /courses with thumbnail_url → 201, URL in response
      2. test_create_course_without_thumbnail — POST /courses without thumbnail → 201, null in response
      3. test_update_course_thumbnail — PATCH /courses/{id} with { thumbnail_url: "https://..." } → 200
      4. test_update_course_remove_thumbnail — PATCH with { thumbnail_url: null } → 200, null
      5. test_invalid_thumbnail_url — POST with { thumbnail_url: "not-a-url" } → 400
      6. test_get_course_includes_thumbnail — GET /courses/{id} includes thumbnail_url field
      7. test_list_courses_includes_thumbnail — GET /courses includes thumbnail_url in items
      8. Write failing tests, then implement.

      IMPLEMENTATION APPROACH:
