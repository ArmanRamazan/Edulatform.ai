  # ─── BACKEND: Identity — Referral Program ───────────────────────────────────

  - id: referral-program
    title: "Referral program: invite friends, earn credits"
    scope: backend:identity
    prompt: |
      Task: Add a referral program to the Identity service.

      CONTEXT:
      - Identity service: services/py/identity/ (FastAPI, asyncpg, Clean Architecture)
      - Users table has: id, email, name, role, is_verified, created_at, etc.
      - Registration endpoint: POST /register { email, password, name }
      - Clean Architecture: routes → services → domain ← repositories
      - JWT auth, user_id from token
      - Tests: AsyncMock, pytest-asyncio, asyncio_mode = "auto"

      WHAT TO BUILD:

      1. Migrations:
         ALTER TABLE users ADD COLUMN referral_code VARCHAR(12) UNIQUE;
         — Generate referral codes for existing users via UPDATE (format: REF-XXXXXXXX, 8 random alphanumeric)

         CREATE TABLE referrals (
           id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
           referrer_id UUID NOT NULL REFERENCES users(id),
           referee_id UUID NOT NULL REFERENCES users(id) UNIQUE,
           referral_code VARCHAR(12) NOT NULL,
           status VARCHAR(20) NOT NULL DEFAULT 'pending'
             CHECK (status IN ('pending', 'completed', 'expired')),
           reward_type VARCHAR(20),
           created_at TIMESTAMPTZ NOT NULL DEFAULT now(),
           completed_at TIMESTAMPTZ
         );
         CREATE INDEX idx_referrals_referrer ON referrals(referrer_id);

      2. Domain: Referral entity (id, referrer_id, referee_id, referral_code, status, reward_type,
         created_at, completed_at).
         ReferralStats VO (referral_code, invited_count, completed_count, rewards_earned).
         ReferralCode generator: static method → "REF-" + 8 random uppercase alphanumeric chars.

      3. Repository: ReferralRepository (ABC + SQL):
         - create_referral(referrer_id, referee_id, referral_code) → Referral
         - get_referral_by_referee(referee_id) → Referral | None
         - get_referrer_by_code(referral_code) → UUID | None (returns referrer user_id)
         - complete_referral(referee_id) → Referral | None
         - get_referral_stats(user_id) → ReferralStats
         - get_user_referral_code(user_id) → str | None

      4. Service: ReferralService:
         - apply_referral_code(referee_id, referral_code) → Referral
           Validates: code exists, referrer != referee, referee not already referred.
           Creates pending referral.
         - complete_referral(referee_id) → Referral | None
           Called when referee completes first course (external trigger).
           Marks referral as completed.
         - get_my_referral_info(user_id) → ReferralStats
           Returns user's referral code + stats.
         - generate_referral_code(user_id) → str
           If user doesn't have referral_code yet, generate and save.

      5. Routes: app/routes/referrals.py
         - GET /referral/me → ReferralStats (authenticated, own code + stats)
         - POST /referral/apply { referral_code } → 201 Referral (authenticated, used during/after registration)
         - POST /referral/complete → 200 (internal/admin — marks referee's referral as completed)
         Register router in main app.

      6. On user registration: auto-generate referral_code for new users.
         Update the registration flow in the existing service to set referral_code on INSERT.

      IMPLEMENTATION APPROACH:
      TDD — write failing tests FIRST in tests/test_referrals.py:
      1. test_apply_referral_success → 201
      2. test_apply_referral_self → 400 (can't refer yourself)
      3. test_apply_referral_already_referred → 409
      4. test_apply_referral_invalid_code → 404
      5. test_complete_referral → status changes to completed
      6. test_complete_referral_no_pending → 404
      7. test_get_referral_stats — returns code, counts
      8. test_referral_code_format — matches REF-XXXXXXXX pattern
      9. test_new_user_gets_referral_code — registration generates code
      10. test_unauthenticated → 401

      Then implement. Then refactor.

      RULES:
      - Domain: no framework imports
      - Parameterized SQL
      - Referral code: REF- + 8 uppercase alphanumeric, unique
      - One referral per referee (referee_id UNIQUE)
      - Can't refer yourself
      - Auto-generate code on registration
      - Async I/O, type hints
      - Independent tests

      COMMIT:
      feat(identity): add referral program with invite codes
