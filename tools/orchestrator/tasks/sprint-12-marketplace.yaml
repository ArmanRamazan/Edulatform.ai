phase: "sprint-12"
description: "Marketplace v2 — frontend for bundles, coupons, referrals"

tasks:
  # ─── FRONTEND: Buyer App — Marketplace Features ────────────────────────────

  - id: bundles-frontend
    title: "Course bundles UI in buyer app"
    scope: frontend:buyer
    prompt: |
      Task: Build course bundles browsing and detail pages in the buyer app.

      CONTEXT:
      - Buyer app: apps/buyer/ (Next.js 15 App Router, Tailwind CSS, TanStack Query)
      - API client: apps/buyer/lib/api.ts
      - Auth hook: apps/buyer/hooks/use-auth.ts — { user, token }
      - API proxy: /api/course/:path* → http://localhost:8002/:path*
      - Course service bundle endpoints:
        GET /bundles?limit&offset&teacher_id → paginated CourseBundle
        GET /bundles/:id → BundleWithCourses { id, teacher_id, title, description, price, discount_percent, courses[] }
        POST /bundles → 201 (teacher)
      - CourseBundle: { id, teacher_id, title, description, price, discount_percent, is_active, created_at }
      - BundleWithCourses: bundle + courses: Course[]

      WHAT TO BUILD:

      1. API client additions in apps/buyer/lib/api.ts:
         Add to courses namespace:
         - listBundles(params): paginated CourseBundle
         - getBundle(bundleId): BundleWithCourses

      2. Hook: apps/buyer/hooks/use-bundles.ts
         - useBundleList(params?) — TanStack Query
         - useBundle(bundleId) — TanStack Query

      3. Bundles listing page: apps/buyer/app/bundles/page.tsx ("use client")
         - Page title: "Наборы курсов"
         - Grid of bundle cards (2-3 columns):
           Each card: title, description (truncated), number of courses, original total price
           (sum of individual prices), bundle price, discount badge ("-{discount_percent}%"),
           "Подробнее" link
         - Empty state: "Пока нет доступных наборов"

      4. Bundle detail page: apps/buyer/app/bundles/[id]/page.tsx ("use client")
         - Bundle title, description
         - Price comparison: "Отдельно: {sum}" crossed out → "В наборе: {bundle_price}" highlighted
         - Savings badge: "Экономия: {sum - bundle_price} ₽ ({discount_percent}%)"
         - List of included courses (reuse CourseCard component or simplified cards):
           title, level, duration, rating
         - "Купить набор" button (placeholder — no actual purchase flow yet)

      5. Navigation: Add "Наборы" link in Header.tsx navigation.

      IMPLEMENTATION APPROACH:
      1. Add API methods
      2. Create hook
      3. Build listing page
      4. Build detail page
      5. Add nav link
      6. Verify: cd apps/buyer && pnpm build

      RULES:
      - "use client" for pages with hooks
      - Named exports (except page default exports)
      - Tailwind CSS only
      - next/link for navigation
      - No new dependencies
      - Price display in ₽ (Russian ruble)

      COMMIT:
      feat(buyer): add course bundles browsing and detail pages
    test: "cd /mnt/c/Users/aquam/PetProject/Merket_for_10_M_uesr/apps/buyer && pnpm build"
    depends_on: []

  - id: coupons-frontend
    title: "Coupon code UI in checkout"
    scope: frontend:buyer
    prompt: |
      Task: Add coupon code input and validation to the checkout flow in the buyer app.

      CONTEXT:
      - Buyer app: apps/buyer/ (Next.js 15 App Router, Tailwind CSS, TanStack Query)
      - API client: apps/buyer/lib/api.ts
      - Auth hook: apps/buyer/hooks/use-auth.ts — { user, token }
      - API proxy: /api/payment/:path* → http://localhost:8004/:path*
      - Payment service coupon endpoints:
        POST /coupons/validate { code, course_id } → DiscountResult { original_price, discount_amount, final_price, coupon_code }
        Returns 404 if coupon not found or invalid
      - Existing checkout/payment flow: look at current course purchase pages/components
        to find where to integrate coupon input

      WHAT TO BUILD:

      1. API client additions in apps/buyer/lib/api.ts:
         Add to payment namespace:
         - validateCoupon(token, { code, course_id }): DiscountResult

      2. Hook: apps/buyer/hooks/use-coupons.ts
         - useValidateCoupon(token) — useMutation
           On success: stores DiscountResult in state
           On error (404): shows error message

      3. Coupon input component: apps/buyer/components/CouponInput.tsx
         - "У вас есть промокод?" — clickable text that expands the input section
         - Text input for coupon code + "Применить" button
         - States:
           * Default: collapsed
           * Expanded: input visible, button enabled
           * Loading: button shows spinner during validation
           * Valid: green checkmark, shows discount info: "{code} — скидка {discount_amount} ₽"
           * Invalid: red text "Промокод не найден или истёк"
           * Applied: input disabled, "Удалить" button to clear coupon
         - Props: courseId, onCouponApplied(discount: DiscountResult | null)

      4. Price display component: apps/buyer/components/PriceDisplay.tsx
         - Without coupon: shows price normally
         - With coupon: shows original price with strikethrough + discounted price + coupon label
         - Props: originalPrice, discount?: DiscountResult

      5. Integration: Find the existing course purchase/enrollment page and add:
         - CouponInput component before the payment button
         - PriceDisplay showing the (possibly discounted) price
         - Pass coupon_code to the payment API call when coupon is applied

      IMPLEMENTATION APPROACH:
      1. Add API methods
      2. Create hook
      3. Build CouponInput component
      4. Build PriceDisplay component
      5. Integrate into checkout flow
      6. Verify: cd apps/buyer && pnpm build

      RULES:
      - "use client" for interactive components
      - Named exports
      - Tailwind CSS only
      - No new dependencies
      - Coupon code input: uppercase transform on input (visual only)
      - Accessible: proper labels, aria attributes for states

      COMMIT:
      feat(buyer): add coupon code input and validation in checkout
    test: "cd /mnt/c/Users/aquam/PetProject/Merket_for_10_M_uesr/apps/buyer && pnpm build"
    depends_on: []

  - id: referral-frontend
    title: "Referral program UI"
    scope: frontend:buyer
    prompt: |
      Task: Build referral program pages in the buyer app.

      CONTEXT:
      - Buyer app: apps/buyer/ (Next.js 15 App Router, Tailwind CSS, TanStack Query)
      - API client: apps/buyer/lib/api.ts
      - Auth hook: apps/buyer/hooks/use-auth.ts — { user, token }
      - API proxy: /api/identity/:path* → http://localhost:8001/:path*
      - Identity service referral endpoints:
        GET /referral/me → ReferralStats { referral_code, invited_count, completed_count, rewards_earned }
        POST /referral/apply { referral_code } → 201
      - Registration page: apps/buyer/app/register/page.tsx

      WHAT TO BUILD:

      1. API client additions in apps/buyer/lib/api.ts:
         Add to identity namespace:
         - getReferralInfo(token): ReferralStats
         - applyReferralCode(token, { referral_code }): Referral

      2. Hook: apps/buyer/hooks/use-referral.ts
         - useReferralInfo(token) — TanStack Query
         - useApplyReferral(token) — useMutation

      3. Referral page: apps/buyer/app/referral/page.tsx ("use client")
         Layout:
         - Page title: "Пригласите друзей"
         - Referral link section:
           * Your code: "{referral_code}" with copy button
           * Your link: "https://eduplatform.ru/register?ref={referral_code}" with copy button
           * Share buttons: "Скопировать ссылку" (copies to clipboard), "Поделиться в Telegram"
             (opens https://t.me/share/url?url=...), "Поделиться в VK"
             (opens https://vk.com/share.php?url=...)
         - Stats section (3 cards):
           * "Приглашено" — invited_count
           * "Завершили курс" — completed_count
           * "Награды" — rewards_earned
         - How it works section:
           * Step 1: "Поделитесь ссылкой с другом"
           * Step 2: "Друг регистрируется по вашей ссылке"
           * Step 3: "Друг завершает первый курс — оба получаете бонус"

      4. Registration page update: apps/buyer/app/register/page.tsx
         - Add optional "Реферальный код" input field below the name field
         - Pre-fill from ?ref= query parameter if present
         - After successful registration, if referral code was entered,
           call POST /referral/apply { referral_code }
         - Wrap register page in Suspense boundary for useSearchParams()

      5. Navigation: Add "Пригласить друзей" link in user menu (dropdown or sidebar).

      IMPLEMENTATION APPROACH:
      1. Add API methods
      2. Create hook
      3. Build referral page
      4. Update registration page
      5. Add nav link
      6. Verify: cd apps/buyer && pnpm build

      RULES:
      - "use client" for pages with hooks
      - useSearchParams() needs Suspense boundary wrapper
      - Named exports (except page default exports)
      - Tailwind CSS only
      - next/link for navigation
      - No new dependencies
      - Copy to clipboard via navigator.clipboard.writeText()

      COMMIT:
      feat(buyer): add referral program UI and registration integration
    test: "cd /mnt/c/Users/aquam/PetProject/Merket_for_10_M_uesr/apps/buyer && pnpm build"
    depends_on: []
