  - id: error-tracking
    title: "Error tracking with Sentry integration"
    scope: backend:identity
    prompt: |
      Task: Add optional Sentry error tracking integration to the common library and identity service.

      CONTEXT:
      - Common library: libs/py/common/ (shared across all services)
      - Identity service: services/py/identity/ (FastAPI)
      - Sentry SDK: sentry-sdk[fastapi] — integrates with FastAPI automatically
      - Should be optional: disabled when SENTRY_DSN env var is empty
      - structlog already integrated (previous task)

      WHAT TO BUILD:
      TDD — write tests first, then implement.

      1. Add sentry-sdk[fastapi] to libs/py/common/pyproject.toml as optional dependency

      2. Create libs/py/common/common/sentry.py:
         - setup_sentry(dsn: str | None, service_name: str, environment: str = "production") -> None
           - If dsn is None or empty: log "Sentry disabled" and return (no-op)
           - If dsn is set: call sentry_sdk.init(
               dsn=dsn,
               environment=environment,
               traces_sample_rate=0.1,  # 10% of transactions
               profiles_sample_rate=0.1,
               send_default_pii=False,  # NEVER send PII
               server_name=service_name,
               integrations=[FastApiIntegration()],
               before_send=_before_send,  # custom filter
             )
         - _before_send(event, hint) -> event | None:
           - Strip sensitive headers (Authorization, Cookie) from request data
           - Strip email, phone from user context if present
           - Return filtered event

      3. Create middleware or hook for user context:
         - After JWT is validated in a request, call sentry_sdk.set_user({"id": user_id, "role": role})
         - Do NOT set email or other PII
         - Clear user context after request

      4. Integrate into identity service:
         - In lifespan: setup_sentry(dsn=settings.SENTRY_DSN, service_name="identity", environment=settings.ENVIRONMENT)
         - Add SENTRY_DSN and ENVIRONMENT to service config (BaseSettings)
         - Default: SENTRY_DSN="" (disabled)

      5. Tests in services/py/identity/tests/:
         - test_sentry.py:
           - Test setup_sentry with empty DSN does nothing (no error)
           - Test setup_sentry with DSN calls sentry_sdk.init (mock sentry_sdk)
           - Test _before_send strips Authorization header
           - Test _before_send strips email from user context
           - Test that with SENTRY_DSN="" the app starts without sentry

      IMPLEMENTATION APPROACH:
      1. Write failing tests (TDD Red)
      2. Add sentry-sdk to common dependencies
      3. Implement sentry.py in common
      4. Integrate into identity service config and lifespan
      5. All tests green (TDD Green)

      RULES:
      - TDD: tests first
      - sentry-sdk[fastapi] is the ONLY new dependency
      - NEVER send PII to Sentry (send_default_pii=False, strip in before_send)
      - Optional: empty SENTRY_DSN = Sentry completely disabled
      - Low sampling rates (0.1) to avoid performance impact
      - Mock sentry_sdk in tests — do NOT make real Sentry calls
      - All tests must pass: cd services/py/identity && uv run --package identity pytest tests/ -v

      COMMIT: feat(identity): add optional Sentry error tracking integration
    test: "cd /mnt/c/Users/aquam/PetProject/Merket_for_10_M_uesr/services/py/identity && uv run --package identity pytest tests/ -v"

