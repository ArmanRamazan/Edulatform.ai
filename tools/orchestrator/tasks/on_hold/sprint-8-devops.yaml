  - id: health-dashboard
    title: "Service health dashboard page"
    scope: frontend:buyer
    prompt: |
      Task: Create a public status page that shows health status of all backend services.

      CONTEXT:
      - Buyer app: apps/buyer/ (Next.js 15 App Router, Tailwind CSS, TanStack Query)
      - All 7 services expose /health/live and /health/ready endpoints
      - Services: identity(:8001), course(:8002), enrollment(:8003), payment(:8004),
        notification(:8005), ai(:8006), learning(:8007)
      - API client proxies requests through Next.js API routes or direct calls
      - This page should be public (no auth required)

      WHAT TO BUILD:
      1. Create apps/buyer/app/status/page.tsx ("use client"):
         - Display a table/grid of all 7 services with their health status
         - Columns: Service Name, Status (green/red badge), Response Time (ms), Last Checked
         - Auto-refresh every 10 seconds using setInterval + refetch

      2. Create apps/buyer/hooks/use-health.ts:
         - useServiceHealth() hook using TanStack Query
         - Fetches health from all 7 services in parallel
         - For each service: GET /api/<service>/health/live (through API proxy)
           or direct: fetch(`http://localhost:<port>/health/live`)
         - Measures response time (performance.now() before/after)
         - Returns: { services: ServiceHealth[], isLoading, refetch }
         - ServiceHealth: { name, url, status: 'healthy' | 'unhealthy' | 'unknown', responseTimeMs, lastChecked }
         - refetchInterval: 10000 (10 seconds)

      3. Page layout:
         - Title: "Статус системы"
         - Overall status banner: "Все системы работают" (green) or "Есть проблемы" (yellow/red)
         - Service grid: 7 cards or table rows
         - Each service: name, status badge (green dot = healthy, red dot = unhealthy, gray = checking)
         - Response time in ms
         - Last checked: "только что", "10 сек назад", etc.
         - Footer: "Автообновление каждые 10 секунд"

      4. Add metadata (via layout.tsx in status/ directory since page is "use client"):
         - title: "Статус системы"

      IMPLEMENTATION APPROACH:
      1. Create the health hook with TanStack Query
      2. Create the status page with auto-refresh
      3. Style with Tailwind CSS
      4. Handle errors gracefully (service down = red badge, not crash)
      5. Build and verify

      RULES:
      - "use client" (uses hooks, setInterval, performance.now)
      - TanStack Query for data fetching
      - Handle all error states (service down, network error, timeout)
      - Set fetch timeout to 5 seconds per service
      - No auth required for this page
      - Named exports for hook, default export for page
      - Tailwind CSS only
      - No new dependencies

      COMMIT: feat(buyer): add service health dashboard page
    test: "cd /mnt/c/Users/aquam/PetProject/Merket_for_10_M_uesr/apps/buyer && pnpm build"

  # ──────────────────────────────────────────────
  # BACKEND: RATE LIMIT IMPROVEMENTS
  # ──────────────────────────────────────────────

  - id: rate-limit-improvements
    title: "Rate limiting improvements: per-endpoint and per-user"
    scope: backend:identity
    prompt: |
      Task: Enhance the rate limiter in the common library to support per-user and per-endpoint limits.

      CONTEXT:
      - Common library: libs/py/common/common/rate_limit.py (existing rate limiter)
      - Current: per-IP global rate limiting (e.g., 100 requests/minute)
      - Identity service already has specific limits for login (10/min) and register (5/min)
      - AI service needs per-user limits based on subscription tier:
        free=10/min, student=100/min, pro=unlimited
      - Redis is used for rate limit state storage
      - JWT contains: user_id, role, extra_claims (which may include tier/plan info)

      WHAT TO BUILD:
      TDD — write tests first, then implement.

      1. Enhance libs/py/common/common/rate_limit.py:
         - RateLimitConfig dataclass:
           - key_type: "ip" | "user" | "ip_and_user"
           - max_requests: int
           - window_seconds: int
           - exclude_roles: list[str] (e.g., ["admin"] to bypass limits)

         - RateLimiter class enhancements:
           - Support key_type="user": use user_id from JWT as rate limit key
           - Support key_type="ip_and_user": combine IP and user_id
           - Support dynamic limits: accept a callable that returns max_requests based on request context
             e.g., def get_ai_limit(user_claims: dict) -> int: return 10 if tier=="free" else 100
           - Support exclude_roles: skip rate limiting for certain roles

         - rate_limit() dependency (FastAPI Depends):
           - Accept RateLimitConfig or use defaults
           - Extract user_id from JWT if key_type involves user
           - Support per-route configuration via decorator or Depends parameter

      2. Example usage patterns (document in code):
         - Global: Depends(rate_limit(RateLimitConfig(key_type="ip", max_requests=100, window_seconds=60)))
         - Per-user AI: Depends(rate_limit(RateLimitConfig(key_type="user", max_requests=10, window_seconds=60)))
         - Dynamic: Depends(rate_limit(RateLimitConfig(key_type="user", dynamic_limit=get_ai_limit)))

      3. Tests in services/py/identity/tests/:
         - test_rate_limit.py:
           - Test IP-based rate limiting (existing behavior preserved)
           - Test user-based rate limiting (user_id as key)
           - Test dynamic limit based on user claims
