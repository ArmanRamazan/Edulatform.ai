  - id: email-delivery
    title: "Email delivery via Resend API"
    scope: backend:notification
    prompt: |
      Task: Add real email delivery to the notification service using Resend API, with a stub fallback.

      CONTEXT:
      - Notification service: services/py/notification/ (FastAPI, Clean Architecture)
      - Currently logs notification content to stdout (no real delivery)
      - Resend API: POST https://api.resend.com/emails, Authorization: Bearer <key>
        Body: { "from": "...", "to": ["..."], "subject": "...", "html": "..." }
      - Service structure: app/routes/, app/services/, app/domain/, app/repositories/
      - httpx is likely already a dependency (used in other services)

      WHAT TO BUILD:
      TDD — write tests first, then implement.

      1. Create app/adapters/email.py:
         - Abstract base: EmailClient (ABC)
           - async def send(self, to: str, subject: str, html_body: str) -> bool
         - StubEmailClient(EmailClient):
           - Logs to stdout: "EMAIL STUB: to={to}, subject={subject}"
           - Returns True always
         - ResendEmailClient(EmailClient):
           - __init__(self, api_key: str, from_address: str = "noreply@eduplatform.ru")
           - Uses httpx.AsyncClient to POST to Resend API
           - Returns True on 200, logs error and returns False on failure
           - Handles network errors gracefully (try/except, log, return False)

      2. Configuration:
         - Add RESEND_API_KEY to service config (via pydantic BaseSettings)
         - If RESEND_API_KEY is empty or not set → use StubEmailClient
         - If RESEND_API_KEY is set → use ResendEmailClient

      3. Integration into notification service:
         - Wire EmailClient into the service layer via dependency injection
         - When a notification is created with type that warrants email delivery
           (e.g., enrollment_confirmation, review_received, payout_processed),
           also send email via EmailClient
         - Notification service.create_notification() should check notification type
           and call email_client.send() for email-worthy types
         - Email delivery is fire-and-forget (don't fail the notification creation if email fails)

      4. Tests:
         - test_email_adapter.py:
           - Test StubEmailClient.send returns True and logs
           - Test ResendEmailClient.send with mocked httpx (mock 200 response → True)
           - Test ResendEmailClient.send with mocked httpx (mock 500 response → False)
           - Test ResendEmailClient.send with network error → False
         - test_notification_service_email.py:
           - Test that creating an enrollment_confirmation notification triggers email send
           - Test that email failure doesn't prevent notification creation
           - Use AsyncMock(spec=EmailClient) for mocking

      IMPLEMENTATION APPROACH:
      1. Write failing tests (TDD Red)
      2. Create email adapter with ABC + two implementations
      3. Add config for RESEND_API_KEY
      4. Wire into notification service
      5. All tests green (TDD Green)
      6. Refactor

      RULES:
      - TDD: tests first
      - Clean Architecture: adapter is in app/adapters/, service uses abstract EmailClient
      - httpx for HTTP calls (no requests library)
      - Graceful failure: email errors are logged, never bubble up to API response
      - No new dependencies beyond httpx (should already be available)
      - StubEmailClient is the default (safe for development)
      - All tests must pass: cd services/py/notification && uv run --package notification pytest tests/ -v

      COMMIT: feat(notification): add email delivery via Resend API
    test: "cd /mnt/c/Users/aquam/PetProject/Merket_for_10_M_uesr/services/py/notification && uv run --package notification pytest tests/ -v"

