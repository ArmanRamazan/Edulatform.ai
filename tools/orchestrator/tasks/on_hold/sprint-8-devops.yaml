  - id: db-backup
    title: "Database backup and restore scripts"
    scope: infra
    prompt: |
      Task: Create database backup and restore shell scripts for all 6 PostgreSQL databases.

      CONTEXT:
      - 6 PostgreSQL databases: identity-db(:5433), course-db(:5434), enrollment-db(:5435),
        payment-db(:5436), notification-db(:5437), learning-db(:5438)
      - Docker Compose runs all databases as containers
      - Each DB container name follows pattern: <name>-db (e.g., identity-db, course-db)
      - pg_dump and pg_restore are available inside the PostgreSQL containers
      - Default DB user: postgres, default DB name: <service>_db (e.g., identity_db)

      WHAT TO BUILD:
      1. Create tools/backup/backup.sh:
         - Usage: ./backup.sh [--db <name>] [--all] [--output-dir <path>]
         - --all (default): backup all 6 databases
         - --db <name>: backup single database (identity, course, enrollment, payment, notification, learning)
         - --output-dir: directory for backups (default: ./backups/$(date +%Y%m%d_%H%M%S))
         - For each DB:
           - Run pg_dump via docker exec: docker exec <name>-db pg_dump -U postgres -Fc <name>_db
           - Output to: <output-dir>/<name>_db.dump.gz (pipe through gzip)
         - Print summary: database name, file size, timestamp
         - Exit 1 on any failure

      2. Create tools/backup/restore.sh:
         - Usage: ./restore.sh [--db <name>] [--all] [--input-dir <path>]
         - --all (default): restore all 6 databases
         - --db <name>: restore single database
         - --input-dir: directory containing backup files (required)
         - For each DB:
           - Drop and recreate the database: docker exec <name>-db dropdb -U postgres --if-exists <name>_db && createdb
           - Restore: gunzip and pipe to pg_restore via docker exec
         - Confirmation prompt before restore (--yes flag to skip)
         - Print summary

      3. Make both scripts executable (chmod +x)

      IMPLEMENTATION APPROACH:
      1. Create tools/backup/ directory
      2. Write backup.sh with argument parsing, loop over databases
      3. Write restore.sh with argument parsing, confirmation, loop
      4. Test syntax with bash -n

      RULES:
      - Bash scripts, POSIX-compatible where possible
      - set -euo pipefail at the top
      - Proper argument parsing with getopts or manual parsing
      - Error handling: check if docker container is running before exec
      - Gzip compression for all dumps
      - Timestamp in default output directory name
      - No hardcoded passwords (use PGPASSWORD env var or .pgpass)
      - Scripts must be syntax-valid: bash -n <script>

      COMMIT: chore(infra): add database backup and restore scripts
    test: "bash -n /mnt/c/Users/aquam/PetProject/Merket_for_10_M_uesr/tools/backup/backup.sh && bash -n /mnt/c/Users/aquam/PetProject/Merket_for_10_M_uesr/tools/backup/restore.sh && echo 'Scripts valid'"

