phase: "sprint-8"
description: "DevOps & Reliability — CI/CD, staging, logging, backups, email delivery"

tasks:
  # ──────────────────────────────────────────────
  # INFRA: GITHUB ACTIONS CI
  # ──────────────────────────────────────────────

  - id: github-ci
    title: "GitHub Actions CI: lint, test, build for all services"
    scope: infra
    prompt: |
      Task: Create a GitHub Actions CI workflow that lints, tests, and builds all services on every push and PR.

      CONTEXT:
      - Monorepo at root with: services/py/ (7 Python services), apps/ (2 Next.js apps)
      - Python: uv package manager, ruff for linting/formatting, pytest for tests
      - Frontend: pnpm package manager, Next.js build
      - Python services: identity, course, enrollment, payment, notification, ai, learning
      - Frontend apps: buyer, seller
      - uv workspace defined in root pyproject.toml
      - pnpm workspace defined in root pnpm-workspace.yaml
      - Each Python service runs tests with: cd services/py/<name> && uv run --package <name> pytest tests/ -v
      - Each frontend app builds with: cd apps/<name> && pnpm build
      - No CI exists yet

      WHAT TO BUILD:
      1. Create .github/workflows/ci.yml:

         Triggers: push to main, pull_request to main

         Job 1 — python-lint:
         - runs-on: ubuntu-latest
         - Steps: checkout, install uv, uv sync --all-packages, ruff check ., ruff format --check .
         - Working directory: root

         Job 2 — python-test:
         - runs-on: ubuntu-latest
         - Strategy matrix: service [identity, course, enrollment, payment, notification, ai, learning]
         - Steps:
           a) Checkout
           b) Set up Python 3.12 (actions/setup-python@v5)
           c) Install uv (astral-sh/setup-uv@v4)
           d) Install dependencies: uv sync --all-packages
           e) Run tests: cd services/py/${{ matrix.service }} && uv run --package ${{ matrix.service }} pytest tests/ -v
         - Each service runs in parallel via matrix

         Job 3 — frontend-build:
         - runs-on: ubuntu-latest
         - Strategy matrix: app [buyer, seller]
         - Steps:
           a) Checkout
           b) Set up Node.js 20 (actions/setup-node@v4)
           c) Install pnpm (pnpm/action-setup@v4, version 9)
           d) Install dependencies: pnpm install --frozen-lockfile
           e) Build: cd apps/${{ matrix.app }} && pnpm build

         Caching:
         - Cache uv: ~/.cache/uv (key: uv-${{ hashFiles('uv.lock') }})
         - Cache pnpm: use pnpm/action-setup built-in caching or actions/cache

      IMPLEMENTATION APPROACH:
      1. Create .github/workflows/ directory
      2. Write ci.yml with all three jobs
      3. Use proper action versions (latest stable)
      4. Ensure matrix strategy runs services in parallel

      RULES:
      - Use official actions: actions/checkout@v4, actions/setup-python@v5, actions/setup-node@v4
      - Use astral-sh/setup-uv@v4 for uv installation
      - Use pnpm/action-setup@v4 for pnpm
      - Cache dependencies to speed up runs
      - Each job is independent (lint, test, build run in parallel)
      - Matrix strategy for per-service/per-app parallelism
      - Fail fast: if one matrix entry fails, cancel others (default behavior)
      - No secrets needed for CI (tests use mocks, not real DBs)

      COMMIT: chore(infra): add GitHub Actions CI for lint, test, and build
    test: "cat /mnt/c/Users/aquam/PetProject/Merket_for_10_M_uesr/.github/workflows/ci.yml && echo 'CI file created'"

  # ──────────────────────────────────────────────
  # INFRA: GITHUB ACTIONS CD
  # ──────────────────────────────────────────────

  - id: github-cd
    title: "GitHub Actions CD: Docker build and push to registry"
    scope: infra
    depends_on:
      - github-ci
    prompt: |
      Task: Create a GitHub Actions CD workflow that builds and pushes Docker images on merge to main.

      CONTEXT:
      - Monorepo with Dockerfiles in deploy/docker/ for services
      - Check deploy/docker/ for existing Dockerfile naming convention
      - Services: identity, course, enrollment, payment, notification, ai, learning, buyer, seller
      - GitHub Container Registry (ghcr.io) for image hosting
      - CI workflow already exists (.github/workflows/ci.yml)

      WHAT TO BUILD:
      1. Create .github/workflows/cd.yml:

         Triggers: push to main (only after CI completes — use workflow_run or needs)

         Alternatively, simpler approach: trigger on push to main, but each build job needs CI.

         Job: build-and-push
         - runs-on: ubuntu-latest
         - Strategy matrix with all services that have Dockerfiles
         - Steps:
           a) Checkout
           b) Log in to GHCR: docker/login-action@v3 with github.token
           c) Set up Docker Buildx: docker/setup-buildx-action@v3
           d) Build and push: docker/build-push-action@v5
              - context: . (root, since Dockerfiles may reference root files)
              - file: deploy/docker/Dockerfile.${{ matrix.service }} (or however Dockerfiles are named)
              - push: true
              - tags: ghcr.io/${{ github.repository }}/${{ matrix.service }}:${{ github.sha }}, ghcr.io/${{ github.repository }}/${{ matrix.service }}:latest
              - cache-from: type=gha
              - cache-to: type=gha,mode=max

         First, check deploy/docker/ to understand the Dockerfile naming convention and adjust accordingly.

      IMPLEMENTATION APPROACH:
      1. Check deploy/docker/ directory structure
      2. Create .github/workflows/cd.yml
      3. Use Docker layer caching via GitHub Actions cache
      4. Tag images with both SHA and latest

      RULES:
      - Use official Docker actions: docker/login-action@v3, docker/setup-buildx-action@v3, docker/build-push-action@v5
      - Use GITHUB_TOKEN for GHCR auth (no additional secrets needed)
      - Tag with commit SHA for traceability and :latest for convenience
      - Use GitHub Actions cache for Docker layers
      - Only push on main branch (not on PRs)
      - Matrix strategy for parallel builds

      COMMIT: chore(infra): add GitHub Actions CD for Docker build and push
    test: "cat /mnt/c/Users/aquam/PetProject/Merket_for_10_M_uesr/.github/workflows/cd.yml && echo 'CD file created'"

  # ──────────────────────────────────────────────
