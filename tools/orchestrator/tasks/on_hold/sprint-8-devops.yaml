  - id: email-templates
    title: "HTML email templates for all notification types"
    scope: backend:notification
    depends_on:
      - email-delivery
    prompt: |
      Task: Create HTML email templates for all notification types as Python string templates.

      CONTEXT:
      - Notification service: services/py/notification/ (FastAPI, Clean Architecture)
      - Email delivery adapter already exists (app/adapters/email.py)
      - No Jinja2 dependency — use Python str.format() or f-strings
      - Notification types used in the system: welcome, email_verification, password_reset,
        enrollment_confirmation, course_completion, review_received, payout_processed

      WHAT TO BUILD:
      TDD — write tests first, then implement.

      1. Create app/templates/ directory with:
         - base.py: base_template(content: str, unsubscribe_url: str = "#") -> str
           - Returns full HTML email with:
             - DOCTYPE html, UTF-8 charset
             - Inline CSS (email clients don't support <style> well)
             - Header: EduPlatform logo text (blue, centered)
             - Content area: {content} placeholder
             - Footer: "Вы получили это письмо, потому что зарегистрированы на EduPlatform"
             - Unsubscribe link: "Отписаться от рассылки"
           - Max width 600px, centered, white background, clean typography

         - welcome.py: welcome_email(user_name: str) -> tuple[str, str]
           Returns (subject, html_body)
           Subject: "Добро пожаловать в EduPlatform!"
           Body: greeting, 3 key features, CTA button "Начать обучение"

         - email_verification.py: verification_email(user_name: str, verify_url: str) -> tuple[str, str]
           Subject: "Подтвердите email"
           Body: greeting, explanation, CTA button "Подтвердить email", link expiry note

         - password_reset.py: password_reset_email(user_name: str, reset_url: str) -> tuple[str, str]
           Subject: "Сброс пароля"
           Body: greeting, explanation, CTA button "Сбросить пароль", "Не запрашивали?" note

         - enrollment_confirmation.py: enrollment_email(user_name: str, course_title: str, course_url: str) -> tuple[str, str]
           Subject: "Вы записаны на курс: {course_title}"
           Body: greeting, course name, CTA button "Перейти к курсу"

         - course_completion.py: completion_email(user_name: str, course_title: str) -> tuple[str, str]
           Subject: "Поздравляем! Курс завершён"
           Body: congratulations, course name, next steps suggestion

         - review_received.py: review_email(teacher_name: str, course_title: str, rating: int, review_text: str) -> tuple[str, str]
           Subject: "Новый отзыв на курс: {course_title}"
           Body: greeting, rating stars, review text preview

         - payout_processed.py: payout_email(teacher_name: str, amount: float, currency: str = "RUB") -> tuple[str, str]
           Subject: "Выплата обработана"
           Body: greeting, amount, expected delivery time

      2. Create app/templates/__init__.py:
         - Import all template functions for easy access
         - get_email_template(notification_type: str, **kwargs) -> tuple[str, str] | None
           - Maps notification type string to template function
           - Returns None for unknown types

      3. Integrate with notification service:
         - When sending email, use get_email_template() to get subject and html_body
         - Pass to email_client.send(to, subject, html_body)

      4. Tests:
         - test_email_templates.py:
           - Test each template returns valid (subject, html_body) tuple
           - Test html_body contains expected content (user_name, course_title, etc.)
           - Test base template wraps content with header/footer
           - Test get_email_template returns correct template for each type
           - Test get_email_template returns None for unknown type

      IMPLEMENTATION APPROACH:
      1. Write tests first (TDD Red)
      2. Create base template
      3. Create individual templates
      4. Create __init__.py with registry
      5. Integrate with email sending
      6. All tests green (TDD Green)

      RULES:
      - TDD: tests first
      - NO Jinja2 — use Python str.format() for variable substitution
      - Inline CSS only (email client compatibility)
      - All text in Russian
      - Templates return (subject, html_body) tuple
      - HTML must be valid and render in email clients
      - CTA buttons: inline-block, padding, background-color, border-radius, color white
      - No images — text and CSS only
      - All tests must pass: cd services/py/notification && uv run --package notification pytest tests/ -v

      COMMIT: feat(notification): add HTML email templates for all notification types
    test: "cd /mnt/c/Users/aquam/PetProject/Merket_for_10_M_uesr/services/py/notification && uv run --package notification pytest tests/ -v"

  # ──────────────────────────────────────────────
