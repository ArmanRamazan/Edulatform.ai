  # ─── BACKEND: Course — Transcription ───────────────────────────────────────────

  - id: video-auto-transcription
    title: "Auto-generate subtitles/transcript from video via Whisper API"
    scope: backend:course
    prompt: |
      Task: Auto-generate subtitles and searchable transcripts from uploaded videos using an external speech-to-text API.

      CONTEXT:
      - Course service: services/py/course/ (FastAPI, asyncpg, Clean Architecture)
      - Video entity with transcript_url field, VideoRepository with update_video_transcript()
      - VideoStoragePort for uploading VTT files to S3
      - TranscodeService runs after video upload — transcription should run after/alongside transcode
      - ffmpeg available for audio extraction
      - Config via pydantic BaseSettings + env vars

      WHAT TO BUILD:

      1. Config: add to app/config.py
         TRANSCRIPTION_API_URL: str = ""  # e.g., OpenAI Whisper API or Google Speech-to-Text
         TRANSCRIPTION_API_KEY: str = ""
         TRANSCRIPTION_ENABLED: bool = False  # disabled by default until API key configured

      2. Domain: app/domain/transcription.py
         @dataclass(frozen=True)
         class TranscriptSegment:
             start_seconds: float
             end_seconds: float
             text: str

         @dataclass(frozen=True)
         class Transcript:
             video_id: UUID
             language: str
             segments: list[TranscriptSegment]

      3. Port: app/domain/transcription.py
         class TranscriptionPort(ABC):
             @abstractmethod
             async def transcribe(self, audio_data: bytes, language: str = "auto") -> Transcript:
                 """Send audio to transcription service, return timed segments."""
                 ...

      4. Adapter: app/repositories/whisper_transcription.py
         WhisperTranscriptionAdapter(TranscriptionPort):
         - Uses httpx to call transcription API (OpenAI-compatible Whisper endpoint)
         - POST /v1/audio/transcriptions with multipart audio file
         - Parses response into TranscriptSegment list
         - Handles rate limits, retries (max 3), timeouts (5 min per request)

      5. Service: app/services/transcription_service.py
         TranscriptionService(video_repo, video_storage, transcription_adapter):
         - async generate_transcript(video_id: UUID) -> str | None
           1. Check TRANSCRIPTION_ENABLED — skip if false
           2. Get video from DB
           3. Download video from S3 to temp file
           4. Extract audio via ffmpeg: ffmpeg -i input.mp4 -vn -acodec pcm_s16le -ar 16000 -ac 1 audio.wav
           5. Call transcription_adapter.transcribe(audio_bytes)
           6. Convert TranscriptSegment list to WebVTT format:
              WEBVTT

              00:00:01.000 --> 00:00:04.500
              Hello and welcome to this lesson.

              00:00:05.000 --> 00:00:08.200
              Today we'll learn about...
           7. Upload VTT file to S3: videos/{teacher_id}/{uuid}/subtitles.vtt
           8. Update video.transcript_url with S3 key
           9. Return S3 key
           On error: log warning, return None (non-critical)

         - _to_vtt(segments: list[TranscriptSegment]) -> str
           Pure function: convert segments to WebVTT string format.
           Format timestamps as HH:MM:SS.mmm

         - async get_transcript_url(video_id: UUID) -> str | None
           Get video, generate presigned URL for transcript VTT.

      6. Integration with transcode pipeline:
         In TranscodeService.transcode(), after successful transcode, if TRANSCRIPTION_ENABLED:
         await transcription_service.generate_transcript(video_id)

      7. Route addition: in routes/videos.py
         GET /videos/{video_id}/transcript → presigned URL to VTT file (or 404 if no transcript)

      IMPLEMENTATION APPROACH:
      TDD — write failing tests FIRST in tests/test_transcription.py:
      1. test_generate_transcript_success — mock API, verify VTT upload to S3
      2. test_generate_transcript_disabled — TRANSCRIPTION_ENABLED=False → skip, return None
      3. test_transcription_api_failure — returns None, no crash
      4. test_to_vtt_format — pure function test, verify WebVTT format
      5. test_to_vtt_timestamps — verify HH:MM:SS.mmm formatting
      6. test_to_vtt_empty_segments — empty list → minimal valid VTT
      7. test_generate_transcript_extracts_audio — verify ffmpeg called with correct args
      8. test_get_transcript_url — returns presigned URL
      9. test_get_transcript_url_no_transcript — returns None

      Focus on _to_vtt() as a pure function — easiest to test thoroughly.
      Mock httpx for API calls, mock subprocess for ffmpeg.

      RULES:
      - TranscriptionPort in domain layer — no framework imports
      - Implementation in repositories layer (external dependency)
      - VTT format must be valid WebVTT (starts with WEBVTT header)
      - Timestamps in HH:MM:SS.mmm format
      - Non-critical: failure doesn't crash the pipeline
      - Feature flag: TRANSCRIPTION_ENABLED (default false)
      - Audio extraction: 16kHz mono WAV (optimal for speech-to-text)
      - Max audio duration: skip if video > 4 hours (API limits)
      - Clean up temp files in finally block
      - Type hints, async I/O

      COMMIT:
      feat(course): add automatic video transcription with WebVTT output
