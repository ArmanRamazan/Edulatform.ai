      WHAT TO BUILD:

      1. Install hls.js: pnpm add hls.js (in apps/buyer/)

      2. Component: apps/buyer/components/VideoPlayer.tsx ("use client")
         Props interface:
         interface VideoPlayerProps {
           src: string;              // HLS manifest URL (.m3u8)
           poster?: string;          // Thumbnail URL
           onProgress?: (currentSecond: number, totalSeconds: number) => void;
           onComplete?: () => void;  // Fires when >= 90% watched
           initialPosition?: number; // Resume position in seconds
           className?: string;
         }

         Features:
         a) HLS.js integration:
            - Initialize Hls instance, attach to <video> element
            - Fallback: if browser supports HLS natively (Safari), use <video src> directly
            - Clean up Hls instance on unmount

         b) Custom controls overlay (Tailwind styled):
            - Play/Pause button (large center overlay + bottom bar)
            - Progress bar: clickable/draggable seek bar, shows buffered ranges
            - Time display: current / total (formatted as mm:ss or hh:mm:ss)
            - Volume slider with mute toggle
            - Quality selector dropdown: Auto, 480p, 720p, 1080p
              (reads available levels from hls.levels, sets hls.currentLevel)
            - Playback speed selector: 0.5x, 0.75x, 1x, 1.25x, 1.5x, 2x
            - Fullscreen toggle button
            - Controls auto-hide after 3s of inactivity, show on mouse move

         c) Keyboard shortcuts (when player is focused):
            - Space / K = toggle play/pause
            - F = toggle fullscreen
            - Left arrow = skip back 10s
            - Right arrow = skip forward 10s
            - Up arrow = volume up 10%
            - Down arrow = volume down 10%
            - M = toggle mute
            - < / > = decrease/increase playback speed

         d) Progress tracking:
            - Call onProgress callback every 5 seconds during playback
            - If initialPosition provided, seek to it on load
            - Call onComplete when currentTime / duration >= 0.9

      3. Hook: apps/buyer/hooks/use-video-progress.ts
         useVideoProgress(videoId: string, lessonId: string, courseId: string)
         - Calls POST /progress/videos/{videoId} every 30 seconds with debounce
         - Returns { currentSecond, completed } from GET on mount
         - Provides onProgress and onComplete callbacks for VideoPlayer

      IMPLEMENTATION APPROACH:
