      2. Add custom controls UI with Tailwind
      3. Implement keyboard shortcuts
      4. Add quality and speed selectors
      5. Create use-video-progress hook
      6. Test: pnpm build must pass

      RULES:
      - "use client" directive required (hooks, event handlers, browser APIs)
      - Named export only: export function VideoPlayer(...)
      - Props via interface, not type
      - Tailwind CSS only — no CSS modules
      - Radix UI for dropdown menus (quality, speed selectors)
      - Responsive: works on mobile and desktop
      - Accessibility: keyboard navigation, aria labels on controls
      - Clean up HLS instance and event listeners on unmount
      - No <img> tags — use next/image if showing poster
      - Handle edge cases: source not ready, network error, format not supported

