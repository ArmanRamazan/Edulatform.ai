  # ─── BACKEND: Enrollment — Video Progress ──────────────────────────────────────

  - id: video-progress-tracking
    title: "Track video watch progress per student with auto-completion"
    scope: backend:enrollment
    prompt: |
      Task: Track video watch progress for enrolled students. Auto-mark lesson as completed when video watched >= 90%.

      CONTEXT:
      - Enrollment service: services/py/enrollment/ (FastAPI, asyncpg, Clean Architecture)
      - enrollment-db on port 5435, migrations in services/py/enrollment/migrations/ (currently 001-004)
      - Existing tables: enrollments (id, user_id, course_id, status, completed_lessons, total_lessons),
        lesson_progress (id, enrollment_id, lesson_id, completed, completed_at)
      - Existing ProgressService in app/services/ handles lesson completion
      - Existing ProgressRepository in app/repositories/progress_repo.py
      - JWT auth: user_id from token, role = student
      - Enrollment check: student must be enrolled in the course to track progress

      WHAT TO BUILD:

      1. Migration: migrations/005_video_progress.sql
         CREATE TABLE IF NOT EXISTS video_progress (
           id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
           user_id UUID NOT NULL,
           video_id UUID NOT NULL,
           lesson_id UUID NOT NULL,
           enrollment_id UUID NOT NULL REFERENCES enrollments(id) ON DELETE CASCADE,
           current_second INT NOT NULL DEFAULT 0,
           total_seconds INT NOT NULL,
           completed BOOLEAN NOT NULL DEFAULT false,
           updated_at TIMESTAMPTZ NOT NULL DEFAULT now(),
           UNIQUE(user_id, video_id)
         );
         CREATE INDEX idx_vp_user ON video_progress(user_id);
         CREATE INDEX idx_vp_enrollment ON video_progress(enrollment_id);

      2. Domain entity: app/domain/video_progress.py
         @dataclass(frozen=True)
         class VideoProgress:
             id: UUID
             user_id: UUID
             video_id: UUID
             lesson_id: UUID
             enrollment_id: UUID
             current_second: int
             total_seconds: int
             completed: bool
             updated_at: datetime

      3. Repository: app/repositories/video_progress_repo.py
         VideoProgressRepository(pool):
         - upsert_progress(user_id, video_id, lesson_id, enrollment_id, current_second, total_seconds) -> VideoProgress
           INSERT ... ON CONFLICT (user_id, video_id)
           DO UPDATE SET current_second = GREATEST(current_second, $val), total_seconds = $val, updated_at = now()
           (never go backwards — only update if current_second is higher)
         - get_progress(user_id, video_id) -> VideoProgress | None
         - get_progress_for_enrollment(enrollment_id) -> list[VideoProgress]
         - mark_completed(user_id, video_id) -> VideoProgress | None

      4. Service: app/services/video_progress_service.py
         VideoProgressService(video_progress_repo, progress_repo, enrollment_repo):
         - update_progress(user_id, video_id, lesson_id, course_id, current_second, total_seconds) -> VideoProgress
           1. Verify enrollment exists for user + course
           2. Upsert video progress
           3. Check if current_second / total_seconds >= 0.9
           4. If >= 90% and not already completed:
              - Mark video progress as completed
              - Mark lesson as completed in lesson_progress (reuse existing progress service logic)
           5. Return video progress
         - get_progress(user_id, video_id) -> VideoProgress | None
         - get_enrollment_video_progress(user_id, course_id) -> list[VideoProgress]

      5. Routes: app/routes/video_progress.py
         - POST /progress/videos/{video_id} { lesson_id, course_id, current_second, total_seconds } → 200
           (student, must be enrolled)
         - GET /progress/videos/{video_id} → VideoProgress | 404
         - GET /progress/videos/course/{course_id} → list[VideoProgress]
