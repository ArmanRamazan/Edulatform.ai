  # ─── BACKEND: Course — Storage & Upload ────────────────────────────────────────

  - id: video-storage-adapter
    title: "S3-compatible video storage adapter (MinIO/S3)"
    scope: backend:course
    prompt: |
      Task: Build an S3-compatible storage adapter for the Course service — abstraction for file upload/download/delete with MinIO (dev) and AWS S3 (prod).

      CONTEXT:
      - Course service: services/py/course/ (FastAPI, asyncpg, Clean Architecture)
      - Config via pydantic BaseSettings + env vars in app/config.py
      - Common lib at libs/py/common/ (config, errors, security, database, health)
      - Existing adapters pattern: services use dependency injection via FastAPI Depends()
      - Global service instance via lifespan + getter function pattern in app/main.py
      - The adapter lives in the adapters/ layer (like repositories — infrastructure concern)

      WHAT TO BUILD:

      1. Abstract interface: app/domain/video_storage.py
         from abc import ABC, abstractmethod

         class VideoStoragePort(ABC):
             @abstractmethod
             async def upload_file(self, key: str, data: bytes, content_type: str) -> str:
                 """Upload file to storage. Returns the S3 key."""
                 ...
             @abstractmethod
             async def get_presigned_url(self, key: str, expires_in: int = 3600) -> str:
                 """Generate a presigned URL for downloading a file."""
                 ...
             @abstractmethod
             async def delete_file(self, key: str) -> bool:
                 """Delete a file from storage. Returns True if deleted."""
                 ...
             @abstractmethod
             async def upload_file_stream(self, key: str, stream, content_type: str, size: int) -> str:
                 """Upload file from stream (for large files). Returns the S3 key."""
                 ...

      2. S3 implementation: app/repositories/s3_storage.py
         S3VideoStorage(VideoStoragePort):
         - Uses httpx for S3-compatible API calls (no boto3 dependency — keep it minimal)
         - Implements AWS Signature V4 for request signing
         - Methods:
           upload_file() — PUT object
           get_presigned_url() — generate signed URL with expiry
           delete_file() — DELETE object
           upload_file_stream() — PUT with chunked transfer for large files
         - Constructor takes: endpoint, access_key, secret_key, bucket, region

      3. Config: add to app/config.py
         S3_ENDPOINT: str = "http://localhost:9000"  # MinIO default
         S3_ACCESS_KEY: str = "minioadmin"
         S3_SECRET_KEY: str = "minioadmin"
         S3_BUCKET: str = "course-videos"
         S3_REGION: str = "us-east-1"

      4. Integration in app/main.py lifespan:
         Create S3VideoStorage instance, store on app.state
         Add get_video_storage() getter function

      IMPLEMENTATION APPROACH:
      TDD — write failing tests FIRST in tests/test_video_storage.py:
      1. test_upload_file — mocks httpx, verifies PUT request with correct key and content type
      2. test_get_presigned_url — verifies URL contains signature and expiry params
      3. test_delete_file — mocks httpx DELETE, verifies correct key
      4. test_upload_file_stream — mocks httpx, verifies chunked upload
      5. test_upload_file_httpx_error — verifies error handling on network failure

      Use AsyncMock to mock httpx.AsyncClient. Do NOT call real S3.
      Then implement. Then refactor.

      RULES:
      - Domain interface (VideoStoragePort) in app/domain/ — no framework imports
      - Implementation in app/repositories/ (infrastructure layer)
      - Use httpx (already a project dependency) — do NOT add boto3
      - AWS Signature V4 signing: implement minimal version or use a lightweight helper
      - All methods async
      - Type hints on all public functions
      - Error handling: raise appropriate errors from common lib on failure
      - Config via pydantic BaseSettings
      - No global variables — dependency injection only

      COMMIT:
      feat(course): add S3-compatible video storage adapter
    test: "cd /mnt/c/Users/aquam/PetProject/Merket_for_10_M_uesr/services/py/course && uv run --package course pytest tests/ -v"
    depends_on: []

  - id: video-upload-endpoint
    title: "Video upload endpoint with DB record and S3 storage"
    scope: backend:course
    prompt: |
      Task: Build the video upload endpoint — teachers upload video files, stored in S3 with metadata in the database.

      CONTEXT:
      - Course service: services/py/course/ (FastAPI, asyncpg, Clean Architecture)
      - course-db on port 5434, migrations in services/py/course/migrations/ (currently 001-007)
      - VideoStoragePort interface in app/domain/video_storage.py (from video-storage-adapter task)
      - S3VideoStorage implementation in app/repositories/s3_storage.py
      - get_video_storage() getter in app/main.py
      - JWT auth with role (student/teacher/admin) and is_verified
      - Teacher ownership check pattern: service verifies teacher_id from JWT
      - Clean Architecture: routes → services → domain ← repositories
      - asyncpg.UniqueViolationError → ConflictError pattern

      WHAT TO BUILD:

      1. Migration: migrations/008_videos.sql
         CREATE TABLE IF NOT EXISTS videos (
           id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
           teacher_id UUID NOT NULL,
           filename VARCHAR(500) NOT NULL,
           original_filename VARCHAR(500) NOT NULL,
           s3_key VARCHAR(1000) NOT NULL UNIQUE,
           status VARCHAR(20) NOT NULL DEFAULT 'uploaded'
             CHECK (status IN ('uploaded', 'processing', 'ready', 'failed')),
           duration_seconds INT,
           size_bytes BIGINT NOT NULL,
           mime_type VARCHAR(100) NOT NULL,
           width INT,
           height INT,
           thumbnail_url TEXT,
           transcript_url TEXT,
           hls_manifest_key VARCHAR(1000),
           created_at TIMESTAMPTZ NOT NULL DEFAULT now(),
           updated_at TIMESTAMPTZ NOT NULL DEFAULT now()
         );
         CREATE INDEX idx_videos_teacher ON videos(teacher_id);
         CREATE INDEX idx_videos_status ON videos(status);

      2. Domain entity: app/domain/video.py
         @dataclass(frozen=True)
         class Video:
             id: UUID
             teacher_id: UUID
             filename: str
             original_filename: str
             s3_key: str
             status: str  # uploaded | processing | ready | failed
             duration_seconds: int | None
             size_bytes: int
             mime_type: str
             width: int | None
             height: int | None
             thumbnail_url: str | None
             transcript_url: str | None
             hls_manifest_key: str | None
             created_at: datetime
             updated_at: datetime

      3. Repository: app/repositories/video_repo.py
         VideoRepository(pool):
         - create_video(teacher_id, filename, original_filename, s3_key, size_bytes, mime_type) -> Video
         - get_video(video_id) -> Video | None
         - get_videos_by_teacher(teacher_id, limit=20, offset=0) -> list[Video]
         - update_video_status(video_id, status) -> Video | None
         - update_video_metadata(video_id, duration_seconds, width, height) -> Video | None
         - update_video_thumbnail(video_id, thumbnail_url) -> Video | None
         - update_video_transcript(video_id, transcript_url) -> Video | None
         - update_video_hls(video_id, hls_manifest_key) -> Video | None
         - delete_video(video_id) -> bool

      4. Service: app/services/video_service.py
         VideoService(video_repo, video_storage):
         - upload_video(teacher_id, file: UploadFile) -> dict
           Validates: teacher is verified, file is video (mime_type starts with video/),
           file size <= 2GB. Generates S3 key: videos/{teacher_id}/{uuid}/{original_filename}.
           Uploads to S3 via storage adapter. Creates DB record with status=uploaded.
           Returns: { video: Video, playback_url: presigned_url }
         - get_video(video_id, teacher_id=None) -> dict
           If teacher_id provided, verifies ownership. Returns video + presigned URL.
         - list_teacher_videos(teacher_id, limit, offset) -> list[dict]
           Each with presigned playback URL.
         - delete_video(teacher_id, video_id) -> None
           Owner check. Deletes from S3 + DB.

      5. Routes: app/routes/videos.py
         - POST /videos/upload (multipart/form-data, teacher, verified) -> 201 { video, playback_url }
         - GET /videos/{video_id} (teacher, owner) -> { video, playback_url }
         - GET /videos/me (teacher) -> paginated list
         - DELETE /videos/{video_id} (teacher, owner) -> 204
         Register router in app/main.py

      IMPLEMENTATION APPROACH:
      TDD — write failing tests FIRST in tests/test_videos.py:
      1. test_upload_video_success — teacher uploads, gets video record + URL
      2. test_upload_video_not_teacher → 403
      3. test_upload_video_not_verified → 403
      4. test_upload_video_invalid_mime → 400 (not a video file)
      5. test_upload_video_too_large → 400 (>2GB)
      6. test_get_video_owner → success
      7. test_get_video_not_owner → 403
      8. test_list_teacher_videos → paginated list
      9. test_delete_video_owner → 204
      10. test_delete_video_not_owner → 403

      Mock VideoStoragePort and VideoRepository with AsyncMock(spec=...).

      RULES:
      - Domain: no framework imports
      - Parameterized SQL ($1, $2, ...)
      - Owner check: video.teacher_id == JWT teacher_id
      - Teacher must be verified (is_verified=true)
      - Max file size: 2GB (2 * 1024 * 1024 * 1024 bytes)
      - Allowed mime types: video/mp4, video/webm, video/quicktime, video/x-msvideo
      - S3 key format: videos/{teacher_id}/{uuid}/{filename}
      - Async I/O, type hints
      - Independent tests

      COMMIT:
      feat(course): add video upload endpoint with S3 storage
    test: "cd /mnt/c/Users/aquam/PetProject/Merket_for_10_M_uesr/services/py/course && uv run --package course pytest tests/ -v"
