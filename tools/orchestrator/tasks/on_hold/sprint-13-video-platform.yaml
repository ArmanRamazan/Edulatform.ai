  - id: video-player-component
    title: "HLS video player with quality selector and keyboard shortcuts"
    scope: frontend:buyer
    prompt: |
      Task: Build a reusable VideoPlayer component using HLS.js for adaptive bitrate streaming.

      CONTEXT:
      - Buyer app: apps/buyer/ (Next.js App Router, TypeScript, Tailwind CSS)
