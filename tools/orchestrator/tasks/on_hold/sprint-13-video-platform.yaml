  # ─── BACKEND: Course — Transcoding & Thumbnails ────────────────────────────────

  - id: video-transcode-worker
    title: "Background video transcoding to HLS (480p/720p/1080p)"
    scope: backend:course
    prompt: |
      Task: Build a background video transcoding service that converts uploaded videos to HLS format with multiple quality levels.

      CONTEXT:
      - Course service: services/py/course/ (FastAPI, asyncpg, Clean Architecture)
      - Video entity in app/domain/video.py with status: uploaded → processing → ready | failed
      - VideoRepository in app/repositories/video_repo.py with update_video_status(), update_video_hls(), update_video_metadata()
      - VideoStoragePort in app/domain/video_storage.py for uploading HLS files to S3
      - Videos are uploaded to S3 with s3_key: videos/{teacher_id}/{uuid}/{filename}
      - ffmpeg is assumed to be available in the Docker container (add to Dockerfile later in infra task)
      - The worker runs as a background task triggered after video upload

      WHAT TO BUILD:

      1. Domain value objects: add to app/domain/video.py
         @dataclass(frozen=True)
         class TranscodeProfile:
             name: str       # "480p", "720p", "1080p"
             width: int      # 854, 1280, 1920
             height: int     # 480, 720, 1080
             bitrate: str    # "1000k", "2500k", "5000k"
             audio_bitrate: str  # "128k"

         TRANSCODE_PROFILES = [
             TranscodeProfile("480p", 854, 480, "1000k", "128k"),
             TranscodeProfile("720p", 1280, 720, "2500k", "128k"),
             TranscodeProfile("1080p", 1920, 1080, "5000k", "192k"),
         ]

      2. Service: app/services/transcode_service.py
         TranscodeService(video_repo, video_storage):
         - async transcode(video_id: UUID) -> None
           1. Get video from DB, verify status == "uploaded"
           2. Update status to "processing"
           3. Download original video from S3 to temp directory
           4. Probe video with ffprobe: get duration, width, height
           5. Update video metadata (duration_seconds, width, height)
           6. For each TranscodeProfile where profile.height <= original height:
              Run ffmpeg to create HLS segments:
              ffmpeg -i input.mp4 -vf scale={width}:{height} -c:v libx264 -b:v {bitrate}
                     -c:a aac -b:a {audio_bitrate} -hls_time 10 -hls_list_size 0
                     -hls_segment_filename '{output_dir}/{name}_%03d.ts' {output_dir}/{name}.m3u8
           7. Create master playlist (.m3u8) referencing all quality levels
           8. Upload all HLS files (master + per-quality playlists + .ts segments) to S3
              Key: videos/{teacher_id}/{uuid}/hls/master.m3u8
           9. Update video: hls_manifest_key, status = "ready"
           10. Clean up temp files
           On any error: set status = "failed", log error, clean up temp

         - _run_ffmpeg(args: list[str]) -> tuple[int, str, str]
           Runs ffmpeg via asyncio.create_subprocess_exec
           Returns (return_code, stdout, stderr)

         - _probe_video(filepath: str) -> dict
           Runs ffprobe -v quiet -print_format json -show_format -show_streams
           Returns parsed JSON with duration, width, height

      3. Background task trigger: in video_service.py upload_video() method
         After successful upload + DB insert, schedule transcode as background task:
         asyncio.create_task(transcode_service.transcode(video_id))
         (Fire-and-forget; status tracked in DB)

      4. Status endpoint: add to routes/videos.py
         GET /videos/{video_id}/status -> { status, duration_seconds, hls_url }
         (Returns current transcoding status; hls_url is presigned URL to master.m3u8 when ready)

      IMPLEMENTATION APPROACH:
      TDD — write failing tests FIRST in tests/test_transcode.py:
      1. test_transcode_success — mock ffmpeg + ffprobe + storage, verify status transitions
      2. test_transcode_updates_metadata — verify duration/width/height set from ffprobe
      3. test_transcode_creates_master_playlist — verify master.m3u8 content
      4. test_transcode_skips_higher_profiles — 720p video only gets 480p + 720p, not 1080p
      5. test_transcode_handles_ffmpeg_failure — status set to "failed"
      6. test_transcode_handles_ffprobe_failure — status set to "failed"
      7. test_transcode_wrong_status — video not in "uploaded" status → skip
      8. test_get_video_status_ready — returns hls_url when ready

      Mock asyncio.create_subprocess_exec for ffmpeg/ffprobe calls.
      Mock VideoStoragePort for upload calls.

      RULES:
      - ffmpeg calls via asyncio.create_subprocess_exec (not subprocess.run — async!)
      - Always clean up temp files in finally block (use tempfile.mkdtemp)
      - Status transitions: uploaded → processing → ready | failed (never skip)
      - Only transcode to profiles where profile.height <= original video height
      - HLS segment duration: 10 seconds
      - Master playlist format follows standard HLS spec (#EXTM3U, #EXT-X-STREAM-INF)
      - Parameterized SQL, type hints, async I/O
      - Domain objects (TranscodeProfile) — no framework imports

      COMMIT:
      feat(course): add HLS video transcoding worker with multi-quality output
    test: "cd /mnt/c/Users/aquam/PetProject/Merket_for_10_M_uesr/services/py/course && uv run --package course pytest tests/ -v"
    depends_on:
      - video-upload-endpoint

  - id: video-thumbnail-generator
    title: "Auto-generate video thumbnails at 10% mark"
    scope: backend:course
    prompt: |
      Task: Auto-generate a thumbnail image from an uploaded video at the 10% duration mark using ffmpeg.

      CONTEXT:
      - Course service: services/py/course/ (FastAPI, asyncpg, Clean Architecture)
      - Video entity in app/domain/video.py with thumbnail_url field
      - VideoRepository with update_video_thumbnail(video_id, thumbnail_url)
      - VideoStoragePort for uploading thumbnail to S3
      - TranscodeService in app/services/transcode_service.py already probes video for duration
      - ffmpeg available via asyncio.create_subprocess_exec (pattern from transcode_service)
      - Videos stored in S3 at: videos/{teacher_id}/{uuid}/{filename}

      WHAT TO BUILD:

      1. Service: app/services/thumbnail_service.py
         ThumbnailService(video_repo, video_storage):
         - async generate_thumbnail(video_id: UUID) -> str | None
           1. Get video from DB
           2. Download original video from S3 to temp file (or use the already-downloaded file during transcode)
           3. Calculate timestamp: duration_seconds * 0.1 (10% mark). Fallback to 1s if no duration.
           4. Run ffmpeg to extract single frame as JPEG:
              ffmpeg -i input.mp4 -ss {timestamp} -vframes 1 -q:v 2 -f image2 thumbnail.jpg
           5. Upload thumbnail.jpg to S3 at: videos/{teacher_id}/{uuid}/thumbnail.jpg
           6. Get presigned URL for the thumbnail
           7. Update video record: thumbnail_url = S3 key (not presigned URL — generate fresh on access)
           8. Clean up temp files
           9. Return thumbnail S3 key
           On error: log warning, return None (thumbnail is non-critical)

         - async get_thumbnail_url(video_id: UUID) -> str | None
           Get video, if thumbnail_url exists, generate presigned URL and return.

      2. Integration with transcode pipeline:
         In TranscodeService.transcode(), after probing video (step 4), call:
         await thumbnail_service.generate_thumbnail(video_id)
         This runs as part of the transcode flow (before HLS encoding, after we know duration).

      3. Route addition: in routes/videos.py
         GET /videos/{video_id}/thumbnail → redirect to presigned thumbnail URL (302)

      IMPLEMENTATION APPROACH:
      TDD — write failing tests FIRST in tests/test_thumbnail.py:
      1. test_generate_thumbnail_success — mock ffmpeg, verify S3 upload with correct key
      2. test_generate_thumbnail_at_10_percent — 100s video → extracts at 10s
      3. test_generate_thumbnail_no_duration_fallback — no duration → extracts at 1s
      4. test_generate_thumbnail_ffmpeg_failure — returns None, no crash
      5. test_generate_thumbnail_updates_video — verify update_video_thumbnail called
      6. test_get_thumbnail_url — returns presigned URL
      7. test_get_thumbnail_url_no_thumbnail — returns None

      RULES:
      - ffmpeg via asyncio.create_subprocess_exec
      - Thumbnail format: JPEG, quality 2 (high quality)
      - Always clean up temp files in finally block
      - Non-critical: failure returns None, does not crash transcode pipeline
      - S3 key: videos/{teacher_id}/{uuid}/thumbnail.jpg
      - Type hints, async I/O
      - Independent tests with mocked dependencies

      COMMIT:
      feat(course): add automatic video thumbnail generation
    test: "cd /mnt/c/Users/aquam/PetProject/Merket_for_10_M_uesr/services/py/course && uv run --package course pytest tests/ -v"
    depends_on:
      - video-transcode-worker

  # ─── BACKEND: Course — Lesson-Video Linking ────────────────────────────────────

  - id: lesson-video-attachment
    title: "Link videos to lessons with presigned playback URLs"
    scope: backend:course
    prompt: |
      Task: Allow teachers to attach videos to lessons, and serve playback URLs to students.

      CONTEXT:
      - Course service: services/py/course/ (FastAPI, asyncpg, Clean Architecture)
      - Existing lessons table (see migrations/002_modules_lessons.sql): id, module_id, title, content, "order", etc.
      - Video entity + videos table with id, teacher_id, s3_key, status, hls_manifest_key, thumbnail_url
      - VideoRepository with get_video(video_id)
      - VideoStoragePort with get_presigned_url(key)
      - Existing lesson routes at app/routes/lessons.py or similar
      - Existing LessonRepository and LessonService
      - Teacher ownership: lessons belong to modules → modules belong to courses → courses belong to teacher

      WHAT TO BUILD:

      1. Migration: migrations/009_lesson_video.sql
         ALTER TABLE lessons ADD COLUMN IF NOT EXISTS video_id UUID REFERENCES videos(id) ON DELETE SET NULL;
         CREATE INDEX IF NOT EXISTS idx_lessons_video ON lessons(video_id) WHERE video_id IS NOT NULL;

      2. Update domain: ensure Lesson entity includes video_id: UUID | None field

      3. Update LessonRepository:
         - update_lesson_video(lesson_id, video_id: UUID | None) -> Lesson | None
           Sets or clears the video_id on a lesson.

      4. Update LessonService:
         - attach_video(teacher_id, lesson_id, video_id) -> Lesson
           Validates: teacher owns the course (via module → course → teacher_id check),
           video exists + status == "ready" + video.teacher_id == teacher_id.
           Calls update_lesson_video.
         - detach_video(teacher_id, lesson_id) -> Lesson
           Owner check. Sets video_id = NULL.

      5. Update routes:
         - PUT /lessons/{lesson_id}/video { video_id } → 200 (teacher, owner)
         - DELETE /lessons/{lesson_id}/video → 200 (teacher, owner)
         - GET /lessons/{lesson_id} — enrich response: if lesson has video_id and video status=="ready",
           include video_playback_url (presigned HLS URL) and thumbnail_url in response.
           For non-ready videos, include video_status.

      6. Response enrichment: when returning a lesson with a video, include:
         {
           ...lesson_fields,
           video: {
             id, status, duration_seconds, thumbnail_url,
             playback_url: presigned_url_to_hls_manifest (only if status == "ready"),
           } | null
         }

      IMPLEMENTATION APPROACH:
      TDD — write failing tests FIRST in tests/test_lesson_video.py:
      1. test_attach_video_success — teacher attaches ready video to lesson
      2. test_attach_video_not_owner_of_course → 403
      3. test_attach_video_not_owner_of_video → 403
      4. test_attach_video_not_ready → 400 (video still processing)
      5. test_attach_video_not_found → 404
      6. test_detach_video_success — removes video from lesson
      7. test_detach_video_not_owner → 403
      8. test_get_lesson_with_video — returns enriched response with playback URL
      9. test_get_lesson_without_video — video field is null
      10. test_get_lesson_with_processing_video — includes status but no playback URL

      RULES:
      - video_id FK with ON DELETE SET NULL (lesson survives if video deleted)
      - Teacher must own BOTH the lesson's course AND the video
      - Only "ready" videos can be attached (prevents broken playback)
      - Presigned URLs regenerated on each request (not stored in DB)
      - Parameterized SQL ($1, $2, ...)
      - Type hints, async I/O
      - Do NOT modify existing lesson creation/update flows — add separate attach/detach endpoints

      COMMIT:
      feat(course): add video attachment to lessons with presigned playback URLs
    test: "cd /mnt/c/Users/aquam/PetProject/Merket_for_10_M_uesr/services/py/course && uv run --package course pytest tests/ -v"
