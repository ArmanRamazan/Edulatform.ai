  # ─── BACKEND: Learning — Calendar Export ───────────────────────────────────

  - id: calendar-export
    title: "iCalendar (.ics) export for study schedule"
    scope: backend:learning
    prompt: |
      Task: Add iCalendar (.ics) export endpoint to the Learning service.

      CONTEXT:
      - Learning service: services/py/learning/ (FastAPI, asyncpg, Clean Architecture)
      - Existing routes: flashcards.py, quizzes.py, concepts.py, streaks.py, badges.py, etc.
      - Flashcards use FSRS algorithm with due dates: flashcards table has due_date TIMESTAMPTZ
      - Streaks table: user_id, current_streak, longest_streak, last_activity_date
      - Existing migrations: 001_quizzes.sql through 008_xp_badges.sql
      - JWT auth: user_id from token
      - Clean Architecture: routes → services → domain ← repositories

      WHAT TO BUILD:

      1. Add icalendar dependency: Add "icalendar>=6.0.0" to the learning service's pyproject.toml
         under [project.dependencies].

      2. Repository: Add methods to existing FlashcardRepository (or create CalendarRepository):
         - get_due_flashcards_schedule(user_id: UUID, days_ahead: int = 30) → list of { due_date, deck_name, count }
           SELECT DATE(due_date) as due_date, d.name as deck_name, COUNT(*) as count
           FROM flashcards f JOIN decks d ON f.deck_id = d.id
           WHERE f.user_id = $1 AND f.due_date BETWEEN now() AND now() + interval '$2 days'
           GROUP BY DATE(due_date), d.name
           ORDER BY due_date

