         - get_course_concepts_with_prerequisites(course_id: UUID) → list of { concept, prerequisites: list[str] }
           SELECT c.id, c.name, c.description,
                  COALESCE(array_agg(cp.name), '{}') as prerequisite_names
           FROM concepts c
           LEFT JOIN concept_prerequisites cr ON c.id = cr.concept_id
           LEFT JOIN concepts cp ON cr.prerequisite_id = cp.id
           WHERE c.course_id = $1
           GROUP BY c.id, c.name, c.description
         - get_user_mastery_for_course(user_id: UUID, course_id: UUID) → dict[concept_id, float]
