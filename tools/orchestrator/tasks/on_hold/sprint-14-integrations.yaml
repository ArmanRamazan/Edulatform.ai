  # ─── BACKEND: Identity — Data Export (GDPR) ───────────────────────────────

  - id: data-export
    title: "GDPR-style user data export"
    scope: backend:identity
    prompt: |
      Task: Add GDPR-style data export to the Identity service.

      CONTEXT:
      - Identity service: services/py/identity/ (FastAPI, asyncpg, Clean Architecture)
      - Users table: id, email, password_hash, name, role, is_verified, email_verified, created_at
      - Existing routes: auth.py (register, login, /me), admin.py
      - Existing migrations: 001 through 007 (including oauth_providers from earlier task)
      - Other services own their own data — Identity cannot read their DBs directly.
        For MVP: export only Identity-owned data. Cross-service export is out of scope.
      - Clean Architecture: routes → services → domain ← repositories
      - Tests use AsyncMock(spec=Repository), pytest-asyncio with asyncio_mode = "auto"

      WHAT TO BUILD:

      1. Migration: services/py/identity/migrations/008_data_exports.sql
         CREATE TABLE IF NOT EXISTS data_exports (
           id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
           user_id UUID NOT NULL REFERENCES users(id) ON DELETE CASCADE,
           status VARCHAR(20) NOT NULL DEFAULT 'pending',
           file_path VARCHAR(512),
           error_message TEXT,
           requested_at TIMESTAMPTZ NOT NULL DEFAULT now(),
           completed_at TIMESTAMPTZ,
           expires_at TIMESTAMPTZ
         );
         CREATE INDEX IF NOT EXISTS idx_data_exports_user_id ON data_exports(user_id);

      2. Domain: app/domain/data_export.py
         - DataExport: id, user_id, status (pending/processing/completed/failed), file_path, requested_at, completed_at, expires_at
         - ExportStatus enum: PENDING, PROCESSING, COMPLETED, FAILED

      3. Repository: app/repositories/export_repository.py
         - ExportRepositoryInterface (ABC):
           - create(user_id: UUID) → DataExport
           - get_by_id(export_id: UUID) → DataExport | None
           - get_latest_by_user(user_id: UUID) → DataExport | None
           - update_status(export_id: UUID, status: str, file_path: str | None, error: str | None) → None
         - ExportRepository implementation

      4. Service: app/services/export_service.py
         - ExportService:
           - request_export(user_id: UUID) → DataExport
             1. Check rate limit: get_latest_by_user, if completed_at > now() - 24h → raise RateLimitError
             2. Create export record with status=pending
             3. Generate export synchronously (for MVP — no background workers):
                - Fetch user profile (id, email, name, role, created_at)
                - Fetch oauth_providers for user
                - Fetch refresh_tokens count
                - Package as JSON: { "exported_at": now, "user": {...}, "oauth_providers": [...], "session_count": N }
             4. Write JSON to a temp path or return as bytes
             5. Update export record: status=completed, completed_at=now, expires_at=now+7d
             6. Return updated DataExport
           - get_export_status(user_id: UUID, export_id: UUID) → DataExport
             Verify user_id matches. Raise NotFoundError if not found.
           - download_export(user_id: UUID, export_id: UUID) → bytes
             Verify ownership, check status=completed and not expired.
             Return the JSON bytes.

      5. Routes: app/routes/exports.py
         - POST /me/export → { export_id, status } (authenticated)
         - GET /me/export/{export_id} → DataExport status (authenticated)
         - GET /me/export/{export_id}/download → JSON file response (authenticated)
         Register router in main app with prefix (under /me path).

      IMPLEMENTATION APPROACH:
      TDD — write failing tests FIRST in tests/test_exports.py:
      1. test_request_export_success — creates export, returns completed status
      2. test_request_export_rate_limited — recent export exists → 429
      3. test_get_export_status — returns export info
      4. test_get_export_status_not_owner → 404
      5. test_download_export_success → 200, JSON content
      6. test_download_export_expired → 410 (Gone)
      7. test_download_export_not_completed → 409 (Conflict)
      8. test_export_contains_user_data — verify JSON has user fields
      9. test_export_excludes_password — verify password_hash is NOT in export

      RULES:
      - NEVER include password_hash in exported data
      - NEVER include other users' data
      - Rate limit: 1 export per 24 hours per user
      - Export expires after 7 days
      - JSON export content must be self-contained and human-readable
      - No cross-service DB access — only Identity-owned data for now
      - Domain entities must NOT import from frameworks
      - Parameterized SQL queries only
      - All tests independent

