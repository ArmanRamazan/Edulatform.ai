  # ─── BACKEND: Identity — GitHub OAuth ──────────────────────────────────────

  - id: github-oauth-backend
    title: "GitHub OAuth2 login backend"
    scope: backend:identity
    prompt: |
      Task: Add GitHub OAuth2 login to the Identity service.

      CONTEXT:
      - Identity service: services/py/identity/ (FastAPI, asyncpg, Clean Architecture)
      - OAuth infrastructure already exists from google-oauth-backend task:
        - migrations/007_oauth_providers.sql — oauth_providers table (provider, provider_user_id, user_id, email)
        - app/domain/oauth.py — OAuthProvider entity, OAuthLinkResult
        - app/repositories/oauth_repository.py — OAuthRepositoryInterface + implementation
        - app/routes/ — POST /auth/google endpoint pattern to follow
      - The oauth_providers table already supports provider='github' (VARCHAR(20))
      - Clean Architecture: routes → services → domain ← repositories
      - Tests use AsyncMock(spec=Repository), pytest-asyncio with asyncio_mode = "auto"

      WHAT TO BUILD:

      1. Service: Add github_login method (in OAuthService or AuthService, wherever Google login lives):
         - github_login(code: str) → OAuthLinkResult
           1. Exchange code for access_token: POST https://github.com/login/oauth/access_token
              Body: { client_id, client_secret, code }
              Headers: Accept: application/json
              Returns: { access_token, token_type, scope }
           2. Fetch user profile: GET https://api.github.com/user
              Headers: Authorization: Bearer {access_token}, Accept: application/vnd.github+json
              Returns: { id, login, email, name, avatar_url }
           3. If email is null, fetch emails: GET https://api.github.com/user/emails
              Find primary verified email
           4. Same link/create logic as Google:
              - Check oauth_providers for provider='github', provider_user_id=str(github_id)
              - Check users by email
              - Create new user if neither found (role=student, email_verified=true)
           5. Create tokens, return OAuthLinkResult
         - Handle errors: invalid code → 401, GitHub API unreachable → 502

      2. Routes: Add endpoint:
         - POST /auth/github  body: { code: str }
           → { access_token, refresh_token, user: { id, email, name, role }, is_new_user }

      3. Config: Add GITHUB_CLIENT_ID: str = "" and GITHUB_CLIENT_SECRET: str = "" to Settings.
         When GITHUB_CLIENT_ID is empty, the endpoint returns 501.

      IMPLEMENTATION APPROACH:
      TDD — write failing tests FIRST in tests/test_oauth.py (extend existing file):
      1. test_github_login_new_user — mock GitHub token exchange + profile fetch, no existing user
      2. test_github_login_existing_oauth — existing github oauth link → returns user
      3. test_github_login_existing_email — email match → links account
      4. test_github_login_invalid_code — mock exchange fails → 401
      5. test_github_login_disabled — GITHUB_CLIENT_ID empty → 501
      6. test_github_login_no_email_fetches_emails — email null in profile, fetches /user/emails

      Mock httpx calls to GitHub API.

      RULES:
      - NEVER store GitHub access tokens in the database (only use them during the flow)
      - Do NOT duplicate oauth link/create logic — reuse the shared method from Google flow
        (extract a _link_or_create_user helper if not already done)
      - Domain entities must NOT import from frameworks
      - Parameterized SQL queries only
      - All tests independent

      COMMIT:
      feat(identity): add GitHub OAuth2 login
    test: "cd /mnt/c/Users/aquam/PetProject/Merket_for_10_M_uesr/services/py/identity && uv run --package identity pytest tests/ -v"
    depends_on:
      - google-oauth-backend

