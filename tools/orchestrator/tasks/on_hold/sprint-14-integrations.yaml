  # ─── BACKEND: Notification — Webhook System ────────────────────────────────

  - id: webhook-system
    title: "Webhook delivery system for external integrations"
    scope: backend:notification
    prompt: |
      Task: Build a webhook registration and delivery system in the Notification service.

      CONTEXT:
      - Notification service: services/py/notification/ (FastAPI, asyncpg, Clean Architecture)
      - Existing routes: app/routes/notifications.py (POST, GET /me, PATCH /:id/read, streak/flashcard reminders)
      - Existing migrations: 001_notifications.sql through 004_flashcard_reminder_type.sql
      - Clean Architecture: routes → services → domain ← repositories
      - JWT auth: roles student/teacher/admin. Teachers and admins can register webhooks.
      - Tests use AsyncMock(spec=Repository), pytest-asyncio with asyncio_mode = "auto"
      - Domain entities are dataclass(frozen=True) or pydantic BaseModel

      WHAT TO BUILD:

      1. Migration: services/py/notification/migrations/005_webhooks.sql
         CREATE TABLE IF NOT EXISTS webhooks (
           id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
           user_id UUID NOT NULL,
           url VARCHAR(2048) NOT NULL,
           events JSONB NOT NULL DEFAULT '[]',
           secret VARCHAR(255) NOT NULL,
           is_active BOOLEAN NOT NULL DEFAULT true,
           created_at TIMESTAMPTZ NOT NULL DEFAULT now()
         );
         CREATE INDEX IF NOT EXISTS idx_webhooks_user_id ON webhooks(user_id);
         CREATE INDEX IF NOT EXISTS idx_webhooks_is_active ON webhooks(is_active) WHERE is_active = true;

         CREATE TABLE IF NOT EXISTS webhook_deliveries (
           id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
           webhook_id UUID NOT NULL REFERENCES webhooks(id) ON DELETE CASCADE,
           event VARCHAR(100) NOT NULL,
           payload JSONB NOT NULL,
           status VARCHAR(20) NOT NULL DEFAULT 'pending',
           status_code INT,
           attempts INT NOT NULL DEFAULT 0,
           max_attempts INT NOT NULL DEFAULT 3,
           last_attempt_at TIMESTAMPTZ,
           next_retry_at TIMESTAMPTZ,
           response_body TEXT,
           created_at TIMESTAMPTZ NOT NULL DEFAULT now()
         );
         CREATE INDEX IF NOT EXISTS idx_webhook_deliveries_webhook_id ON webhook_deliveries(webhook_id);
         CREATE INDEX IF NOT EXISTS idx_webhook_deliveries_status ON webhook_deliveries(status)
           WHERE status IN ('pending', 'retrying');

      2. Domain: app/domain/webhook.py
         - Webhook: id, user_id, url, events (list[str]), secret, is_active, created_at
         - WebhookDelivery: id, webhook_id, event, payload (dict), status, status_code, attempts, max_attempts, last_attempt_at, next_retry_at, created_at
         - DeliveryStatus enum: PENDING, SUCCESS, FAILED, RETRYING
         - Supported events: "enrollment.created", "course.completed", "payment.processed", "review.created"

      3. Repository: app/repositories/webhook_repository.py
         - WebhookRepositoryInterface (ABC):
           - create(user_id, url, events, secret) → Webhook
           - get_by_user(user_id) → list[Webhook]
           - get_by_id(webhook_id) → Webhook | None
           - delete(webhook_id) → None
           - get_active_for_event(event: str) → list[Webhook]
           - create_delivery(webhook_id, event, payload) → WebhookDelivery
           - update_delivery(delivery_id, status, status_code, attempts, next_retry_at, response_body) → None
           - get_deliveries_by_webhook(webhook_id, limit, offset) → list[WebhookDelivery]
           - get_pending_deliveries() → list[WebhookDelivery]

      4. Service: app/services/webhook_service.py
         - WebhookService:
           - register_webhook(user_id, url, events) → Webhook
             Validate URL (https only), validate events against allowed list.
             Generate secret using secrets.token_hex(32).
             Max 10 webhooks per user.
           - list_webhooks(user_id) → list[Webhook]
           - delete_webhook(user_id, webhook_id) → None
             Verify ownership before deleting.
           - get_deliveries(user_id, webhook_id, limit=20, offset=0) → list[WebhookDelivery]
             Verify webhook ownership.
           - deliver_event(event: str, payload: dict) → None
             Find all active webhooks subscribed to this event.
             For each: create delivery record, attempt POST to URL.
             Signature: HMAC-SHA256(secret, json_payload) in X-Webhook-Signature header.
             Content-Type: application/json.
             Timeout: 10 seconds.
             On success (2xx): mark delivery as SUCCESS.
             On failure: mark as RETRYING, set next_retry_at with exponential backoff (30s, 120s, 480s).
             After max_attempts: mark as FAILED.
           - retry_pending_deliveries() → int
             Fetch pending/retrying deliveries where next_retry_at <= now().
             Attempt delivery again. Return count of retried.

      5. Routes: app/routes/webhooks.py
         - POST /webhooks { url, events } → Webhook (teacher/admin only)
         - GET /webhooks/me → list[Webhook] (authenticated)
         - GET /webhooks/{webhook_id}/deliveries?limit=20&offset=0 → list[WebhookDelivery] (owner only)
         - DELETE /webhooks/{webhook_id} → 204 (owner only)
         Register router in main app with prefix /webhooks.

      IMPLEMENTATION APPROACH:
      TDD — write failing tests FIRST in tests/test_webhooks.py:
      1. test_register_webhook_success — teacher creates webhook
      2. test_register_webhook_invalid_url — non-https URL → 400
      3. test_register_webhook_invalid_event — unsupported event → 400
      4. test_register_webhook_max_limit — 11th webhook → 400
      5. test_register_webhook_student_forbidden — student role → 403
      6. test_list_webhooks — returns user's webhooks
      7. test_delete_webhook_owner — owner deletes → 204
      8. test_delete_webhook_not_owner — different user → 403 or 404
      9. test_deliver_event_success — mock httpx POST returns 200 → delivery marked SUCCESS
      10. test_deliver_event_failure — mock httpx POST raises → delivery marked RETRYING
      11. test_deliver_event_signature — verify HMAC-SHA256 is correct
      12. test_get_deliveries — returns delivery history for webhook

      RULES:
      - Webhook secrets are generated server-side, never client-supplied
      - HTTPS URLs only (no HTTP) for webhook endpoints
      - HMAC-SHA256 signature: hmac.new(secret.encode(), payload_bytes, hashlib.sha256).hexdigest()
      - Never log webhook secrets or full payloads (may contain PII)
      - Timeout on webhook delivery: 10 seconds max
      - Domain entities must NOT import from frameworks
      - Parameterized SQL queries only
      - All tests independent

      COMMIT:
      feat(notification): add webhook registration and delivery system
    test: "cd /mnt/c/Users/aquam/PetProject/Merket_for_10_M_uesr/services/py/notification && uv run --package notification pytest tests/ -v"
    depends_on: []

