           token VARCHAR(64) NOT NULL UNIQUE,
           created_at TIMESTAMPTZ NOT NULL DEFAULT now()
         );
         CREATE INDEX IF NOT EXISTS idx_calendar_tokens_token ON calendar_tokens(token);

