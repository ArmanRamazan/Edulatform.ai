  # ─── BACKEND: Identity — Google OAuth ──────────────────────────────────────

  - id: google-oauth-backend
    title: "Google OAuth2 login backend"
    scope: backend:identity
    prompt: |
      Task: Add Google OAuth2 login to the Identity service.

      CONTEXT:
      - Identity service: services/py/identity/ (FastAPI, asyncpg, Clean Architecture)
      - Existing routes: app/routes/auth.py (register, login, /me, refresh, logout)
      - Users table: id (UUID), email, password_hash, name, role, is_verified, email_verified, created_at
      - Refresh tokens table: id, user_id, token, expires_at, created_at
      - Clean Architecture: routes → services → domain ← repositories
      - Domain entities are dataclass(frozen=True) or pydantic BaseModel
      - JWT: HS256, claims: sub, iat, exp, role, is_verified, email_verified
      - create_access_token() supports extra_claims for role/is_verified in JWT
      - Tests use AsyncMock(spec=Repository), pytest-asyncio with asyncio_mode = "auto"
      - Existing migrations: 001_users.sql through 006_password_reset.sql
      - Config via pydantic BaseSettings + env vars

      WHAT TO BUILD:

      1. Migration: services/py/identity/migrations/007_oauth_providers.sql
         CREATE TABLE IF NOT EXISTS oauth_providers (
           id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
           user_id UUID NOT NULL REFERENCES users(id) ON DELETE CASCADE,
           provider VARCHAR(20) NOT NULL,  -- 'google', 'github'
           provider_user_id VARCHAR(255) NOT NULL,
           email VARCHAR(255),
           created_at TIMESTAMPTZ NOT NULL DEFAULT now(),
           UNIQUE(provider, provider_user_id),
           UNIQUE(provider, user_id)
         );
         CREATE INDEX IF NOT EXISTS idx_oauth_providers_user_id ON oauth_providers(user_id);

      2. Domain: Add OAuthProvider entity in app/domain/oauth.py:
         - OAuthProvider: id, user_id, provider, provider_user_id, email, created_at
         - OAuthLinkResult: user (User entity), access_token, refresh_token, is_new_user

      3. Repository: app/repositories/oauth_repository.py
         - OAuthRepositoryInterface (ABC):
           - get_by_provider(provider: str, provider_user_id: str) → OAuthProvider | None
           - get_by_user(user_id: UUID, provider: str) → OAuthProvider | None
           - create(user_id: UUID, provider: str, provider_user_id: str, email: str | None) → OAuthProvider
           - delete_by_user(user_id: UUID, provider: str) → None
         - OAuthRepository implementation using asyncpg with parameterized queries

      4. Service: Add google_login method to AuthService (or create OAuthService in app/services/oauth_service.py):
         - google_login(id_token: str) → OAuthLinkResult
           1. Verify id_token with Google: POST https://oauth2.googleapis.com/tokeninfo?id_token=...
              OR use the google.oauth2.id_token module. Prefer httpx POST to googleapis for simplicity.
              Validate: aud == GOOGLE_CLIENT_ID, email_verified == true
           2. Extract: google_user_id (sub), email, name from token info
           3. Check oauth_providers for existing link → if found, fetch user, create tokens, return
           4. Check users by email → if found, link oauth provider to existing user, create tokens, return
           5. If neither → create new user (role=student, email_verified=true, password_hash=null),
              link oauth provider, create tokens, return with is_new_user=true
         - Handle errors: invalid token → 401, Google API unreachable → 502

      5. Routes: Add to app/routes/auth.py (or new app/routes/oauth.py):
         - POST /auth/google  body: { id_token: str }
           → { access_token, refresh_token, user: { id, email, name, role }, is_new_user }
         - Register router in main app

      6. Config: Add GOOGLE_CLIENT_ID: str = "" to Settings. When empty, the endpoint returns 501.

      IMPLEMENTATION APPROACH:
      TDD — write failing tests FIRST in tests/test_oauth.py:
      1. test_google_login_new_user — mock Google token verification, no existing user → creates user + oauth link
      2. test_google_login_existing_oauth — mock Google verify, existing oauth link → returns existing user
      3. test_google_login_existing_email — mock Google verify, email exists in users but no oauth link → links account
      4. test_google_login_invalid_token — mock Google verify fails → 401
      5. test_google_login_disabled — GOOGLE_CLIENT_ID is empty → 501
      6. test_google_login_returns_tokens — response contains access_token, refresh_token, user dict

      Mock the Google token verification (httpx call) using AsyncMock.
      Mock OAuthRepository with AsyncMock(spec=OAuthRepositoryInterface).

      RULES:
      - NO storing Google tokens or secrets in the database
      - password_hash can be NULL for OAuth-only users (ALTER COLUMN if needed in migration)
      - Domain entities must NOT import from routes, services, repositories, or frameworks
      - Routes must NOT access repositories directly
      - Type hints on all public functions
      - Async for all I/O operations
      - Parameterized SQL queries only ($1, $2, ...)
      - All tests must be independent, no order dependency

      COMMIT:
      feat(identity): add Google OAuth2 login
    test: "cd /mnt/c/Users/aquam/PetProject/Merket_for_10_M_uesr/services/py/identity && uv run --package identity pytest tests/ -v"
    depends_on: []

