phase: "sprint-10"
description: "Advanced AI & Personalization — adaptive testing, learning velocity, AI course builder, personalized paths"

tasks:
  - id: adaptive-pretest
    title: "Adaptive pre-test: entrance assessment per course"
    scope: backend:learning
    prompt: |
      Task: Build an adaptive pre-test system that assesses student knowledge before starting a course.

      CONTEXT:
      - Learning service: services/py/learning/ (FastAPI, asyncpg, Clean Architecture)
      - Learning DB: learning-db (port 5438)
      - Existing tables: concepts (id, course_id, name, description), concept_mastery (id, user_id, concept_id, mastery_level 0.0-1.0)
      - Concepts represent knowledge graph nodes for a course
      - concept_mastery tracks how well a student knows each concept
      - Existing quiz infrastructure: quizzes, quiz_questions, quiz_attempts
      - JWT auth: user_id, role from token

      WHAT TO BUILD:
      1. Migration: migrations/ (next sequence number)
         CREATE TABLE IF NOT EXISTS pretests (
           id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
           user_id UUID NOT NULL,
           course_id UUID NOT NULL,
           started_at TIMESTAMPTZ NOT NULL DEFAULT now(),
           completed_at TIMESTAMPTZ,
           status VARCHAR(20) NOT NULL DEFAULT 'in_progress',
           UNIQUE(user_id, course_id)
         );
         CREATE TABLE IF NOT EXISTS pretest_answers (
           id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
           pretest_id UUID NOT NULL REFERENCES pretests(id) ON DELETE CASCADE,
           concept_id UUID NOT NULL,
           question TEXT NOT NULL,
           user_answer TEXT,
           correct_answer TEXT NOT NULL,
           is_correct BOOLEAN,
           created_at TIMESTAMPTZ NOT NULL DEFAULT now()
         );
         CREATE INDEX idx_pretests_user_course ON pretests(user_id, course_id);
         CREATE INDEX idx_pretest_answers_pretest ON pretest_answers(pretest_id);

      2. Domain entities: app/domain/pretest.py
         @dataclass(frozen=True) Pretest: id, user_id, course_id, started_at, completed_at, status
         @dataclass(frozen=True) PretestAnswer: id, pretest_id, concept_id, question, user_answer, correct_answer, is_correct

      3. Repository: app/repositories/pretest_repository.py
         PretestRepository(pool):
         - create_pretest(user_id, course_id) -> Pretest
         - get_by_user_and_course(user_id, course_id) -> Pretest | None
         - complete_pretest(pretest_id) -> Pretest
         - add_answer(pretest_id, concept_id, question, correct_answer) -> PretestAnswer
         - update_answer(answer_id, user_answer, is_correct) -> PretestAnswer
         - get_answers(pretest_id) -> list[PretestAnswer]

      4. Service: app/services/pretest_service.py
         PretestService(pretest_repo, concept_repo, concept_mastery_repo):
         - start_pretest(user_id, course_id) -> dict
           Check if pretest already exists → return existing if in_progress, error if completed
           Get all concepts for course. Generate first question for a medium-difficulty concept.
           Return: { pretest_id, question, concept_id, total_concepts }
         - answer_and_next(pretest_id, answer_id, user_answer) -> dict
           Grade answer (simple string match or keyword match).
           Adaptive logic: if correct → pick a harder (less common) concept next,
           if wrong → pick an easier (more fundamental) concept next.
           If all concepts tested or enough data (min 5 questions), complete pretest.
           Update concept_mastery based on results (correct → 0.7, wrong → 0.1).
           Return: { next_question, concept_id, progress } or { completed: true, results }
         - get_results(user_id, course_id) -> dict
           Return: { concepts: [{ name, mastery_level, tested }], overall_readiness: float }

      5. Routes: app/routes/pretest_routes.py
         POST /pretests/course/{course_id}/start — start adaptive pretest
         POST /pretests/{pretest_id}/answer — submit answer and get next question
         GET /pretests/course/{course_id}/results — get pretest results
         Register in app/main.py

      IMPLEMENTATION APPROACH:
      1. TDD: Test adaptive algorithm — correct answers lead to harder concepts
      2. Test completion logic — pretest completes after testing enough concepts
      3. Test concept mastery updates — correct/wrong answers set appropriate mastery
      4. Test duplicate prevention — can't start two pretests for same course
      5. Keep question generation simple: use concept name + description to form questions
         "What do you know about {concept.name}? {concept.description}" with True/False or short answer
      6. Implement: migration → domain → repository → service → routes

      RULES:
      - TDD mandatory: write failing tests FIRST
      - Clean Architecture: routes → services → domain ← repositories
      - Adaptive algorithm must be testable — extract into a pure function
      - Questions generated from concept metadata (no AI needed — simple templates)
      - Parameterized SQL only ($1, $2, ...)
      - Type hints on all public functions
      - Handle edge cases: course with 0 concepts, pretest already completed
      - Don't modify existing concept or mastery tables — only read from them and update mastery values

      COMMIT: feat(learning): add adaptive pre-test with concept-based entrance assessment
    test: "cd /mnt/c/Users/aquam/PetProject/Merket_for_10_M_uesr/services/py/learning && uv run --package learning pytest tests/ -v"
    depends_on: []

  - id: learning-velocity-dashboard
    title: "Learning Velocity Dashboard: concepts/hour, trends"
    scope: backend:learning
    prompt: |
      Task: Build a learning velocity API that aggregates student learning metrics from existing data.

      CONTEXT:
      - Learning service: services/py/learning/
      - Existing tables (check actual schemas in migrations/):
        concept_mastery: id, user_id, concept_id, mastery_level, updated_at (or similar timestamp)
        quiz_attempts: id, user_id, quiz_id, score, created_at (or similar)
        review_logs: flashcard review tracking (check actual table name and schema)
        streaks: user_id, current_streak, longest_streak (check actual schema)
      - No new tables needed — compute everything from existing data via SQL aggregation

      WHAT TO BUILD:
      1. Repository: app/repositories/velocity_repository.py
         VelocityRepository(pool):
         - get_concepts_mastered_by_week(user_id, weeks=4) -> list[dict]
           Count concepts where mastery_level >= 0.7 grouped by week
         - get_quiz_score_trend(user_id, weeks=4) -> list[dict]
           Average quiz score per week for last N weeks
         - get_flashcard_retention_rate(user_id) -> float
           Percentage of flashcard reviews marked correct in last 30 days
         - get_learning_streak(user_id) -> int
           Current streak days from streaks table
         - get_course_progress(user_id) -> list[dict]
           For each enrolled course (needs enrollment data or concept data):
           total concepts, mastered concepts, estimated completion based on velocity

      2. Service: app/services/velocity_service.py
         VelocityService(repository):
         - get_velocity(user_id) -> dict with:
           {
             concepts_mastered_this_week: int,
             concepts_mastered_last_week: int,
             trend: "up" | "down" | "stable",
             quiz_score_trend: [{ week, avg_score }],
             flashcard_retention_rate: float,
             streak_days: int,
             course_progress: [{ course_id, total_concepts, mastered, mastery_pct, estimated_weeks_left }]
           }
         - Trend calculation: this_week vs last_week — "up" if higher, "down" if lower, "stable" if equal
         - Estimated weeks left: (remaining_concepts / concepts_per_week) if concepts_per_week > 0, else None

      3. Routes: app/routes/velocity_routes.py
         GET /velocity/me — auth required. Returns velocity metrics.
         Register in app/main.py

      IMPLEMENTATION APPROACH:
      1. TDD: Read existing table schemas FIRST to understand exact column names and types
      2. Write tests with mock repository returning sample data
      3. Test trend calculation logic: up, down, stable
      4. Test estimated completion calculation
      5. Test edge cases: new user with no data, user with no quizzes, no flashcards
      6. Implement: repository (SQL queries) → service (aggregation logic) → routes

      RULES:
      - TDD mandatory: write failing tests FIRST
      - READ existing migration files to get exact table/column names before writing SQL
      - Clean Architecture: routes → services → domain ← repositories
      - SQL aggregation queries — no loading all rows into Python
      - Parameterized SQL only ($1, $2, ...)
      - Type hints on all public functions
      - Handle zero-division (concepts_per_week = 0)
      - Return sensible defaults for missing data (0, empty lists, None)

      COMMIT: feat(learning): add learning velocity dashboard API with aggregated metrics
    test: "cd /mnt/c/Users/aquam/PetProject/Merket_for_10_M_uesr/services/py/learning && uv run --package learning pytest tests/ -v"
    depends_on: []

  - id: velocity-dashboard-frontend
    title: "Learning Velocity Dashboard UI"
    scope: frontend:buyer
    prompt: |
      Task: Build a learning velocity dashboard page showing student progress metrics and trends.

      CONTEXT:
      - Buyer app: apps/buyer/ (Next.js 15 App Router, Tailwind CSS, TanStack Query)
      - API client: apps/buyer/lib/api.ts
      - Learning service endpoint: GET /api/learning/velocity/me returns:
        { concepts_mastered_this_week, concepts_mastered_last_week, trend,
          quiz_score_trend: [{ week, avg_score }], flashcard_retention_rate,
          streak_days, course_progress: [{ course_id, total_concepts, mastered, mastery_pct, estimated_weeks_left }] }
      - Auth hook: apps/buyer/hooks/use-auth.ts
      - Recharts library: check if already in package.json. If not, add it (pnpm add recharts)
      - Existing Header/Nav for adding links

      WHAT TO BUILD:
      1. Hook: apps/buyer/hooks/use-velocity.ts
         - useMyVelocity(token) — GET /api/learning/velocity/me
           queryKey: ["velocity", "me"], enabled: !!token, staleTime: 5 minutes

      2. Page: apps/buyer/app/velocity/page.tsx
         - "use client"
         - Title: "Скорость обучения"
         - Auth required — redirect to /login if not authenticated

         Layout (responsive grid):

         Row 1 — Key metrics (3 cards side by side):
         a) Velocity score card:
            - "Концепций за неделю: {concepts_mastered_this_week}"
            - Trend arrow: green up arrow if trend="up", red down arrow if "down", gray dash if "stable"
            - Comparison: "vs {concepts_mastered_last_week} на прошлой неделе"
         b) Streak card:
            - Fire icon + "{streak_days} дней подряд"
         c) Retention card:
            - "Запоминание: {flashcard_retention_rate}%"
            - Color: green if >=80%, yellow if >=60%, red if <60%

         Row 2 — Charts (2 cols on desktop):
         a) Weekly concepts chart (line/bar chart):
            - X axis: weeks, Y axis: concepts mastered
            - Use recharts BarChart or LineChart
            - Dynamic import for recharts (performance)
         b) Quiz score trend (bar chart):
            - X axis: weeks, Y axis: avg score (0-100)
            - Color-coded bars (green >=80, yellow >=60, red <60)

         Row 3 — Course progress (full width):
         - Cards for each course in progress:
           * Course title (course_id for now — or fetch from course service)
           * Progress bar: mastery_pct%
           * "{mastered}/{total_concepts} концепций"
           * "Осталось ~{estimated_weeks_left} недель" (or "Завершён!" if mastery_pct >= 100)

         Loading state: skeleton cards and chart placeholders
         Empty state: "Начните учиться, чтобы увидеть свою статистику!"

      3. Add "Статистика" link to Header navigation.

      IMPLEMENTATION APPROACH:
      1. Create hook
      2. Check if recharts is in package.json — if not, note to add it
      3. Build page with dynamic imports for chart components (next/dynamic with ssr: false)
      4. Use Tailwind for layout and styling
      5. Add nav link
      6. Verify build

      RULES:
      - "use client" for page
      - Dynamic import recharts components (no SSR for charts): import dynamic from "next/dynamic"
      - Named exports for hook and components (default export for page.tsx only)
      - Tailwind CSS only
      - next/link for navigation
      - If recharts not in package.json, add via pnpm add recharts
      - Build must pass: cd apps/buyer && pnpm build

      COMMIT: feat(buyer): add learning velocity dashboard with charts and progress tracking
    test: "cd /mnt/c/Users/aquam/PetProject/Merket_for_10_M_uesr/apps/buyer && pnpm build"
    depends_on: [learning-velocity-dashboard]

  - id: ai-course-outline
    title: "AI course outline generator for teachers"
    scope: backend:ai
    prompt: |
      Task: Add an AI endpoint that generates course outlines (module and lesson structure) for teachers.

      CONTEXT:
      - AI service: services/py/ai/ (FastAPI, asyncpg or stateless, Clean Architecture)
      - AI service uses Gemini Flash via httpx (check app/adapters/ for existing LLM adapter)
      - Existing endpoints: /ai/quiz/generate, /ai/summary/generate, /ai/tutor/chat, /ai/tutor/feedback
      - Credit system: free (10/day), student (100/day), pro (unlimited) — check existing credit logic
      - Config: GEMINI_API_KEY in env/config
      - Rate limiting per plan already implemented (check existing patterns)
      - JWT contains user_id, role

      WHAT TO BUILD:
      1. Request/Response models (pydantic):
         CourseOutlineRequest:
           topic: str (required, max 200 chars)
           level: str (beginner/intermediate/advanced)
           target_audience: str (max 500 chars)
           num_modules: int (2-10, default 5)

         CourseOutlineResponse:
           modules: list[ModuleOutline]
           total_lessons: int
           estimated_duration_hours: int

         ModuleOutline:
           title: str
           description: str
           lessons: list[LessonOutline]

         LessonOutline:
           title: str
           description: str
           key_concepts: list[str]
           estimated_duration_minutes: int

      2. Service: app/services/course_outline_service.py (or add to existing AI service)
         generate_outline(topic, level, target_audience, num_modules) -> CourseOutlineResponse
         - Build prompt for Gemini:
           "You are an expert course designer. Generate a detailed course outline.
           Topic: {topic}
           Level: {level}
           Target audience: {target_audience}
           Number of modules: {num_modules}
           Each module should have 3-5 lessons.
           Return valid JSON: { modules: [{ title, description, lessons: [{ title, description, key_concepts, estimated_duration_minutes }] }] }"
         - Call Gemini adapter (follow existing pattern from quiz/summary generation)
         - Parse JSON response, validate structure
         - Calculate total_lessons and estimated_duration_hours
         - Handle Gemini errors gracefully (retry once, then return error)

      3. Route: app/routes/ (new file or add to existing)
         POST /ai/course/outline — auth required (teacher or admin role)
         - Validate request
         - Check credits (5/day for free plan, 20/day for student, unlimited for pro — or use existing rate limit)
         - Deduct credit
         - Call service
         - Return CourseOutlineResponse
         Register in app/main.py

      IMPLEMENTATION APPROACH:
      1. TDD: Read existing AI service code FIRST — understand adapter pattern, credit system, test patterns
      2. Write tests: mock Gemini adapter, test prompt construction, test response parsing
      3. Test credit deduction logic
      4. Test invalid Gemini response handling (malformed JSON)
      5. Test role authorization (only teacher/admin)
      6. Implement: models → service → route

      RULES:
      - TDD mandatory: write failing tests FIRST
      - Follow EXISTING patterns in the AI service — don't reinvent adapter/credit/rate-limit logic
      - Clean Architecture
      - Gemini adapter must be mocked in tests (no real API calls)
      - Validate and sanitize user input before sending to LLM (no raw PII)
      - Parse Gemini response defensively (try/except for JSON parsing)
      - Type hints on all public functions
      - Role check: teacher or admin only

      COMMIT: feat(ai): add AI course outline generator for teachers
    test: "cd /mnt/c/Users/aquam/PetProject/Merket_for_10_M_uesr/services/py/ai && uv run --package ai pytest tests/ -v"
    depends_on: []

  - id: ai-lesson-content
    title: "AI lesson content generator"
    scope: backend:ai
    prompt: |
      Task: Add an AI endpoint that generates structured lesson content in markdown for teachers.

      CONTEXT:
      - AI service: services/py/ai/ (FastAPI, Clean Architecture)
      - Gemini Flash adapter exists (check app/adapters/)
      - Credit system and rate limiting already in place
      - Existing patterns from /ai/quiz/generate and /ai/summary/generate
      - JWT contains user_id, role

      WHAT TO BUILD:
      1. Request/Response models (pydantic):
         LessonContentRequest:
           title: str (required, max 200 chars)
           description: str (optional, max 1000 chars)
           course_context: str (optional, max 500 chars — what course this lesson belongs to)
           format: str ("article" or "tutorial", default "article")

         LessonContentResponse:
           content: str (markdown formatted lesson content)
           key_concepts: list[str]
           estimated_duration_minutes: int

      2. Service logic (add to existing AI service or create app/services/lesson_content_service.py):
         generate_lesson_content(title, description, course_context, format) -> LessonContentResponse
         - Build prompt for Gemini:
           For "article" format:
           "Write a comprehensive educational lesson in markdown format.
           Title: {title}. Description: {description}. Course context: {course_context}.
           Structure: ## Introduction, ## Main Content (with subsections), ## Key Takeaways, ## Practice Exercises (2-3).
           Use clear explanations, examples, and analogies. Target length: 1000-2000 words."
           For "tutorial" format:
           "Write a step-by-step tutorial in markdown format.
           Title: {title}. Description: {description}. Course context: {course_context}.
           Structure: ## Overview, ## Prerequisites, ## Step-by-step Guide (numbered steps with code/examples), ## Summary, ## Exercises.
           Include practical examples and code snippets where relevant."
         - Call Gemini adapter
         - Extract key_concepts from response (ask Gemini to include them or parse from content)
         - Estimate duration: ~200 words per minute reading speed
         - Return structured response

      3. Route:
         POST /ai/lesson/generate — auth required (teacher or admin)
         - Same credit/rate-limit logic as course outline
         - Return LessonContentResponse
         Register in app/main.py

      IMPLEMENTATION APPROACH:
      1. TDD: Read existing AI service patterns first
      2. Write tests: mock Gemini, test both formats, test response structure
      3. Test that non-teacher/admin users get 403
      4. Test credit deduction
      5. Implement: models → service → route
      6. Follow exact same patterns as ai-course-outline task

      RULES:
      - TDD mandatory: write failing tests FIRST
      - Follow existing AI service patterns exactly
      - Mock Gemini adapter in tests
      - Sanitize input before sending to LLM
      - Content returned as markdown string (not HTML)
      - Type hints on all public functions
      - Role check: teacher or admin only
      - Don't duplicate credit/rate-limit logic — reuse existing

      COMMIT: feat(ai): add AI lesson content generator for teachers
    test: "cd /mnt/c/Users/aquam/PetProject/Merket_for_10_M_uesr/services/py/ai && uv run --package ai pytest tests/ -v"
    depends_on: []

  - id: ai-study-plan
    title: "AI personalized study plan generator"
    scope: backend:ai
    prompt: |
      Task: Add an AI endpoint that generates personalized weekly study plans for students.

      CONTEXT:
      - AI service: services/py/ai/ (FastAPI, Clean Architecture)
      - Gemini Flash adapter and credit system exist
      - Learning service has: concept_mastery (user's knowledge per concept), course concepts
      - Enrollment service has: enrollment data (which courses, progress)
      - AI service can call other services via httpx (service-to-service HTTP calls)
      - LEARNING_SERVICE_URL, ENROLLMENT_SERVICE_URL in config (or add them)
      - JWT contains user_id

      WHAT TO BUILD:
      1. Request/Response models (pydantic):
         StudyPlanRequest:
           course_id: UUID
           available_hours_per_week: int (1-40, default 10)
           goal: str (optional, max 500 chars — e.g., "finish by end of month")

         StudyPlanResponse:
           weeks: list[WeekPlan]
           estimated_completion: str (e.g., "3 weeks")
           total_estimated_hours: int

         WeekPlan:
           week_number: int
           focus_areas: list[str] (concept names to focus on)
           lessons_to_complete: list[str] (lesson titles or IDs)
           flashcard_sessions: int (recommended sessions)
           quiz_practice: bool (should take practice quiz this week)
           estimated_hours: float

      2. Service: app/services/study_plan_service.py
         StudyPlanService(gemini_adapter, http_client):
         - generate_plan(user_id, course_id, available_hours_per_week, goal) -> StudyPlanResponse
           Step 1: Fetch student's concept mastery from learning service
             GET {LEARNING_SERVICE_URL}/concepts/course/{course_id}/mastery?user_id={user_id}
             (or appropriate endpoint — check learning service routes)
           Step 2: Build context for Gemini:
             "Create a personalized study plan for a student.
             Course concepts and current mastery: {concepts_with_mastery}.
             Weak areas (mastery < 0.5): {weak_concepts}.
             Strong areas (mastery >= 0.7): {strong_concepts}.
             Available hours per week: {hours}.
             Student's goal: {goal}.
             Generate a week-by-week plan in JSON format."
           Step 3: Parse Gemini response into StudyPlanResponse
           Step 4: Calculate total_estimated_hours and estimated_completion

      3. Route:
         POST /ai/study-plan — auth required (any authenticated user)
         - Validate request
         - Check credits
         - Call service
         - Return StudyPlanResponse
         Register in app/main.py

      IMPLEMENTATION APPROACH:
      1. TDD: Mock both Gemini adapter AND httpx calls to learning service
      2. Test plan generation with sample mastery data
      3. Test that weak concepts are prioritized in the plan
      4. Test error handling: learning service unavailable, Gemini failure
      5. Test credit deduction
      6. Implement: models → service → route

      RULES:
      - TDD mandatory: write failing tests FIRST
      - Follow existing AI service patterns
      - Mock ALL external calls in tests (Gemini + learning service)
      - Service-to-service calls via httpx with timeout (5s)
      - Graceful fallback if learning service is unavailable (generate generic plan)
      - Sanitize concept data before sending to LLM (no user PII)
      - Type hints on all public functions
      - Don't store the plan — generate on demand (stateless)

      COMMIT: feat(ai): add personalized study plan generator using concept mastery data
    test: "cd /mnt/c/Users/aquam/PetProject/Merket_for_10_M_uesr/services/py/ai && uv run --package ai pytest tests/ -v"
    depends_on: []

