  - id: ai-content-moderation
    title: "AI content moderation for course submissions"
    scope: backend:ai
    prompt: |
      Task: Add an AI content moderation endpoint that checks course content for quality and safety.

      CONTEXT:
      - AI service: services/py/ai/ (FastAPI, Clean Architecture)
      - Gemini Flash adapter and credit system exist
      - Teachers submit course descriptions and lesson content that should be checked
      - This is advisory — provides information, doesn't auto-block content
