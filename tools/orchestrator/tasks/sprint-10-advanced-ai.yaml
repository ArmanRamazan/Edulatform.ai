      WHAT TO BUILD:
      1. Request/Response models (pydantic):
         ModerationRequest:
           content: str (required, max 10000 chars)
           content_type: str ("course_description" | "lesson_content" | "review_text")

         ModerationResponse:
           approved: bool (True if quality_score >= 5 and no critical flags)
           flags: list[str] (e.g., ["low_quality", "potential_spam", "inappropriate_language"])
           quality_score: int (1-10)
           suggestions: list[str] (improvement suggestions)

      2. Service: app/services/moderation_service.py
         ModerationService(gemini_adapter):
         - moderate(content, content_type) -> ModerationResponse
           Build prompt for Gemini:
           "You are a content moderator for an educational platform.
           Review the following {content_type} and evaluate it.
           Content: {content}

           Evaluate on these criteria:
           1. Appropriateness (no hate speech, violence, adult content)
           2. Quality (well-written, educational value)
           3. Spam indicators (repetitive, promotional, off-topic)
           4. Plagiarism indicators (generic/template content)

           Return JSON: {
             quality_score: 1-10,
             flags: ['flag1', 'flag2'] or [],
             suggestions: ['suggestion1'] or [],
             summary: 'brief assessment'
           }"
           - Parse response
           - approved = quality_score >= 5 and no critical flags (inappropriate_content, hate_speech)
           - Return ModerationResponse

      3. Route:
         POST /ai/moderate — auth required (teacher or admin)
