phase: "sprint-10"
description: "Advanced AI & Personalization — frontend for adaptive testing, learning velocity, AI course builder"

tasks:
  - id: velocity-dashboard-frontend
    title: "Learning Velocity Dashboard UI"
    scope: frontend:buyer
    prompt: |
      Task: Build a learning velocity dashboard page showing student progress metrics and trends.

      CONTEXT:
      - Buyer app: apps/buyer/ (Next.js 15 App Router, Tailwind CSS, TanStack Query)
      - API client: apps/buyer/lib/api.ts
      - Learning service endpoint: GET /api/learning/velocity/me returns:
        { concepts_mastered_this_week, concepts_mastered_last_week, trend,
          quiz_score_trend: [{ week, avg_score }], flashcard_retention_rate,
          streak_days, course_progress: [{ course_id, total_concepts, mastered, mastery_pct, estimated_weeks_left }] }
      - Auth hook: apps/buyer/hooks/use-auth.ts
      - Recharts library: check if already in package.json. If not, add it (pnpm add recharts)
      - Existing Header/Nav for adding links

      WHAT TO BUILD:
      1. Hook: apps/buyer/hooks/use-velocity.ts
         - useMyVelocity(token) — GET /api/learning/velocity/me
           queryKey: ["velocity", "me"], enabled: !!token, staleTime: 5 minutes

      2. Page: apps/buyer/app/velocity/page.tsx
         - "use client"
         - Title: "Скорость обучения"
         - Auth required — redirect to /login if not authenticated

         Layout (responsive grid):

         Row 1 — Key metrics (3 cards side by side):
         a) Velocity score card:
            - "Концепций за неделю: {concepts_mastered_this_week}"
            - Trend arrow: green up arrow if trend="up", red down arrow if "down", gray dash if "stable"
            - Comparison: "vs {concepts_mastered_last_week} на прошлой неделе"
         b) Streak card:
            - Fire icon + "{streak_days} дней подряд"
         c) Retention card:
            - "Запоминание: {flashcard_retention_rate}%"
            - Color: green if >=80%, yellow if >=60%, red if <60%

         Row 2 — Charts (2 cols on desktop):
         a) Weekly concepts chart (line/bar chart):
            - X axis: weeks, Y axis: concepts mastered
            - Use recharts BarChart or LineChart
            - Dynamic import for recharts (performance)
         b) Quiz score trend (bar chart):
            - X axis: weeks, Y axis: avg score (0-100)
            - Color-coded bars (green >=80, yellow >=60, red <60)

         Row 3 — Course progress (full width):
         - Cards for each course in progress:
           * Course title (course_id for now — or fetch from course service)
           * Progress bar: mastery_pct%
           * "{mastered}/{total_concepts} концепций"
           * "Осталось ~{estimated_weeks_left} недель" (or "Завершён!" if mastery_pct >= 100)

         Loading state: skeleton cards and chart placeholders
         Empty state: "Начните учиться, чтобы увидеть свою статистику!"

      3. Add "Статистика" link to Header navigation.

      IMPLEMENTATION APPROACH:
      1. Create hook
      2. Check if recharts is in package.json — if not, note to add it
      3. Build page with dynamic imports for chart components (next/dynamic with ssr: false)
      4. Use Tailwind for layout and styling
      5. Add nav link
      6. Verify build

      RULES:
      - "use client" for page
      - Dynamic import recharts components (no SSR for charts): import dynamic from "next/dynamic"
      - Named exports for hook and components (default export for page.tsx only)
      - Tailwind CSS only
      - next/link for navigation
      - If recharts not in package.json, add via pnpm add recharts
      - Build must pass: cd apps/buyer && pnpm build

      COMMIT: feat(buyer): add learning velocity dashboard with charts and progress tracking
    test: "cd /mnt/c/Users/aquam/PetProject/Merket_for_10_M_uesr/apps/buyer && pnpm build"
    depends_on: []

  - id: pretest-frontend
    title: "Adaptive pre-test UI"
    scope: frontend:buyer
    prompt: |
      Task: Build the adaptive pre-test UI — step-by-step quiz before starting a course.

      CONTEXT:
      - Buyer app: apps/buyer/ (Next.js 15 App Router, Tailwind CSS, TanStack Query)
      - API client: apps/buyer/lib/api.ts
      - Learning service pretest endpoints:
        POST /api/learning/pretests/course/{course_id}/start — returns { pretest_id, question, concept_id, total_concepts }
        POST /api/learning/pretests/{pretest_id}/answer — body: { answer_id, user_answer }
          returns { next_question, concept_id, progress } or { completed: true, results }
        GET /api/learning/pretests/course/{course_id}/results — returns { concepts: [...], overall_readiness }
      - Course detail page: apps/buyer/app/courses/[id]/page.tsx
      - Auth hook: apps/buyer/hooks/use-auth.ts

      WHAT TO BUILD:
      1. Hook: apps/buyer/hooks/use-pretest.ts
         - useStartPretest(token) — mutation: POST start
         - useAnswerPretest(token) — mutation: POST answer
         - usePretestResults(token, courseId) — query: GET results
           queryKey: ["pretest", "results", courseId], enabled: !!token && !!courseId

      2. On course detail page (apps/buyer/app/courses/[id]/page.tsx):
         - Add "Пройти вступительный тест" button
         - Show only if user is enrolled AND no pretest results exist for this course
         - Button links to /courses/{id}/pretest

      3. Page: apps/buyer/app/courses/[id]/pretest/page.tsx
         - "use client"
         - State machine: idle → loading → question → answering → next_question → ... → completed

         Question view:
         - Progress bar: "Вопрос {current}/{total}" with visual progress bar
         - Concept being tested (small label above question)
         - Question text (large, readable)
         - Answer input: text input or True/False buttons (depending on question format)
         - "Ответить" button → submit, show loading, get next question

         Completed view (results):
         - Title: "Результаты вступительного теста"
         - Overall readiness: percentage with color indicator and circular progress
         - Concept mastery map: grid of concept cards
           Each card: concept name, mastery indicator (green check if known, red X if unknown, yellow if partial)
         - Summary: "Вы уже знаете {known_count} из {total_count} концепций"
         - "Начать обучение" button → navigate to /courses/{id}
         - "Повторить тест" option (if API supports reset)

         Loading/error states handled gracefully

      IMPLEMENTATION APPROACH:
      1. Create hooks for pretest API calls
      2. Build the pretest page with state management (useState for step tracking)
      3. Handle the adaptive flow: submit answer → receive next question → repeat
      4. Build results view with concept mastery visualization
      5. Add button to course detail page
      6. Verify build

      RULES:
      - "use client" for pretest page (hooks, state, interactions)
      - Named exports for hooks and components
      - Tailwind CSS only
      - next/link for navigation
      - Handle edge cases: API errors, empty concepts, pretest already taken
      - No new dependencies
      - Build must pass: cd apps/buyer && pnpm build

      COMMIT: feat(buyer): add adaptive pre-test UI with step-by-step questions and results
    test: "cd /mnt/c/Users/aquam/PetProject/Merket_for_10_M_uesr/apps/buyer && pnpm build"
    depends_on: []

  - id: ai-tools-seller
    title: "AI tools integration in seller app"
    scope: frontend:seller
    prompt: |
      Task: Integrate AI course outline and lesson content generators into the seller (teacher) dashboard.

      CONTEXT:
      - Seller app: apps/seller/ (Next.js App Router, Tailwind CSS)
      - AI service endpoints:
        POST /api/ai/course/outline { topic, level, target_audience, num_modules }
          Returns: { modules: [{ title, description, lessons: [...] }], total_lessons, estimated_duration_hours }
        POST /api/ai/lesson/generate { title, description, course_context, format }
          Returns: { content (markdown), key_concepts, estimated_duration_minutes }
      - Seller app likely has course creation/editing pages (check apps/seller/app/ for existing routes)
      - Auth: teacher JWT token
      - Check apps/seller/lib/ for existing API client pattern

      WHAT TO BUILD:
      1. AI API functions in seller app's API client (check existing pattern):
         - generateCourseOutline(token, { topic, level, target_audience, num_modules })
         - generateLessonContent(token, { title, description, course_context, format })

      2. Course creation page enhancement:
         - Find existing course creation form in seller app
         - Add "Сгенерировать структуру с помощью AI" button near the module/lesson section
         - On click: open modal with form fields: topic, level (select), target_audience, num_modules (slider 2-10)
         - "Сгенерировать" button → call AI endpoint → show loading spinner
         - On success: show preview of generated outline in modal
         - "Применить" button → populate the course form with generated modules and lessons
         - "Отмена" → close modal without changes
         - Show credit usage info: "Это действие использует 1 AI-кредит"

      3. Lesson editing enhancement:
         - Find existing lesson edit form in seller app
         - Add "Сгенерировать контент" button near lesson content textarea
         - On click: confirmation modal "Сгенерировать контент для урока '{lesson.title}'?"
         - Format selection: "Статья" or "Пошаговый туториал"
         - Generate → loading → preview in modal (render markdown)
         - "Применить" → populate lesson content field
         - "Отмена" → close

      4. If seller app doesn't have course creation pages yet, create minimal stubs:
         - apps/seller/app/courses/new/page.tsx — course creation form
         - Include basic fields: title, description, level, price
         - Module/lesson section where AI can populate

      IMPLEMENTATION APPROACH:
      1. First explore seller app structure to understand what exists
      2. Add API functions for AI endpoints
      3. Build reusable AIGenerateModal component
      4. Integrate into course creation flow
      5. Integrate into lesson editing flow
      6. Verify build

      RULES:
      - "use client" for components with interactions
      - Named exports for components
      - Tailwind CSS only
      - Confirmation modals before any AI generation (prevent accidental credit usage)
      - Show loading states during AI generation (can take 5-10 seconds)
      - Don't overwrite existing form data without confirmation
      - No new dependencies beyond what seller app already has
      - Build must pass: cd apps/seller && pnpm build

      COMMIT: feat(seller): integrate AI course outline and lesson content generators
    test: "cd /mnt/c/Users/aquam/PetProject/Merket_for_10_M_uesr/apps/seller && pnpm build"
    depends_on: []
