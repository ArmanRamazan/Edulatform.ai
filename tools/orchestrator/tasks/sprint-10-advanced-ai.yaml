  - id: smart-notifications
    title: "Smart FSRS-scheduled review notifications"
    scope: backend:notification
    prompt: |
      Task: Add smart flashcard review reminders based on FSRS due dates instead of bulk sending.

      CONTEXT:
      - Notification service: services/py/notification/ (FastAPI, asyncpg, Clean Architecture)
      - Notification DB: notification-db (port 5437)
      - Existing endpoint: POST /flashcard-reminders/send — bulk sends reminders to all users (admin)
      - Learning service has flashcards with FSRS scheduling: each flashcard has a due_date
        GET /api/learning/flashcards/due?user_id=X — returns due flashcards (check actual endpoint)
      - Streaks tracked in learning service: GET /api/learning/streaks/me
      - Service-to-service HTTP calls via httpx
      - LEARNING_SERVICE_URL in config (or add it)

      WHAT TO BUILD:
      1. Config: Add LEARNING_SERVICE_URL to notification service config if not present.

      2. Service logic: app/services/smart_reminder_service.py
         SmartReminderService(notification_repo, http_client):
         - send_smart_reminders() -> dict
           Step 1: Get list of all users with notifications (or a dedicated user list endpoint)
           Step 2: For each user, call learning service to get:
             a) Count of due flashcards: GET {LEARNING_SERVICE_URL}/flashcards/due-count?user_id={id}
                (or fetch due flashcards and count them)
             b) Last review timestamp: check if user reviewed in last 24 hours
             c) Active streak: GET {LEARNING_SERVICE_URL}/streaks/{user_id}
           Step 3: Decision logic per user:
             - If due_cards > 5 AND last_review > 24h ago → send reminder
             - If user has active streak > 3 days → don't send (they're already engaged)
             - If due_cards <= 5 → don't send (not urgent)
           Step 4: Create notification for qualifying users:
             title: "Время для повторения!"
             message: "У вас {due_count} карточек для повторения. Не дайте знаниям забыться!"
             type: "flashcard_reminder"
           Step 5: Return: { users_checked, reminders_sent, skipped_active_streak, skipped_low_cards }

      3. Route: POST /flashcard-reminders/smart — admin only
         Calls SmartReminderService.send_smart_reminders()
         Returns summary stats
         Register in app/main.py

      IMPLEMENTATION APPROACH:
      1. TDD: Mock httpx calls to learning service
      2. Test: user with >5 due cards and no recent review → reminder sent
      3. Test: user with active streak → no reminder
      4. Test: user with <=5 due cards → no reminder
      5. Test: learning service unavailable → skip user gracefully, continue with others
      6. Test: deduplication — don't send if same notification sent today
      7. Implement: service → route

      RULES:
      - TDD mandatory: write failing tests FIRST
      - Clean Architecture
      - Service-to-service via httpx with timeout (5s per call)
      - Graceful failure: if learning service is down for one user, skip and continue
      - Don't spam: max 1 reminder per user per day (check existing notifications before creating)
      - Parameterized SQL only
      - Type hints on all public functions
      - Admin-only endpoint (role check)
      - Don't break existing /flashcard-reminders/send endpoint

