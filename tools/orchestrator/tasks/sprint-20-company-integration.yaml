phase: "sprint-20"
description: "Company Integration — multi-tenant organizations, GitHub adapter, knowledge base management"

tasks:
  - id: organization-model
    title: "Organization model in Identity service"
    scope: backend:identity
    type: feat
    prompt: |
      Task: Add organization (company/team) support to the Identity service for multi-tenancy.

      CONTEXT:
      - Identity service: services/py/identity/ (FastAPI, asyncpg, Clean Architecture)
      - identity-db on port 5433
      - Users table has: id, email, password_hash, name, role, is_verified, email_verified
      - Existing migrations: check migrations/ for next number
      - JWT: create_access_token supports extra_claims for role/is_verified

      WHAT TO BUILD:
      TDD — write tests first, then implement.

      1. Migration:
         CREATE TABLE IF NOT EXISTS organizations (
           id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
           name VARCHAR(200) NOT NULL,
           slug VARCHAR(200) NOT NULL UNIQUE,
           logo_url TEXT,
           settings JSONB DEFAULT '{}',
           is_active BOOLEAN NOT NULL DEFAULT true,
           created_at TIMESTAMPTZ NOT NULL DEFAULT now()
         );
         CREATE TABLE IF NOT EXISTS org_members (
           id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
           organization_id UUID NOT NULL REFERENCES organizations(id) ON DELETE CASCADE,
           user_id UUID NOT NULL REFERENCES users(id) ON DELETE CASCADE,
           role VARCHAR(20) NOT NULL DEFAULT 'member',  -- owner, admin, member
           joined_at TIMESTAMPTZ NOT NULL DEFAULT now(),
           UNIQUE(organization_id, user_id)
         );
         CREATE INDEX idx_org_members_user ON org_members(user_id);
         CREATE INDEX idx_org_members_org ON org_members(organization_id);

      2. Domain: app/domain/organization.py
         @dataclass(frozen=True) Organization: id, name, slug, logo_url, settings, is_active, created_at
         @dataclass(frozen=True) OrgMember: id, organization_id, user_id, role, joined_at

      3. Repository: app/repositories/organization_repository.py
         OrganizationRepository(pool):
         - create(name, slug, settings={}) -> Organization
         - get_by_id(org_id) -> Organization | None
         - get_by_slug(slug) -> Organization | None
         - add_member(org_id, user_id, role="member") -> OrgMember
         - remove_member(org_id, user_id) -> bool
         - get_members(org_id, limit, offset) -> list[OrgMember]
         - get_user_orgs(user_id) -> list[Organization]

      4. Service: app/services/organization_service.py
         OrganizationService(repo):
         - create_organization(name, slug, owner_user_id) -> Organization
           Create org + add owner as member with role="owner"
         - get_organization(org_id) -> Organization
         - invite_member(org_id, user_id, inviter_user_id, role="member") -> OrgMember
           Check inviter is owner/admin. Handle duplicate → ConflictError.
         - remove_member(org_id, user_id, remover_user_id) -> None
           Check remover is owner/admin. Can't remove owner.
         - get_my_organizations(user_id) -> list[Organization]

      5. Routes: app/routes/organization_routes.py
         POST /organizations — Auth required. Body: {name, slug}. Creator becomes owner.
         GET /organizations/me — Auth required. List user's organizations.
         GET /organizations/{id} — Auth required (member only).
         POST /organizations/{id}/members — Body: {user_id, role}. Admin/owner only.
         DELETE /organizations/{id}/members/{user_id} — Admin/owner only.
         GET /organizations/{id}/members — Member access.

      6. Add organization_id to JWT extra_claims (when user selects active org)

      7. Tests: full service + route tests

      RULES:
      - TDD mandatory
      - Slug must be URL-safe (lowercase, hyphens only)
      - Owner cannot be removed
      - UniqueViolationError → ConflictError
      - Follow existing Identity service patterns

      COMMIT: feat(identity): add organization model with multi-tenant membership
    test: "cd /mnt/c/Users/aquam/PetProject/Merket_for_10_M_uesr/services/py/identity && uv run --package identity pytest tests/ -v"
    depends_on: []

  - id: github-adapter
    title: "GitHub repository indexing adapter"
    scope: backend:rag
    type: feat
    prompt: |
      Task: Build a GitHub adapter that fetches repository files and indexes them into the RAG service.

      CONTEXT:
      - RAG service: services/py/rag/ (port 8008)
      - IngestionService exists: ingest(org_id, source_type, source_path, title, content)
      - GitHub API: GET https://api.github.com/repos/{owner}/{repo}/git/trees/{branch}?recursive=1
        Returns: {tree: [{path, type, sha, size}]}
      - File content: GET https://api.github.com/repos/{owner}/{repo}/contents/{path}?ref={branch}
        Returns: {content (base64), encoding}
      - httpx for HTTP calls

      WHAT TO BUILD:
      TDD — write tests first, then implement.

      1. app/adapters/github_adapter.py:
         GitHubAdapter(http_client, github_token: str = ""):
         - async list_files(owner, repo, branch="main", extensions=[".py",".ts",".md",".yaml"]) -> list[dict]
           Fetch tree, filter by extensions and size < 100KB
         - async get_file_content(owner, repo, path, branch="main") -> str
           Fetch file, decode base64
         - async index_repository(org_id, owner, repo, branch, extensions) -> int
           1. List files
           2. For each file: get content, call IngestionService.ingest
           3. Return count of indexed files
           4. Batch process (10 files at a time to avoid rate limits)

      2. Add to config: github_token: str = "" (PAT for private repos, optional for public)

      3. Routes: app/routes/github_routes.py
         POST /sources/github — Auth required (admin). Body: {org_id, owner, repo, branch, extensions[]}
         Triggers index_repository. Returns {indexed_files_count}.

      4. Tests:
         - test_github_adapter.py: mock httpx responses (tree listing, file content)
         - Test file filtering by extension
         - Test base64 decoding
         - Test batch processing

      RULES:
      - TDD mandatory
      - Rate limit: max 10 concurrent requests, sleep 100ms between batches
      - Skip binary files, files > 100KB
      - GitHub token via env var (optional for public repos)
      - Error on individual file doesn't stop batch

      COMMIT: feat(rag): add GitHub repository indexing adapter
    test: "cd /mnt/c/Users/aquam/PetProject/Merket_for_10_M_uesr/services/py/rag && uv run --package rag pytest tests/ -v"
    depends_on: []

  - id: knowledge-base-crud
    title: "Knowledge base management API"
    scope: backend:rag
    type: feat
    prompt: |
      Task: Build CRUD API for managing company knowledge bases — an admin creates sources, triggers indexing, views concepts.

      CONTEXT:
      - RAG service: services/py/rag/
      - documents table, chunks table, org_concepts table already exist
      - IngestionService: ingest documents
      - GitHubAdapter: index repositories
      - SearchService: semantic search
      - ExtractionService: extract concepts from documents

      WHAT TO BUILD:
      TDD — write tests first, then implement.

      1. app/services/knowledge_base_service.py:
         KnowledgeBaseService(document_repo, concept_store, ingestion_service, search_service):

         async get_stats(org_id) -> KBStats:
           {total_documents, total_chunks, total_concepts, last_updated}

         async list_sources(org_id) -> list[Document]:
           All documents for this org, grouped by source_type

         async search(org_id, query, limit=5) -> list[SearchResult]:
           Delegate to SearchService

         async get_concept_graph(org_id) -> dict:
           Fetch org_concepts + concept_relationships
           Return {nodes: [{id, name, description}], edges: [{source, target, type}]}

         async refresh_source(document_id) -> Document:
           Re-ingest document (delete chunks, re-chunk, re-embed)

      2. Routes: app/routes/knowledge_base_routes.py
         GET /kb/{org_id}/stats — Auth required (member). Knowledge base overview.
         GET /kb/{org_id}/sources — Auth required (member). List all sources.
         GET /kb/{org_id}/concepts — Auth required (member). Returns concept graph.
         POST /kb/{org_id}/search — Auth required (member). Body: {query, limit}.
         POST /kb/{org_id}/refresh/{document_id} — Auth required (admin). Re-index source.

      3. Tests: mock all dependencies, test aggregation logic

      RULES:
      - TDD mandatory
      - Clean Architecture
      - Organization membership check on all endpoints
      - Concept graph returns nodes + edges for frontend visualization

      COMMIT: feat(rag): add knowledge base management API with stats and concept graph
    test: "cd /mnt/c/Users/aquam/PetProject/Merket_for_10_M_uesr/services/py/rag && uv run --package rag pytest tests/ -v"
    depends_on: [github-adapter]

  - id: markdown-ingestion
    title: "Markdown and document file ingestion"
    scope: backend:rag
    type: feat
    prompt: |
      Task: Build markdown/text document upload and ingestion — admin uploads company docs directly.

      CONTEXT:
      - RAG service: services/py/rag/
      - IngestionService exists: ingest(org_id, source_type, source_path, title, content)
      - Currently only GitHub adapter provides content. Need direct upload too.

      WHAT TO BUILD:
      TDD — write tests first, then implement.

      1. app/routes/upload_routes.py:
         POST /upload/markdown — Auth required (admin). Multipart form: file + org_id + title
           Read file content (must be .md, .txt, .rst, max 1MB)
           Call IngestionService.ingest(org_id, "markdown", filename, title, content)
           Return document.

         POST /upload/bulk — Auth required (admin). Multipart form: files[] + org_id
           Process multiple files in one request (max 20 files)
           Return list of created documents.

      2. Input validation:
         - Max file size: 1MB
         - Allowed extensions: .md, .txt, .rst, .yaml, .json
         - Content must be valid UTF-8
         - Title auto-generated from filename if not provided

      3. Tests:
         - test_upload_routes.py: test single upload, bulk upload, validation errors
         - Use FastAPI TestClient with multipart upload

      RULES:
      - TDD mandatory
      - Use FastAPI UploadFile for file handling
      - Validate file size and type BEFORE processing
      - UTF-8 only

      COMMIT: feat(rag): add markdown and document file upload ingestion
    test: "cd /mnt/c/Users/aquam/PetProject/Merket_for_10_M_uesr/services/py/rag && uv run --package rag pytest tests/ -v"
    depends_on: [knowledge-base-crud]

  - id: onboarding-template
    title: "Onboarding path template: admin defines learning structure"
    scope: backend:rag
    type: feat
    prompt: |
      Task: Let organization admins define onboarding path templates — ordered concept groups that new engineers should learn.

      CONTEXT:
      - RAG service: services/py/rag/
      - org_concepts table has extracted concepts per organization
      - Strategist agent uses these concepts to build learning paths
      - Admin needs to define: which concepts are critical, what order, what prerequisites

      WHAT TO BUILD:
      TDD — write tests first, then implement.

      1. Migration:
         CREATE TABLE IF NOT EXISTS onboarding_templates (
           id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
           organization_id UUID NOT NULL,
           name VARCHAR(200) NOT NULL,
           description TEXT,
           is_default BOOLEAN DEFAULT false,
           created_at TIMESTAMPTZ NOT NULL DEFAULT now()
         );
         CREATE TABLE IF NOT EXISTS template_stages (
           id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
           template_id UUID NOT NULL REFERENCES onboarding_templates(id) ON DELETE CASCADE,
           name VARCHAR(200) NOT NULL,
           description TEXT,
           stage_order INT NOT NULL,
           trust_level_required INT NOT NULL DEFAULT 0,
           concept_ids UUID[] DEFAULT '{}',
           created_at TIMESTAMPTZ NOT NULL DEFAULT now()
         );

      2. Domain + Repository + Service (standard CRUD pattern)

      3. Routes:
         POST /templates — Create onboarding template. Admin only.
         GET /templates?org_id=... — List templates.
         GET /templates/{id} — Get template with stages.
         POST /templates/{id}/stages — Add stage to template. Body: {name, order, trust_level_required, concept_ids[]}.
         PUT /templates/{id}/stages/{stage_id} — Update stage.
         DELETE /templates/{id}/stages/{stage_id} — Remove stage.

      4. Integration: Strategist agent reads the default template to seed the learning path.

      5. Tests: standard service + route tests

      RULES:
      - TDD mandatory
      - Only one template can be is_default=true per org
      - Stages ordered by stage_order
      - concept_ids references org_concepts(id) — validated at service layer
      - Clean Architecture

      COMMIT: feat(rag): add onboarding path templates for organization admins
    test: "cd /mnt/c/Users/aquam/PetProject/Merket_for_10_M_uesr/services/py/rag && uv run --package rag pytest tests/ -v"
    depends_on: [knowledge-base-crud]
