phase: "sprint-2"
description: "Supply Side — Seller App + Teacher Tools"

tasks:
  # ─── FRONTEND: Seller App scaffold ───────────────────────────────────────────

  - id: seller-scaffold
    title: "Scaffold seller Next.js app"
    scope: frontend:seller
    prompt: |
      Task: Scaffold the seller Next.js app at apps/seller/ from scratch.
      The directory already exists with empty .gitkeep files in app/, components/, hooks/, lib/.

      CONTEXT:
      - Buyer app (apps/buyer/) is the reference: Next.js 15, App Router, TypeScript strict,
        Tailwind CSS v4, TanStack Query, port 3001
      - Package manager: pnpm. Workspace root has pnpm-workspace.yaml
      - Seller app is for teachers only: manage courses, view analytics, track earnings
      - No Radix UI (not used in buyer) — plain HTML + Tailwind is fine
      - Auth: same JWT from identity service (port 8001). Teacher role required.
      - API proxied via next.config.ts rewrites (same pattern as buyer)

      WHAT TO BUILD:

      1. Remove .gitkeep files from app/, components/, hooks/, lib/

      2. Create apps/seller/package.json:
         ```json
         {
           "name": "seller",
           "version": "0.1.0",
           "private": true,
           "scripts": {
             "dev": "next dev --port 3002",
             "build": "next build",
             "start": "next start --port 3002"
           },
           "dependencies": {
             "@tanstack/react-query": "^5.90.21",
             "next": "^15.3.0",
             "react": "^19.1.0",
             "react-dom": "^19.1.0"
           },
           "devDependencies": {
             "@tailwindcss/postcss": "^4.1.0",
             "@types/node": "^22.0.0",
             "@types/react": "^19.0.0",
             "@types/react-dom": "^19.0.0",
             "tailwindcss": "^4.1.0",
             "typescript": "^5.8.0"
           }
         }
         ```

      3. Create apps/seller/tsconfig.json (identical to buyer except name):
         strict: true, moduleResolution: bundler, paths: {"@/*": ["./*"]}
         jsx: preserve, incremental: true, plugins: [{name: "next"}]

      4. Create apps/seller/next.config.ts — rewrites proxying all services:
         /api/identity/:path* → http://localhost:8001/:path*
         /api/course/:path* → http://localhost:8002/:path*
         /api/payment/:path* → http://localhost:8004/:path*
         /api/notification/:path* → http://localhost:8005/:path*

      5. Create apps/seller/postcss.config.mjs:
         ```js
         const config = { plugins: { "@tailwindcss/postcss": {} } };
         export default config;
         ```

      6. Create apps/seller/app/globals.css:
         ```css
         @import "tailwindcss";
         ```

      7. Create apps/seller/lib/api.ts — typed API client namespace objects.
         Interfaces to define (minimal — only what seller needs):
         - User (id, email, name, role, is_verified, email_verified, created_at)
         - Course (id, teacher_id, title, description, is_free, price, duration_minutes,
                   level, created_at, avg_rating, review_count, category_id)
         - CourseCreate (title, description, is_free, price, duration_minutes, level, category_id)
         - CourseUpdate (Partial CourseCreate fields, all optional)
         - Module (id, course_id, title, order, created_at)
         - Lesson (id, module_id, title, content, video_url, duration_minutes, order, created_at)
         - CourseAnalytics (course_id, title, avg_rating, review_count, module_count, lesson_count)
         - TeacherAnalyticsSummary (total_courses, total_lessons, avg_rating, total_reviews, courses)
         - EarningResponse (id, teacher_id, course_id, payment_id, gross_amount,
                            commission_rate, net_amount, status, created_at)
         - EarningsSummary (total_gross, total_net, total_pending, total_paid, earnings)
         - PayoutResponse (id, teacher_id, amount, stripe_transfer_id, status, requested_at, completed_at)
         - PayoutListResponse (items, total)

         Namespace objects (same fetch pattern as buyer's lib/api.ts):
         - identity: { login(email, password), me(token) }
         - courses: {
             list(token, params?): CourseList,
             get(token, id): Course,
             create(token, body: CourseCreate): Course,
             update(token, id, body: CourseUpdate): Course,
             curriculum(token, id): CurriculumResponse
           }
         - analytics: {
             getSummary(token): TeacherAnalyticsSummary
           }
         - earnings: {
             getSummary(token): EarningsSummary,
             listEarnings(token, limit?, offset?): EarningsListResponse,
             requestPayout(token, amount): PayoutResponse,
             listPayouts(token, limit?, offset?): PayoutListResponse
           }

         All fetch calls go to /api/{service}/... (proxied by next.config.ts).
         Throw an Error with message from JSON body on non-2xx responses.

      8. Create apps/seller/lib/errors.ts — same AppError class as buyer

      9. Create apps/seller/components/Providers.tsx — QueryClientProvider wrapper,
         same as buyer's components/Providers.tsx (staleTime 60s, retry 1)

      10. Create apps/seller/hooks/use-auth.ts — same pattern as buyer's hooks/use-auth.ts
          but only allows role="teacher" (redirect if student logs in)

      11. Create apps/seller/app/layout.tsx:
          - Metadata: title "EduPlatform — Seller", description "Teacher dashboard"
          - Wraps children in <Providers>
          - Import globals.css
          - html lang="en", body with bg-gray-50 text-gray-900 min-h-screen

      12. Create apps/seller/app/loading.tsx — simple centered spinner div

      13. Create apps/seller/app/error.tsx — "use client", error boundary with retry button

      14. Create apps/seller/app/page.tsx (root redirect):
          Server component that redirects to /dashboard.
          Use next/navigation redirect() from "next/navigation".

      INSTALL DEPS:
      Run: cd apps/seller && pnpm install

      RULES:
      - Named exports only, no default exports
      - "use client" only where hooks or event handlers are used
      - Tailwind CSS only (no CSS modules, no styled-components)
      - TypeScript strict: no `any`, no implicit unknowns
      - After scaffold: cd apps/seller && pnpm build
      - Commit: feat(seller): scaffold seller app with API client and auth
    test: "cd apps/seller && pnpm build"

  # ─── FRONTEND: Seller dashboard + course list ─────────────────────────────────

  - id: seller-dashboard
    title: "Seller dashboard and course management UI"
    scope: frontend:seller
    depends_on:
      - seller-scaffold
    prompt: |
      Task: Build the seller dashboard and course management pages in apps/seller/.

      CONTEXT:
      - apps/seller/ is scaffolded with Next.js 15, App Router, Tailwind v4, TanStack Query
      - lib/api.ts has typed namespace objects: identity, courses, analytics, earnings
      - hooks/use-auth.ts provides { token, user, loading, login, logout }
      - Teacher can: view their courses, create a new course, edit a course, view curriculum
      - Course service (port 8002, proxied at /api/course/):
        - GET /courses/my — teacher's courses (requires Bearer token)
        - POST /courses — create course
        - PUT /courses/:id — update course
        - GET /courses/:id/curriculum — modules + lessons
      - All pages behind /dashboard/* require teacher auth; redirect to /login if not authenticated

      WHAT TO BUILD:

      1. apps/seller/hooks/use-courses.ts — TanStack Query hooks:
         - useTeacherCourses(token: string | null) → useQuery({queryKey: ["teacher-courses"], ...})
         - useCurriculum(token, courseId) → useQuery({queryKey: ["curriculum", courseId], ...})
         - useCreateCourse(token) → useMutation calling courses.create, invalidates "teacher-courses"
         - useUpdateCourse(token) → useMutation calling courses.update, invalidates "teacher-courses" + ["curriculum", id]

      2. apps/seller/components/CourseRow.tsx — table row component:
         Interface CourseRowProps { course: Course; onEdit: (id: string) => void }
         Displays: title, level badge, price/free label, review_count stars, created_at date
         Named export: CourseRow

      3. apps/seller/app/login/page.tsx — "use client" login form:
         - Email + password fields
         - On submit: calls identity.login, stores token in localStorage, redirects to /dashboard
         - Show error message on failure
         - If already logged in, redirect to /dashboard
         - Link to "register" (just a placeholder href for now, no register page needed)

      4. apps/seller/app/dashboard/layout.tsx — "use client":
         - Check auth on mount (useAuth hook)
         - If loading: show spinner
         - If not authenticated: redirect to /login
         - If role !== "teacher": show "Access denied — teacher account required" message
         - Sidebar navigation: links to /dashboard, /dashboard/courses, /dashboard/analytics, /dashboard/earnings
         - Header with user name and logout button

      5. apps/seller/app/dashboard/page.tsx — overview page:
         Server component shell (no data fetching here — data in child Client components).
         Renders a DashboardOverview client component.

      6. apps/seller/components/DashboardOverview.tsx — "use client":
         - Fetches useTeacherCourses(token) and displays stats cards:
           - Total courses count
           - Total reviews count (sum of review_count)
           - Average rating (computed from courses)
         - Shows last 5 courses in a simple table using CourseRow
         - "Create New Course" button links to /dashboard/courses/new

      7. apps/seller/app/dashboard/courses/page.tsx — course list page:
         Renders a CourseList client component.

      8. apps/seller/components/CourseList.tsx — "use client":
         - Fetches useTeacherCourses(token)
         - Table with all teacher's courses using CourseRow
         - "New Course" button → navigates to /dashboard/courses/new
         - Click row → navigates to /dashboard/courses/[id]/edit

      9. apps/seller/app/dashboard/courses/new/page.tsx — new course form:
         Renders a CourseForm client component in create mode.

      10. apps/seller/app/dashboard/courses/[id]/edit/page.tsx — edit course form:
          Renders CourseForm in edit mode, pre-fills with course data from GET /courses/:id

      11. apps/seller/components/CourseForm.tsx — "use client":
          Interface CourseFormProps { courseId?: string } (undefined = create mode)
          Fields: title (text), description (textarea), level (select: beginner/intermediate/advanced),
                  is_free (checkbox), price (number, disabled if is_free), duration_minutes (number)
          On submit: calls useCreateCourse or useUpdateCourse mutation
          On success: navigate to /dashboard/courses
          Validation: title required (min 3 chars), duration_minutes > 0, price required if not free

      RULES:
      - Named exports only, no default exports
      - No default exports, no index.tsx barrels
      - "use client" only in components that use hooks/event handlers
      - TanStack Query for all server state (no direct fetch in components)
      - next/link for all internal navigation, no <a> tags
      - Tailwind only for styles
      - After implementation: cd apps/seller && pnpm build
      - Commit: feat(seller): add dashboard and course management UI
    test: "cd apps/seller && pnpm build"

  # ─── FRONTEND: Seller analytics page ─────────────────────────────────────────

  - id: seller-analytics
    title: "Seller analytics dashboard page"
    scope: frontend:seller
    depends_on:
      - seller-dashboard
    prompt: |
      Task: Build the teacher analytics page in apps/seller/app/dashboard/analytics/.

      CONTEXT:
      - apps/seller/ is set up with TanStack Query, Tailwind, TypeScript strict
      - lib/api.ts has analytics.getSummary(token) → TeacherAnalyticsSummary
        TeacherAnalyticsSummary = { total_courses, total_lessons, avg_rating, total_reviews, courses: CourseAnalytics[] }
        CourseAnalytics = { course_id, title, avg_rating, review_count, module_count, lesson_count }
      - Course service analytics endpoint: GET /api/course/analytics/teacher (Bearer token required)
      - hooks/use-auth.ts provides { token, user }
      - Dashboard layout (app/dashboard/layout.tsx) already handles auth guard

      WHAT TO BUILD:

      1. apps/seller/hooks/use-analytics.ts — TanStack Query hooks:
         ```typescript
         export function useTeacherAnalytics(token: string | null) {
           return useQuery({
             queryKey: ["teacher-analytics"],
             queryFn: () => analytics.getSummary(token!),
             enabled: !!token,
           });
         }
         ```

      2. apps/seller/app/dashboard/analytics/loading.tsx — skeleton with 4 stat cards

      3. apps/seller/app/dashboard/analytics/page.tsx — Server component shell,
         renders AnalyticsDashboard client component.

      4. apps/seller/components/AnalyticsDashboard.tsx — "use client":
         - Calls useTeacherAnalytics(token)
         - Loading state: show skeleton cards
         - Error state: "Failed to load analytics" message with retry button
         - Summary stat cards row (4 cards):
           - Total Courses (total_courses)
           - Total Lessons (total_lessons)
           - Average Rating (avg_rating ?? "N/A", 1 decimal)
           - Total Reviews (total_reviews)
         - Per-course analytics table with columns:
           Course Title | Modules | Lessons | Reviews | Avg Rating
           One row per course in summary.courses
         - Empty state: "No courses yet. Create your first course." with link to /dashboard/courses/new

      RULES:
      - Named exports only
      - "use client" only on AnalyticsDashboard (not on page.tsx)
      - No <a> tags — use next/link
      - Tailwind only
      - After implementation: cd apps/seller && pnpm build
      - Commit: feat(seller): add teacher analytics dashboard page
    test: "cd apps/seller && pnpm build"

  # ─── FRONTEND: Seller earnings page ──────────────────────────────────────────

  - id: seller-earnings
    title: "Seller earnings and payout request UI"
    scope: frontend:seller
    depends_on:
      - seller-analytics
    prompt: |
      Task: Build the teacher earnings page and payout request UI in apps/seller/app/dashboard/earnings/.

      CONTEXT:
      - apps/seller/ is set up with TanStack Query, Tailwind, TypeScript strict
      - lib/api.ts has earnings namespace:
        - earnings.getSummary(token) → EarningsSummary
          EarningsSummary = { total_gross, total_net, total_pending, total_paid, earnings: EarningResponse[] }
          EarningResponse = { id, teacher_id, course_id, payment_id, gross_amount,
                              commission_rate, net_amount, status, created_at }
        - earnings.requestPayout(token, amount) → PayoutResponse
        - earnings.listPayouts(token) → PayoutListResponse
          PayoutListResponse = { items: PayoutResponse[], total }
          PayoutResponse = { id, teacher_id, amount, stripe_transfer_id, status, requested_at, completed_at }
      - Payment service earnings endpoints (port 8004, proxied at /api/payment/):
        - GET /earnings/me/summary
        - GET /earnings/me
        - POST /earnings/payouts
        - GET /earnings/payouts
      - Dashboard layout already handles auth guard

      WHAT TO BUILD:

      1. apps/seller/hooks/use-earnings.ts — TanStack Query hooks:
         - useEarningsSummary(token: string | null) → useQuery
         - usePayouts(token: string | null) → useQuery
         - useRequestPayout(token: string | null) → useMutation
           On success: invalidate ["earnings-summary"] and ["payouts"]

      2. apps/seller/app/dashboard/earnings/loading.tsx — skeleton with 4 stat cards

      3. apps/seller/app/dashboard/earnings/page.tsx — Server component shell,
         renders EarningsDashboard client component.

      4. apps/seller/components/EarningsDashboard.tsx — "use client":
         - Calls useEarningsSummary(token) and usePayouts(token)
         - Loading/error states
         - Summary stat cards (4 cards):
           - Total Gross Revenue (total_gross formatted as $X.XX)
           - Total Net (after commission) (total_net formatted as $X.XX)
           - Pending (total_pending formatted as $X.XX)
           - Paid Out (total_paid formatted as $X.XX)
         - Commission info note: "Platform commission: 30%. Net = 70% of gross."
         - Payout request section:
           - Number input for amount (min 1, max = total_pending as number)
           - "Request Payout" button — calls useRequestPayout mutation
           - Disabled + spinner while mutation is pending
           - Show success message: "Payout of $X.XX requested successfully"
           - Show error message on failure
         - Earnings history table:
           Columns: Date | Course ID (truncated UUID) | Gross | Net | Status badge
           Show last 20 from summary.earnings
         - Payouts history table:
           Columns: Date | Amount | Status | Transfer ID (or "pending")
           Show from usePayouts result

      RULES:
      - Named exports only
      - "use client" only on EarningsDashboard (not on page.tsx)
      - No <a> tags, no <img> tags
      - Tailwind only
      - Format Decimal amounts as "$X.XX" (toFixed(2))
      - After implementation: cd apps/seller && pnpm build
      - Commit: feat(seller): add earnings and payout request UI
    test: "cd apps/seller && pnpm build"

  # ─── FRONTEND: Seller onboarding page ────────────────────────────────────────

  - id: seller-onboarding
    title: "Teacher onboarding and registration page"
    scope: frontend:seller
    depends_on:
      - seller-earnings
    prompt: |
      Task: Build the teacher onboarding flow in apps/seller/ — a dedicated register/onboarding page
      that guides a new teacher through account creation and explains the platform.

      CONTEXT:
      - apps/seller/ is set up with Next.js 15, App Router, Tailwind, TypeScript strict
      - lib/api.ts has identity namespace: identity.login(email, password), identity.me(token)
      - Identity service (port 8001, proxied at /api/identity/):
        - POST /register { email, password, name, role: "teacher" } → { access_token, token_type }
        - Teachers start as is_verified=false and must be verified by an admin
      - After registration, teacher sees a "pending verification" screen
      - hooks/use-auth.ts provides useAuth() with { token, user, login, register, logout }
        register(email, password, name, role) calls POST /register — add this to use-auth.ts if missing

      WHAT TO BUILD:

      1. Verify apps/seller/hooks/use-auth.ts has register() function.
         If identity.register is not in lib/api.ts, add it:
         POST /api/identity/register { email, password, name, role } → TokenResponse

      2. apps/seller/app/register/page.tsx — renders TeacherRegisterForm client component.

      3. apps/seller/components/TeacherRegisterForm.tsx — "use client":
         Multi-step form (2 steps controlled by local state, no routing between steps):

         Step 1 — Account details:
           - Name (text, required, min 2 chars)
           - Email (email type, required)
           - Password (password type, required, min 8 chars)
           - "Next" button: validates fields, advances to step 2

         Step 2 — Confirm and create:
           - Summary: "Creating teacher account for {name} ({email})"
           - Checklist of what teachers can do on the platform:
             * Create and manage courses
             * Track student enrollments and reviews
             * View earnings analytics
             * Request payouts
           - "Create Teacher Account" submit button
           - "Back" button to return to step 1
           - Calls identity.register + stores token + calls identity.me
           - On success: shows PendingVerification component (not a redirect)
           - On error: shows error message below form

         Step 3 — Pending verification (shown after successful register):
           Not a separate route — rendered inline after successful registration.
           Shows:
           - "Account created successfully!" heading
           - "Your teacher account is pending admin verification. You will receive
             an email once your account is approved."
           - "Go to Dashboard" link → /dashboard
             (Dashboard layout will show access-denied if not verified — that's intentional
             so teacher can see what's coming)

      4. Update apps/seller/app/login/page.tsx (if it exists from seller-dashboard task):
         Add a link "New teacher? Create an account →" pointing to /register

      5. apps/seller/app/page.tsx (root redirect):
         Ensure it still redirects to /dashboard (created in scaffold task).

      RULES:
      - Named exports only
      - "use client" only on TeacherRegisterForm (not on page.tsx)
      - No default exports
      - Tailwind only
      - next/link for navigation links
      - Client-side validation before API call (no empty submit)
      - After implementation: cd apps/seller && pnpm build
      - Commit: feat(seller): add teacher onboarding and registration flow
    test: "cd apps/seller && pnpm build"

  # ─── FRONTEND: Generate quiz button for teacher ───────────────────────────────

  - id: generate-quiz-button
    title: "Generate quiz button for teacher"
    scope: frontend:buyer
    prompt: |
      Task: Add a "Generate quiz" button on the lesson page for teachers.

      CONTEXT:
      - Course service (port 8002) has lessons with teacher_id
      - AI service (port 8006) has POST /ai/quiz/generate {lesson_id, content}
      - Learning service (port 8007) has POST /quizzes to save generated quiz
      - Frontend buyer app is in apps/buyer/ (Next.js App Router, Tailwind, TanStack Query)
      - Existing quiz UI is at apps/buyer/app/courses/[id]/lessons/[lessonId]/
      - API client is in apps/buyer/lib/api.ts with namespace objects
      - Hooks pattern: apps/buyer/hooks/use-quiz.ts

      WHAT TO BUILD:
      1. Add a "Generate Quiz" button on the lesson page, visible only to the course teacher
      2. Button calls AI service to generate quiz, then saves it via Learning service
      3. Show loading state during generation
      4. After generation, show the quiz inline

      IMPLEMENTATION:
      1. Check if current user is the course teacher (compare JWT user_id with course.teacher_id)
      2. Add button component with loading spinner
      3. On click: POST /ai/quiz/generate → POST /quizzes with the result
      4. Invalidate quiz query cache after creation
      5. Use existing patterns from apps/buyer/hooks/use-quiz.ts

      RULES:
      - Follow existing component patterns in apps/buyer/
      - Use TanStack Query mutations
      - "use client" only where needed
      - Named exports only, no default exports
      - Tailwind for styling
      - After implementation: cd apps/buyer && pnpm build
      - Create atomic git commit: feat(buyer): add generate quiz button for teachers
    test: "cd apps/buyer && pnpm build"
