phase: "sprint-3"
description: "Acquisition + Retention — SEO, Certificates, Wishlist, Recommendations"

tasks:
  - id: seo-meta-tags
    title: "Dynamic meta tags per page"
    scope: frontend:buyer
    prompt: |
      Task: Add dynamic <title> and <meta name="description"> to every page in the buyer app.

      CONTEXT:
      - Buyer app is in apps/buyer/ (Next.js App Router, TypeScript strict, Tailwind)
      - Next.js App Router uses generateMetadata() export or static metadata export per layout/page
      - Course service (port 8002): GET /courses/:id returns title, description, instructor name
      - Key pages to cover:
        - apps/buyer/app/page.tsx (home/landing)
        - apps/buyer/app/courses/page.tsx (catalog)
        - apps/buyer/app/courses/[id]/page.tsx (course detail)
        - apps/buyer/app/courses/[id]/lessons/[lessonId]/page.tsx (lesson)
        - apps/buyer/app/profile/page.tsx (profile)
        - apps/buyer/app/login/page.tsx and apps/buyer/app/register/page.tsx

      WHAT TO BUILD:
      1. Root layout (apps/buyer/app/layout.tsx): default metadata with site name and fallback description
      2. Home page: static metadata — "Learn anything | EduPlatform" with value-prop description
      3. Catalog page: static metadata — "Browse Courses | EduPlatform"
      4. Course detail page: generateMetadata() fetching course by id — title = course.title, description = first 155 chars of course.description
      5. Lesson page: generateMetadata() — title = lesson title + course name
      6. Auth pages (login, register): static metadata
      7. Profile page: noindex meta tag (private page)

      IMPLEMENTATION:
      1. In root layout export const metadata: Metadata = { title: { template: '%s | EduPlatform', default: 'EduPlatform' }, description: '...' }
      2. Each page exports either static `metadata` or async `generateMetadata({ params })`
      3. For dynamic pages call the course API directly (server component, no auth needed for public data)
      4. Use Next.js Metadata API — no manual <Head> tags
      5. Add metadataBase to root layout: new URL(process.env.NEXT_PUBLIC_BASE_URL ?? 'https://eduplatform.com')

      RULES:
      - Named exports only, no default exports (page.tsx and layout.tsx are Next.js convention exceptions)
      - generateMetadata must handle fetch errors gracefully (return fallback metadata on error)
      - Do not add "use client" to pages that only need metadata
      - After implementation: cd apps/buyer && pnpm build
      - Create atomic git commit: feat(buyer): add dynamic meta tags per page
    test: "cd apps/buyer && pnpm build"

  - id: seo-json-ld
    title: "JSON-LD Course schema (schema.org/Course)"
    scope: frontend:buyer
    depends_on: [seo-meta-tags]
    prompt: |
      Task: Add schema.org/Course JSON-LD structured data to the course detail page.

      CONTEXT:
      - Buyer app is in apps/buyer/ (Next.js App Router, TypeScript strict, Tailwind)
      - Course detail page: apps/buyer/app/courses/[id]/page.tsx (Server Component)
      - Course API: GET /courses/:id returns { id, title, description, price, teacher_name, rating, total_reviews, thumbnail_url, created_at }
      - Next.js App Router: inject JSON-LD via a <script type="application/ld+json"> tag in the page JSX
      - schema.org/Course: https://schema.org/Course

      WHAT TO BUILD:
      1. A reusable server component: apps/buyer/components/seo/CourseJsonLd.tsx
      2. Props interface: { course: CourseDetail } where CourseDetail matches the API shape
      3. Renders a <script> tag with type="application/ld+json" containing the serialized schema
      4. Schema fields to include:
         - "@context": "https://schema.org"
         - "@type": "Course"
         - name: course.title
         - description: course.description
         - provider: { "@type": "Organization", name: "EduPlatform" }
         - instructor: { "@type": "Person", name: course.teacher_name }
         - aggregateRating (if rating > 0): { "@type": "AggregateRating", ratingValue, reviewCount }
         - offers: { "@type": "Offer", price: course.price, priceCurrency: "USD", availability: "https://schema.org/InStock" }
         - image: course.thumbnail_url (if present)
      5. Import and render <CourseJsonLd course={course} /> in the course detail page

      IMPLEMENTATION:
      1. Create apps/buyer/components/seo/ directory
      2. Create CourseJsonLd.tsx as a Server Component (no "use client")
      3. Use TypeScript interface for props
      4. Serialize the schema object with JSON.stringify and inject into a script tag
      5. Add to course detail page after existing content

      RULES:
      - Named exports only
      - Server Component — no hooks
      - Do not expose internal user UUIDs in the schema
      - After implementation: cd apps/buyer && pnpm build
      - Create atomic git commit: feat(buyer): add JSON-LD Course schema for SEO
    test: "cd apps/buyer && pnpm build"

  - id: seo-open-graph
    title: "Open Graph + Twitter Card meta tags"
    scope: frontend:buyer
    depends_on: [seo-meta-tags]
    prompt: |
      Task: Add Open Graph and Twitter Card meta tags to course detail and home pages.

      CONTEXT:
      - Buyer app is in apps/buyer/ (Next.js App Router, TypeScript strict, Tailwind)
      - Next.js Metadata API supports openGraph and twitter fields in the Metadata object
      - Course detail page: apps/buyer/app/courses/[id]/page.tsx
      - Home page: apps/buyer/app/page.tsx
      - Course API returns thumbnail_url for OG image
      - metadataBase should already be set in root layout from task dynamic-meta-tags

      WHAT TO BUILD:
      1. Root layout: add default openGraph and twitter card metadata
         - openGraph: { type: "website", siteName: "EduPlatform", images: [default OG image] }
         - twitter: { card: "summary_large_image", site: "@EduPlatform" }
      2. Course detail generateMetadata(): extend with openGraph fields
         - openGraph.type: "website"
         - openGraph.title: course.title
         - openGraph.description: first 200 chars of course.description
         - openGraph.images: [{ url: course.thumbnail_url, width: 1200, height: 630, alt: course.title }]
         - twitter: { card: "summary_large_image", title: course.title, description: ..., images: [course.thumbnail_url] }
      3. Home page: add static openGraph with a default hero image path (/og-home.jpg placeholder)

      IMPLEMENTATION:
      1. Edit apps/buyer/app/layout.tsx — add openGraph + twitter to default metadata
      2. Edit apps/buyer/app/courses/[id]/page.tsx — extend generateMetadata() return value
      3. Edit apps/buyer/app/page.tsx — add openGraph to static metadata export
      4. Create a 1x1 placeholder image at apps/buyer/public/og-home.jpg if no OG image exists yet

      RULES:
      - All within Next.js Metadata API — no manual <meta> tags
      - Graceful fallback when thumbnail_url is null/undefined
      - After implementation: cd apps/buyer && pnpm build
      - Create atomic git commit: feat(buyer): add Open Graph and Twitter Card meta tags
    test: "cd apps/buyer && pnpm build"

  - id: seo-sitemap
    title: "Dynamic sitemap.xml generation"
    scope: frontend:buyer
    prompt: |
      Task: Generate a dynamic sitemap.xml for the buyer app using Next.js App Router conventions.

      CONTEXT:
      - Buyer app is in apps/buyer/ (Next.js App Router, TypeScript strict)
      - Next.js App Router supports sitemap.ts at apps/buyer/app/sitemap.ts
      - Course service (port 8002): GET /courses?page=1&page_size=1000 returns list of courses with ids and updated_at
      - Public pages: / , /courses, /courses/[id], /login, /register
      - Base URL from env: NEXT_PUBLIC_BASE_URL (default: https://eduplatform.com)

      WHAT TO BUILD:
      1. apps/buyer/app/sitemap.ts — default export async function sitemap() returning MetadataRoute.Sitemap
      2. Static routes: home (/), catalog (/courses), login (/login), register (/register)
         - home: priority 1.0, changeFrequency: "daily"
         - catalog: priority 0.9, changeFrequency: "hourly"
         - auth pages: priority 0.3, changeFrequency: "yearly"
      3. Dynamic routes: fetch all course IDs from course service
         - Each course: /courses/[id], priority 0.8, changeFrequency: "weekly", lastModified from course.updated_at
      4. Handle fetch errors gracefully — return only static routes if course service is unavailable

      IMPLEMENTATION:
      1. Create apps/buyer/app/sitemap.ts
      2. Use Next.js MetadataRoute.Sitemap type from "next"
      3. Fetch courses server-side (runs at build time for SSG or on-demand for ISR)
      4. Use the internal service URL: process.env.INTERNAL_COURSE_SERVICE_URL ?? 'http://localhost:8002'
      5. Set export const revalidate = 3600 for hourly regeneration

      RULES:
      - Default export required (Next.js sitemap.ts convention — exception to the no-default-export rule)
      - TypeScript strict — use MetadataRoute.Sitemap return type
      - Graceful error handling with try/catch
      - After implementation: cd apps/buyer && pnpm build
      - Create atomic git commit: feat(buyer): add dynamic sitemap.xml generation
    test: "cd apps/buyer && pnpm build"

  - id: seo-robots
    title: "robots.txt"
    scope: frontend:buyer
    prompt: |
      Task: Add robots.txt to the buyer app using Next.js App Router conventions.

      CONTEXT:
      - Buyer app is in apps/buyer/ (Next.js App Router, TypeScript strict)
      - Next.js App Router supports robots.ts at apps/buyer/app/robots.ts
      - Pages that should be blocked from indexing: /profile, /checkout, /api
      - Sitemap URL will be at /sitemap.xml

      WHAT TO BUILD:
      1. apps/buyer/app/robots.ts — default export function robots() returning MetadataRoute.Robots
      2. Allow all user agents to crawl public content
      3. Disallow: /profile, /checkout, /api, /dashboard
      4. Reference sitemap in the return value

      IMPLEMENTATION:
      1. Create apps/buyer/app/robots.ts
      2. Use Next.js MetadataRoute.Robots type from "next"
      3. baseUrl from process.env.NEXT_PUBLIC_BASE_URL ?? 'https://eduplatform.com'
      4. Return object with rules array and sitemap string

      RULES:
      - Default export required (Next.js robots.ts convention — exception to no-default-export rule)
      - TypeScript strict
      - After implementation: cd apps/buyer && pnpm build
      - Create atomic git commit: feat(buyer): add robots.txt via Next.js App Router
    test: "cd apps/buyer && pnpm build"

  - id: certificate-model
    title: "Certificate domain model and DB migration"
    scope: backend:learning
    prompt: |
      Task: Add the Certificate domain model and database migration to the learning service.

      CONTEXT:
      - Learning service (port 8007) in services/py/learning/
      - Clean Architecture: routes/ -> services/ -> domain/ <- repositories/
      - Learning DB (port 5438): PostgreSQL
      - Migrations in services/py/learning/migrations/ (idempotent SQL, CREATE TABLE IF NOT EXISTS)
      - Existing domain entities: Quiz, Flashcard, Concept, Streak, LeaderboardEntry

      DB SCHEMA (learning-db):
      CREATE TABLE certificates (
          id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
          user_id UUID NOT NULL,
          course_id UUID NOT NULL,
          pdf_url TEXT,
          issued_at TIMESTAMPTZ DEFAULT now(),
          UNIQUE(user_id, course_id)
      );
      CREATE INDEX IF NOT EXISTS idx_certificates_user_id ON certificates(user_id);

      WHAT TO BUILD:
      1. Migration: services/py/learning/migrations/007_add_certificates.sql
         - CREATE TABLE IF NOT EXISTS certificates (as above)
         - CREATE INDEX IF NOT EXISTS for user_id lookups
      2. Domain entity: services/py/learning/app/domain/certificate.py
         - @dataclass(frozen=True) Certificate with fields: id (UUID), user_id (UUID), course_id (UUID), pdf_url (str | None), issued_at (datetime)
      3. Repository interface: services/py/learning/app/repositories/certificate_repository.py
         - Abstract class CertificateRepository:
           async def create(self, user_id: UUID, course_id: UUID) -> Certificate
           async def get_by_user(self, user_id: UUID) -> list[Certificate]
           async def get_by_user_and_course(self, user_id: UUID, course_id: UUID) -> Certificate | None
           async def update_pdf_url(self, certificate_id: UUID, pdf_url: str) -> Certificate
      4. SQL implementation: services/py/learning/app/repositories/sql_certificate_repository.py
         - Implements CertificateRepository using asyncpg connection pool
         - Handle UniqueViolationError from asyncpg -> raise ConflictError (from common library)

      TDD:
      1. Write integration tests in services/py/learning/tests/test_certificate_repository.py:
         - test: create certificate -> returns Certificate entity
         - test: create duplicate (same user_id + course_id) -> raises ConflictError
         - test: get_by_user returns list of certificates for user
         - test: get_by_user_and_course returns None when not found
      2. Use testcontainers for real PostgreSQL in integration tests (follow existing test patterns)
      3. Run migration in test setup
      4. Run: cd services/py/learning && uv run --package learning pytest tests/ -v

      RULES:
      - TDD: failing test first
      - domain/certificate.py has NO imports from repositories/, services/, or frameworks
      - Migration is idempotent (IF NOT EXISTS)
      - Migration does NOT use locks that block writes
      - After tests pass: create atomic git commit: feat(learning): add certificate domain model and migration
    test: "cd services/py/learning && uv run --package learning pytest tests/ -v"

  - id: certificate-pdf
    title: "Generate certificate PDF"
    scope: backend:learning
    depends_on: [certificate-model]
    prompt: |
      Task: Implement PDF certificate generation in the learning service.

      CONTEXT:
      - Learning service (port 8007) in services/py/learning/
      - Certificate domain model and repository already implemented (see certificate-model task)
      - PDF generation: use reportlab (add to pyproject.toml) or fpdf2 — pick fpdf2 (lighter dependency)
      - Certificate PDF should contain: student name, course name, completion date, certificate ID
      - PDF stored: for now, save to local filesystem at /tmp/certificates/{certificate_id}.pdf
        (In production this would be S3, but keep it simple for now — no S3 dependency)
      - The pdf_url stored in DB will be the local path: /tmp/certificates/{certificate_id}.pdf

      WHAT TO BUILD:
      1. Add fpdf2 to services/py/learning/pyproject.toml dependencies
      2. Domain service: services/py/learning/app/services/certificate_service.py
         - issue_certificate(user_id: UUID, course_id: UUID, student_name: str, course_name: str) -> Certificate
           Steps: check if certificate already exists (return existing if so), create certificate record,
           generate PDF, update pdf_url in repository, return certificate
         - get_user_certificates(user_id: UUID) -> list[Certificate]
         - get_certificate(user_id: UUID, course_id: UUID) -> Certificate | None
      3. PDF generation helper: services/py/learning/app/services/pdf_generator.py
         - generate_certificate_pdf(certificate_id: UUID, student_name: str, course_name: str, issued_at: datetime) -> str
           Returns the file path where PDF was saved
         - Layout: A4 landscape, centered content
           - Title: "Certificate of Completion" (large font, brand color)
           - Body: "This certifies that {student_name} has successfully completed {course_name}"
           - Date: "Issued on {issued_at.strftime('%B %d, %Y')}"
           - Certificate ID: small text at bottom for verification
         - Creates /tmp/certificates/ directory if not exists
      4. Routes: services/py/learning/app/routes/certificates.py
         - POST /certificates — body: { course_id, student_name, course_name }
           Requires auth (JWT). Creates certificate for authenticated user.
           Returns 201 with certificate data. Returns 200 if already exists.
         - GET /certificates/me — returns list of user's certificates
         - GET /certificates/download/{certificate_id} — returns PDF file as FileResponse
           Only allows downloading own certificate (check user_id match)

      TDD:
      1. Write test: issue_certificate creates PDF file and stores pdf_url
      2. Write test: issue_certificate called twice -> returns same certificate (idempotent)
      3. Write test: POST /certificates returns 201 with certificate data
      4. Write test: GET /certificates/me returns list
      5. Write test: GET /certificates/download/{id} returns 404 for non-existent certificate
      6. Write test: GET /certificates/download/{id} returns 403 when user tries to download another user's cert
      7. Run: cd services/py/learning && uv run --package learning pytest tests/ -v

      RULES:
      - TDD: failing test first
      - pdf_generator.py is in services/ layer (it does I/O — creates files)
      - Clean Architecture respected — routes/ calls service, service calls repository
      - After tests pass: create atomic git commit: feat(learning): add certificate PDF generation
    test: "cd services/py/learning && uv run --package learning pytest tests/ -v"

  - id: certificate-auto-issue
    title: "Auto-issue certificate on course completion"
    scope: backend:learning
    depends_on: [certificate-pdf]
    prompt: |
      Task: Automatically issue a certificate when a student completes all lessons in a course.

      CONTEXT:
      - Learning service (port 8007) in services/py/learning/
      - Enrollment service (port 8003) tracks lesson progress and course completion
      - Learning service has its own concept of progress via quiz/flashcard completions, BUT
        enrollment service is the source of truth for lesson completion
      - Current enrollment service: POST /enrollments/{id}/lessons/{lessonId}/complete marks lesson done
        and auto-completes course when all lessons done (sets completed_at on enrollment)
      - The two services do NOT share a DB — use event-based approach
      - Since NATS is not yet wired, use a polling approach:
        New endpoint in learning service: POST /certificates/check-and-issue
        Body: { user_id, course_id, student_name, course_name, all_lessons_completed: bool }
        Called by enrollment service logic (or a cron job) when course completes
      - Alternative (simpler): expose the endpoint and let the buyer frontend call it after detecting completion

      WHAT TO BUILD:
      1. Endpoint: POST /certificates/check-and-issue (authenticated, for the user themselves only)
         - Body: { course_id: UUID, student_name: str, course_name: str }
         - Checks if user already has certificate for this course — return existing if so
         - Creates and returns certificate
         - Returns 201 on creation, 200 if already exists
      2. This endpoint is effectively idempotent (safe to call multiple times)
      3. Add to the existing certificate routes file

      TDD:
      1. Write test: POST /certificates/check-and-issue creates certificate if not exists
      2. Write test: POST /certificates/check-and-issue returns existing if already issued
      3. Write test: cannot issue certificate for another user (user_id from JWT, not body)
      4. Run: cd services/py/learning && uv run --package learning pytest tests/ -v

      RULES:
      - TDD: failing test first
      - user_id MUST come from JWT (authenticated user), not from request body — security requirement
      - Idempotent: calling twice returns same certificate, no error on duplicate
      - After tests pass: create atomic git commit: feat(learning): add auto-issue certificate on course completion
    test: "cd services/py/learning && uv run --package learning pytest tests/ -v"

  - id: certificates-ui
    title: "Certificates UI — view and download certificate"
    scope: frontend:buyer
    depends_on: [certificate-auto-issue]
    prompt: |
      Task: Add certificate viewing and download UI to the buyer app.

      CONTEXT:
      - Buyer app is in apps/buyer/ (Next.js App Router, TypeScript strict, Tailwind)
      - Learning service (port 8007) has:
        - GET /certificates/me — returns list of { id, course_id, pdf_url, issued_at }
        - GET /certificates/download/{certificate_id} — returns PDF file
        - POST /certificates/check-and-issue — { course_id, student_name, course_name }
      - Auth: JWT stored in cookie/localStorage, sent via Authorization header
      - API client: apps/buyer/lib/api.ts — add certificate namespace
      - Existing hooks pattern: apps/buyer/hooks/use-gamification.ts for reference

      WHAT TO BUILD:
      1. API client methods in apps/buyer/lib/api.ts:
         - certificates.list() -> GET /certificates/me
         - certificates.download(certificateId: string) -> returns blob URL for PDF
         - certificates.checkAndIssue(courseId: string, studentName: string, courseName: string)

      2. Hook: apps/buyer/hooks/use-certificates.ts
         - useCertificates() — TanStack Query, fetches certificate list
         - useIssueCertificate() — mutation for check-and-issue

      3. Certificates page: apps/buyer/app/certificates/page.tsx
         - Lists all earned certificates
         - Each certificate card shows: course name (from course_id lookup or stored separately), issued date
         - Download button: calls /certificates/download/{id}, triggers PDF download in browser
         - Empty state: "Complete a course to earn your first certificate"
         - Loading skeleton while fetching

      4. Course completion detection: in the lesson page or enrollment hooks,
         after marking last lesson complete, call certificates.checkAndIssue() automatically
         Show a toast/banner: "Congratulations! Your certificate is ready. View Certificates"
         Link to /certificates page

      5. Add "Certificates" link to user profile nav or header dropdown

      IMPLEMENTATION:
      1. Create apps/buyer/app/certificates/ directory
      2. Create page.tsx (Server Component wrapper with Client Component for interactive parts)
      3. Create apps/buyer/components/certificates/CertificateCard.tsx
      4. Update apps/buyer/lib/api.ts with certificates namespace
      5. Create apps/buyer/hooks/use-certificates.ts

      RULES:
      - "use client" only for CertificateCard (has download button interaction)
      - page.tsx can be server component that passes initial data down
      - next/link for navigation to /certificates
      - Named exports for all components
      - After implementation: cd apps/buyer && pnpm build
      - Create atomic git commit: feat(buyer): add certificates UI — view and download
    test: "cd apps/buyer && pnpm build"

  - id: wishlist-model
    title: "Wishlist domain model and DB migration"
    scope: backend:course
    prompt: |
      Task: Add Wishlist domain model and database migration to the course service.

      CONTEXT:
      - Course service (port 8002) in services/py/course/
      - Clean Architecture: routes/ -> services/ -> domain/ <- repositories/
      - Course DB (port 5434): PostgreSQL
      - Migrations in services/py/course/migrations/ (idempotent SQL)
      - Existing domain entities: Course, Module, Lesson, Review, Category

      DB SCHEMA (course-db):
      CREATE TABLE wishlist (
          id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
          user_id UUID NOT NULL,
          course_id UUID NOT NULL,
          created_at TIMESTAMPTZ DEFAULT now(),
          UNIQUE(user_id, course_id)
      );
      CREATE INDEX IF NOT EXISTS idx_wishlist_user_id ON wishlist(user_id);

      WHAT TO BUILD:
      1. Migration: services/py/course/migrations/XXX_add_wishlist.sql
         - Find next migration number by checking existing migrations
         - CREATE TABLE IF NOT EXISTS wishlist (as above)
         - CREATE INDEX IF NOT EXISTS for user_id lookups
      2. Domain entity: services/py/course/app/domain/wishlist.py
         - @dataclass(frozen=True) WishlistItem: id (UUID), user_id (UUID), course_id (UUID), created_at (datetime)
      3. Repository interface: services/py/course/app/repositories/wishlist_repository.py
         - Abstract class WishlistRepository:
           async def add(self, user_id: UUID, course_id: UUID) -> WishlistItem
           async def remove(self, user_id: UUID, course_id: UUID) -> bool  # returns False if not found
           async def get_by_user(self, user_id: UUID) -> list[WishlistItem]
           async def exists(self, user_id: UUID, course_id: UUID) -> bool
      4. SQL implementation: services/py/course/app/repositories/sql_wishlist_repository.py
         - Implements WishlistRepository using asyncpg connection pool
         - Handle UniqueViolationError -> raise ConflictError

      TDD:
      1. Integration tests in services/py/course/tests/test_wishlist_repository.py:
         - test: add item -> returns WishlistItem
         - test: add duplicate -> raises ConflictError
         - test: remove existing item -> returns True
         - test: remove non-existent item -> returns False
         - test: get_by_user returns all items for user
         - test: exists returns True/False correctly
      2. Use testcontainers for real PostgreSQL (follow existing course test patterns)
      3. Run: cd services/py/course && uv run --package course pytest tests/ -v

      RULES:
      - TDD: failing test first
      - domain/wishlist.py has NO framework imports
      - Migration is idempotent
      - After tests pass: create atomic git commit: feat(course): add wishlist domain model and migration
    test: "cd services/py/course && uv run --package course pytest tests/ -v"

  - id: wishlist-api
    title: "Wishlist API endpoints (add, remove, list)"
    scope: backend:course
    depends_on: [wishlist-model]
    prompt: |
      Task: Add wishlist API endpoints to the course service.

      CONTEXT:
      - Course service (port 8002) in services/py/course/
      - Wishlist repository and domain model already implemented (see wishlist-model task)
      - Clean Architecture: routes/ -> services/ -> domain/ <- repositories/
      - Auth: JWT required for all wishlist endpoints (student role)
      - Existing route patterns: see services/py/course/app/routes/ for examples

      WHAT TO BUILD:
      1. Service: services/py/course/app/services/wishlist_service.py
         - add_to_wishlist(user_id: UUID, course_id: UUID) -> WishlistItem
           Verifies course exists (calls CourseRepository.get_by_id) before adding
           Raises NotFoundError if course doesn't exist
           Raises ConflictError if already in wishlist (let repository error propagate)
         - remove_from_wishlist(user_id: UUID, course_id: UUID) -> None
           Raises NotFoundError if item not in wishlist
         - get_wishlist(user_id: UUID) -> list[WishlistItem]
      2. Routes: services/py/course/app/routes/wishlist.py
         - POST /wishlist — body: { course_id: UUID }
           Returns 201 with WishlistItem on add, 409 if already exists
         - DELETE /wishlist/{course_id} — removes course from wishlist
           Returns 204 on success, 404 if not in wishlist
         - GET /wishlist/me — returns user's wishlist (list of WishlistItem with course details)
           Enrich each item with course data (title, thumbnail, price) via CourseRepository
      3. Register wishlist router in main app

      TDD:
      1. Write test: POST /wishlist adds course, returns 201
      2. Write test: POST /wishlist with non-existent course_id returns 404
      3. Write test: POST /wishlist duplicate returns 409
      4. Write test: DELETE /wishlist/{course_id} returns 204
      5. Write test: DELETE /wishlist/{course_id} when not in wishlist returns 404
      6. Write test: GET /wishlist/me returns list of wishlist items
      7. Run: cd services/py/course && uv run --package course pytest tests/ -v

      RULES:
      - TDD: failing test first
