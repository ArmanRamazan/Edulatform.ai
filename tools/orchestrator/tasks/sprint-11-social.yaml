  # DONE: public-profiles — moved to done/completed-individual-tasks.yaml

  - id: follow-system
    title: "Follow system: follow teachers and students"
    scope: backend:identity
    prompt: |
      Task: Add a follow/unfollow system to the Identity service.

      CONTEXT:
      - Identity service: services/py/identity/ (FastAPI, asyncpg, Clean Architecture)
      - Users table has: id, email, name, role, bio, avatar_url, is_verified, created_at, is_public
      - Public profiles were just added (GET /users/:id/profile)
      - Clean Architecture: routes → services → domain ← repositories
      - JWT auth extracts user_id from token via Depends()
      - Tests: AsyncMock(spec=Repository), pytest-asyncio, asyncio_mode = "auto"
      - Existing patterns for paginated responses: { items: [...], total: int }

      WHAT TO BUILD:

      1. Migration: CREATE TABLE follows (
           id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
           follower_id UUID NOT NULL REFERENCES users(id),
           following_id UUID NOT NULL REFERENCES users(id),
           created_at TIMESTAMPTZ NOT NULL DEFAULT now(),
           UNIQUE(follower_id, following_id)
         );
         CREATE INDEX idx_follows_follower ON follows(follower_id);
         CREATE INDEX idx_follows_following ON follows(following_id);

      2. Domain: Follow entity (id, follower_id, following_id, created_at).
         FollowStats value object (followers_count, following_count).

      3. Repository: FollowRepository (ABC + SQL implementation):
         - follow(follower_id, following_id) → Follow
         - unfollow(follower_id, following_id) → bool
         - get_followers(user_id, limit, offset) → list[Follow]
         - get_following(user_id, limit, offset) → list[Follow]
         - is_following(follower_id, following_id) → bool
         - count_followers(user_id) → int
         - count_following(user_id) → int

      4. Service: FollowService:
         - follow_user(follower_id, following_id) — validates: can't follow self, target user exists
           Raises ConflictError if already following (catch asyncpg.UniqueViolationError)
         - unfollow_user(follower_id, following_id) — raises NotFoundError if not following
         - get_my_followers(user_id, limit, offset) → paginated
         - get_my_following(user_id, limit, offset) → paginated
         - get_follow_counts(user_id) → FollowStats

      5. Routes: app/routes/follows.py
         - POST /follow/{user_id} → 201 (authenticated)
         - DELETE /follow/{user_id} → 204 (authenticated)
         - GET /followers/me?limit=20&offset=0 → paginated list (authenticated)
         - GET /following/me?limit=20&offset=0 → paginated list (authenticated)
         - GET /users/{user_id}/followers/count → { followers_count, following_count }
         Register router in main app.

      IMPLEMENTATION APPROACH:
      TDD — write failing tests FIRST in tests/test_follows.py:
      1. test_follow_user_success → 201
      2. test_follow_self → 400 (can't follow yourself)
      3. test_follow_duplicate → 409 (already following)
      4. test_follow_nonexistent_user → 404
      5. test_unfollow_success → 204
      6. test_unfollow_not_following → 404
      7. test_get_followers_paginated
      8. test_get_following_paginated
      9. test_get_follow_counts
      10. test_follow_unauthenticated → 401

      Then implement. Then refactor.

      RULES:
      - Domain entities: no framework imports
      - Parameterized SQL ($1, $2, ...)
      - asyncpg.UniqueViolationError → ConflictError
      - All public functions have type hints
      - Async I/O operations
      - Independent tests, no order dependency

      COMMIT:
      feat(identity): add follow/unfollow system
    test: "cd /mnt/c/Users/aquam/PetProject/Merket_for_10_M_uesr/services/py/identity && uv run --package identity pytest tests/ -v"
    depends_on: [public-profiles]

  # ─── BACKEND: Learning — Activity Feed, Study Groups, Enhanced Discussions ──

  - id: activity-feed
    title: "Activity feed: recent learning activity"
    scope: backend:learning
    prompt: |
      Task: Add an activity feed to the Learning service to track and display user learning activities.

      CONTEXT:
      - Learning service: services/py/learning/ (FastAPI, asyncpg, Clean Architecture)
      - Existing features: quizzes, flashcards, concepts, streaks, leaderboard, discussions, XP, badges
      - learning-db on port 5438
      - Clean Architecture: routes → services → domain ← repositories
      - JWT auth, user_id from token
      - Tests: AsyncMock, pytest-asyncio, asyncio_mode = "auto"

      WHAT TO BUILD:

      1. Migration: CREATE TABLE activity_feed (
           id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
           user_id UUID NOT NULL,
           activity_type VARCHAR(50) NOT NULL,
           payload JSONB NOT NULL DEFAULT '{}',
           created_at TIMESTAMPTZ NOT NULL DEFAULT now()
         );
         CREATE INDEX idx_activity_feed_user ON activity_feed(user_id, created_at DESC);
         CREATE INDEX idx_activity_feed_created ON activity_feed(created_at DESC);

      2. Domain: Activity entity (id, user_id, activity_type, payload: dict, created_at).
         ActivityType enum: quiz_completed, flashcard_reviewed, badge_earned, streak_milestone, concept_mastered.

      3. Repository: ActivityRepository (ABC + SQL):
         - record_activity(user_id, activity_type, payload) → Activity
         - get_user_activities(user_id, limit, offset) → list[Activity]
         - get_feed_for_users(user_ids: list[UUID], limit, offset) → list[Activity]
           (returns activities for a list of users, sorted by created_at DESC)

      4. Service: ActivityService:
         - record(user_id, activity_type, payload) → Activity
         - get_my_activity(user_id, limit=20, offset=0) → paginated
         - get_social_feed(user_ids: list[UUID], limit=20, offset=0) → paginated
           (user_ids are the IDs of users the caller follows — passed from the client/frontend
            since the learning service doesn't have follow data)

      5. Routes: app/routes/activity.py
         - GET /activity/me?limit=20&offset=0 → paginated (authenticated, own activities)
         - GET /activity/feed?user_ids=id1,id2,...&limit=20&offset=0 → paginated
           (authenticated, feed of specified users' activities)
         Register router in main app.

      6. Integration: In existing services where quiz_completed, flashcard_reviewed, badge_earned,
         streak_milestone, or concept_mastered events happen, call activity_service.record().
         Look at existing code to find where these events occur. If integration is too invasive,
         create a helper function that can be called from existing code paths.

      IMPLEMENTATION APPROACH:
      TDD — write failing tests FIRST in tests/test_activity.py:
      1. test_record_activity — service creates activity entry
      2. test_get_my_activity_paginated — returns own activities, newest first
      3. test_get_my_activity_empty — new user, empty list
      4. test_get_social_feed — returns activities for specified user_ids
      5. test_get_social_feed_empty_user_ids — returns empty list
      6. test_activity_types — each type records correctly
      7. test_get_activity_unauthenticated → 401

      Then implement. Then refactor.

      RULES:
      - Domain: no framework imports
      - Parameterized SQL queries
      - JSONB payload allows extensible data per activity type
      - Async I/O
      - Type hints on all public functions
      - Independent tests

      COMMIT:
      feat(learning): add activity feed for tracking learning events
    test: "cd /mnt/c/Users/aquam/PetProject/Merket_for_10_M_uesr/services/py/learning && uv run --package learning pytest tests/ -v"
    depends_on: []

  - id: direct-messaging
    title: "Direct messaging between students and teachers"
    scope: backend:notification
    prompt: |
      Task: Add direct messaging to the Notification service for student-teacher communication.

      CONTEXT:
      - Notification service: services/py/notification/ (FastAPI, asyncpg, Clean Architecture)
      - notification-db on port 5437
      - Existing: notifications table, routes for creating/listing/marking read
      - Clean Architecture: routes → services → domain ← repositories
      - JWT auth, user_id from token
      - Tests: AsyncMock, pytest-asyncio, asyncio_mode = "auto"

      WHAT TO BUILD:

      1. Migrations:
         CREATE TABLE conversations (
           id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
           participant_1 UUID NOT NULL,
           participant_2 UUID NOT NULL,
           created_at TIMESTAMPTZ NOT NULL DEFAULT now(),
           last_message_at TIMESTAMPTZ NOT NULL DEFAULT now(),
           UNIQUE(participant_1, participant_2)
         );
         CREATE INDEX idx_conversations_p1 ON conversations(participant_1, last_message_at DESC);
         CREATE INDEX idx_conversations_p2 ON conversations(participant_2, last_message_at DESC);

         CREATE TABLE messages (
           id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
           conversation_id UUID NOT NULL REFERENCES conversations(id),
           sender_id UUID NOT NULL,
           content TEXT NOT NULL,
           is_read BOOLEAN NOT NULL DEFAULT false,
           created_at TIMESTAMPTZ NOT NULL DEFAULT now()
         );
         CREATE INDEX idx_messages_conversation ON messages(conversation_id, created_at);

      2. Domain: Conversation entity (id, participant_1, participant_2, created_at, last_message_at).
         Message entity (id, conversation_id, sender_id, content, is_read, created_at).
         ConversationPreview VO (conversation_id, other_user_id, last_message_content, last_message_at, unread_count).

      3. Repository: ConversationRepository (ABC + SQL):
         - get_or_create(user_id_1, user_id_2) → Conversation
           (ensure participant_1 < participant_2 for consistent UNIQUE constraint)
         - get_user_conversations(user_id, limit, offset) → list[ConversationPreview]
         - get_conversation(conversation_id) → Conversation | None

         MessageRepository (ABC + SQL):
         - create_message(conversation_id, sender_id, content) → Message
           (also UPDATE conversations SET last_message_at = now() WHERE id = conversation_id)
         - get_messages(conversation_id, limit, offset) → list[Message]
         - mark_as_read(message_id, user_id) → bool (only recipient can mark)

      4. Service: MessagingService:
         - send_message(sender_id, recipient_id, content) → Message
           Validates: content 1-2000 chars, no self-messaging (sender_id != recipient_id).
           Gets or creates conversation, then creates message.
         - get_conversations(user_id, limit=20, offset=0) → paginated ConversationPreview
         - get_messages(user_id, conversation_id, limit=50, offset=0) → paginated Message
           Validates user is a participant in the conversation.
         - mark_read(user_id, message_id) → None
           Validates user is the recipient, not the sender.

      5. Routes: app/routes/messaging.py
         - POST /messages { recipient_id: UUID, content: str } → 201 Message
         - GET /conversations/me?limit=20&offset=0 → paginated ConversationPreview
         - GET /conversations/{conversation_id}/messages?limit=50&offset=0 → paginated Message
         - PATCH /messages/{message_id}/read → 204
         Register router in main app.

      IMPLEMENTATION APPROACH:
      TDD — write failing tests FIRST in tests/test_messaging.py:
      1. test_send_message_creates_conversation — first message between two users
      2. test_send_message_existing_conversation — second message reuses conversation
      3. test_send_message_self → 400 (can't message yourself)
      4. test_send_message_empty_content → 422
      5. test_send_message_too_long → 422 (over 2000 chars)
      6. test_get_conversations — returns conversations with preview
      7. test_get_messages — returns messages for conversation participant
      8. test_get_messages_non_participant → 403
      9. test_mark_read_success → 204
      10. test_mark_read_not_recipient → 403
      11. test_unauthenticated → 401

      Then implement. Then refactor.

      RULES:
      - Domain: no framework imports
      - Parameterized SQL ($1, $2, ...)
      - Content validation: 1-2000 chars
      - No self-messaging
      - Only conversation participants can read messages
      - Only message recipient can mark as read
      - Async I/O, type hints
      - Independent tests

      COMMIT:
      feat(notification): add direct messaging between users
    test: "cd /mnt/c/Users/aquam/PetProject/Merket_for_10_M_uesr/services/py/notification && uv run --package notification pytest tests/ -v"
    depends_on: []

  - id: study-groups
    title: "Study groups for courses"
    scope: backend:learning
    prompt: |
      Task: Add study groups to the Learning service for collaborative learning within courses.

      CONTEXT:
      - Learning service: services/py/learning/ (FastAPI, asyncpg, Clean Architecture)
      - learning-db on port 5438
      - Existing: quizzes, flashcards, concepts, streaks, discussions, XP, badges
      - Clean Architecture: routes → services → domain ← repositories
      - JWT auth, user_id from token
      - Tests: AsyncMock, pytest-asyncio, asyncio_mode = "auto"

      WHAT TO BUILD:

      1. Migrations:
         CREATE TABLE study_groups (
           id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
           course_id UUID NOT NULL,
           name VARCHAR(100) NOT NULL,
           description TEXT,
           creator_id UUID NOT NULL,
           max_members INT NOT NULL DEFAULT 10,
           created_at TIMESTAMPTZ NOT NULL DEFAULT now()
         );
         CREATE INDEX idx_study_groups_course ON study_groups(course_id);

         CREATE TABLE study_group_members (
           id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
           group_id UUID NOT NULL REFERENCES study_groups(id) ON DELETE CASCADE,
           user_id UUID NOT NULL,
           joined_at TIMESTAMPTZ NOT NULL DEFAULT now(),
           UNIQUE(group_id, user_id)
         );
         CREATE INDEX idx_sgm_group ON study_group_members(group_id);
         CREATE INDEX idx_sgm_user ON study_group_members(user_id);

      2. Domain: StudyGroup entity (id, course_id, name, description, creator_id, max_members, created_at).
         GroupMember entity (id, group_id, user_id, joined_at).
         StudyGroupWithCount VO (group + member_count: int).

      3. Repository: StudyGroupRepository (ABC + SQL):
         - create_group(course_id, name, description, creator_id, max_members) → StudyGroup
         - get_group(group_id) → StudyGroup | None
         - get_course_groups(course_id, limit, offset) → list[StudyGroupWithCount]
         - get_user_groups(user_id) → list[StudyGroup]
         - add_member(group_id, user_id) → GroupMember
         - remove_member(group_id, user_id) → bool
         - get_members(group_id, limit, offset) → list[GroupMember]
         - count_members(group_id) → int
         - is_member(group_id, user_id) → bool

      4. Service: StudyGroupService:
         - create_group(user_id, course_id, name, description) → StudyGroup
           Validates name 1-100 chars. Auto-adds creator as first member.
         - get_course_groups(course_id, limit=20, offset=0) → paginated
         - join_group(user_id, group_id) → GroupMember
           Validates: group exists, not already member, group not full (count < max_members).
           Raises ConflictError if already member, ValidationError if group full.
         - leave_group(user_id, group_id) → None
           Validates: is member. Creator cannot leave (must delete group instead).
         - get_members(group_id, limit=20, offset=0) → paginated
         - get_my_groups(user_id) → list[StudyGroup]

      5. Routes: app/routes/study_groups.py
         - POST /study-groups { course_id, name, description? } → 201 StudyGroup (authenticated)
         - GET /study-groups/course/{course_id}?limit=20&offset=0 → paginated (public)
         - POST /study-groups/{group_id}/join → 201 GroupMember (authenticated)
         - DELETE /study-groups/{group_id}/leave → 204 (authenticated)
         - GET /study-groups/{group_id}/members?limit=20&offset=0 → paginated (public)
         - GET /study-groups/me → list of user's groups (authenticated)
         Register router in main app.

      IMPLEMENTATION APPROACH:
      TDD — write failing tests FIRST in tests/test_study_groups.py:
      1. test_create_group — success, creator auto-joined
      2. test_create_group_name_too_long → 422
      3. test_get_course_groups — returns groups with member counts
      4. test_join_group_success
      5. test_join_group_already_member → 409
      6. test_join_group_full → 400
      7. test_leave_group_success
      8. test_leave_group_creator → 400 (creator can't leave)
      9. test_leave_group_not_member → 404
      10. test_get_members_paginated
      11. test_get_my_groups
      12. test_unauthenticated → 401

      Then implement. Then refactor.

      RULES:
      - Domain: no framework imports
      - Parameterized SQL
      - Max 10 members per group (configurable via max_members)
      - Creator auto-added as member on creation
      - Creator cannot leave (prevents orphaned groups)
      - asyncpg.UniqueViolationError → ConflictError
      - Async I/O, type hints
      - Independent tests

      COMMIT:
      feat(learning): add study groups for collaborative learning
    test: "cd /mnt/c/Users/aquam/PetProject/Merket_for_10_M_uesr/services/py/learning && uv run --package learning pytest tests/ -v"
    depends_on: []

  - id: enhanced-discussions
    title: "Enhanced discussions: replies, pinning, teacher answers"
    scope: backend:learning
    prompt: |
      Task: Enhance the existing discussions feature with threaded replies, pinning, and teacher answers.

      CONTEXT:
      - Learning service: services/py/learning/ (FastAPI, asyncpg, Clean Architecture)
      - Existing discussions table has: id, lesson_id, user_id, content, upvotes, created_at
      - Existing endpoints: POST /discussions (create), GET /discussions/lesson/:id (list),
        POST /discussions/:id/upvote, DELETE /discussions/:id
      - Existing repository: DiscussionRepository in app/repositories/
      - Existing service: DiscussionService in app/services/
      - JWT auth, user_id + role from token

      WHAT TO BUILD:

      1. Migration: ALTER TABLE discussions
         ADD COLUMN parent_id UUID REFERENCES discussions(id),
         ADD COLUMN is_pinned BOOLEAN NOT NULL DEFAULT false,
         ADD COLUMN is_teacher_answer BOOLEAN NOT NULL DEFAULT false;
         CREATE INDEX idx_discussions_parent ON discussions(parent_id);

      2. Domain: Update Discussion entity to include parent_id, is_pinned, is_teacher_answer.
         Add ThreadedDiscussion VO with replies: list[Discussion] nested.

      3. Repository updates:
         - create_reply(lesson_id, user_id, content, parent_id) → Discussion
           Validates parent_id exists and belongs to same lesson.
         - set_pinned(discussion_id, is_pinned: bool) → Discussion
         - set_teacher_answer(discussion_id, is_teacher_answer: bool) → Discussion
         - get_threaded_discussions(lesson_id, limit, offset) → list[ThreadedDiscussion]
           Returns top-level discussions with their replies nested (max 2 levels).
           ORDER BY is_pinned DESC, is_teacher_answer DESC, created_at DESC.

      4. Service updates:
         - create_reply(user_id, discussion_id, content) → Discussion
           Gets parent discussion, creates reply with same lesson_id and parent_id.
           Max 2 levels: if parent already has a parent_id, raise ValidationError.
         - pin_discussion(user_id, discussion_id) → Discussion
           Only the teacher who owns the course containing this lesson can pin.
           This means: get discussion → get lesson_id → the teacher_id check is tricky
           since learning service doesn't have course ownership data. Solution: accept
           role from JWT — if role == "teacher", allow pinning. (Simplified for now.)
         - mark_teacher_answer(user_id, discussion_id) → Discussion
           Same auth as pin — teacher role required.
         - get_lesson_discussions(lesson_id, limit, offset) → threaded, paginated

      5. Routes updates in app/routes/discussions.py:
         - POST /discussions/{discussion_id}/reply { content } → 201 Discussion (authenticated)
         - PATCH /discussions/{discussion_id}/pin → 200 Discussion (teacher-only)
         - PATCH /discussions/{discussion_id}/mark-answer → 200 Discussion (teacher-only)
         - Update GET /discussions/lesson/{lesson_id} to return threaded structure

      IMPLEMENTATION APPROACH:
      TDD — write failing tests FIRST in tests/test_discussions_enhanced.py:
      1. test_create_reply_success — reply links to parent
      2. test_create_reply_max_depth — reply to reply → 400 (max 2 levels)
      3. test_create_reply_parent_not_found → 404
      4. test_pin_discussion_teacher → 200
      5. test_pin_discussion_student → 403
      6. test_mark_answer_teacher → 200
      7. test_mark_answer_student → 403
      8. test_get_threaded_discussions — returns nested structure
      9. test_threaded_order — pinned first, then teacher answers, then by date

      Then implement. Then refactor.

      RULES:
      - Don't break existing discussion tests — add new tests alongside
      - Max 2 nesting levels for replies
      - Teacher role required for pin and mark-answer
      - Parameterized SQL
      - Async I/O, type hints
      - Independent tests
      - Update existing GET endpoint to support threading (backward compatible)

      COMMIT:
      feat(learning): enhance discussions with replies, pinning, teacher answers
    test: "cd /mnt/c/Users/aquam/PetProject/Merket_for_10_M_uesr/services/py/learning && uv run --package learning pytest tests/ -v"
    depends_on: []

  # ─── FRONTEND: Buyer App — Social Features ─────────────────────────────────

  - id: profiles-frontend
    title: "Public profile pages in buyer app"
    scope: frontend:buyer
    prompt: |
      Task: Build public user profile pages with follow functionality in the buyer app.

      CONTEXT:
      - Buyer app: apps/buyer/ (Next.js 15 App Router, Tailwind CSS, TanStack Query, Radix UI)
      - API client: apps/buyer/lib/api.ts — namespace objects with typed fetch calls
      - Auth hook: apps/buyer/hooks/use-auth.ts — { user, token, loading }
      - Existing hooks pattern: each hook file exports TanStack Query hooks
      - API proxy: /api/identity/:path* → http://localhost:8001/:path*
      - Identity service has:
        GET /users/:id/profile → { id, name, bio, avatar_url, role, is_verified, created_at, is_public }
        GET /users/:id/stats → { role, is_verified, member_since, name }
        GET /users/:id/followers/count → { followers_count, following_count }
        POST /follow/:user_id → 201
        DELETE /follow/:user_id → 204
        GET /followers/me → paginated
        GET /following/me → paginated

      WHAT TO BUILD:

      1. API client additions in apps/buyer/lib/api.ts:
         Add to identity namespace:
         - getUserProfile(userId): PublicProfile
         - getUserStats(userId): UserStats
         - getFollowCounts(userId): FollowCounts
         - followUser(token, userId): void
         - unfollowUser(token, userId): void
         - getFollowers(token, params): paginated
         - getFollowing(token, params): paginated

      2. Hook: apps/buyer/hooks/use-profile.ts
         - useUserProfile(userId) — TanStack Query, staleTime 60s
         - useFollowCounts(userId) — TanStack Query
         - useFollowUser(token) — useMutation, invalidates follow counts
         - useUnfollowUser(token) — useMutation, invalidates follow counts
         - useFollowers(token) — TanStack Query, paginated
         - useFollowing(token) — TanStack Query, paginated

      3. Profile page: apps/buyer/app/users/[id]/page.tsx ("use client")
         Layout:
         - Top section: avatar (or initials placeholder), name, role badge (Студент/Преподаватель),
           "Подтверждённый" badge if is_verified, bio, member since date
         - Stats row: followers count, following count
         - Follow/Unfollow button (if viewing another user's profile, authenticated)
         - If own profile: "Редактировать" link to /settings
         - For teachers: "Курсы преподавателя" section (future — show placeholder text)
         - For students: "Достижения" section (future — show placeholder text)

      4. Follow button component: apps/buyer/components/FollowButton.tsx
         - Shows "Подписаться" (blue) if not following, "Отписаться" (gray) if following
         - Optimistic update: toggle immediately, revert on error
         - Disabled if viewing own profile or not authenticated

      5. Link user names to profile pages:
         - In discussion components, link author names to /users/:id
         - In review components, link reviewer names to /users/:id
         - In leaderboard, link usernames to /users/:id
         Use next/link for all links.

      IMPLEMENTATION APPROACH:
      1. Add API methods first
      2. Create hook
      3. Build profile page
      4. Build FollowButton component
      5. Update existing components to link to profiles
      6. Verify: cd apps/buyer && pnpm build

      RULES:
      - "use client" for pages using hooks/state
      - Named exports only (except page.tsx default export — Next.js requirement)
      - Tailwind CSS only, no inline styles
      - next/link for navigation, next/image for avatars
      - No new dependencies
      - Type hints via TypeScript interfaces

      COMMIT:
      feat(buyer): add public profile pages with follow functionality
    test: "cd /mnt/c/Users/aquam/PetProject/Merket_for_10_M_uesr/apps/buyer && pnpm build"
    depends_on: [public-profiles, follow-system]

  - id: messaging-frontend
    title: "Direct messaging UI in buyer app"
    scope: frontend:buyer
    prompt: |
      Task: Build a messaging interface for direct communication between users.

      CONTEXT:
      - Buyer app: apps/buyer/ (Next.js 15 App Router, Tailwind CSS, TanStack Query)
      - API client: apps/buyer/lib/api.ts
      - Auth hook: apps/buyer/hooks/use-auth.ts — { user, token, loading }
      - API proxy: /api/notification/:path* → http://localhost:8005/:path*
      - Notification service messaging endpoints:
        POST /messages { recipient_id, content } → 201
        GET /conversations/me?limit&offset → paginated ConversationPreview
        GET /conversations/:id/messages?limit&offset → paginated Message
        PATCH /messages/:id/read → 204
      - ConversationPreview: { conversation_id, other_user_id, last_message_content, last_message_at, unread_count }
      - Message: { id, conversation_id, sender_id, content, is_read, created_at }

      WHAT TO BUILD:

      1. API client additions in apps/buyer/lib/api.ts:
         Add to notification namespace (or create messaging namespace):
