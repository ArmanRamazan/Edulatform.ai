phase: "3.1"
description: "Real Payments + Subscriptions"

tasks:
  # ──────────────────────────────────────────────
  # BACKEND: PAYMENT SERVICE
  # ──────────────────────────────────────────────

  - id: subscription-db-migration
    title: "Subscription plans + user_subscriptions DB migration"
    scope: backend:payment
    prompt: |
      Task: Create DB migration for subscription plans and user_subscriptions tables in the payment service.

      CONTEXT:
      - Payment service: services/py/payment/ (port 8004, FastAPI, asyncpg)
      - Existing migrations: migrations/001_payments.sql, migrations/002_indexes.sql
      - Main wiring is in app/main.py — lifespan opens migration files sequentially
      - Clean Architecture: routes/ -> services/ -> domain/ <- repositories/

      WHAT TO BUILD:
      1. Create migrations/003_subscriptions.sql with:

         CREATE TABLE IF NOT EXISTS subscription_plans (
             id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
             name VARCHAR(50) NOT NULL UNIQUE,
             stripe_price_id VARCHAR(255),
             price_monthly DECIMAL(10,2) NOT NULL,
             price_yearly DECIMAL(10,2),
             ai_credits_daily INT NOT NULL,
             features JSONB NOT NULL DEFAULT '{}',
             created_at TIMESTAMPTZ DEFAULT now()
         );

         CREATE TABLE IF NOT EXISTS user_subscriptions (
             id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
             user_id UUID NOT NULL UNIQUE,
             plan_id UUID NOT NULL REFERENCES subscription_plans(id),
             stripe_subscription_id VARCHAR(255),
             stripe_customer_id VARCHAR(255),
             status VARCHAR(20) NOT NULL DEFAULT 'active',
             current_period_start TIMESTAMPTZ,
             current_period_end TIMESTAMPTZ,
             cancel_at_period_end BOOLEAN DEFAULT false,
             created_at TIMESTAMPTZ DEFAULT now(),
             updated_at TIMESTAMPTZ DEFAULT now()
         );

         CREATE INDEX IF NOT EXISTS idx_user_subscriptions_user ON user_subscriptions(user_id);
         CREATE INDEX IF NOT EXISTS idx_user_subscriptions_stripe ON user_subscriptions(stripe_subscription_id);

      2. Seed the three plans in the migration itself (idempotent INSERT ... ON CONFLICT DO NOTHING):
         - free: price_monthly=0.00, ai_credits_daily=10, features={"courses": true, "ai_features": "limited"}
         - student: price_monthly=9.99, price_yearly=99.99, ai_credits_daily=100, features={"courses": true, "ai_features": "standard"}
         - pro: price_monthly=19.99, price_yearly=199.99, ai_credits_daily=-1, features={"courses": true, "ai_features": "unlimited", "offline": true}

      3. Load the new migration in app/main.py lifespan (after existing migrations):
         with open("migrations/003_subscriptions.sql") as f:
             await conn.execute(f.read())

      TDD:
      1. Write test in tests/test_subscription_migration.py: migration runs idempotently (run twice, no error)
      2. Write test: subscription_plans table has 3 rows after migration
      3. Implement the migration file
      4. Update main.py to load it
      5. Run: cd services/py/payment && uv run --package payment pytest tests/ -v

      RULES:
      - All SQL must be idempotent (CREATE TABLE IF NOT EXISTS, INSERT ... ON CONFLICT DO NOTHING)
      - No exclusive locks, no DROP statements
      - Async, type hints, Clean Architecture preserved
      - Commit: feat(payment): add subscription plans and user_subscriptions migration
    test: "cd services/py/payment && uv run --package payment pytest tests/ -v"

  - id: subscription-domain-and-repo
    title: "Subscription domain entities and repository"
    scope: backend:payment
    depends_on:
      - subscription-db-migration
    prompt: |
      Task: Add SubscriptionPlan and UserSubscription domain entities plus their repository in the payment service.

      CONTEXT:
      - Payment service: services/py/payment/ (port 8004, FastAPI, asyncpg)
      - Existing domain: app/domain/payment.py — dataclass(frozen=True) for Payment, Pydantic models for request/response
      - Existing repo pattern: app/repositories/payment_repo.py — PaymentRepository with asyncpg.Pool
      - Clean Architecture: domain/ has no framework imports; repositories/ maps domain <-> DB

      WHAT TO BUILD:
      1. app/domain/subscription.py:
         - SubscriptionStatus(StrEnum): active, canceled, past_due
         - @dataclass(frozen=True) SubscriptionPlan: id, name, stripe_price_id, price_monthly, price_yearly, ai_credits_daily, features (dict), created_at
         - @dataclass(frozen=True) UserSubscription: id, user_id, plan_id, plan_name, stripe_subscription_id, stripe_customer_id, status, current_period_start, current_period_end, cancel_at_period_end, created_at, updated_at
         - Pydantic models: SubscriptionResponse, SubscriptionPlanResponse, SubscriptionCreateRequest (plan_id: UUID, payment_method_id: str)
         - ai_credits_daily == -1 means unlimited

      2. app/repositories/subscription_repo.py:
         - SubscriptionRepository(pool: asyncpg.Pool)
         - async get_plan_by_name(name: str) -> SubscriptionPlan | None
         - async get_plan_by_id(plan_id: UUID) -> SubscriptionPlan | None
         - async list_plans() -> list[SubscriptionPlan]
         - async get_user_subscription(user_id: UUID) -> UserSubscription | None
         - async create_user_subscription(user_id, plan_id, stripe_subscription_id, stripe_customer_id, status, period_start, period_end) -> UserSubscription
         - async update_user_subscription(user_id, **fields) -> UserSubscription  # status, cancel_at_period_end, period dates
         - Private _to_plan_entity(row) and _to_subscription_entity(row) helpers

      TDD:
      1. Write tests/test_subscription_domain.py:
         - Test SubscriptionPlan dataclass is frozen (cannot mutate)
         - Test SubscriptionResponse serializes correctly
         - Test ai_credits_daily=-1 represents unlimited (domain logic only, no assertions on int value needed)
      2. Write tests/test_subscription_repo.py with AsyncMock for the pool
         - get_plan_by_name returns None when fetchrow returns None
         - list_plans maps all rows to SubscriptionPlan entities
         - create_user_subscription returns UserSubscription entity
      3. Implement domain and repo
      4. Run: cd services/py/payment && uv run --package payment pytest tests/ -v

      RULES:
      - domain/ has zero imports from FastAPI, asyncpg, or any framework
      - Use `from __future__ import annotations` at top of all new files
      - Async, type hints, frozen dataclasses
      - Commit: feat(payment): add subscription domain entities and repository
    test: "cd services/py/payment && uv run --package payment pytest tests/ -v"

  - id: stripe-sdk-integration
    title: "Stripe SDK integration: StripeClient adapter"
    scope: backend:payment
    depends_on:
      - subscription-domain-and-repo
    prompt: |
      Task: Add a Stripe SDK adapter to the payment service that wraps stripe-python calls.

      CONTEXT:
      - Payment service: services/py/payment/ (port 8004, FastAPI, asyncpg)
      - Currently payment is mock-only (create always succeeds with status=completed)
      - Clean Architecture: external dependencies go in repositories/ as adapters
      - app/main.py uses lifespan pattern and global service getter functions
      - pyproject.toml is at services/py/payment/pyproject.toml

      WHAT TO BUILD:
      1. Add stripe dependency to services/py/payment/pyproject.toml [project.dependencies]

      2. Add STRIPE_SECRET_KEY and STRIPE_WEBHOOK_SECRET to app/config.py Settings:
         stripe_secret_key: str = ""
         stripe_webhook_secret: str = ""

      3. app/repositories/stripe_client.py — StripeClient class:
         - __init__(self, secret_key: str) — calls stripe.api_key = secret_key
         - async create_customer(email: str, name: str) -> str  # returns stripe customer_id
         - async create_subscription(customer_id: str, price_id: str, payment_method_id: str) -> dict
           Returns dict with: id (subscription_id), status, current_period_start, current_period_end
         - async cancel_subscription(stripe_subscription_id: str, at_period_end: bool = True) -> dict
         - async construct_webhook_event(payload: bytes, sig_header: str, secret: str) -> dict
           Uses stripe.Webhook.construct_event — raises AppError(400) on invalid signature
         - All stripe calls wrapped in try/except stripe.StripeError -> raise AppError(502, message)
         - Note: stripe SDK calls are synchronous — wrap in asyncio.to_thread()

      TDD:
      1. Write tests/test_stripe_client.py using unittest.mock.patch("stripe.Customer.create"):
         - create_customer calls stripe.Customer.create with correct params, returns customer id
         - create_subscription calls stripe.PaymentMethod.attach + stripe.Subscription.create
         - construct_webhook_event raises AppError(400) on invalid signature
         - StripeError from SDK is re-raised as AppError(502)
      2. Implement StripeClient
      3. Run: cd services/py/payment && uv run --package payment pytest tests/ -v

      RULES:
      - StripeClient lives in repositories/ (it is an external adapter)
      - Services never import stripe directly — only StripeClient
      - STRIPE_SECRET_KEY defaults to "" (empty = sandbox mode, tests mock it out)
      - Use asyncio.to_thread() for synchronous stripe SDK calls
      - Commit: feat(payment): add Stripe SDK adapter
    test: "cd services/py/payment && uv run --package payment pytest tests/ -v"

  - id: subscription-service-endpoints
    title: "Subscription service: create, get, cancel + webhooks"
    scope: backend:payment
    depends_on:
      - stripe-sdk-integration
    prompt: |
      Task: Implement subscription business logic, HTTP endpoints, and Stripe webhook handler in the payment service.

      CONTEXT:
      - Payment service: services/py/payment/ (port 8004)
      - Clean Architecture: routes/ -> services/ -> domain/ <- repositories/
      - Existing pattern: PaymentService in app/services/payment_service.py
      - Existing route pattern: app/routes/payments.py (JWT decode via _get_current_user_claims)
      - SubscriptionRepository and StripeClient are already built (previous tasks)
      - SubscriptionPlan, UserSubscription domain entities already exist

      WHAT TO BUILD:
      1. app/services/subscription_service.py — SubscriptionService:
         - __init__(self, repo: SubscriptionRepository, stripe: StripeClient, settings: Settings)
         - async get_plans() -> list[SubscriptionPlan]
         - async get_my_subscription(user_id: UUID) -> UserSubscription | None
           If no subscription exists, return a synthetic "free" plan subscription (no DB row needed)
         - async create_subscription(user_id: UUID, user_email: str, user_name: str, plan_id: UUID, payment_method_id: str) -> UserSubscription
           1. Get plan by id, raise NotFoundError if missing
           2. If plan.price_monthly == 0 (free): create DB row with no Stripe IDs, status=active
           3. If paid: create Stripe customer, create Stripe subscription, create DB row
           4. Raise ConflictError if user already has active subscription
         - async cancel_subscription(user_id: UUID) -> UserSubscription
           1. Get subscription, raise NotFoundError if missing
           2. If has stripe_subscription_id: call stripe.cancel_subscription(at_period_end=True)
           3. Update DB: cancel_at_period_end=True
         - async handle_webhook(payload: bytes, sig_header: str) -> None
           Handle events: invoice.paid -> update status=active + period dates
                          invoice.payment_failed -> update status=past_due
                          customer.subscription.deleted -> update status=canceled

      2. app/routes/subscriptions.py — APIRouter(prefix="/subscriptions"):
         - GET /plans → list[SubscriptionPlanResponse] (no auth required)
         - POST /create → SubscriptionResponse (auth required: student only)
           Body: SubscriptionCreateRequest {plan_id: UUID, payment_method_id: str}
         - GET /me → SubscriptionResponse (auth required)
         - POST /cancel → SubscriptionResponse (auth required)
         - POST /webhooks/stripe → 200 OK (no auth — verified by Stripe signature)
           Reads raw body bytes, X-Stripe-Signature header

      3. Register subscriptions_router and webhook_router in app/main.py:
         - Add SubscriptionRepository and StripeClient to lifespan wiring
         - Add _subscription_service global + getter

      TDD:
      1. Write tests/test_subscription_service.py:
         - create_subscription for free plan: no Stripe calls, DB row created
         - create_subscription for paid plan: stripe.create_customer called, then create_subscription
         - create_subscription with existing active subscription: raises ConflictError
         - cancel_subscription: stripe.cancel_subscription called, DB updated
         - handle_webhook invoice.paid: updates status and period dates
         - handle_webhook customer.subscription.deleted: sets status=canceled
      2. Write tests/test_subscription_routes.py:
         - GET /subscriptions/plans returns 200 with plan list
         - POST /subscriptions/create with valid JWT returns 201
         - GET /subscriptions/me returns current plan
         - POST /subscriptions/cancel returns updated subscription
         - POST /subscriptions/webhooks/stripe with invalid sig returns 400
      3. Implement service and routes
      4. Run: cd services/py/payment && uv run --package payment pytest tests/ -v

      RULES:
      - Webhook endpoint must use Request to read raw bytes (not Pydantic body) to preserve Stripe signature
      - JWT claims extraction follows exact same pattern as app/routes/payments.py _get_current_user_claims
      - user_email and user_name must come from JWT claims (add to token decode)
      - routes/ never imports repositories/ directly
      - Commit: feat(payment): add subscription endpoints and webhook handler
    test: "cd services/py/payment && uv run --package payment pytest tests/ -v"

  - id: upgrade-payments-stripe
    title: "Upgrade POST /payments to use Stripe PaymentIntents (backward compatible)"
    scope: backend:payment
    depends_on:
      - stripe-sdk-integration
    prompt: |
      Task: Upgrade the existing POST /payments endpoint to use real Stripe PaymentIntents while keeping full backward compatibility with free courses.

      CONTEXT:
      - Payment service: services/py/payment/ (port 8004)
      - Existing: POST /payments accepts {course_id, amount} and immediately marks as completed (mock)
      - PaymentRepository already exists in app/repositories/payment_repo.py
      - PaymentService in app/services/payment_service.py
      - StripeClient already built (previous task)
      - Clean Architecture must be preserved

      WHAT TO BUILD:
      1. Extend app/domain/payment.py:
         - Add stripe_payment_intent_id: str | None = None to Payment dataclass
         - Add payment_method_id: str | None to PaymentCreate request model
         - Update PaymentResponse to include stripe_payment_intent_id

      2. Update migrations/001_payments.sql: add column (idempotent ALTER TABLE ... IF NOT EXISTS):
         ALTER TABLE payments ADD COLUMN IF NOT EXISTS stripe_payment_intent_id VARCHAR(255);

      3. Update PaymentRepository.create() to accept and store stripe_payment_intent_id
         Update PaymentRepository._to_entity() to read the new column

      4. Update PaymentService.create():
         - If amount == 0 (free course): skip Stripe, status=completed immediately (existing behavior)
         - If amount > 0 and stripe_client available and secret key set:
           a. Call stripe_client.create_payment_intent(amount, currency="usd", payment_method_id)
           b. Store payment_intent_id, set status based on intent status
         - If stripe not configured (empty key): fall back to mock completed (keeps tests working)
         - StripeClient injected via __init__ as optional: stripe: StripeClient | None = None

      TDD:
      1. Write tests/test_payment_stripe_upgrade.py:
         - create payment with amount=0: no Stripe call, status=completed
         - create payment with amount>0, no stripe configured: mock completed (backward compat)
         - create payment with amount>0, stripe configured: create_payment_intent called
         - StripeError from Stripe: PaymentService raises AppError(502)
      2. Implement changes (domain, repo, service)
      3. Run: cd services/py/payment && uv run --package payment pytest tests/ -v

      RULES:
      - Never break existing tests — backward compatibility is mandatory
      - routes/ is not changed — only domain/, repositories/, services/
      - Stripe is optional injection (None = mock mode, for tests and dev without keys)
      - Commit: feat(payment): upgrade payments to Stripe PaymentIntents with backward compat
    test: "cd services/py/payment && uv run --package payment pytest tests/ -v"

  # ──────────────────────────────────────────────
  # BACKEND: AI SERVICE
  # ──────────────────────────────────────────────

  - id: ai-credit-system
    title: "AI credit system: plan-based daily limits + GET /ai/credits/me"
    scope: backend:ai
    prompt: |
      Task: Implement subscription-tier-aware AI credit limits in the AI service.

      CONTEXT:
      - AI service: services/py/ai/ (port 8006, FastAPI, Redis for caching and credit tracking)
      - Current credit logic: AICache.get_credits_used() and increment_credits() track daily tutor chats
        Key pattern: "ai:credits:{user_id}:{date}"
      - Current limit: hardcoded Settings.tutor_daily_limit = 10 (applies to /tutor/chat only)
      - TutorService.chat() enforces the limit and returns credits_remaining in response
      - All AI endpoints are in app/routes/ai.py — JWT decoded via _get_current_user_claims
      - Clean Architecture: routes/ -> services/ -> domain/ <- repositories/

      WHAT TO BUILD:
      1. Extend credit tracking to cover ALL AI endpoints (quiz, summary, tutor):
         - One shared credit pool per user per day
         - Each AI call consumes 1 credit regardless of endpoint

      2. Add plan tier to JWT claims extraction in app/routes/ai.py:
         - JWT payload may contain "subscription_tier" claim: "free" | "student" | "pro"
         - Default to "free" if claim missing
         - Pass tier down to service layer

      3. app/services/credit_service.py — CreditService:
         - PLAN_LIMITS: dict = {"free": 10, "student": 100, "pro": -1}
         - __init__(self, cache: AICache)
         - async get_limit(tier: str) -> int  # -1 means unlimited
         - async get_used(user_id: str) -> int
         - async check_and_consume(user_id: str, tier: str) -> int
           Returns credits_remaining (int, or 999999 for unlimited)
           Raises ForbiddenError("AI credit limit reached. Upgrade your plan.") if over limit
         - async get_status(user_id: str, tier: str) -> dict
           Returns: {used: int, limit: int, remaining: int, reset_at: str (ISO next midnight UTC), tier: str}

      4. New endpoint in app/routes/ai.py:
         GET /ai/credits/me → returns credit status dict
         Uses _get_current_user_claims, calls credit_service.get_status()

      5. Enforce credits on all three generate endpoints (quiz, summary, tutor/chat):
         - Before calling the underlying service, call credit_service.check_and_consume()
         - Remove the old inline limit check from TutorService (it used Settings.tutor_daily_limit)
         - TutorChatResponse.credits_remaining stays but is now populated from CreditService

      6. Wire CreditService into app/main.py lifespan (shares AICache with other services)

      TDD:
      1. Write tests/test_credit_service.py:
         - get_limit("free") == 10, get_limit("pro") == -1
         - check_and_consume: increments redis counter, returns correct remaining
         - check_and_consume at limit: raises ForbiddenError
         - check_and_consume pro tier: never raises, returns 999999
         - get_status returns correct dict with reset_at as next midnight UTC ISO string
      2. Write tests/test_ai_credits_route.py:
         - GET /ai/credits/me with valid JWT returns 200 + status dict
         - POST /ai/quiz/generate when credits exhausted returns 403
         - POST /ai/tutor/chat when credits exhausted returns 403
         - POST /ai/summary/generate when credits exhausted returns 403
      3. Implement CreditService, update routes, wire into main.py
      4. Run: cd services/py/ai && uv run --package ai pytest tests/ -v

      RULES:
      - TDD: write all failing tests first, then implement
      - CreditService takes AICache as dependency (no new Redis connection)
      - "pro" tier (-1) must never raise ForbiddenError regardless of usage
      - reset_at must be accurate: midnight UTC of the next day
      - Commit: feat(ai): add plan-based AI credit system with /ai/credits/me endpoint
    test: "cd services/py/ai && uv run --package ai pytest tests/ -v"

  # ──────────────────────────────────────────────
  # FRONTEND: BUYER APP
  # ──────────────────────────────────────────────

  - id: frontend-api-types-subscriptions
    title: "Add subscription + credit TypeScript types and API client methods"
    scope: frontend:buyer
    depends_on:
      - subscription-service-endpoints
      - ai-credit-system
    prompt: |
      Task: Extend apps/buyer/lib/api.ts with subscription and AI credit types and API client methods.

      CONTEXT:
      - Buyer app: apps/buyer/ (Next.js App Router, TypeScript strict, Tailwind CSS)
      - API client: apps/buyer/lib/api.ts — typed namespace objects, uses fetch with bearer token
      - Existing pattern: namespaced objects like `payments`, `notifications`, each with typed methods
      - PAYMENT_URL = "/api/payment", AI_URL = "/api/ai"
      - Token always passed as first argument to auth-required methods

      WHAT TO BUILD:
      1. New TypeScript interfaces in apps/buyer/lib/api.ts:
         interface SubscriptionPlan {
           id: string;
           name: "free" | "student" | "pro";
           stripe_price_id: string | null;
           price_monthly: number;
           price_yearly: number | null;
           ai_credits_daily: number;  // -1 = unlimited
           features: Record<string, unknown>;
           created_at: string;
         }
         interface UserSubscription {
           id: string;
           user_id: string;
           plan_id: string;
           plan_name: "free" | "student" | "pro";
           stripe_subscription_id: string | null;
           stripe_customer_id: string | null;
           status: "active" | "canceled" | "past_due";
           current_period_start: string | null;
           current_period_end: string | null;
           cancel_at_period_end: boolean;
           created_at: string;
           updated_at: string;
         }
         interface AICreditStatus {
           used: number;
           limit: number;
           remaining: number;
           reset_at: string;
           tier: "free" | "student" | "pro";
         }

      2. New API namespace `subscriptions` (at PAYMENT_URL):
         - plans(): Promise<SubscriptionPlan[]>  — no auth
         - me(token: string): Promise<UserSubscription>
         - create(token: string, body: { plan_id: string; payment_method_id: string }): Promise<UserSubscription>
         - cancel(token: string): Promise<UserSubscription>

      3. Extend existing `ai` namespace with:
         - credits(token: string): Promise<AICreditStatus>  — GET /ai/credits/me

      4. New TanStack Query hooks in apps/buyer/hooks/use-subscriptions.ts:
         - useSubscriptionPlans() — no token needed, enabled: true always
         - useMySubscription(token: string | null)
         - useCreateSubscription() — useMutation
         - useCancelSubscription() — useMutation, invalidates ["subscription", "me"] on success
         - useAICredits(token: string | null) — queryKey: ["ai", "credits"]

      RULES:
      - Only named exports. No default exports. No index.tsx barrels.
      - TypeScript strict — no `any`, no `!` non-null assertions where avoidable
      - All fetch calls must handle non-ok responses by throwing an Error
      - Commit: feat(buyer): add subscription and AI credit API types and hooks
    test: "cd apps/buyer && pnpm build"

  - id: frontend-pricing-page
    title: "Pricing page: 3 tiers with feature comparison, monthly/yearly toggle"
    scope: frontend:buyer
    depends_on:
      - frontend-api-types-subscriptions
    prompt: |
      Task: Build a pricing page at /pricing in the buyer Next.js app.

      CONTEXT:
      - Buyer app: apps/buyer/ (Next.js App Router, TypeScript strict, Tailwind CSS, Radix UI)
      - Existing pages: apps/buyer/app/page.tsx (home), courses/[id]/page.tsx (course detail)
      - useSubscriptionPlans hook available from apps/buyer/hooks/use-subscriptions.ts
      - Route: apps/buyer/app/pricing/page.tsx
      - Server Components by default; "use client" only for interactive elements
      - No CSS modules, no styled-components — Tailwind only

      WHAT TO BUILD:
      1. apps/buyer/app/pricing/page.tsx — Server Component (static metadata, Suspense wrapper):
         - export const metadata with title="Pricing — EduPlatform"
         - Renders <PricingContent /> wrapped in <Suspense fallback={<PricingLoading />}>

      2. apps/buyer/components/pricing/PricingContent.tsx — "use client":
         - Uses useSubscriptionPlans() hook to fetch plans
         - Annual/monthly toggle (local state)
         - Three pricing cards side by side (responsive grid)
         - Each card: plan name, price (monthly or yearly/12), ai_credits_daily ("10/day", "100/day", "Unlimited")
         - Feature list from plan.features JSONB (render as bullet list)
         - CTA button: "Get Started" → links to /checkout?plan={plan.id} for paid plans, /register for free
         - "Most Popular" badge on student plan
         - Current plan highlighted if user is logged in (read token from localStorage via useAuth hook)

      3. apps/buyer/components/pricing/PricingLoading.tsx:
         - Three skeleton cards matching the layout

      RULES:
      - "use client" only on PricingContent (it uses hooks and state)
      - next/link for all navigation, never <a>
      - next/image not needed here (no images)
      - Named exports only
      - Tailwind classes only
      - Commit: feat(buyer): add pricing page with plan comparison and annual/monthly toggle
    test: "cd apps/buyer && pnpm build"

  - id: frontend-checkout-flow
    title: "Checkout flow: Stripe Elements card input, plan selection, confirmation"
    scope: frontend:buyer
    depends_on:
      - frontend-pricing-page
    prompt: |
      Task: Build a checkout page at /checkout in the buyer app that integrates Stripe Elements for card input.

      CONTEXT:
      - Buyer app: apps/buyer/ (Next.js App Router, TypeScript strict, Tailwind CSS)
      - useCreateSubscription() mutation hook available from hooks/use-subscriptions.ts
      - Stripe Elements: use @stripe/react-stripe-js and @stripe/stripe-js
        Install: pnpm add @stripe/react-stripe-js @stripe/stripe-js (in apps/buyer)
      - Route: apps/buyer/app/checkout/page.tsx
      - Auth: use useAuth hook (apps/buyer/hooks/use-auth.ts) — redirect to /login if not authenticated
      - URL param: ?plan=<plan_id> pre-selects the plan

      WHAT TO BUILD:
      1. apps/buyer/app/checkout/page.tsx — Server Component:
         - export const metadata with title="Checkout — EduPlatform"
         - Renders <CheckoutContent /> with Suspense wrapper

      2. apps/buyer/components/checkout/CheckoutContent.tsx — "use client":
         - Reads ?plan from useSearchParams (wrapped in Suspense per Next.js requirement)
         - Shows selected plan summary (name, price) from useSubscriptionPlans()
         - For free plan: no card input, just a "Activate Free Plan" button calling createSubscription({plan_id, payment_method_id: ""})
