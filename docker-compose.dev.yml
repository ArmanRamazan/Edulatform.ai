# DEV: docker compose -f docker-compose.dev.yml up
# Hot reload, volume mounts, debug ports exposed, no monitoring overhead
services:
  identity-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: identity
      POSTGRES_USER: identity
      POSTGRES_PASSWORD: identity
    ports:
      - "5433:5432"
    volumes:
      - identity-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U identity"]
      interval: 5s
      timeout: 3s
      retries: 5

  course-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: course
      POSTGRES_USER: course
      POSTGRES_PASSWORD: course
    ports:
      - "5434:5432"
    volumes:
      - course-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U course"]
      interval: 5s
      timeout: 3s
      retries: 5

  enrollment-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: enrollment
      POSTGRES_USER: enrollment
      POSTGRES_PASSWORD: enrollment
    ports:
      - "5435:5432"
    volumes:
      - enrollment-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U enrollment"]
      interval: 5s
      timeout: 3s
      retries: 5

  payment-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: payment
      POSTGRES_USER: payment
      POSTGRES_PASSWORD: payment
    ports:
      - "5436:5432"
    volumes:
      - payment-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payment"]
      interval: 5s
      timeout: 3s
      retries: 5

  notification-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: notification
      POSTGRES_USER: notification
      POSTGRES_PASSWORD: notification
    ports:
      - "5437:5432"
    volumes:
      - notification-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notification"]
      interval: 5s
      timeout: 3s
      retries: 5

  learning-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: learning
      POSTGRES_USER: learning
      POSTGRES_PASSWORD: learning
    ports:
      - "5438:5432"
    volumes:
      - learning-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U learning"]
      interval: 5s
      timeout: 3s
      retries: 5

  rag-db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: rag
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: rag
    ports:
      - "5439:5432"
    volumes:
      - rag-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  identity:
    build:
      context: .
      dockerfile: deploy/docker/identity.Dockerfile
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgresql://identity:identity@identity-db:5432/identity
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-secret-key
    volumes:
      - ./services/py/identity/app:/app/app
      - ./services/py/identity/migrations:/app/migrations
      - ./libs/py/common/common:/libs/common/common
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload --timeout-graceful-shutdown 10
    depends_on:
      identity-db:
        condition: service_healthy

  course:
    build:
      context: .
      dockerfile: deploy/docker/course.Dockerfile
    ports:
      - "8002:8002"
    environment:
      DATABASE_URL: postgresql://course:course@course-db:5432/course
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-secret-key
    volumes:
      - ./services/py/course/app:/app/app
      - ./services/py/course/migrations:/app/migrations
      - ./libs/py/common/common:/libs/common/common
    command: uvicorn app.main:app --host 0.0.0.0 --port 8002 --reload --timeout-graceful-shutdown 10
    depends_on:
      course-db:
        condition: service_healthy

  enrollment:
    build:
      context: .
      dockerfile: deploy/docker/enrollment.Dockerfile
    ports:
      - "8003:8003"
    environment:
      DATABASE_URL: postgresql://enrollment:enrollment@enrollment-db:5432/enrollment
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-secret-key
    volumes:
      - ./services/py/enrollment/app:/app/app
      - ./services/py/enrollment/migrations:/app/migrations
      - ./libs/py/common/common:/libs/common/common
    command: uvicorn app.main:app --host 0.0.0.0 --port 8003 --reload --timeout-graceful-shutdown 10
    depends_on:
      enrollment-db:
        condition: service_healthy

  payment:
    build:
      context: .
      dockerfile: deploy/docker/payment.Dockerfile
    ports:
      - "8004:8004"
    environment:
      DATABASE_URL: postgresql://payment:payment@payment-db:5432/payment
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-secret-key
    volumes:
      - ./services/py/payment/app:/app/app
      - ./services/py/payment/migrations:/app/migrations
      - ./libs/py/common/common:/libs/common/common
    command: uvicorn app.main:app --host 0.0.0.0 --port 8004 --reload --timeout-graceful-shutdown 10
    depends_on:
      payment-db:
        condition: service_healthy

  notification:
    build:
      context: .
      dockerfile: deploy/docker/notification.Dockerfile
    ports:
      - "8005:8005"
    environment:
      DATABASE_URL: postgresql://notification:notification@notification-db:5432/notification
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-secret-key
    volumes:
      - ./services/py/notification/app:/app/app
      - ./services/py/notification/migrations:/app/migrations
      - ./libs/py/common/common:/libs/common/common
    command: uvicorn app.main:app --host 0.0.0.0 --port 8005 --reload --timeout-graceful-shutdown 10
    depends_on:
      notification-db:
        condition: service_healthy

  ai:
    build:
      context: .
      dockerfile: deploy/docker/ai.Dockerfile
    ports:
      - "8006:8006"
    environment:
      DATABASE_URL: postgresql://unused:unused@localhost:5432/unused
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-secret-key
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.0-flash-lite}
      WS_GATEWAY_URL: http://ws-gateway:8011
    volumes:
      - ./services/py/ai/app:/app/app
      - ./libs/py/common/common:/libs/common/common
    command: uvicorn app.main:app --host 0.0.0.0 --port 8006 --reload --timeout-graceful-shutdown 10
    depends_on:
      redis:
        condition: service_healthy

  ws-gateway:
    build: services/rs/ws-gateway
    ports:
      - "8011:8011"
    environment:
      WS_PORT: 8011
      JWT_SECRET: dev-secret-key
      MAX_CONNECTIONS: 10000
      RUST_LOG: ws_gateway=debug

  learning:
    build:
      context: .
      dockerfile: deploy/docker/learning.Dockerfile
    ports:
      - "8007:8007"
    environment:
      DATABASE_URL: postgresql://learning:learning@learning-db:5432/learning
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-secret-key
    volumes:
      - ./services/py/learning/app:/app/app
      - ./services/py/learning/migrations:/app/migrations
      - ./libs/py/common/common:/libs/common/common
    command: uvicorn app.main:app --host 0.0.0.0 --port 8007 --reload --timeout-graceful-shutdown 10
    depends_on:
      learning-db:
        condition: service_healthy

  rag:
    build:
      context: .
      dockerfile: deploy/docker/rag.Dockerfile
    ports:
      - "8008:8008"
    environment:
      DATABASE_URL: postgresql://rag:rag@rag-db:5432/rag
      JWT_SECRET: dev-secret-key
      EMBEDDING_SERVICE_URL: http://embedding-orchestrator:8009
    volumes:
      - ./services/py/rag/app:/app/app
      - ./services/py/rag/migrations:/app/migrations
      - ./libs/py/common/common:/libs/common/common
    command: uvicorn app.main:app --host 0.0.0.0 --port 8008 --reload --timeout-graceful-shutdown 10
    depends_on:
      rag-db:
        condition: service_healthy

  api-gateway:
    build: services/rs/api-gateway
    ports:
      - "8080:8080"
    environment:
      GATEWAY_PORT: 8080
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-secret-key
      IDENTITY_URL: http://identity:8001
      COURSE_URL: http://course:8002
      ENROLLMENT_URL: http://enrollment:8003
      AI_URL: http://ai:8006
      LEARNING_URL: http://learning:8007
      RAG_URL: http://rag:8008
      NOTIFICATION_URL: http://notification:8005
      PAYMENT_URL: http://payment:8004
      CORS_ORIGINS: http://localhost:3001,http://localhost:3000
      RUST_LOG: api_gateway=debug,tower_http=debug
    depends_on:
      redis:
        condition: service_healthy
      identity:
        condition: service_started

  embedding-orchestrator:
    build: services/rs/embedding-orchestrator
    ports:
      - "8009:8009"
    environment:
      PORT: 8009
      EMBEDDING_API_URL: ${GEMINI_EMBEDDING_URL:-https://generativelanguage.googleapis.com/v1beta/models}
      EMBEDDING_API_KEY: ${GEMINI_API_KEY:-}
      MAX_CONCURRENT_REQUESTS: 50
      RUST_LOG: embedding_orchestrator=debug

  mcp:
    build:
      context: .
      dockerfile: deploy/docker/mcp.Dockerfile
    environment:
      MCP_API_BASE_URL: http://api-gateway:8080
      MCP_AUTH_TOKEN: ${MCP_AUTH_TOKEN:-}
    volumes:
      - ./services/py/mcp/app:/app/app
    depends_on:
      redis:
        condition: service_healthy
    profiles:
      - mcp

  seed:
    build:
      context: .
      dockerfile: deploy/docker/seed.Dockerfile
    environment:
      IDENTITY_DB_URL: postgresql://identity:identity@identity-db:5432/identity
      COURSE_DB_URL: postgresql://course:course@course-db:5432/course
      ENROLLMENT_DB_URL: postgresql://enrollment:enrollment@enrollment-db:5432/enrollment
      PAYMENT_DB_URL: postgresql://payment:payment@payment-db:5432/payment
      NOTIFICATION_DB_URL: postgresql://notification:notification@notification-db:5432/notification
      LEARNING_DB_URL: postgresql://learning:learning@learning-db:5432/learning
      RAG_DB_URL: postgresql://rag:rag@rag-db:5432/rag
    depends_on:
      identity:
        condition: service_started
      course:
        condition: service_started
      enrollment:
        condition: service_started
      payment:
        condition: service_started
      notification:
        condition: service_started
      learning:
        condition: service_started
      rag:
        condition: service_started
    profiles:
      - seed

volumes:
  identity-db-data:
  course-db-data:
  enrollment-db-data:
  payment-db-data:
  notification-db-data:
  learning-db-data:
  rag-db-data:
