syntax = "proto3";
package events.v1;

import "google/protobuf/timestamp.proto";

option java_package = "com.knowledgeos.events.v1";
option go_package = "github.com/knowledgeos/proto/events/v1";

// BadgeEarned is published by the learning service when a badge is awarded
// to a user (e.g. streak milestone, mastery threshold, mission count).
//
// NATS subject: platform.badge.earned
// NATS stream:  PLATFORM_EVENTS
message BadgeEarned {
  string user_id    = 1;
  string org_id     = 2;
  // badge_type maps to the badge identifier defined in the learning service
  // domain (e.g. "streak_7", "mastery_expert", "missions_10").
  string badge_type = 3;
  google.protobuf.Timestamp timestamp = 4;
}
